<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#111; color:#fff; font-family:monospace; font-size:11px; }
#banner {
  width:100%; height:200px;
  background:rgba(8,10,14,0.95);
  border-bottom:3px solid #ff6600;
  position:relative; overflow:hidden;
}
#banner canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
#grid {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:5px; padding:8px;
}
button {
  padding:10px 4px; background:#2a2a2a; color:#fff;
  border:1px solid #444; border-radius:6px;
  font-family:monospace; font-size:11px; cursor:pointer;
}
#info { padding:8px; background:#1a1a1a; border-top:1px solid #333; line-height:1.9; }
</style>
</head>
<body>
 
<div id="banner"><canvas id="c"></canvas></div>
 
<div id="grid">
  <button onclick="adj('scale',-500)">Scale -500</button>
  <button onclick="adj('scale',0)" style="background:#333">Scale: <span id='sv'>3000</span></button>
  <button onclick="adj('scale',500)">Scale +500</button>
 
  <button onclick="adj('floor',-0.1)">Floor ↓</button>
  <button onclick="adj('floor',0)" style="background:#333">Floor: <span id='fv'>0</span></button>
  <button onclick="adj('floor',0.1)">Floor ↑</button>
 
  <button onclick="adj('camY',-0.2)">CamY ↓</button>
  <button onclick="adj('camY',0)" style="background:#333">CamY: <span id='cyv'>0</span></button>
  <button onclick="adj('camY',0.2)">CamY ↑</button>
 
  <button onclick="adj('fov',-5)">FOV -</button>
  <button onclick="adj('fov',0)" style="background:#333">FOV: <span id='fovv'>60</span></button>
  <button onclick="adj('fov',5)">FOV +</button>
 
  <button onclick="adj('camZ',-0.5)">CamZ -</button>
  <button onclick="adj('camZ',0)" style="background:#333">CamZ: <span id='czv'>6</span></button>
  <button onclick="adj('camZ',0.5)">CamZ +</button>
 
  <button onclick="walk()" style="background:#1a3a1a">TEST WALK</button>
  <button onclick="stopWalk()" style="background:#3a1a1a">STOP</button>
  <button onclick="copyVals()" style="background:#1a1a3a">COPY</button>
</div>
 
<div id="info">Cargando...</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const MODEL='https://danielngr.github.io/FORJA/idle.glb';
const WALK_URL='https://danielngr.github.io/FORJA/animations/bot_walk.glb';
 
let V={scale:3000,floor:-1.5,camY:0,fov:60,camZ:6};
let renderer,scene,camera,model,mixer,clock,walkAction,idleAction;
let walkX=0, walkDir=1, walking=false;
 
function upd(){
  document.getElementById('sv').textContent=V.scale;
  document.getElementById('fv').textContent=V.floor.toFixed(2);
  document.getElementById('cyv').textContent=V.camY.toFixed(2);
  document.getElementById('fovv').textContent=V.fov;
  document.getElementById('czv').textContent=V.camZ.toFixed(1);
  if(!model||!camera) return;
  model.scale.setScalar(V.scale);
  model.position.y=V.floor;
  camera.position.set(walkX,V.camY,V.camZ);
  camera.fov=V.fov;
  camera.lookAt(walkX,V.camY,0);
  camera.updateProjectionMatrix();
  document.getElementById('info').innerHTML=
    `scale=${V.scale} | floor=${V.floor.toFixed(2)} | camY=${V.camY.toFixed(2)}<br>`+
    `fov=${V.fov} | camZ=${V.camZ.toFixed(1)}<br>`+
    `→ Ajusta hasta que el robot pise la línea naranja<br>`+
    `→ TEST WALK para ver caminar | COPY para copiar valores`;
}
 
function adj(k,d){
  if(d===0) return;
  V[k]=Math.round((V[k]+d)*100)/100;
  upd();
}
 
function walk(){
  walking=true;
  if(walkAction){ walkAction.reset().play(); }
  if(idleAction) idleAction.stop();
}
function stopWalk(){
  walking=false;
  if(walkAction) walkAction.stop();
  if(idleAction){ idleAction.reset().play(); }
}
 
function copyVals(){
  const txt=`scale=${V.scale} floor=${V.floor.toFixed(2)} camY=${V.camY.toFixed(2)} fov=${V.fov} camZ=${V.camZ.toFixed(1)}`;
  navigator.clipboard&&navigator.clipboard.writeText(txt);
  document.getElementById('info').innerHTML='COPIADO: '+txt;
}
 
function setup(){
  const canvas=document.getElementById('c');
  const W=canvas.offsetWidth, H=200;
  canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
  renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0x000000,0);
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(V.fov,W/H,0.1,500);
  camera.position.set(0,V.camY,V.camZ);
  camera.lookAt(0,V.camY,0);
  scene.add(new THREE.AmbientLight(0xffffff,2));
  const d=new THREE.DirectionalLight(0xffffff,1.5);
  d.position.set(3,5,5); scene.add(d);
  clock=new THREE.Clock();
 
  fetch(MODEL).then(r=>r.arrayBuffer()).then(buf=>{
    new THREE.GLTFLoader().parse(buf,'',(gltf)=>{
      model=gltf.scene;
      model.traverse(c=>{
        if(c.isMesh||c.isSkinnedMesh){
          c.material=new THREE.MeshStandardMaterial({color:0xccbbaa,roughness:0.4,metalness:0.1});
          if(c.isSkinnedMesh) c.material.skinning=true;
        }
      });
      model.scale.setScalar(V.scale);
      model.position.set(0,V.floor,0);
      scene.add(model);
      mixer=new THREE.AnimationMixer(model);
      if(gltf.animations[0]){
        idleAction=mixer.clipAction(gltf.animations[0]);
        idleAction.play();
      }
      // Load walk
      fetch(WALK_URL).then(r=>r.arrayBuffer()).then(buf2=>{
        new THREE.GLTFLoader().parse(buf2,'',(g2)=>{
          if(g2.animations[0]){
            const clip=g2.animations[0];
            // Remove root motion
            clip.tracks=clip.tracks.filter(t=>!t.name.includes('Hips.position'));
            walkAction=mixer.clipAction(clip);
          }
          document.getElementById('info').innerHTML='✓ Listo. Ajusta los controles.';
        });
      });
      animate();
    });
  });
}
 
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  if(mixer) mixer.update(dt);
  if(walking&&model){
    walkX+=walkDir*1.5*dt;
    if(Math.abs(walkX)>4){ walkDir*=-1; model.rotation.y=walkDir>0?0:Math.PI; }
    model.position.set(walkX,V.floor,0);
    camera.position.x=walkX;
    camera.lookAt(walkX,V.camY,0);
  } else if(model){
    model.position.y=V.floor;
  }
  renderer.render(scene,camera);
}
 
window.addEventListener('load',setup);
</script>
</body>
</html>
