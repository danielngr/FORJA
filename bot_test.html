<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { background:#111; color:#fff; font-family:monospace; font-size:12px; }
 
/* Este es el banner — mismo tamaño y estilo que FORJA */
#banner {
  width:100%;
  height:160px;
  background:rgba(8,10,14,0.95);
  border-bottom:3px solid #ff6600;
  position:relative;
  overflow:hidden; /* igual que FORJA */
}
#banner canvas { 
  position:absolute; top:0; left:0; 
  width:100%; height:100%; 
}
 
/* Línea de referencia del "piso" */
#floor-line {
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:rgba(255,100,0,0.5);
  pointer-events:none;
}
 
#controls {
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;
  padding:10px;
}
button {
  padding:10px 4px;
  background:#333; color:#fff;
  border:1px solid #555; border-radius:6px;
  font-family:monospace; font-size:12px;
  cursor:pointer;
}
#info {
  padding:10px;
  background:#1a1a1a;
  border-top:1px solid #333;
  line-height:1.8;
}
</style>
</head>
<body>
 
<div id="banner">
  <canvas id="c"></canvas>
  <div id="floor-line"></div>
</div>
 
<div id="controls">
  <button onclick="adj(-2000)">-2000</button>
  <button onclick="adj(-500)">-500</button>
  <button onclick="adj(500)">+500</button>
  <button onclick="adj(2000)">+2000</button>
  <button onclick="adjFloor(-0.05)">Floor ↓</button>
  <button onclick="adjFloor(0.05)">Floor ↑</button>
  <button onclick="adjFOV(-5)">FOV -</button>
  <button onclick="adjFOV(5)">FOV +</button>
</div>
 
<div id="info">Cargando robot...</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const MODEL = 'https://danielngr.github.io/FORJA/idle.glb';
 
let renderer, scene, camera, model, mixer, clock;
let S = 3500;   // scale — empieza aquí
let FOV = 30;
let CAM_Z = 6;
let FLOOR_Y = -1.0;  // ajustable
let W, H, halfH, MX;
let ready = false;
 
function info(msg) {
  document.getElementById('info').innerHTML = msg;
}
 
function setup() {
  const canvas = document.getElementById('c');
  W = canvas.offsetWidth;
  H = 160;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
 
  renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
 
  scene = new THREE.Scene();
  recalc();
  camera = new THREE.PerspectiveCamera(FOV, W/H, 0.1, 500);
  camera.position.set(0, 0, CAM_Z);
 
  scene.add(new THREE.AmbientLight(0xffffff, 2.0));
  const d = new THREE.DirectionalLight(0xffffff, 1.5);
  d.position.set(2, 5, 5); scene.add(d);
 
  clock = new THREE.Clock();
 
  fetch(MODEL)
    .then(r => r.arrayBuffer())
    .then(buf => {
      new THREE.GLTFLoader().parse(buf, '', gltf => {
        model = gltf.scene;
        model.traverse(c => {
          if(c.isMesh || c.isSkinnedMesh) {
            c.material = new THREE.MeshStandardMaterial({
              color: 0xddccbb, roughness:0.4, metalness:0.1
            });
            if(c.isSkinnedMesh) c.material.skinning = true;
          }
        });
        // SIN animación para ver forma pura
        model.scale.setScalar(S);
        model.position.set(0, FLOOR_Y, 0);
        scene.add(model);
        ready = true;
        update();
        animate();
      });
    });
 
  animate();
}
 
function recalc() {
  halfH = CAM_Z * Math.tan(FOV / 2 * Math.PI / 180);
  MX = halfH * (W/H) * 0.72;
}
 
function update() {
  if(!model) return;
 
  recalc();
  camera.fov = FOV;
  camera.position.z = CAM_Z;
  camera.updateProjectionMatrix();
 
  model.scale.setScalar(S);
  model.position.set(0, FLOOR_Y, 0);
 
  // Medir bounding box real
  const box = new THREE.Box3().setFromObject(model);
  const sz = box.getSize(new THREE.Vector3());
  const pct = sz.y / (halfH * 2) * 100;
 
  info(
    `<b>scale=${S} | FOV=${FOV} | camZ=${CAM_Z}</b><br>` +
    `robot altura: ${sz.y.toFixed(3)}u = <b>${pct.toFixed(0)}% del banner</b><br>` +
    `FLOOR_Y: ${FLOOR_Y.toFixed(3)} | halfH: ${halfH.toFixed(3)}<br>` +
    `Pies Y: ${box.min.y.toFixed(3)} | Cabeza Y: ${box.max.y.toFixed(3)}<br>` +
    `Borde inf frustum: ${(-halfH).toFixed(3)} | Borde sup: ${halfH.toFixed(3)}<br>` +
    `<br>→ Ajusta Scale hasta que llene ~70% del banner<br>` +
    `→ Ajusta Floor hasta que los pies toquen el borde naranja`
  );
}
 
function animate() {
  requestAnimationFrame(animate);
  if(mixer) mixer.update(clock.getDelta());
  renderer.render(scene, camera);
}
 
function adj(d)      { S = Math.max(100, S + d); update(); }
function adjFloor(d) { FLOOR_Y += d; update(); }
function adjFOV(d)   { FOV = Math.max(5, Math.min(120, FOV + d)); update(); }
 
window.addEventListener('load', setup);
</script>
</body>
</html>
