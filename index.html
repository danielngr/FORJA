*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body{overscroll-behavior:none;}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fogIn{from{opacity:0;filter:blur(6px)}to{opacity:1;filter:blur(0)}}
@keyframes pulse{0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.04)}}

let _sb = null, _user = null, _authReady = false;
const _authCbs = [];

function syncDot(state){ // 'syncing'|'ok'|'offline'|'error'
  const d=document.getElementById('forja-sync-dot');
  if(!d)return;
  d.className='forja-sync-dot '+(state==='ok'?'':state);
  d.title=state==='ok'?'Synced':state==='syncing'?'Syncing…':state==='error'?'Sync error':'Offline';
}

function getSB(){
  if(_sb)return _sb;
  if(!window.supabase||FORJA_SUPABASE_URL.includes('YOUR_PROJECT')){syncDot('offline');return null;}
  try{
    _sb=window.supabase.createClient(FORJA_SUPABASE_URL,FORJA_SUPABASE_KEY,{
      auth:{persistSession:true,autoRefreshToken:true}
    });
    _sb.auth.onAuthStateChange((ev,sess)=>{
      _user=sess?.user??null;_authReady=true;
      _authCbs.forEach(cb=>cb(_user));
      syncDot(_user?'ok':'offline');
    });
    _sb.auth.getSession().then(({data:{session}})=>{
      _user=session?.user??null;_authReady=true;
      _authCbs.forEach(cb=>cb(_user));
      syncDot(_user?'ok':'offline');
    });
    return _sb;
  }catch(e){syncDot('error');return null;}
}

async function ensureAuth(){
  const sb=getSB();if(!sb)return null;
  if(_user)return _user;
  if(!_authReady){
    await new Promise(res=>{
      const t=setTimeout(()=>res(),3000);
      _authCbs.push(u=>{clearTimeout(t);res(u);});
    });
    if(_user)return _user;
  }
  const{data,error}=await sb.auth.signInAnonymously();
  if(!error){_user=data.user;syncDot('ok');return _user;}
  syncDot('error');return null;
}

// Auto-compute weekly muscle volume from logs
function computeWeeklyMuscleVol(logs,routine){
  const today=new Date();
  const dow=today.getDay();const daysToMon=dow===0?6:dow-1;
  const ws=new Date(today);ws.setDate(today.getDate()-daysToMon);ws.setHours(0,0,0,0);
  const weekStr=ws.toISOString().slice(0,10);
  const mv={};
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{
      if(e.d<weekStr)return;
      let nm=id;
      if(routine)routine.forEach(d=>{if(!d)return;(d.ex||[]).forEach(ex=>{if(ex.id===id)nm=ex.e;});});
      const md=EXERCISE_MUSCLE_MAP[nm?.toLowerCase()?.trim()];
      if(!md)return;
      const vol=(+e.w||0)*(+e.r||0);if(vol<=0)return;
      md.p.forEach(m=>{mv[m]=(mv[m]||0)+vol;});
      md.s.forEach(m=>{mv[m]=(mv[m]||0)+vol*0.20;});
    });
  });
  return mv;
}

// ── Hybrid store: instant localStorage + async Supabase ──────
const FStore={
  async saveProfile(profile,routine){
    try{localStorage.setItem('fv8p',JSON.stringify(profile));}catch(_){}
    try{localStorage.setItem('fv8r',JSON.stringify(routine));}catch(_){}
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return;
    syncDot('syncing');
    try{
      await sb.from('user_profiles').upsert({
        user_id:user.id,profile_data:profile,routine_data:routine,
        updated_at:new Date().toISOString()
      },{onConflict:'user_id'});
      syncDot('ok');
    }catch(e){syncDot('error');}
  },

  async loadProfile(){
    try{
      const p=localStorage.getItem('fv8p');const r=localStorage.getItem('fv8r');
      if(p)return{profile:JSON.parse(p),routine:r?JSON.parse(r):null};
    }catch(_){}
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return null;
    syncDot('syncing');
    const{data}=await sb.from('user_profiles').select('profile_data,routine_data').eq('user_id',user.id).single();
    if(data){
      try{localStorage.setItem('fv8p',JSON.stringify(data.profile_data));}catch(_){}
      try{localStorage.setItem('fv8r',JSON.stringify(data.routine_data));}catch(_){}
      syncDot('ok');
      return{profile:data.profile_data,routine:data.routine_data};
    }
    return null;
  },

  async saveLogs(logs){
    try{localStorage.setItem('fv8l',JSON.stringify(logs));}catch(_){}
    // Note: individual log entries are saved via saveLogEntry for Supabase
  },

  async saveLogEntry(exerciseId,exerciseName,weightKg,reps,rm){
    const today=new Date().toISOString().slice(0,10);
    try{
      const raw=localStorage.getItem('fv8l');
      const logs=raw?JSON.parse(raw):{};
      if(!logs[exerciseId])logs[exerciseId]=[];
      logs[exerciseId]=[{d:today,w:weightKg,r:reps,rm},...logs[exerciseId]].slice(0,60);
      localStorage.setItem('fv8l',JSON.stringify(logs));
    }catch(_){}
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return;
    syncDot('syncing');
    try{
      await sb.from('exercise_logs').insert({
        user_id:user.id,exercise_id:exerciseId,exercise_name:exerciseName,
        logged_at:today,weight_kg:weightKg,reps:reps,estimated_1rm:rm
      });
      syncDot('ok');
    }catch(e){syncDot('error');}
  },

  async loadLogs(){
    try{const raw=localStorage.getItem('fv8l');if(raw)return JSON.parse(raw);}catch(_){}
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return{};
    syncDot('syncing');
    try{
      const{data}=await sb.from('exercise_logs')
        .select('exercise_id,logged_at,weight_kg,reps,estimated_1rm')
        .eq('user_id',user.id).order('logged_at',{ascending:false}).limit(1000);
      if(!data)return{};
      const logs={};
      data.forEach(row=>{
        if(!logs[row.exercise_id])logs[row.exercise_id]=[];
        logs[row.exercise_id].push({d:row.logged_at,w:row.weight_kg,r:row.reps,rm:row.estimated_1rm});
      });
      try{localStorage.setItem('fv8l',JSON.stringify(logs));}catch(_){}
      syncDot('ok');return logs;
    }catch(e){syncDot('error');return{};}
  },

  async saveSession(dayLabel,exercises,durationSecs){
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return null;
    syncDot('syncing');
    const today=new Date().toISOString().slice(0,10);
    const exData=exercises.map(ex=>({
      id:ex.id,name:ex.e,
      muscles_primary:(EXERCISE_MUSCLE_MAP[ex.e?.toLowerCase()]?.p||[]),
      muscles_secondary:(EXERCISE_MUSCLE_MAP[ex.e?.toLowerCase()]?.s||[])
    }));
    try{
      const{data,error}=await sb.from('sessions').insert({
        user_id:user.id,session_date:today,day_label:dayLabel,
        exercises:exData,duration_seconds:durationSecs
      }).select('id').single();
      syncDot('ok');return data?.id||null;
    }catch(e){syncDot('error');return null;}
  },

  saveDone(weekKey,done){
    try{localStorage.setItem(`fv8d:${weekKey}`,JSON.stringify(done));}catch(_){}
  },
  loadDone(weekKey){
    try{const r=localStorage.getItem(`fv8d:${weekKey}`);return r?JSON.parse(r):{};}catch(_){return{};}
  },
  saveMacros(dateKey,macros){
    try{localStorage.setItem(`fv8m:${dateKey}`,JSON.stringify(macros));}catch(_){}
  },
  loadMacros(dateKey){
    try{const r=localStorage.getItem(`fv8m:${dateKey}`);return r?JSON.parse(r):{};}catch(_){return{};}
  }
};

// Adapta reps/series según objetivo
function applyGoal(ex,goal){
  let s=ex.s,r=ex.r;
  if(goal==="strength"){s=Math.min(ex.s+1,5);r=ex.rs;}
  else if(goal==="lose"){s=Math.max(ex.s-1,3);r=ex.rc;}
  else if(goal==="recomp"){r=ex.rr;}
  else if(goal==="general"){s=Math.max(ex.s-1,3);r=ex.rg;}
  return{e:ex.e,s,r};
}

// Equipment a substitute exercise needs (if not in CELEB_EQ_NEEDS, assume bodyweight)
const CELEB_SUB_EQ={
  "Press banca mancuerna":["bench","dumbbells"],"Flexiones lastradas":["weight_vest"],
  "Press inclinado mancuerna":["bench","dumbbells"],"Press Arnold":["dumbbells"],
  "Press hombro mancuerna":["dumbbells"],"Sentadilla goblet":["dumbbells"],
  "Sentadilla mancuerna":["dumbbells"],"Peso muerto mancuerna":["dumbbells"],
  "Peso muerto rumano mancuerna":["dumbbells"],"Remo con mancuerna":["dumbbells"],
  "Curl mancuerna":["dumbbells"],"Tríceps mancuerna":["dumbbells"],
  "Fondos entre bancos":["bench"],"Dominadas agarre supino":["pull_up_bar"],
  "Pájaros":["dumbbells"],"Aperturas":["bench","dumbbells"],
  "Laterales posteriores mancuerna":["dumbbells"],"Buenos días":["rack"],
};

function canDo(exName, eq){
  const needed = CELEB_EQ_NEEDS[exName];
  if(needed===undefined) return true;
  if(needed.length===0) return true;
  return needed.every(e=>eq.includes(e));
}

// Map UI equipment names → internal keys used by CELEB_EQ_NEEDS
const EQ_MAP={
  "Rack+Barra":"rack","Banco":"bench","Mancuernas":"dumbbells",
  "Dominadas":"pull_up_bar","Paralelas":"dip_bar","Barra Z/EZ":"ez_bar",
  "Leg Ext/Curl":"leg_extension","Polea":"cable_machine",
  "Chaleco":"weight_vest","Kettlebell":"kettlebell","Bandas":"bands",
  // also accept internal keys directly
  "rack":"rack","bench":"bench","dumbbells":"dumbbells","pull_up_bar":"pull_up_bar",
  "dip_bar":"dip_bar","ez_bar":"ez_bar","leg_extension":"leg_extension",
  "cable_machine":"cable_machine","weight_vest":"weight_vest"
};

function normEq(userEquipment){
  return userEquipment.map(e=>EQ_MAP[e]||e);
}

function adaptExercise(exName, userEquipment){
  const eq = normEq(userEquipment);
  if(canDo(exName, eq)) return exName;
  const subs = CELEB_SUBS[exName]||[];
  for(const sub of subs){
    const subNeeds = CELEB_SUB_EQ[sub]||[];
    if(subNeeds.length===0||subNeeds.every(e=>eq.includes(e))) return sub;
  }
  return "Flexiones";
}

function buildRoutine7(splits,selectedDays,goal){
  const r=Array(7).fill(null);
  const adapted=splits.map(d=>({...d,ex:d.ex.map(e=>applyGoal(e,goal))}));
  // Para 5beg: secuencia A B A B A
  const seq=adapted.length===2
    ?[adapted[0],adapted[1],adapted[0],adapted[1],adapted[0]].slice(0,selectedDays.length)
    :adapted.slice(0,selectedDays.length);
  selectedDays.forEach((dayIdx,i)=>{
    if(seq[i])r[dayIdx]={...seq[i],ex:seq[i].ex.map((x,j)=>({...x,id:`${dayIdx}${j}`}))};
  });
  return r;
}

    "dumbbell curl":{"p":["bíceps braquial"],"s":["braquial", "braquiorradial"],"diff":"beginner","mec":"isolation","force":"pull","steps":["De pie, mancuernas a los lados con palmas hacia adelante.", "Flexiona los codos subiendo las mancuernas hacia los hombros alternando o juntas.", "Baja de forma controlada."]},
    "hammer curl":{"p":["braquial"],"s":["bíceps braquial", "braquiorradial"],"diff":"beginner","mec":"isolation","force":"pull","steps":["De pie, mancuernas en agarre neutro (pulgares arriba).", "Flexiona los codos subiendo las mancuernas sin rotar las muñecas.", "Baja de forma controlada."]},
    "concentration curl":{"p":["bíceps braquial (cabeza larga)"],"s":["braquial"],"diff":"beginner","mec":"isolation","force":"pull","steps":["Sentado, codo apoyado en el interior del muslo.", "Flexiona el codo subiendo la mancuerna hacia el hombro sin mover el brazo.", "Baja de forma controlada."]},
    "preacher curl":{"p":["bíceps braquial (cabeza corta)"],"s":["braquial"],"diff":"beginner","mec":"isolation","force":"pull","steps":["Brazos apoyados en el pad inclinado, agarre supinado.", "Flexiona los codos llevando la barra hacia los hombros.", "Baja de forma controlada sin llegar a la extensión total para mantener tensión."]},
    "reverse curl":{"p":["braquiorradial"],"s":["bíceps braquial", "braquial"],"diff":"beginner","mec":"isolation","force":"pull","steps":["Agarre pronado (palmas abajo) en barra o mancuernas.", "Flexiona los codos subiendo la barra manteniendo las muñecas rectas.", "Baja de forma controlada."]},
    "tricep pushdown":{"p":["tríceps braquial"],"s":["anconeo"],"diff":"beginner","mec":"isolation","force":"push","steps":["Polea alta con barra recta o en V. Codos fijos al costado.", "Extiende los codos hacia abajo hasta la posición completamente recta.", "Regresa controladamente sin que los codos se alejen del cuerpo."]},
    "overhead tricep extension":{"p":["tríceps braquial (cabeza larga)"],"s":["anconeo"],"diff":"beginner","mec":"isolation","force":"push","steps":["De pie o sentado. Mancuerna o barra sobre la cabeza con codos apuntando al techo.", "Baja el peso detrás de la cabeza flexionando solo los codos.", "Extiende hasta la posición inicial sin mover los codos."]},
    "skull crusher":{"p":["tríceps braquial"],"s":["anconeo"],"diff":"intermediate","mec":"isolation","force":"push","steps":["Acostado en banco. Barra sobre el pecho con agarre cerrado.", "Baja la barra hacia la frente flexionando solo los codos.", "Extiende los codos volviendo a la posición inicial."]},
    "bench dips":{"p":["tríceps braquial"],"s":["deltoides anterior", "pectoral"],"diff":"beginner","mec":"compound","force":"push","steps":["Manos en el borde del banco, pies en el suelo o en otro banco.", "Baja flexionando los codos hasta 90°, torso erguido.", "Empuja hasta extender los codos."]},
    "close grip bench press":{"p":["tríceps braquial"],"s":["pectoral mayor", "deltoides anterior"],"diff":"intermediate","mec":"compound","force":"push","steps":["Barra con agarre cerrado (ancho de hombros). Acostado en banco plano.", "Baja la barra al pecho bajo manteniendo los codos cerca del cuerpo.", "Empuja hasta la extensión completa."]},
    "diamond push ups":{"p":["tríceps braquial"],"s":["pectoral mayor", "deltoides anterior"],"diff":"intermediate","mec":"compound","force":"push","steps":["Manos en posición de diamante debajo del pecho.", "Baja manteniendo los codos apuntando hacia atrás.", "Empuja hasta extender completamente."]},
    "plank":{"p":["core (transverso abdominal)"],"s":["recto abdominal", "glúteo", "erectores espinales"],"diff":"beginner","mec":"isolation","force":"static","steps":["Posición de flexión en antebrazos. Cuerpo en línea recta de cabeza a talones.", "Aprieta el abdomen y glúteos. No dejes caer las caderas ni elevarlas.", "Mantén la posición el tiempo indicado respirando de forma constante."]},
    "hanging knee raises":{"p":["recto abdominal (inferior)"],"s":["flexores de cadera", "oblicuos"],"diff":"intermediate","mec":"isolation","force":"pull","steps":["Cuelga de una barra con agarre al ancho de hombros.", "Flexiona las caderas y rodillas subiendo las rodillas hacia el pecho.", "Baja de forma controlada sin balancearte."]},
    "machine crunch":{"p":["recto abdominal"],"s":["oblicuos"],"diff":"beginner","mec":"isolation","force":"pull","steps":["Ajusta el pad sobre los hombros o pecho. Pies planos en el suelo.", "Flexiona el torso hacia adelante apretando el abdomen.", "Regresa controladamente sin perder la tensión."]},
    "mountain climber":{"p":["core"],"s":["deltoides", "flexores de cadera", "cuádriceps"],"diff":"beginner","mec":"compound","force":"static","steps":["Posición de plancha alta con brazos extendidos.", "Lleva una rodilla al pecho de forma explosiva alternando piernas.", "Mantén las caderas niveladas y el core apretado durante todo el movimiento."]},
};


function WorkoutScreen({day,sel,done,logs,onToggle,onSaveLog,t,lang,profile,onBack}){
  const exs=day.ex;
  const C2={bg:"#383e4e",bgD:"#2c3040",card:"#424858",border:"#525a6e",borderL:"#4a5264",
    tx:"#F0F2F5",tx2:"#C8CDD8",tx3:"#7a8294",
    green:"#5faa88",blue:"#6a8fc0",yellow:"#c0a870",red:"#d96060",purple:"#8878c0",white:"#FFFFFF"};

  // ── Per-exercise sets state: [{kg,rp,done}] ──
  const[sets,setSets]=useState(()=>exs.map(ex=>{
    const h=logs[ex.id];
    const numSets=ex.s||1;
    return Array.from({length:numSets},(_,si)=>{
      const kg=h&&h[si]?String(h[si].w):h&&h[0]?String(h[0].w):"";
      const rp=h&&h[si]?String(h[si].r):h&&h[0]?String(h[0].r):"";
      return {kg,rp,done:false};
    });
  }));
  const[notes,setNotes]=useState({});
  const[noteOpen,setNoteOpen]=useState(null); // ei
  const[techOpen,setTechOpen]=useState(null); // ei para panel de técnica
  const[noteText,setNoteText]=useState("");
  const[npOpen,setNpOpen]=useState(null); // {ei,si,field}
  const[npVal,setNpVal]=useState("0");
  const[arcPopOpen,setArcPopOpen]=useState(false);

  // ── Rest timer ──
  const[restSecs,setRestSecs]=useState(0);
  const[restDur,setRestDur]=useState(90);
  const[restActive,setRestActive]=useState(false);
  const[restCtx,setRestCtx]=useState(null);
  const restRef=useRef(null);

  // ── Session timer ──
  const[sessSecs,setSessSecs]=useState(0);
  const[finalSecs,setFinalSecs]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setSessSecs(s=>s+1),1000);return()=>clearInterval(t);},[]);

  // ── Rest countdown ──
  useEffect(()=>{
    if(restActive&&restSecs>0){
      restRef.current=setTimeout(()=>setRestSecs(s=>s-1),1000);
    } else if(restActive&&restSecs===0){
      setRestActive(false);
      // Vibrar al terminar (mobile)
      if(navigator.vibrate) navigator.vibrate([100,50,100]);
      // Beep de audio
      try{
        const ac=new(window.AudioContext||window.webkitAudioContext)();
        [0,0.15,0.30].forEach(t=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.frequency.value=880;g.gain.setValueAtTime(.3,ac.currentTime+t);
          g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+t+.12);
          o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.12);
        });
      }catch(e){}
      try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}
      if(restCtx) highlightNext(restCtx.ei,restCtx.si);
    }
    return()=>clearTimeout(restRef.current);
  },[restActive,restSecs]);

  // ── Adaptive rest ──
  function calcRest(ei,si){
    const s=sets[ei][si];
    const ex=exs[ei];
    const h=logs[ex.id];
    const prevKg=h&&h[0]?+h[0].w:0;
    const curKg=+s.kg||0;
    if(curKg>prevKg&&prevKg>0)return{dur:120,msg:lang==="es"?"NUEVO PESO · 2 MIN":"NEW WEIGHT · 2 MIN"};
    if(+s.rp>12)return{dur:60,msg:lang==="es"?"REPS ALTAS · 60S":"HIGH REPS · 60S"};
    if(curKg>0&&curKg<prevKg)return{dur:60,msg:lang==="es"?"MENOS PESO · 60S":"LESS WEIGHT · 60S"};
    return{dur:90,msg:""};
  }

  function startRest(ei,si){
    const{dur}=calcRest(ei,si);
    setRestDur(dur);setRestSecs(dur);setRestActive(true);setRestCtx({ei,si});
  }
  function skipRest(){setRestActive(false);setRestSecs(0);if(restCtx)highlightNext(restCtx.ei,restCtx.si);}

  // ── Highlight next set ──
  function highlightNext(ei,si){
    const nextSi=sets[ei].findIndex((s,i)=>i>si&&!s.done);
    let id=null;
    if(nextSi!==-1) id=`setrow-${ei}-${nextSi}`;
    else{
      for(let e2=ei+1;e2<exs.length;e2++){
        const ns=sets[e2].findIndex(s=>!s.done);
        if(ns!==-1){id=`setrow-${e2}-${ns}`;
          const vidEl2=document.getElementById(`vid-${e2}`);
          if(vidEl2) vidEl2.scrollIntoView({behavior:'smooth',block:'start'});
          break;}
      }
    }
    if(id){
      const el=document.getElementById(id);
      if(el){el.classList.add('next-pulse');setTimeout(()=>el.classList.remove('next-pulse'),3600);}
    }
  }

  // ── Toggle set done ──
  function toggleDone(ei,si){
    const ns=sets.map((e,i)=>i!==ei?e:e.map((s,j)=>j!==si?s:{...s,done:!s.done}));
    setSets(ns);
    const s=sets[ei][si];
    if(!s.done){
      // Haptic
      try{navigator.vibrate&&navigator.vibrate(40);}catch{}
      // Save log
      onSaveLog(exs[ei].id,ns[ei][si].kg,ns[ei][si].rp,exs[ei].e);
      onToggle(exs[ei].id);
      // Rest
      startRest(ei,si);
    }
    // Check all done
    const allDone=ns.every(e=>e.every(s=>s.done));
    if(allDone) setTimeout(()=>{setFinalSecs(sessSecs);setAllDone(true);FStore.saveSession(day&&day.l,exs,sessSecs);},700);
  }

  function addSet(ei){
    const last=sets[ei][sets[ei].length-1];
    setSets(sets.map((e,i)=>i!==ei?e:[...e,{kg:last.kg,rp:last.rp,done:false}]));
  }

  // ── Completion ──
  const[allDone,setAllDone]=useState(false);
  const totalSets=sets.reduce((a,e)=>a+e.length,0);
  const doneSets=sets.reduce((a,e)=>a+e.filter(s=>s.done).length,0);

  // ── Numpad ──
  function openNp(ei,si,field){
    const v=field==='kg'?sets[ei][si].kg:sets[ei][si].rp;
    setNpVal(v||"0");setNpOpen({ei,si,field});
  }
  function npKey(k){
    setNpVal(v=>{
      if(k==='⌫')return v.slice(0,-1)||'0';
      if(k==='.'&&v.includes('.'))return v;
      if(v==='0'&&k!=='.')return k;
      if(v.length>=6)return v;
      return v+k;
    });
  }
  function npOk(){
    if(npOpen){
      const{ei,si,field}=npOpen;
      setSets(sets.map((e,i)=>i!==ei?e:e.map((s,j)=>j!==si?s:
        field==='kg'?{...s,kg:npVal}:{...s,rp:npVal}
      )));
    }
    setNpOpen(null);
  }
  function npAdj(d){
    const cur=parseFloat(npVal)||0;
    const nv=Math.max(0,cur+d);
    setNpVal(nv%1===0?String(nv):nv.toFixed(1));
  }

  // ── Vol per exercise ──
  function calcVol(ei){
    return sets[ei].filter(s=>s.done).reduce((sum,s)=>{
      const kg=typeof s.kg==='string'?parseFloat(s.kg)||0:+s.kg||0;
      const rp=+s.rp||0;
      return sum+kg*rp;
    },0);
  }

  // ── Arc values ──
  const arcPct=restActive?(restSecs/restDur):Math.min(sessSecs/3600,1);
  const arcOffset=ARC_C*(1-arcPct);
  const arcColor=restActive?(restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.blue):"rgba(82,90,110,.4)";
  const arcNumStr=restActive?
    (Math.floor(restSecs/60)+':'+(restSecs%60<10?'0':'')+(restSecs%60)):
    ((sessSecs<3600)?((Math.floor(sessSecs/60)<10?'0':'')+Math.floor(sessSecs/60)+':'+(sessSecs%60<10?'0':'')+sessSecs%60):"59:59");
  const arcNumColor=restActive?(restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.tx):C2.tx3;

  const fmtSess=()=>{const s=allDone?finalSecs:sessSecs;const m=Math.floor(s/60),sec=s%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;};

  // ── msgs must be outside conditional — React rules of hooks ──
  const celebMsgs=lang==="es"?["¡Lo aplastaste hoy!","¡Brutal, crack!","¡Sesión completada!"]:["You crushed it!","Absolutely brutal!","Session complete!"];
  const[celebMsg]=useState(()=>celebMsgs[Math.floor(Math.random()*celebMsgs.length)]);

  // Pre-generate confetti so it's stable
  const[confettiPieces]=useState(()=>{
    const colors=["#5faa88","#6a8fc0","#c0a870","#8878c0","#F0F2F5","#d96060","#f0c040","#60d0d9"];
    return Array.from({length:80},(_,i)=>{
      const sz=3+Math.random()*7;
      const isRect=i%3===0;
      return{
        left:Math.random()*100,
        // Start spread across full screen height, animation moves up
        top:10+Math.random()*90,
        w:isRect?sz*1.8:sz, h:sz,
        br:isRect?2:sz/2,
        bg:colors[Math.floor(Math.random()*colors.length)],
        rot:Math.random()*360,
        dur:1.0+Math.random()*1.8,
        delay:Math.random()*2.0,
        op:0.7+Math.random()*0.3,
      };
    });
  });

  // ── Completion screen ──
  if(allDone){
    const confettiColors=["#5faa88","#6a8fc0","#c0a870","#8878c0","#F0F2F5","#d96060"];
    return(
      <div style={{position:"fixed",inset:0,background:C2.bgD,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"sans-serif",overflow:"hidden"}}>
        {/* Confetti — 80 pieces, full screen */}
        <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
          {confettiPieces.map((p,i)=>(
            <div key={i} style={{
              position:"absolute",
              left:`${p.left}%`,
              top:`${p.top}%`,
              width:p.w, height:p.h,
              borderRadius:p.br,
              background:p.bg,
              transform:`rotate(${p.rot}deg)`,
              animation:`floatUp ${p.dur}s ease-out ${p.delay}s infinite`,
              opacity:p.op,
            }}/>
          ))}
        </div>
        <div style={{width:88,height:88,borderRadius:"50%",background:C2.green,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 48px ${C2.green}55`,marginBottom:22,animation:"celebrate .6s cubic-bezier(.34,1.56,.64,1) both"}}>
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M7 20L16 29L33 11" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:C2.tx,textAlign:"center",padding:"0 32px",animation:"fu .5s .25s both"}}>{celebMsg}</div>
        <div style={{fontFamily:"'SF Mono','Courier New',monospace",fontSize:9,color:C2.tx3,letterSpacing:2,marginTop:8,animation:"fu .5s .4s both"}}>
          {lang==="es"?"EL TRABAJO DE HOY FORJA EL ATLETA DE MAÑANA":"TODAY'S WORK BUILDS TOMORROW'S ATHLETE"}
        </div>
        <div style={{display:"flex",gap:24,marginTop:28,animation:"fu .5s .55s both"}}>
          {[{v:exs.length,l:lang==="es"?"EJERCICIOS":"EXERCISES",c:C2.tx},
            {v:doneSets,l:lang==="es"?"SERIES":"SETS",c:C2.green},
            {v:fmtSess(),l:lang==="es"?"DURACIÓN":"DURATION",c:C2.blue}
          ].map((stat,i)=>(
            <React.Fragment key={i}>
              {i>0&&<div style={{width:1,background:C2.borderL}}/>}
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color:stat.c}}>{stat.v}</div>
                <div style={{fontFamily:"'SF Mono','Courier New',monospace",fontSize:8,color:C2.tx3,letterSpacing:2,marginTop:3}}>{stat.l}</div>
              </div>
            </React.Fragment>
          ))}
        </div>
        <button onClick={onBack} style={{marginTop:36,padding:"14px 42px",background:C2.tx,color:C2.bgD,border:"none",borderRadius:12,fontFamily:"'SF Mono','Courier New',monospace",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",animation:"fu .5s .7s both"}}>
          {lang==="es"?"← VOLVER":"← BACK"}
        </button>
      </div>
    );
  }

  const mono="'SF Mono','Fira Code','Courier New',monospace";
  const sans="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif";

  return(
    <div style={{position:"fixed",inset:0,background:C2.bg,display:"flex",flexDirection:"column",fontFamily:sans,overflow:"hidden"}}>

      {/* ── REST OVERLAY ── */}
      {restActive&&(
        <div style={{
          position:"fixed",inset:0,zIndex:200,
          background:"rgba(12,15,24,0.97)",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          animation:"fogIn .2s ease",
        }}>
          {/* Contexto de qué ejercicio/serie */}
          {restCtx&&(
            <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:3,textTransform:"uppercase",marginBottom:20}}>
              {sets[restCtx.ei]&&exs[restCtx.ei]?.e} — {lang==="es"?"SERIE":"SET"} {restCtx.si+1}
            </div>
          )}

          {/* Círculo grande con countdown */}
          <div style={{position:"relative",width:220,height:220,marginBottom:32}}>
            <svg viewBox="0 0 220 220" width="220" height="220" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
              <circle cx="110" cy="110" r="95" fill="none" stroke="rgba(82,90,110,.2)" strokeWidth="6"/>
              <circle cx="110" cy="110" r="95" fill="none"
                stroke={restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.blue}
                strokeWidth="6" strokeLinecap="round"
                strokeDasharray={2*Math.PI*95}
                strokeDashoffset={2*Math.PI*95*(1-restSecs/restDur)}
                style={{transition:"stroke .5s, stroke-dashoffset .9s linear"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
              <div style={{
                fontSize:restSecs>=60?52:64,fontWeight:900,fontFamily:mono,
                color:restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.tx,
                lineHeight:1,letterSpacing:-2,transition:"color .5s",
              }}>
                {Math.floor(restSecs/60)>0?
                  (Math.floor(restSecs/60)+':'+(restSecs%60<10?'0':'')+restSecs%60):
                  restSecs
                }
              </div>
              <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:3}}>
                {lang==="es"?"DESCANSO":"REST"}
              </div>
            </div>
          </div>

          {/* Selector de duración rápida */}
          <div style={{display:"flex",gap:8,marginBottom:32}}>
            {[30,60,90,120,180].map(s=>(
              <button key={s} onClick={()=>{setRestDur(s);setRestSecs(s);}} style={{
                padding:"7px 12px",borderRadius:20,fontFamily:mono,fontSize:10,letterSpacing:1,cursor:"pointer",
                border:`1px solid ${restDur===s?"rgba(106,143,192,.6)":"rgba(82,90,110,.4)"}`,
                background:restDur===s?"rgba(106,143,192,.12)":"transparent",
                color:restDur===s?C2.blue:C2.tx3,transition:"all .15s",
              }}>{s<60?s+"s":s/60+"m"}</button>
            ))}
          </div>

          {/* Botones de acción */}
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>{setRestSecs(r=>Math.min(r+15,restDur));}} style={{
              padding:"12px 20px",borderRadius:12,border:"1px solid rgba(82,90,110,.4)",
              background:"transparent",color:C2.tx3,fontFamily:mono,fontSize:11,letterSpacing:1,cursor:"pointer",
            }}>+15s</button>
            <button onClick={skipRest} style={{
              padding:"12px 28px",borderRadius:12,border:"none",
              background:C2.tx,color:C2.bgD,fontFamily:mono,fontSize:12,letterSpacing:2,
              fontWeight:700,cursor:"pointer",
            }}>{lang==="es"?"SALTAR":"SKIP"}</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px 12px",flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C2.tx3,fontFamily:mono,fontSize:11,letterSpacing:1.5,cursor:"pointer",padding:0}}>
          ← {lang==="es"?"VOLVER":"BACK"}
        </button>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <div style={{fontFamily:mono,fontSize:10,color:C2.tx2,letterSpacing:3,fontWeight:600}}>{day.l}</div>
          <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:1}}>
            {doneSets}/{totalSets} {lang==="es"?"series":"sets"}
          </div>
        </div>
        {/* Arc clock */}
        <div style={{position:"relative",width:44,height:44,cursor:"pointer",flexShrink:0}} onClick={()=>setArcPopOpen(p=>!p)}>
          <svg viewBox="0 0 44 44" width="44" height="44" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
            <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(82,90,110,.3)" strokeWidth="2.5"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke={arcColor} strokeWidth="2.5"
              strokeDasharray={ARC_C} strokeDashoffset={arcOffset}

                      style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}

                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 45%,rgba(44,48,64,.85) 100%)",pointerEvents:"none"}}/>
                <div style={{position:"absolute",top:12,left:16,fontFamily:mono,fontSize:9,color:"rgba(255,255,255,.3)",letterSpacing:2}}>FORJA</div>

              <div style={{padding:"14px 20px 0"}}>
                <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:2,marginBottom:4}}>

                {/* Note preview */}
                {notes[ei]&&(
                  <div style={{fontFamily:mono,fontSize:9,color:C2.yellow,letterSpacing:.5,marginTop:4,opacity:.7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>

              </div>

              {/* Sets table */}
              <div style={{padding:"10px 20px 0"}}>
                {/* Header */}

                    <span key={i} style={{fontFamily:mono,fontSize:8,color:C2.tx3,letterSpacing:2,textAlign:i===0?"left":"center"}}>{h}</span>
                  ))}
                </div>
                {sets[ei].map((s,si)=>{
                  // Suggestion arrow
                  const curKg=parseFloat(s.kg)||0;
                  const pKg=prevKg?+prevKg:null;
                  const suggest=pKg&&si===0?(curKg>pKg?"↑":curKg===pKg?"=":"↓"):null;
                  const suggestColor=suggest==="↑"?C2.green:suggest==="↓"?C2.yellow:C2.tx3;

                  return(
                    <div key={si} id={`setrow-${ei}-${si}`}
                      style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 44px",
                        alignItems:"stretch",minHeight:50,
                        borderBottom:si<sets[ei].length-1?"1px solid rgba(82,90,110,.2)":"none",

                      {/* KG */}
                      <div onClick={()=>openNp(ei,si,'kg')} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,cursor:"pointer",borderLeft:"1px solid rgba(82,90,110,.2)",padding:"4px 0",position:"relative"}}>
                        {suggest&&<span style={{position:"absolute",top:4,right:4,fontFamily:mono,fontSize:7,color:suggestColor,opacity:.7}}>{suggest}</span>}
                        <div style={{fontSize:18,fontWeight:900,color:s.done?C2.green:C2.tx,letterSpacing:-.5,lineHeight:1}}>{s.kg||"—"}</div>
                        <div style={{fontFamily:mono,fontSize:7,color:C2.tx3,letterSpacing:1.5}}>KG</div>
                      </div>
                      {/* REPS — locked for celebrity challenges */}
                      {profile?.mode==="celebrity"?(
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,borderLeft:"1px solid rgba(82,90,110,.2)",padding:"4px 0",cursor:"default"}}>
                          <div style={{fontSize:14,fontWeight:900,color:s.done?C2.green:"rgba(240,242,245,.4)",letterSpacing:-.5,lineHeight:1,letterSpacing:0}}>{exs[ei].r||"—"}</div>
                          <div style={{fontFamily:mono,fontSize:7,color:"rgba(240,168,24,.5)",letterSpacing:1.5}}>REPS 🔒</div>
                        </div>
                      ):(
                        <div onClick={()=>openNp(ei,si,'rp')} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,cursor:"pointer",borderLeft:"1px solid rgba(82,90,110,.2)",padding:"4px 0"}}>
                          <div style={{fontSize:18,fontWeight:900,color:s.done?C2.green:C2.tx,letterSpacing:-.5,lineHeight:1}}>{s.rp||"—"}</div>
                          <div style={{fontFamily:mono,fontSize:7,color:C2.tx3,letterSpacing:1.5}}>REPS</div>
                        </div>
                      )}
                      {/* CHECK */}
                      <div onClick={()=>toggleDone(ei,si)} style={{display:"flex",alignItems:"center",justifyContent:"center",borderLeft:"1px solid rgba(82,90,110,.2)",cursor:"pointer"}}>
                        <div id={`chkring-${ei}-${si}`} style={{width:26,height:26,borderRadius:"50%",border:`1.5px solid ${s.done?C2.green:C2.borderL}`,background:s.done?C2.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .18s"}}>
                          {s.done&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L5 9.5L10 3" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                        </div>
                      </div>
                    </div>
                  );
                })}
                {profile?.mode!=="celebrity"&&(
                  <button onClick={()=>addSet(ei)}
                    style={{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",padding:"11px 0",border:"none",background:"transparent",cursor:"pointer",fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:2}}>
                    + {lang==="es"?"AGREGAR SERIE":"ADD SET"}
                  </button>
                )}
                {profile?.mode==="celebrity"&&(
                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",width:"100%",padding:"10px 0",fontFamily:mono,fontSize:8,color:"rgba(240,168,24,.4)",letterSpacing:2,gap:5}}>
                    🏆 {lang==="es"?"SIGUE EL PROGRAMA":"FOLLOW THE PROGRAM"}
                  </div>
                )}
              </div>
            </React.Fragment>
          );
        })}
      </div>

      {/* Progress bar */}
      <div style={{height:2,background:"rgba(0,0,0,.2)",flexShrink:0}}>
        <div style={{height:"100%",width:`${totalSets>0?doneSets/totalSets*100:0}%`,background:C2.tx,transition:"width .5s ease"}}/>
      </div>

      {/* Rest toast */}
      {restActive&&(
        <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:430,margin:"0 auto",
          display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"14px 24px 28px",background:C2.bgD,borderTop:`1px solid ${C2.borderL}`,
          zIndex:50}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.blue,animation:"blink 1s ease-in-out infinite",flexShrink:0}}/>
            <div>
              <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:3,marginBottom:2}}>
                {lang==="es"?"DESCANSO":"REST"}
              </div>
              <div style={{fontFamily:mono,fontSize:36,fontWeight:700,color:restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.tx,letterSpacing:-2,lineHeight:1,transition:"color .5s"}}>
                {Math.floor(restSecs/60)}:{(restSecs%60<10?'0':'')+restSecs%60}
              </div>
            </div>
          </div>
          <button onClick={skipRest}
            style={{background:"rgba(255,255,255,.06)",border:`1px solid rgba(82,90,110,.5)`,borderRadius:10,padding:"10px 18px",fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:1.5,cursor:"pointer"}}>
            {lang==="es"?"SALTAR ›":"SKIP ›"}
          </button>
        </div>
      )}

      {/* Numpad */}
      {npOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:100,background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)",display:"flex",flexDirection:"column",justifyContent:"flex-end",maxWidth:430,margin:"0 auto"}}
          onClick={e=>{if(e.target===e.currentTarget)npOk();}}>
          <div style={{background:C2.bgD,borderTop:`1px solid ${C2.borderL}`,borderRadius:"16px 16px 0 0"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 12px",borderBottom:`1px solid rgba(82,90,110,.35)`}}>
              <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:2}}>{npOpen.field==='kg'?'KG':'REPS'}</div>
              <div style={{fontSize:34,fontWeight:900,color:C2.tx,letterSpacing:-2}}>{npVal}</div>
              <button onClick={npOk} style={{background:C2.tx,color:C2.bgD,border:"none",borderRadius:10,padding:"8px 20px",fontFamily:mono,fontSize:10,fontWeight:700,letterSpacing:1,cursor:"pointer"}}>OK</button>
            </div>
            {/* Quick adjust */}
            <div style={{display:"flex",gap:6,padding:"10px 16px",borderBottom:`1px solid rgba(82,90,110,.25)`}}>
              {(npOpen.field==='kg'?[[-5,"-5"],[-2.5,"-2.5"],[2.5,"+2.5"],[5,"+5"]]:[[-2,"-2"],[-1,"-1"],[1,"+1"],[2,"+2"]]).map(([d,label])=>(
                <button key={label} onClick={()=>npAdj(d)}
                  style={{flex:1,padding:"8px 0",background:"rgba(255,255,255,.04)",border:`1px solid rgba(82,90,110,.4)`,borderRadius:8,color:C2.tx2,fontFamily:mono,fontSize:10,cursor:"pointer",textAlign:"center"}}>
                  {label}
                </button>
              ))}
            </div>
            {/* Grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:`rgba(82,90,110,.3)`}}>
              {['1','2','3','4','5','6','7','8','9',npOpen.field==='kg'?'.':'','0','⌫'].map((k,i)=>(
                <button key={i} onClick={()=>k&&npKey(k)}
                  style={{padding:"17px 0",background:C2.bgD,border:"none",cursor:k?"pointer":"default",fontSize:k==='⌫'?14:20,fontWeight:600,color:k?C2.tx:C2.tx3,fontFamily:sans,textAlign:"center"}}>
                  {k}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Notes popup */}
      {noteOpen!==null&&(
        <div style={{position:"fixed",inset:0,zIndex:110,background:"rgba(0,0,0,.55)",backdropFilter:"blur(4px)",display:"flex",flexDirection:"column",justifyContent:"flex-end",maxWidth:430,margin:"0 auto"}}
          onClick={e=>{if(e.target===e.currentTarget){setNotes({...notes,[noteOpen]:noteText});setNoteOpen(null);}}}>
          <div style={{background:C2.bgD,borderTop:`1px solid ${C2.borderL}`,borderRadius:"16px 16px 0 0",padding:"16px 20px 32px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
              <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:2}}>
                {lang==="es"?"NOTA":"NOTE"} · {exs[noteOpen]&&exs[noteOpen].e?exs[noteOpen].e.toUpperCase():""}
              </div>
              <button onClick={()=>{setNotes({...notes,[noteOpen]:noteText});setNoteOpen(null);}}
                style={{background:C2.tx,color:C2.bgD,border:"none",borderRadius:8,padding:"6px 16px",fontFamily:mono,fontSize:10,fontWeight:700,cursor:"pointer"}}>
                {lang==="es"?"GUARDAR":"SAVE"}
              </button>
            </div>
            <textarea
              autoFocus
              value={noteText}
              onChange={e=>setNoteText(e.target.value)}
              placeholder={lang==="es"?"Ej: intentar 75kg próxima sesión...":"E.g.: try 75kg next session..."}
              style={{width:"100%",background:"rgba(255,255,255,.05)",border:`1px solid ${C2.borderL}`,borderRadius:10,padding:"12px 14px",color:C2.tx,fontFamily:mono,fontSize:13,resize:"none",height:90,outline:"none",letterSpacing:.3,lineHeight:1.5}}
            />
          </div>
        </div>
      )}

      {/* Arc popup close on outside click */}
      {arcPopOpen&&<div style={{position:"fixed",inset:0,zIndex:79}} onClick={()=>setArcPopOpen(false)}/>}
    </div>
  );
}

function Main({lang,setLang,profile,routine,sp,sr,setStep}){
  const t=L[lang];
  const[sel,setSel]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const[tab,setTab]=useState("train");
  const[done,setDone]=useState({});
  const[logs,setLogs]=useState({});
  const[macros,setMacros]=useState({});
  const[inWorkout,setInWorkout]=useState(false);
  const[addEx,setAddEx]=useState(false);
  const[nex,setNex]=useState({e:"",s:3,r:"8-12"});
  const[addF,setAddF]=useState(false);
  const[fd,setFd]=useState({n:"",cal:"",prot:"",carbs:"",fat:"",m:"mid"});
  const[showSet,setShowSet]=useState(false);
  const[confirmR,setConfirmR]=useState(false);
  const w=wk(),today=tdy();
  const mt={cal:2000,prot:150,carbs:200,fat:60};

  useEffect(()=>{
    setDone(FStore.loadDone(w));
    setMacros(FStore.loadMacros(today));
    FStore.loadLogs().then(l=>setLogs(l));
  },[]);

  const sd=useCallback(n=>{setDone(n);FStore.saveDone(w,n);},[w]);
  const slg=useCallback(n=>{setLogs(n);FStore.saveLogs(n);},[]);
  const sm=useCallback(n=>{setMacros(n);FStore.saveMacros(today,n);},[today]);

  const day=routine?routine[sel]:null;
  const exs=day?day.ex:[];
  const dc=exs.filter(x=>done[`${sel}-${x.id}`]).length;
  const pct=exs.length?dc/exs.length:0;
  const entries=macros.entries||[];
  const tot=entries.reduce((a,e)=>({cal:a.cal+(+e.cal||0),prot:a.prot+(+e.prot||0),carbs:a.carbs+(+e.carbs||0),fat:a.fat+(+e.fat||0)}),{cal:0,prot:0,carbs:0,fat:0});

  const toggle=id=>{const k=`${sel}-${id}`;sd({...done,[k]:!done[k]});};
  const BW_EXERCISES=new Set(["pull up","weighted pull up","chin up","push up","decline push up","dips","bench dips","diamond push ups","plank","mountain climber","hanging knee raises","box jump","bodyweight squat"]);
  const saveLog=(id,kg,rp,exName)=>{
    // For bodyweight exercises with kg=0, use bodyweight from profile
    const effKg=(+kg>0)?+kg:(BW_EXERCISES.has(exName?.toLowerCase()?.trim())?(+profile?.weight||75):0);
    if((!effKg||effKg<=0)&&(!rp||+rp<=0))return;
    const nl={...logs};
    if(!nl[id])nl[id]=[];
    const rm1=epley(effKg,rp);
    nl[id]=[{d:today,w:effKg,r:rp,rm:rm1},...nl[id]].slice(0,60);
    slg(nl);
    FStore.saveLogEntry(id,exName||id,effKg,rp,rm1);
  };

  const exportData=()=>{
    const data={profile,routine,logs,exported:today};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`forja_backup_${today}.json`;
    a.click();
  };
  const addExFn=()=>{if(!nex.e||!day)return;const r=[...routine];r[sel].ex=[...r[sel].ex,{...nex,id:`${sel}${Date.now()}`}];sr(r);setAddEx(false);setNex({e:"",s:3,r:"8-12"});};
  const rmEx=id=>{const r=[...routine];r[sel].ex=r[sel].ex.filter(x=>x.id!==id);sr(r);};
  const addFood=()=>{if(!fd.n||!fd.cal)return;const m={...macros};if(!m.entries)m.entries=[];m.entries.push({...fd,id:Date.now()});sm(m);setAddF(false);setFd({n:"",cal:"",prot:"",carbs:"",fat:"",m:"mid"});};
  const rmFood=id=>{const m={...macros};m.entries=(m.entries||[]).filter(x=>x.id!==id);sm(m);};

  // Dispara evento custom cada vez que React renderiza — los scripts Three.js lo escuchan
  useEffect(()=>{
    window.dispatchEvent(new CustomEvent("forja:mount"));
  });

  const Inp=({value,onChange,placeholder,type="text",style:s2={}})=>(
    <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={{padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.borderL}`,
        background:C.card,color:C.tx,fontSize:14,fontFamily:sans,outline:"none",width:"100%",...s2}}
      onFocus={e=>e.target.style.borderColor=C.tx}
      onBlur={e=>e.target.style.borderColor=C.borderL}/>
  );

  if(inWorkout&&day&&day.ex&&day.ex.length){
    return <WorkoutScreen day={day} sel={sel} done={done} logs={logs}
      onToggle={toggle} onSaveLog={saveLog} t={t} lang={lang} profile={profile} onBack={()=>setInWorkout(false)}/>;
  }

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#252936 0%,#2e3448 40%,#383e4e 100%)`,color:C.tx,fontFamily:sans}}>
      <div style={{background:"rgba(44,48,64,0.75)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderBottom:`1px solid rgba(240,242,245,0.08)`,padding:"14px 18px 10px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,fontFamily:mono,color:C.tx3,letterSpacing:3,marginBottom:2,fontWeight:600}}>FORJA</div>
            <div style={{fontSize:24,fontWeight:900,letterSpacing:-1,lineHeight:1,textTransform:"uppercase"}}>{day?day.l:t.rest}</div>
            <div style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginTop:2}}>{DF[lang][sel].toUpperCase()} {day?`· ${day.ex.length} ${lang==="es"?"ejercicios":"exercises"}`:""}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,paddingTop:2}}>
            {day&&exs.length>0&&(
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:1,marginBottom:4}}>{dc}/{exs.length}</div>
                <div style={{width:52,height:2,background:C.borderL,borderRadius:1,overflow:"hidden"}}>
                  <div style={{height:"100%",background:pct===1?C.green:C.tx,width:`${pct*100}%`,transition:"width 0.4s"}}/>
                </div>
              </div>
            )}
            <button onClick={()=>setShowSet(!showSet)} style={{width:30,height:30,borderRadius:8,border:`1.5px solid ${C.borderL}`,background:C.card,cursor:"pointer",color:C.tx3,fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
          </div>
        </div>
        {showSet&&(
          <div style={{display:"flex",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${C.borderL}`}}>
            <button onClick={()=>{const nl=lang==="es"?"en":"es";setLang(nl);sp({...profile,lang:nl});}}
              style={{padding:"7px 12px",borderRadius:7,border:`1.5px solid ${C.borderL}`,background:C.card,color:C.tx2,fontSize:10,fontFamily:mono,letterSpacing:1,cursor:"pointer"}}>
              {lang==="es"?"EN":"ES"}
            </button>
            <button onClick={()=>{setStep(0);setShowSet(false);}}
              style={{padding:"7px 12px",borderRadius:7,border:`1.5px solid ${C.borderL}`,background:C.card,color:C.tx2,fontSize:10,fontFamily:mono,letterSpacing:1,cursor:"pointer"}}>
              {t.reconfig.toUpperCase()}
            </button>
          </div>
        )}
        <div style={{display:"flex",gap:4,marginTop:12}}>
          {(()=>{
            const isCeleb=profile?.mode==="celebrity";
            const celebId=profile?.celebrity;
            const CMETA={arnold:{l:"ARNOLD",c:"#f0a830"},hemsworth:{l:"THOR",c:"#4898e8"},rock:{l:"ROCK",c:"#30c870"},goggins:{l:"GOGGINS",c:"#e09020"},cavill:{l:"CAVILL",c:"#8868d8"},ronaldo:{l:"CR7",c:"#e83030"},stallone:{l:"ROCKY",c:"#e88020"},lebron:{l:"KING",c:"#f0a818"},zyzz:{l:"ZYZZ",c:"#e050a8"}};
            const cm=celebId?CMETA[celebId]:null;
            return Array(7).fill(0).map((_,i)=>{
              const d=routine?routine[i]:null,de=d?d.ex:[],dd=de.filter(x=>done[`${i}-${x.id}`]).length;
              const cp=de.length>0&&dd===de.length,isSel=sel===i,isRest=!d;
              const cc=cm?.c;
              return(
                <button key={i} onClick={()=>{setSel(i);setTab("train");setAddEx(false);setAddF(false);setInWorkout(false);}}
                  style={{flex:1,padding:"10px 0 8px",borderRadius:10,
                    border:`1.5px solid ${isSel?(cc||C.tx):cp?C.green+"44":d&&cc?cc+"33":C.borderL}`,cursor:"pointer",
                    background:isSel?(cc||C.tx):cp?C.green+"0D":d&&cc?cc+"0A":"transparent",
                    color:isSel?C.white:cp?C.green:isRest?C.tx3:C.tx2,
                    transition:"all 0.2s",textAlign:"center",position:"relative",overflow:"hidden",
                    boxShadow:isSel&&cc?`0 0 14px ${cc}44`:"none"}}>
                  {d&&cc&&!isRest&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:isSel?"rgba(255,255,255,.5)":cc,borderRadius:"10px 10px 0 0"}}/>}
                  <div style={{fontSize:9,fontWeight:800,fontFamily:mono,letterSpacing:1.5,lineHeight:1,marginTop:d&&cc?2:0}}>{DN[lang][i]}</div>
                  {d&&isCeleb&&cm&&!isRest&&<div style={{fontSize:6,fontFamily:mono,marginTop:2,letterSpacing:.5,color:isSel?"rgba(255,255,255,.7)":cc,fontWeight:800,opacity:isSel?.8:.65}}>{cm.l}</div>}
                  {d&&!isCeleb&&<div style={{fontSize:7,fontFamily:mono,marginTop:3,opacity:isSel?0.6:0.4,letterSpacing:0.5,padding:"0 2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.l}</div>}
                  {!d&&<div style={{fontSize:7,fontFamily:mono,marginTop:3,opacity:0.3,letterSpacing:0.5}}>REST</div>}
                  {cp&&!isSel&&<div style={{position:"absolute",top:4,right:4,width:4,height:4,borderRadius:"50%",background:C.green}}/>}
                  {isSel&&<div style={{position:"absolute",bottom:0,left:"25%",right:"25%",height:2,background:cc||C.white,borderRadius:2}}/>}
                </button>
              );
            });
          })()}
        </div>
      </div>

      <div style={{display:"flex",borderBottom:`1px solid ${C.borderL}`,padding:"0 18px",background:C.bg}}>
        {[{id:"train",l:t.train},{id:"stats",l:t.stats}].map(tb=>(
          <button key={tb.id} onClick={()=>{setTab(tb.id);setAddEx(false);setAddF(false);}}
            style={{padding:"13px 0",marginRight:22,border:"none",
              borderBottom:`2px solid ${tab===tb.id?C.tx:"transparent"}`,background:"transparent",
              color:tab===tb.id?C.tx:C.tx3,fontSize:10,fontWeight:700,fontFamily:mono,letterSpacing:2,cursor:"pointer",transition:"all 0.2s"}}>
            {tb.l}
          </button>
        ))}
      </div>

      <div style={{padding:"14px 18px 90px"}}>
        {tab==="train"&&(
          <div>
            {!day?(
              <div style={{textAlign:"center",padding:"40px 20px 60px"}}>
                <div style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:3,marginBottom:16}}>// REST DAY</div>
                <div style={{
                  width:"100%",maxWidth:380,height:400,margin:"0 auto 24px",
                  position:"relative",
                }}>
                  <canvas
                    id="forja-meditation-canvas"
                    data-gender={(profile&&profile.gender==="female")?"female":(profile&&profile.gender==="nonbinary")?(Math.random()>.5?"male":"female"):"male"}
                    style={{
                      width:"100%",height:"100%",display:"block",
                      marginLeft:"-12%",width:"124%", // disco sobresale en los lados
                    }}
                  />
                </div>
                <div style={{fontSize:38,fontWeight:900,letterSpacing:-2,textTransform:"uppercase"}}>{t.rest}</div>
                <div style={{fontSize:13,color:C.tx3,marginTop:8}}>{t.restSub}</div>
              </div>
            ):(
              <>
                {/* HERO CARD — alma de la pantalla */}
                <div style={{
                  width:"100%",borderRadius:22,background:"linear-gradient(135deg,#1A2540 0%,#0D1520 100%)",cursor:"default",
                  marginBottom:16,padding:"26px 22px 22px",
                  boxShadow:"0 16px 56px rgba(0,0,0,0.22)",
                  position:"relative",overflow:"hidden",userSelect:"none"}}>
                  
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                    <div>
                      <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.35)",letterSpacing:3,marginBottom:7,textTransform:"uppercase"}}>
                        {DF[lang][sel]}
                      </div>
                      <div style={{fontSize:32,fontWeight:900,color:C.white,letterSpacing:-1.5,lineHeight:1,textTransform:"uppercase"}}>
                        {day.l}
                      </div>
                      <div style={{fontSize:10,fontFamily:mono,color:"rgba(255,255,255,0.35)",marginTop:6,letterSpacing:1}}>
                        {exs.length} {lang==="es"?"ejercicios":"exercises"}
                      </div>
                    </div>
                    <div style={{textAlign:"right",paddingTop:2}}>
                      <div style={{fontSize:36,fontWeight:900,lineHeight:1,
                        color:pct===1?"#4ade80":pct>0?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.2)"}}>
                        {dc}
                      </div>
                      <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.3)",letterSpacing:1}}>
                        / {exs.length}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:3,marginBottom:22}}>
                    {exs.map((ex,i)=>{
                      const isDone=done[`${sel}-${ex.id}`];
                      return <div key={i} style={{height:3,flex:1,borderRadius:2,
                        background:isDone?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.12)",
                        transition:"background 0.3s"}}/>;
                    })}
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                    <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.35)",letterSpacing:2}}>
                      {pct===1?(lang==="es"?"COMPLETADO":"COMPLETED"):(lang==="es"?"SEMANA EN CURSO":"WEEK IN PROGRESS")}
                    </div>
                    <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.35)",letterSpacing:1}}>
                      {Math.round(pct*100)}%
                    </div>
                  </div>
                </div>

                {/* ── PESA 3D — tap to start workout ── */}
                <div id="forja-dumbbell-wrap" style={{width:"100%",height:260,marginTop:16,borderRadius:16,overflow:"hidden",position:"relative",background:C.bg,cursor:"pointer"}}
                  onClick={()=>{if(day&&day.ex&&day.ex.length)setInWorkout(true);}}
                >
                  <canvas id="forja-dumbbell-canvas" style={{width:"100%",height:"100%",display:"block"}}></canvas>
                  <div style={{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",
                    background:"rgba(240,242,245,0.12)",backdropFilter:"blur(8px)",
                    border:"1px solid rgba(240,242,245,0.20)",
                    padding:"7px 20px",borderRadius:20,
                    fontSize:10,fontFamily:"monospace",color:C.tx,letterSpacing:2,fontWeight:700,
                    whiteSpace:"nowrap",pointerEvents:"none",
                    animation:"pulse 2.2s ease-in-out infinite"}}>
                    ▶ {t.startWorkout}
                  </div>
                </div>

                {/* ── VOLUMEN SEMANAL POR MÚSCULO ── */}
                {(()=>{
                  // Calcular series por grupo muscular esta semana
                  const muscleMap={
                    "bench press":"Pecho","incline bench press":"Pecho","dumbbell bench press":"Pecho",
                    "incline dumbbell press":"Pecho","cable fly":"Pecho","dumbbell flyes":"Pecho",
                    "dips":"Pecho","push up":"Pecho","machine chest press":"Pecho",
                    "pull up":"Espalda","chin up":"Espalda","barbell row":"Espalda","pendlay row":"Espalda",
                    "dumbbell row":"Espalda","cable row":"Espalda","lat pulldown":"Espalda","machine pulldown":"Espalda",
                    "overhead press":"Hombros","dumbbell shoulder press":"Hombros","lateral raise":"Hombros",
                    "face pull":"Hombros","reverse fly":"Hombros",
                    "barbell curl":"Bíceps","dumbbell curl":"Bíceps","hammer curl":"Bíceps","preacher curl":"Bíceps",
                    "skull crusher":"Tríceps","tricep pushdown":"Tríceps","overhead tricep extension":"Tríceps",
                    "barbell squat":"Piernas","front squat":"Piernas","leg press":"Piernas","leg extension":"Piernas",
                    "leg curl":"Piernas","romanian deadlift":"Piernas","bulgarian split squat":"Piernas",
                    "deadlift":"Piernas","hip thrust":"Glúteos","calf raise":"Gemelos",
                  };
                  const vol={};
                  // Iterar todos los días de la semana
                  if(routine)routine.forEach((day,di)=>{
                    if(!day)return;
                    day.ex.forEach(ex=>{
                      if(done[`${di}-${ex.id}`]){
                        const muscle=muscleMap[ex.e.toLowerCase()]||(lang==="es"?"Otro":"Other");
                        vol[muscle]=(vol[muscle]||0)+ex.s;
                      }
                    });
                  });
                  const entries=Object.entries(vol).sort((a,b)=>b[1]-a[1]);
                  if(!entries.length)return null;
                  const maxV=entries[0][1];
                  return(
                    <div style={{marginTop:14,padding:"14px 16px",background:C.card,borderRadius:12,border:`1px solid ${C.borderL}`}}>
                      <div style={{fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:12}}>
                        {lang==="es"?"// VOLUMEN SEMANAL":"// WEEKLY VOLUME"}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {entries.map(([m,s])=>(
                          <div key={m} style={{display:"flex",alignItems:"center",gap:10}}>
                            <div style={{fontSize:10,fontFamily:mono,color:C.tx2,width:60,flexShrink:0}}>{m}</div>
                            <div style={{flex:1,height:6,background:C.borderL,borderRadius:3,overflow:"hidden"}}>
                              <div style={{height:"100%",width:`${(s/maxV)*100}%`,
                                background:s>=10?C.green:s>=6?C.blue:C.yellow,
                                borderRadius:3,transition:"width 0.5s"}}/>
                            </div>
                            <div style={{fontSize:10,fontFamily:mono,color:C.tx3,width:28,textAlign:"right"}}>{s}s</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })()}

                {!addEx?(
                  <button onClick={()=>setAddEx(true)} style={{width:"100%",padding:"13px 0",marginTop:12,borderRadius:10,border:`1.5px dashed ${C.border}`,background:"transparent",color:C.tx3,fontSize:10,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.addEx}</button>
                ):(
                  <div style={{marginTop:12,padding:16,background:C.card,borderRadius:12,border:`1.5px solid ${C.borderL}`}}>
                    <Inp placeholder={t.exName} value={nex.e} onChange={e=>setNex({...nex,e:e.target.value})}/>
                    <div style={{display:"flex",gap:10,marginTop:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:4,letterSpacing:2}}>{t.sets}</div>
                        <Inp type="number" value={nex.s} onChange={e=>setNex({...nex,s:+e.target.value})} style={{textAlign:"center"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:4,letterSpacing:2}}>{t.reps}</div>
                        <Inp value={nex.r} onChange={e=>setNex({...nex,r:e.target.value})} style={{textAlign:"center"}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:12}}>
                      <button onClick={()=>setAddEx(false)} style={{flex:1,padding:11,borderRadius:9,border:`1.5px solid ${C.borderL}`,background:"transparent",color:C.tx3,fontSize:12,cursor:"pointer",fontFamily:sans}}>{t.cancel}</button>
                      <button onClick={addExFn} style={{flex:2,padding:11,borderRadius:9,border:"none",background:C.tx,color:C.white,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:sans}}>{lang==="es"?"AGREGAR":"ADD"}</button>
                    </div>
                  </div>
                )}

                <div style={{textAlign:"center",marginTop:22,display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
                  {!confirmR?(
                    <>
                      <button onClick={()=>setConfirmR(true)} style={{background:"none",border:`1px solid ${C.borderL}`,borderRadius:8,padding:"8px 18px",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.reset.toUpperCase()}</button>
                      <button onClick={exportData} style={{background:"none",border:`1px solid ${C.borderL}`,borderRadius:8,padding:"8px 18px",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                        {lang==="es"?"↓ EXPORTAR":"↓ EXPORT"}
                      </button>
                      <button onClick={()=>{
                        if(window.confirm("🧪 MODO TEST — Borrar todos los logs para probar desde cero?")){
                          slg({});
                          sd({});
                          ['fv8l'].forEach(k=>localStorage.removeItem(k));
                        }
                      }} style={{background:"none",border:`1px solid rgba(217,96,96,.35)`,borderRadius:8,padding:"8px 18px",color:"rgba(217,96,96,.6)",fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                        🧪 RESET TEST
                      </button>
                    </>
                  ):(
                    <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                      <button onClick={()=>{sd({});setConfirmR(false);}} style={{padding:"8px 18px",borderRadius:8,border:"none",background:C.tx,color:C.white,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.yes.toUpperCase()}</button>
                      <button onClick={()=>setConfirmR(false)} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.borderL}`,background:"transparent",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.cancel.toUpperCase()}</button>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {tab==="macros"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[{v:tot.cal,mx:mt.cal,c:C.tx,l:t.cal,u:"kcal"},{v:tot.prot,mx:mt.prot,c:C.green,l:t.prot,u:"g"},{v:tot.carbs,mx:mt.carbs,c:C.blue,l:t.carbs,u:"g"},{v:tot.fat,mx:mt.fat,c:C.purple,l:t.fat,u:"g"}].map((r,i)=>{
                const left=r.mx-r.v,p2=Math.min(r.v/r.mx,1);
                return(
                  <div key={i} style={{padding:"14px",background:C.card,borderRadius:12,border:`1px solid ${C.borderL}`,boxShadow:"inset 0 1px 0 rgba(255,255,255,0.5)"}}>
                    <div style={{fontSize:9,fontFamily:mono,color:r.c,letterSpacing:2,marginBottom:6,fontWeight:600}}>{r.l}</div>
                    <div style={{fontSize:26,fontWeight:800,color:r.v>r.mx?C.red:C.tx}}>{r.v}</div>
                    <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:8}}>{r.u} / {r.mx}</div>
                    <div style={{height:2,background:C.borderL,borderRadius:1,overflow:"hidden"}}>
                      <div style={{height:"100%",background:r.c,width:`${p2*100}%`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:9,fontFamily:mono,color:left>=0?C.tx3:C.red,marginTop:5}}>
                      {left>=0?`${left}${r.u} ${t.left}`:`${Math.abs(left)}${r.u} ${t.over}`}
                    </div>
                  </div>
                );
              })}
            </div>

            {entries.map(f=>{
              const mc={am:C.yellow,mid:C.tx,snk:C.blue,pm:C.purple};
              return(
                <div key={f.id} style={{display:"flex",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.borderL}`,gap:12}}>
                  <div style={{width:3,height:32,borderRadius:2,background:mc[f.m]||C.tx3,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{f.n}</div>

        )}

// Thumbnail lazy — solo carga cuando entra al viewport
function VideoThumb({src,size=56}){
  const[thumb,setThumb]=useState(null);
  const[playing,setPlaying]=useState(false);
  const[visible,setVisible]=useState(false);
  const wrapRef=React.useRef(null);
  const vidRef=React.useRef(null);

  // IntersectionObserver — dispara carga solo cuando el elemento es visible
  useEffect(()=>{
    if(!wrapRef.current) return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setVisible(true);obs.disconnect();}
    },{rootMargin:"80px"});
    obs.observe(wrapRef.current);
    return()=>obs.disconnect();
  },[]);

  // Capturar primer frame solo cuando visible y aún no hay thumb
  useEffect(()=>{
    if(!visible||!src||thumb) return;
    const v=document.createElement("video");
    v.crossOrigin="anonymous";
    v.muted=true;
    v.preload="metadata";
    v.src=src;
    v.currentTime=0.5;
    v.addEventListener("seeked",()=>{
      try{
        const c=document.createElement("canvas");
        c.width=v.videoWidth||160; c.height=v.videoHeight||160;
        c.getContext("2d").drawImage(v,0,0);
        setThumb(c.toDataURL("image/jpeg",0.65));
      }catch(e){}
    },{once:true});
    v.load();
  },[visible,src]);

  return(
    <div ref={wrapRef} style={{width:size,height:size,borderRadius:10,overflow:"hidden",background:"#2c3040",flexShrink:0,position:"relative"}}
      onMouseEnter={()=>{setPlaying(true);vidRef.current?.play();}}
      onMouseLeave={()=>{setPlaying(false);if(vidRef.current){vidRef.current.pause();vidRef.current.currentTime=0;}}}>
      {thumb&&<img src={thumb} style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0,opacity:playing?0:1,transition:"opacity .2s"}}/>}
      {src&&playing&&<video ref={vidRef} src={src} muted loop playsInline preload="none" autoPlay
        style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>}
      {!thumb&&!playing&&<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",opacity:.25,fontSize:18}}>▶</div>}
    </div>
  );
}

function MuscleHeatmap({muscleVol,lang}){
  const cRef=React.useRef(null);
  const renRef=React.useRef(null);
  const mdlRef=React.useRef(null);
  const frameRef=React.useRef(null);
  const[status,setStatus]=React.useState("CARGANDO...");
  const mono="'SF Mono','Courier New',monospace";
  const es=lang==="es";

  // Smooth gaussian heatmap using world-space normalized coordinates
  function applyHeatmap(obj, muscleVol){
    const totalVol=Object.values(muscleVol||{}).reduce((a,b)=>a+b,0);
    if(!muscleVol||totalVol===0){
      obj.traverse(function(c){
        if(!c.isMesh) return;

// ── RECOVERY SCORE ─────────────────────────────────────────────────────
// Returns {muscle: {score:0-1, hoursLeft:N}} where 1.0 = fully recovered
const RECOVERY_HOURS={
  "pectoral mayor":48,"tríceps braquial":48,"deltoides anterior":48,
  "deltoides posterior":48,"bíceps braquial":60,"braquial":60,
  "braquiorradial":60,"trapecio superior":60,"dorsal ancho":60,
  "cuádriceps":72,"isquiotibiales":72,"glúteo mayor":72,"gastrocnemio":48,
  "core (transverso abdominal)":24,
};
function computeRecovery(logs,routine){
  const now=Date.now();
  // Only consider logs within the last 4 days (max recovery window is 72h)
  const cutoff=new Date(now-4*24*3600000).toISOString().slice(0,10);
  const lastHit={};  // muscle → {ts, vol}
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{
      if(!e.d||e.d<cutoff) return;
      let nm=id;
      if(routine) routine.forEach(d=>{if(!d)return;(d.ex||[]).forEach(ex=>{if(ex.id===id)nm=ex.e;});});
      const md=EXERCISE_MUSCLE_MAP[nm?.toLowerCase()?.trim()];
      if(!md) return;
      const vol=(+e.w||0)*(+e.r||0); if(vol<=0) return;
      const ts=new Date(e.d).getTime();
      md.p.forEach(m=>{
        if(!lastHit[m]||ts>lastHit[m].ts) lastHit[m]={ts,vol,isPrimary:true};
      });
      md.s.forEach(m=>{
        const sv=vol*0.35;
        if(!lastHit[m]||ts>lastHit[m].ts) lastHit[m]={ts,vol:sv,isPrimary:false};
      });
    });
  });
  const result={};
  Object.entries(lastHit).forEach(([m,{ts,isPrimary}])=>{
    const hrs=RECOVERY_HOURS[m]||48;
    const elapsedHrs=(now-ts)/3600000;
    const score=Math.min(1, elapsedHrs/hrs);
    const hoursLeft=Math.max(0, Math.round(hrs-elapsedHrs));
    result[m]={score, hoursLeft, isPrimary};
  });
  return result;
}

// Recovery → heatmap input: fatigued muscles show as red/orange, recovered as green
function recoveryToHeatmap(recovery){
  const mv={};
  Object.entries(recovery).forEach(([m,{score,isPrimary}])=>{
    const fatigue=1-score;
    if(fatigue>0.05) mv[m]=isPrimary!==false?fatigue:fatigue*0.40;
  });
  return mv;
}

function StatsScreen({logs,routine,lang,profile}){
  const C={bg:"#383e4e",bgDeep:"#2c3040",card:"#424858",border:"#525a6e",borderL:"#4a5264",
    tx:"#F0F2F5",tx2:"#C8CDD8",tx3:"#7a8294",
    green:"#5faa88",blue:"#6a8fc0",yellow:"#c0a870",red:"#d96060",purple:"#8878c0"};
  const mono="'SF Mono','Courier New',monospace";
  const sans="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif";
  const es=lang==="es";
  const[selPR,setSelPR]=useState(null);

  // ── Datos ────────────────────────────────────────────────────────────
  // PRs
  const prs=Object.entries(logs).map(([id,entries])=>{
    if(!entries||!entries.length) return null;
    const best=entries.reduce((b,e)=>((e.rm||0)>(b.rm||0)?e:b),entries[0]);
    let name=id;
    if(routine) routine.forEach(d=>{if(!d)return;d.ex&&d.ex.forEach(e=>{if(e.id===id)name=e.e;})});
    // Historial de 1RM ordenado por fecha
    const hist=[...entries].sort((a,b)=>a.d.localeCompare(b.d)).map(e=>({d:e.d,rm:e.rm||0,w:e.w,r:e.r}));
    return {id,name,best1rm:best.rm||0,bestW:best.w,bestR:best.r,date:best.d,entries,hist};
  }).filter(Boolean).filter(p=>p.best1rm>0).sort((a,b)=>b.best1rm-a.best1rm);

  // Semana actual
  const today=new Date();
  const weekStart=new Date(today);
  // Semana empieza el lunes (getDay: 0=dom,1=lun,...6=sab)
  const dow=today.getDay();
  const daysToMon=dow===0?6:dow-1; // días desde el lunes anterior
  weekStart.setDate(today.getDate()-daysToMon);
  weekStart.setHours(0,0,0,0);
  const weekStr=weekStart.toISOString().slice(0,10);
  let weekVol=0,weekSets=0;
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{if(e.d>=weekStr){weekVol+=((+e.w||0)*(+e.r||0));weekSets++;}});
  });

  // Días entrenados últimas 12 semanas (grilla tipo GitHub)
  const WEEKS=12;
  const grid=Array.from({length:WEEKS},(_,wi)=>{
    return Array.from({length:7},(_,di)=>{
      const d=new Date(today);
      // di=0=lun, di=6=dom (consistente con lunes como inicio de semana)
      d.setDate(today.getDate()-daysToMon-((WEEKS-1-wi)*7)+di);
      d.setHours(0,0,0,0);
      const ds=d.toISOString().slice(0,10);
      let vol=0;
      Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d===ds)vol+=(+e.w||0)*(+e.r||0);}));
      return {ds,vol};
    });
  });

  // Volumen por músculo esta semana (auto-calculado desde logs)
  const muscleVol=computeWeeklyMuscleVol(logs,routine);
  const mvArr=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]);
  const totalMV=mvArr.reduce((s,[,v])=>s+v,0)||1;
  // Recovery score por músculo
  const recovery=computeRecovery(logs,routine);
  const recoveryArr=Object.entries(recovery).sort((a,b)=>a[1].score-b[1].score); // most fatigued first
  // Heatmap driven by fatigue (not weekly vol)
  const heatmapInput=Object.keys(recovery).length>0?recoveryToHeatmap(recovery):muscleVol;

  // Mes actual
  const monthStr=today.toISOString().slice(0,7);
  const trainedDays=new Set();
  Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d&&e.d.startsWith(monthStr))trainedDays.add(e.d);}));

  // ── STREAK — días consecutivos entrenados ────────────────────────
  // Collect ALL trained days across all time
  const allTrainedDays=new Set();
  Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d)allTrainedDays.add(e.d);}));

  // Current streak: count back from today (or yesterday if today not trained)
  const todayStr=today.toISOString().slice(0,10);
  let streakCurrent=0;
  let streakCheck=new Date(today);
  // If today not trained yet, start counting from yesterday
  if(!allTrainedDays.has(todayStr)) streakCheck.setDate(streakCheck.getDate()-1);
  while(true){
    const ds=streakCheck.toISOString().slice(0,10);
    if(!allTrainedDays.has(ds)) break;
    streakCurrent++;
    streakCheck.setDate(streakCheck.getDate()-1);
    if(streakCurrent>365) break; // safety
  }

  // Best streak ever
  const sortedDays=[...allTrainedDays].sort();
  let streakBest=0,streakTemp=0;
  for(let i=0;i<sortedDays.length;i++){
    if(i===0){streakTemp=1;}
    else{
      const prev=new Date(sortedDays[i-1]);
      const curr=new Date(sortedDays[i]);
      const diff=(curr-prev)/(1000*60*60*24);
      if(diff===1){streakTemp++;}
      else{streakTemp=1;}
    }
    if(streakTemp>streakBest) streakBest=streakTemp;
  }
  if(streakCurrent>streakBest) streakBest=streakCurrent;

  // This week's training days (Mon–Sun)
  const weekDaysTrained=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    return{ds,trained:allTrainedDays.has(ds),isToday:ds===todayStr,isFuture:ds>todayStr};

    "bíceps braquial":C.green,"tríceps braquial":C.yellow};

        <span style={{fontSize:9,opacity:.6}}>{es?"tus stats aparecerán aquí":"your stats will appear here"}</span>
      </div>
    </div>

        <div style={{
          background:`linear-gradient(135deg, #2c3040 0%, #383e4e 100%)`,
          borderRadius:20,padding:"20px 18px 18px",marginBottom:12,
          border:`1px solid ${C.borderL}`,position:"relative",overflow:"hidden",
        }}>
          {/* Background glow */}
          <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",
            background:"rgba(106,143,192,.12)",filter:"blur(30px)",pointerEvents:"none"}}/>

            🏆 {es?"MEJOR PR ACTIVO":"TOP PR"}

          {/* Nombre del ejercicio */}
          <div style={{fontSize:11,fontFamily:mono,color:C.tx3,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{prView.name}</div>

          {/* 1RM grande */}
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:6}}>
            <div style={{fontSize:52,fontWeight:900,letterSpacing:-3,color:C.tx,lineHeight:1,fontFamily:sans}}>{prView.best1rm}</div>
            <div style={{fontSize:14,fontFamily:mono,color:C.tx3,fontWeight:400}}>kg<br/><span style={{fontSize:9}}>1RM est.</span></div>
          </div>
          <div style={{fontSize:9,fontFamily:mono,color:C.tx3,opacity:.55,letterSpacing:.5,marginBottom:14}}>
            {es
              ?"peso × (1 + reps/30) — cuánto podrías levantar una sola vez"
              :"weight × (1 + reps/30) — your estimated single max lift"}
          </div>

          {/* Detalle del set */}
          <div style={{display:"flex",gap:16,marginBottom:18}}>
            <div>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:2}}>{es?"PESO":"WEIGHT"}</div>
              <div style={{fontSize:18,fontWeight:700,color:C.tx}}>{prView.bestW}<span style={{fontSize:10,color:C.tx3,fontWeight:400}}>kg</span></div>
            </div>
            <div style={{width:1,background:C.borderL}}/>
            <div>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:2}}>REPS</div>
              <div style={{fontSize:18,fontWeight:700,color:C.tx}}>{prView.bestR}</div>
            </div>
            <div style={{width:1,background:C.borderL}}/>
            <div>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:2}}>{es?"FECHA":"DATE"}</div>

          </div>

          {/* Sparkline de progresión */}
          {prView.hist&&prView.hist.length>1&&(()=>{
            const vals=prView.hist.map(h=>h.rm).filter(v=>v>0);
            if(vals.length<2) return null;
            const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
            const W=280,H=40;
            const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
            const last=vals[vals.length-1],prev=vals[vals.length-2];

                  <polyline points={pts} fill="none" stroke={up?C.green:C.red} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>

                <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                  <div style={{fontSize:8,fontFamily:mono,color:C.tx3}}>{prView.hist[0]?.d}</div>
