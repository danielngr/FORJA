const getImg=name=>IMG[name.toLowerCase().trim()]||null;

function WorkoutScreen({day,sel,done,logs,onToggle,onSaveLog,t,lang,onBack}){
  const exs=day.ex;
  const[idx,setIdx]=useState(0);
  const[kg,setKg]=useState("10");
  const[rp,setRp]=useState("8");
  const[showHist,setShowHist]=useState(false);
  const[imgErr,setImgErr]=useState({});
  const[sliding,setSliding]=useState(false);
  const[slideDir,setSlideDir]=useState(0);
  const[dragY,setDragY]=useState(0);
  const startY=useRef(0);
  const isDrag=useRef(false);

  const ex=exs[idx];
  const isDone=ex?!!done[`${sel}-${ex.id}`]:false;
  const hist=ex?(logs[ex.id]||[]):[];
  const last=hist[0];
  const totalDone=exs.filter(x=>done[`${sel}-${x.id}`]).length;
  const imgUrl=ex&&!imgErr[ex.id]?getImg(ex.e):null;

  const goTo=ni=>{
    if(ni<0||ni>=exs.length||sliding)return;
    setSlideDir(ni>idx?-1:1);setSliding(true);setKg("");setRp("");setShowHist(false);
    setTimeout(()=>{setIdx(ni);setSlideDir(0);setSliding(false);},260);
  };

  const onTS=e=>{startY.current=e.touches[0].clientY;isDrag.current=true;};
  const onTM=e=>{if(isDrag.current)setDragY(e.touches[0].clientY-startY.current);};
  const onTE=()=>{if(dragY<-55)goTo(idx+1);else if(dragY>55)goTo(idx-1);setDragY(0);isDrag.current=false;};
  const onMD=e=>{startY.current=e.clientY;isDrag.current=true;};
  const onMM=e=>{if(isDrag.current)setDragY(e.clientY-startY.current);};
  const onMU=()=>{if(dragY<-55)goTo(idx+1);else if(dragY>55)goTo(idx-1);setDragY(0);isDrag.current=false;};
  const handleSave=()=>{if(kg||rp){onSaveLog(ex.id,kg,rp);if(!isDone)onToggle(ex.id);}setKg("");setRp("");};
  const sp=e=>e.stopPropagation();
  const ty=sliding?slideDir*110:(isDrag.current?Math.min(Math.max(dragY*0.35,-70),70):0);

  // ScrollPicker — estilo X/dark
  const ScrollPicker=({val,set,label,items})=>{
    const iH=54;
    const listRef=useRef(null);
    const isDragging=useRef(false);
    const startYRef=useRef(0);
    const startScrollRef=useRef(0);

    useEffect(()=>{
      if(listRef.current&&val){
        const i=items.indexOf(val);
        if(i>=0) listRef.current.scrollTop=i*iH;
      }
    },[]);

    const snap=()=>{
      if(!listRef.current)return;
      const i=Math.round(listRef.current.scrollTop/iH);
      const clamped=Math.max(0,Math.min(i,items.length-1));
      listRef.current.scrollTop=clamped*iH;
      set(items[clamped]);
    };

    const onScroll=()=>{
      if(!listRef.current)return;
      const i=Math.round(listRef.current.scrollTop/iH);
      set(items[Math.max(0,Math.min(i,items.length-1))]);
    };

    const pds=e=>{e.stopPropagation();isDragging.current=true;const y=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);startYRef.current=y;startScrollRef.current=listRef.current?.scrollTop||0;};
    const pms=e=>{if(!isDragging.current)return;const y=e.clientY||(e.touches&&e.touches[0]?e.touches[0].clientY:0);if(listRef.current)listRef.current.scrollTop=startScrollRef.current-(y-startYRef.current);};
    const pue=()=>{isDragging.current=false;snap();};

    return(
      <div onPointerDown={sp} onMouseDown={sp} onTouchStart={sp}
        style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
        <div style={{fontSize:8,color:C.tx3,fontFamily:mono,letterSpacing:3,fontWeight:700}}>{label}</div>
        <div style={{position:"relative",width:"100%",height:iH*3,overflow:"hidden",background:"transparent"}}>
          {/* líneas de selección — estilo minimal */}
          <div style={{position:"absolute",top:iH,left:0,right:0,height:iH,
            borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,
            zIndex:2,pointerEvents:"none"}}/>
          {/* fade top */}
          <div style={{position:"absolute",top:0,left:0,right:0,height:iH,
            background:`linear-gradient(to bottom,${C.bg}FF,${C.bg}00)`,
            zIndex:3,pointerEvents:"none"}}/>
          {/* fade bottom */}
          <div style={{position:"absolute",bottom:0,left:0,right:0,height:iH,
            background:`linear-gradient(to top,${C.bg}FF,${C.bg}00)`,
            zIndex:3,pointerEvents:"none"}}/>
          <div ref={listRef} onScroll={onScroll}
            onMouseDown={pds} onMouseMove={pms} onMouseUp={pue} onMouseLeave={pue}
            onTouchStart={pds} onTouchMove={pms} onTouchEnd={pue}
            style={{height:"100%",overflowY:"scroll",scrollSnapType:"y mandatory",
              WebkitOverflowScrolling:"touch",scrollbarWidth:"none",cursor:"ns-resize",userSelect:"none"}}>
            <style>{"[data-fpicker]::-webkit-scrollbar{display:none}"}</style>
            <div style={{height:iH}}/>
            {items.map((item,i)=>{
              const isSel=item===val;
              return(
                <div key={i} data-fpicker
                  onClick={()=>{set(item);if(listRef.current)listRef.current.scrollTop=i*iH;}}
                  style={{height:iH,display:"flex",alignItems:"center",justifyContent:"center",
                    scrollSnapAlign:"start",
                    fontSize:isSel?30:16,
                    fontWeight:isSel?800:300,
                    fontFamily:isSel?sans:mono,
                    color:isSel?C.tx:C.tx3,
                    letterSpacing:isSel?-1:1,
                    transition:"all 0.12s",cursor:"pointer"}}>
                  {item}
                </div>
              );
            })}
            <div style={{height:iH}}/>
          </div>
        </div>
      </div>
    );
  };

  const kgItems=[...Array.from({length:21},(_,i)=>(i*0.5).toFixed(1).replace(".0","")),...Array.from({length:281},(_,i)=>((i+21)*0.5).toFixed(1).replace(".0",""))].map(String);
  const kgAll=Array.from({length:301},(_,i)=>i===0?"0":(i*0.5%1===0?String(i*0.5):(i*0.5).toFixed(1)));
  const rpItems=Array.from({length:50},(_,i)=>String(i+1));

  return(
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden",fontFamily:sans}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px 12px",borderBottom:`1px solid ${C.borderL}`,flexShrink:0,background:C.bg}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.tx3,fontSize:11,fontFamily:mono,letterSpacing:1.5,cursor:"pointer",padding:0}}>
          ← {lang==="es"?"VOLVER":"BACK"}
        </button>
        <div style={{fontSize:10,fontFamily:mono,color:C.tx2,letterSpacing:3,fontWeight:600}}>{day.l}</div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {exs.map((_,i)=>(
            <div key={i} onClick={()=>goTo(i)} style={{width:i===idx?20:5,height:5,borderRadius:3,cursor:"pointer",
              background:done[`${sel}-${exs[i].id}`]?C.tx:i===idx?C.tx:C.borderL,transition:"all 0.3s"}}/>
          ))}
        </div>
      </div>

      <div onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
        style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",
          transform:`translateY(${ty}px)`,
          transition:isDrag.current?"none":"transform 0.26s cubic-bezier(.4,0,.2,1)",
          opacity:Math.abs(ty)>30?Math.max(0.4,1-Math.abs(ty)/120):1,
          cursor:isDrag.current?"grabbing":"grab",userSelect:"none",minHeight:0}}>

        <div style={{padding:"18px 20px 10px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:2}}>
              {String(idx+1).padStart(2,"0")} / {String(exs.length).padStart(2,"0")}
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {last&&<div style={{fontSize:10,fontFamily:mono,color:C.tx2,letterSpacing:1}}>{last.w}KG × {last.r}</div>}
              <div onPointerDown={sp} onMouseDown={sp} onTouchStart={sp}
                onClick={e=>{sp(e);onToggle(ex.id);}}
                style={{width:26,height:26,borderRadius:7,cursor:"pointer",
                  background:isDone?C.tx:"transparent",border:`1.5px solid ${isDone?C.tx:C.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                {isDone&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L5 9.5L10 3" stroke={C.white} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
            </div>
          </div>
          <div style={{fontSize:32,fontWeight:900,color:C.tx,lineHeight:1,letterSpacing:-1.5,textTransform:"uppercase",animation:"fu 0.3s ease",fontFamily:sans}}>{ex.e}</div>
          <div style={{marginTop:7}}>
            <span style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:1.5}}>{ex.s} × {ex.r}</span>
          </div>
        </div>

        <div style={{margin:"0 14px",flex:1,minHeight:0}}>
          <div style={{width:"100%",height:"100%",borderRadius:20,overflow:"hidden",
            background:"#424858",

function App(){
  const[lang,setLang]=useState(null);
  const[step,setStep]=useState(0);
  const[profile,setProfile]=useState(null);
  const[routine,setRoutine]=useState(null);
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    try{const p=store.get("fv8p");if(p){const d=JSON.parse(p.value);setProfile(d);setLang(d.lang);const r=store.get("fv8r");if(r)setRoutine(JSON.parse(r.value));setStep(99);}}catch(_){}
    setReady(true);
  },[]);

  const sp=useCallback(p=>{setProfile(p);store.set("fv8p",JSON.stringify(p));},[]);
  const sr=useCallback(r=>{setRoutine(r);store.set("fv8r",JSON.stringify(r));},[]);

  if(!ready)return <div style={{minHeight:"100vh",background:C.bg}}/>;
  if(step<99)return <Onboard lang={lang} setLang={setLang} step={step} setStep={setStep} sp={sp} sr={sr}/>;
  return <Main lang={lang} setLang={setLang} profile={profile} routine={routine} sp={sp} sr={sr} setStep={setStep}/>;
}

  const finish=()=>{
    const tm=TP[split];sp({lang,goal,level,days});
    const r=Array(7).fill(null);
    tm.s.forEach((s,i)=>{r[i]={...s,ex:s.ex.map((x,j)=>({...x,id:`${i}${j}`}))};});

  };

  const Opt=({active,onClick,children})=>(

            <div style={{marginTop:16,display:"flex",alignItems:"center",gap:12}}>

            </div>
          </div>
          <div style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:10}}>// SELECT LANGUAGE</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:36}}>
            <Opt active={lang==="es"} onClick={()=>setLang("es")}>Español</Opt>
            <Opt active={lang==="en"} onClick={()=>setLang("en")}>English</Opt>
          </div>
          <Btn onClick={()=>setStep(1)} disabled={!lang}>{t.next} →</Btn>
        </div>
      )}
      {step>=1&&step<=4&&(
        <div style={{padding:"0 26px",paddingTop:"7vh",paddingBottom:40,animation:"fu 0.4s ease"}}>
          <div style={{display:"flex",gap:6,marginBottom:36}}>

          </div>
          {step===1&&(<>

                    <div style={{fontWeight:700,marginBottom:2}}>{v.n[lang||"es"]}</div>

function Main({lang,setLang,profile,routine,sp,sr,setStep}){
  const t=L[lang];
  const[sel,setSel]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const[tab,setTab]=useState("train");
  const[done,setDone]=useState({});
  const[logs,setLogs]=useState({});
  const[macros,setMacros]=useState({});
  const[inWorkout,setInWorkout]=useState(false);
  const[addEx,setAddEx]=useState(false);
  const[nex,setNex]=useState({e:"",s:3,r:"8-12"});
  const[addF,setAddF]=useState(false);
  const[fd,setFd]=useState({n:"",cal:"",prot:"",carbs:"",fat:"",m:"mid"});
  const[showSet,setShowSet]=useState(false);
  const[confirmR,setConfirmR]=useState(false);
  const w=wk(),today=tdy();
  const mt={cal:2000,prot:150,carbs:200,fat:60};

  useEffect(()=>{
    try{const r=store.get(`fv8d:${w}`);if(r)setDone(JSON.parse(r.value));}catch(_){}
    try{const r=store.get("fv8l");if(r)setLogs(JSON.parse(r.value));}catch(_){}
    try{const r=store.get(`fv8m:${today}`);if(r)setMacros(JSON.parse(r.value));}catch(_){}
  },[]);

  const sd=useCallback(n=>{setDone(n);store.set(`fv8d:${w}`,JSON.stringify(n));},[w]);
  const slg=useCallback(n=>{setLogs(n);store.set("fv8l",JSON.stringify(n));},[]);
  const sm=useCallback(n=>{setMacros(n);store.set(`fv8m:${today}`,JSON.stringify(n));},[today]);

  const day=routine?routine[sel]:null;
  const exs=day?day.ex:[];
  const dc=exs.filter(x=>done[`${sel}-${x.id}`]).length;
  const pct=exs.length?dc/exs.length:0;
  const entries=macros.entries||[];
  const tot=entries.reduce((a,e)=>({cal:a.cal+(+e.cal||0),prot:a.prot+(+e.prot||0),carbs:a.carbs+(+e.carbs||0),fat:a.fat+(+e.fat||0)}),{cal:0,prot:0,carbs:0,fat:0});

  const toggle=id=>{const k=`${sel}-${id}`;sd({...done,[k]:!done[k]});};
  const saveLog=(id,kg,rp)=>{if(!kg&&!rp)return;const nl={...logs};if(!nl[id])nl[id]=[];nl[id]=[{d:today,w:kg,r:rp},...nl[id]].slice(0,30);slg(nl);};
  const addExFn=()=>{if(!nex.e||!day)return;const r=[...routine];r[sel].ex=[...r[sel].ex,{...nex,id:`${sel}${Date.now()}`}];sr(r);setAddEx(false);setNex({e:"",s:3,r:"8-12"});};
  const rmEx=id=>{const r=[...routine];r[sel].ex=r[sel].ex.filter(x=>x.id!==id);sr(r);};
  const addFood=()=>{if(!fd.n||!fd.cal)return;const m={...macros};if(!m.entries)m.entries=[];m.entries.push({...fd,id:Date.now()});sm(m);setAddF(false);setFd({n:"",cal:"",prot:"",carbs:"",fat:"",m:"mid"});};
  const rmFood=id=>{const m={...macros};m.entries=(m.entries||[]).filter(x=>x.id!==id);sm(m);};

  const Inp=({value,onChange,placeholder,type="text",style:s2={}})=>(
    <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={{padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.borderL}`,
        background:C.card,color:C.tx,fontSize:14,fontFamily:sans,outline:"none",width:"100%",...s2}}
      onFocus={e=>e.target.style.borderColor=C.tx}
      onBlur={e=>e.target.style.borderColor=C.borderL}/>
  );

  if(inWorkout&&day){
    return <WorkoutScreen day={day} sel={sel} done={done} logs={logs}
      onToggle={toggle} onSaveLog={saveLog} t={t} lang={lang} onBack={()=>setInWorkout(false)}/>;
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.tx,fontFamily:sans}}>
      <div style={{background:C.bg,borderBottom:`1px solid ${C.borderL}`,padding:"14px 18px 10px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,fontFamily:mono,color:C.tx3,letterSpacing:3,marginBottom:2,fontWeight:600}}>FORJA</div>

            <button onClick={()=>{const nl=lang==="es"?"en":"es";setLang(nl);sp({...profile,lang:nl});}}

                {/* HERO CARD — alma de la pantalla */}
                <div style={{
                  width:"100%",borderRadius:22,background:"linear-gradient(135deg,#1A2540 0%,#0D1520 100%)",cursor:"default",
                  marginBottom:16,padding:"26px 22px 22px",
                  boxShadow:"0 16px 56px rgba(0,0,0,0.22)",
                  position:"relative",overflow:"hidden",userSelect:"none"}}>
                  
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
                    <div>
                      <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.35)",letterSpacing:3,marginBottom:7,textTransform:"uppercase"}}>
                        {DF[lang][sel]}
                      </div>
                      <div style={{fontSize:32,fontWeight:900,color:C.white,letterSpacing:-1.5,lineHeight:1,textTransform:"uppercase"}}>
                        {day.l}
                      </div>
                      <div style={{fontSize:10,fontFamily:mono,color:"rgba(255,255,255,0.35)",marginTop:6,letterSpacing:1}}>
                        {exs.length} {lang==="es"?"ejercicios":"exercises"}
                      </div>
                    </div>
                    <div style={{textAlign:"right",paddingTop:2}}>
                      <div style={{fontSize:36,fontWeight:900,lineHeight:1,
                        color:pct===1?"#4ade80":pct>0?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.2)"}}>
                        {dc}
                      </div>
                      <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.3)",letterSpacing:1}}>
                        / {exs.length}
                      </div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:3,marginBottom:22}}>
                    {exs.map((ex,i)=>{
                      const isDone=done[`${sel}-${ex.id}`];
                      return <div key={i} style={{height:3,flex:1,borderRadius:2,
                        background:isDone?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.12)",
                        transition:"background 0.3s"}}/>;
                    })}
                  </div>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:4}}>
                    <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.35)",letterSpacing:2}}>
                      {pct===1?(lang==="es"?"COMPLETADO":"COMPLETED"):(lang==="es"?"SEMANA EN CURSO":"WEEK IN PROGRESS")}
                    </div>
                    <div style={{fontSize:9,fontFamily:mono,color:"rgba(255,255,255,0.35)",letterSpacing:1}}>
                      {Math.round(pct*100)}%
                    </div>
                  </div>
                </div>

                {/* ── PESA 3D — tap to start workout ── */}
                <div id="forja-dumbbell-wrap" style={{width:"100%",height:260,marginTop:16,borderRadius:16,overflow:"hidden",position:"relative",background:C.bg,cursor:"pointer"}}
                  onClick={()=>setInWorkout(true)}
                >
                  <canvas id="forja-dumbbell-canvas" style={{width:"100%",height:"100%",display:"block"}}></canvas>
                </div>

                {!addEx?(
                  <button onClick={()=>setAddEx(true)} style={{width:"100%",padding:"13px 0",marginTop:12,borderRadius:10,border:`1.5px dashed ${C.border}`,background:"transparent",color:C.tx3,fontSize:10,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.addEx}</button>
                ):(
                  <div style={{marginTop:12,padding:16,background:C.card,borderRadius:12,border:`1.5px solid ${C.borderL}`}}>
                    <Inp placeholder={t.exName} value={nex.e} onChange={e=>setNex({...nex,e:e.target.value})}/>
                    <div style={{display:"flex",gap:10,marginTop:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:4,letterSpacing:2}}>{t.sets}</div>
                        <Inp type="number" value={nex.s} onChange={e=>setNex({...nex,s:+e.target.value})} style={{textAlign:"center"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:4,letterSpacing:2}}>{t.reps}</div>
                        <Inp value={nex.r} onChange={e=>setNex({...nex,r:e.target.value})} style={{textAlign:"center"}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:12}}>
                      <button onClick={()=>setAddEx(false)} style={{flex:1,padding:11,borderRadius:9,border:`1.5px solid ${C.borderL}`,background:"transparent",color:C.tx3,fontSize:12,cursor:"pointer",fontFamily:sans}}>{t.cancel}</button>
                      <button onClick={addExFn} style={{flex:2,padding:11,borderRadius:9,border:"none",background:C.tx,color:C.white,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:sans}}>{lang==="es"?"AGREGAR":"ADD"}</button>
                    </div>
                  </div>
                )}

                <div style={{textAlign:"center",marginTop:22}}>
                  {!confirmR?(
                    <button onClick={()=>setConfirmR(true)} style={{background:"none",border:`1px solid ${C.borderL}`,borderRadius:8,padding:"8px 18px",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.reset.toUpperCase()}</button>
                  ):(
                    <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                      <button onClick={()=>{sd({});setConfirmR(false);}} style={{padding:"8px 18px",borderRadius:8,border:"none",background:C.tx,color:C.white,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.yes.toUpperCase()}</button>
                      <button onClick={()=>setConfirmR(false)} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.borderL}`,background:"transparent",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.cancel.toUpperCase()}</button>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {tab==="macros"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[{v:tot.cal,mx:mt.cal,c:C.tx,l:t.cal,u:"kcal"},{v:tot.prot,mx:mt.prot,c:C.green,l:t.prot,u:"g"},{v:tot.carbs,mx:mt.carbs,c:C.blue,l:t.carbs,u:"g"},{v:tot.fat,mx:mt.fat,c:C.purple,l:t.fat,u:"g"}].map((r,i)=>{
                const left=r.mx-r.v,p2=Math.min(r.v/r.mx,1);
                return(
                  <div key={i} style={{padding:"14px",background:C.card,borderRadius:12,border:`1px solid ${C.borderL}`,boxShadow:"inset 0 1px 0 rgba(255,255,255,0.5)"}}>
                    <div style={{fontSize:9,fontFamily:mono,color:r.c,letterSpacing:2,marginBottom:6,fontWeight:600}}>{r.l}</div>
                    <div style={{fontSize:26,fontWeight:800,color:r.v>r.mx?C.red:C.tx}}>{r.v}</div>
                    <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:8}}>{r.u} / {r.mx}</div>
                    <div style={{height:2,background:C.borderL,borderRadius:1,overflow:"hidden"}}>
                      <div style={{height:"100%",background:r.c,width:`${p2*100}%`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:9,fontFamily:mono,color:left>=0?C.tx3:C.red,marginTop:5}}>
                      {left>=0?`${left}${r.u} ${t.left}`:`${Math.abs(left)}${r.u} ${t.over}`}
                    </div>
                  </div>
                );
              })}
            </div>

            {entries.map(f=>{
              const mc={am:C.yellow,mid:C.tx,snk:C.blue,pm:C.purple};
              return(
                <div key={f.id} style={{display:"flex",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.borderL}`,gap:12}}>
                  <div style={{width:3,height:32,borderRadius:2,background:mc[f.m]||C.tx3,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{f.n}</div>
                    <div style={{display:"flex",gap:8,marginTop:2}}>
                      <span style={{fontSize:10,fontFamily:mono,color:C.tx2}}>{f.cal}kcal</span>
                      <span style={{fontSize:10,fontFamily:mono,color:C.green}}>{f.prot}P</span>
                      <span style={{fontSize:10,fontFamily:mono,color:C.blue}}>{f.carbs}C</span>
                      <span style={{fontSize:10,fontFamily:mono,color:C.purple}}>{f.fat}F</span>
                    </div>
                  </div>
                  <button onClick={()=>rmFood(f.id)} style={{background:"none",border:"none",color:C.tx3,fontSize:16,cursor:"pointer"}}>×</button>
                </div>
              );
            })}

            {entries.length===0&&!addF&&(
              <div style={{textAlign:"center",padding:"40px 0",fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:2}}>// 0 KCAL LOGGED</div>
            )}

            {!addF?(
              <button onClick={()=>setAddF(true)} style={{width:"100%",padding:"13px 0",marginTop:10,borderRadius:10,border:`1.5px dashed ${C.border}`,background:"transparent",color:C.green,fontSize:10,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.addFood}</button>
            ):(
              <div style={{marginTop:12,padding:16,background:C.card,borderRadius:12,border:`1.5px solid ${C.borderL}`}}>
                <Inp placeholder={t.what} value={fd.n} onChange={e=>setFd({...fd,n:e.target.value})}/>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  {[["am",t.am],["mid",t.mid],["snk",t.snk],["pm",t.pm]].map(([k,lb])=>(
                    <button key={k} onClick={()=>setFd({...fd,m:k})} style={{flex:1,padding:"8px 0",borderRadius:7,border:`1.5px solid ${fd.m===k?C.tx:C.borderL}`,background:fd.m===k?C.tx:"transparent",color:fd.m===k?C.white:C.tx3,fontSize:9,fontFamily:mono,cursor:"pointer",transition:"all 0.15s"}}>
                      {lb.slice(0,3).toUpperCase()}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  {[["cal","KCAL",C.tx],["prot","P",C.green],["carbs","C",C.blue],["fat","F",C.purple]].map(([k,lb,clr])=>(
                    <div key={k} style={{flex:1}}>
                      <div style={{fontSize:9,color:clr,fontFamily:mono,letterSpacing:1,textAlign:"center",marginBottom:3,fontWeight:600}}>{lb}</div>
                      <Inp type="number" value={fd[k]} onChange={e=>setFd({...fd,[k]:e.target.value})} style={{textAlign:"center",fontSize:16,fontWeight:800,padding:9}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>setAddF(false)} style={{flex:1,padding:11,borderRadius:9,border:`1.5px solid ${C.borderL}`,background:"transparent",color:C.tx3,fontSize:10,fontFamily:mono,cursor:"pointer"}}>CANCEL</button>
                  <button onClick={addFood} style={{flex:2,padding:11,borderRadius:9,border:"none",background:C.tx,color:C.white,fontSize:10,fontFamily:mono,fontWeight:700,cursor:"pointer",letterSpacing:1}}>{t.save}</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function initDumbbell(){
  function tryInit(){
    const canvas = document.getElementById("forja-dumbbell-canvas");
    if(!canvas || !window.THREE){ setTimeout(tryInit,200); return; }
    const wrap = canvas.parentElement;
    const W = wrap.offsetWidth||360;
    const H = wrap.offsetHeight||260;

    const renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46,W/H,0.1,100);
    camera.position.set(0,0,9.5);

    const parts = [
      {xC:0,     r:0.12, th:1.44, type:"cyl"},
      {xC:-0.80, r:0.20, th:0.09, type:"disc"},
      {xC: 0.80, r:0.20, th:0.09, type:"disc"},
      {xC:-0.99, r:1.20, th:0.11, type:"disc"},
      {xC: 0.99, r:1.20, th:0.11, type:"disc"},
      {xC:-1.19, r:0.88, th:0.10, type:"disc"},
      {xC: 1.19, r:0.88, th:0.10, type:"disc"},
      {xC:-1.36, r:0.58, th:0.09, type:"disc"},
      {xC: 1.36, r:0.58, th:0.09, type:"disc"},
      {xC:-1.48, r:0.10, th:0.10, type:"cyl"},
      {xC: 1.48, r:0.10, th:0.10, type:"cyl"},
    ];
    parts.forEach(p=>{ p.area = p.type==="cyl" ? p.th*p.r*2 : p.r*p.r; });
    const totalArea = parts.reduce((s,p)=>s+p.area,0);
    let acc=0;
    parts.forEach(p=>{ p.w=p.area/totalArea; p.cumW=acc+p.w; acc=p.cumW; });

    function samplePart(){
      const rnd=Math.random();
      const p=parts.find(p=>rnd<=p.cumW)||parts[parts.length-1];
      const a=Math.random()*Math.PI*2;
      if(p.type==="cyl") return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*Math.random()*p.r, z:Math.cos(a)*Math.random()*p.r};
      const rad=Math.sqrt(Math.random())*p.r;
      return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*rad, z:Math.cos(a)*rad};
    }

    const CORE=48000, DISP=42000, TOTAL=CORE+DISP;
    const pos=new Float32Array(TOTAL*3), col=new Float32Array(TOTAL*3);

    for(let i=0;i<CORE;i++){
      const s=samplePart();
      const zOff=(Math.random()-0.5)*0.26;
      pos[i*3]=s.x+(Math.random()-0.5)*0.020;
      pos[i*3+1]=s.y+(Math.random()-0.5)*0.020;
      pos[i*3+2]=s.z+zOff;
      const distR=Math.sqrt(s.y*s.y+s.z*s.z);
      const radialT=Math.min(distR/1.20,1.0);
      const depthT=(zOff+0.13)/0.26;
      const t=radialT*0.40+depthT*0.20+Math.random()*0.08;
      const v=0.70+t*0.30;
      // blanco puro en el centro, azulado en bordes
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const idx=CORE+i;
      const s=samplePart();
      const sx=s.x, sy=s.y, sz=s.z;
      const len=Math.sqrt(sy*sy+sz*sz)+0.001;
      const ny=sy/len, nz=sz/len;
      const nx=(Math.abs(sx)>0.8&&Math.abs(sy)<0.15&&Math.abs(sz)<0.15)?Math.sign(sx)*0.3:0;
      const eD=Math.pow(Math.random(),0.35)*7.0;
      const spread=1.4;
      const dx=nx+(Math.random()-0.5)*spread;
      const dy=ny+(Math.random()-0.5)*spread;
      const dz=nz+(Math.random()-0.5)*spread;
      const dlen=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
      pos[idx*3]=sx+(dx/dlen)*eD;
      pos[idx*3+1]=sy+(dy/dlen)*eD;
      pos[idx*3+2]=sz+(dz/dlen)*eD;
      const fadeT=eD/7.0;
      const op=Math.max(0,1.0-fadeT*0.88);
      // fade de blanco (#F0F2F5) hacia bg (#383e4e)
      col[idx*3]=0.94*op+0.22*(1-op);
      col[idx*3+1]=0.96*op+0.243*(1-op);
      col[idx*3+2]=1.0*op+0.306*(1-op);
    }

    const geo=new THREE.BufferGeometry();
    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",   new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:0.014,vertexColors:true,transparent:true,opacity:0.88,sizeAttenuation:true});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);

    let t=0, animId;
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      pts.rotation.y=Math.sin(t*0.45)*0.50;
      pts.rotation.x=Math.sin(t*0.28)*0.05;
      renderer.render(scene,camera);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){ cancelAnimationFrame(animId); } else { animate(); }
    });
  }
  setTimeout(tryInit,400);
})();
</script>
</body>
</html>
