function syncDot(state){ // 'syncing'|'ok'|'offline'|'error'
  const d=document.getElementById('forja-sync-dot');
  if(!d)return;
  d.className='forja-sync-dot '+(state==='ok'?'':state);

function getSB(){
  if(_sb)return _sb;
  if(!window.supabase||FORJA_SUPABASE_URL.includes('YOUR_PROJECT')){syncDot('offline');return null;}
  try{
    // Storage adapter that uses cookies for PKCE code_verifier
    // (survives Safari ITP cross-site navigation) and localStorage for sessions
    const _cookieGet=function(key){
      const m=document.cookie.match('(^|;)\\s*'+encodeURIComponent(key)+'\\s*=\\s*([^;]+)');
      return m?decodeURIComponent(m.pop()):null;
    };
    const _cookieSet=function(key,val,days){
      const exp=new Date(Date.now()+(days||1)*864e5).toUTCString();
      document.cookie=encodeURIComponent(key)+'='+encodeURIComponent(val)+';expires='+exp+';path=/;SameSite=Lax';
    };
    const _cookieDel=function(key){
      document.cookie=encodeURIComponent(key)+'=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/;SameSite=Lax';
    };
    const _storage={
      getItem:function(key){
        // PKCE verifier must survive cross-site nav — use cookie
        if(key.includes('code_verifier')||key.includes('pkce')){
          return _cookieGet(key)||localStorage.getItem(key);
        }
        return localStorage.getItem(key)||_cookieGet(key);
      },
      setItem:function(key,value){
        if(key.includes('code_verifier')||key.includes('pkce')){
          _cookieSet(key,value,1); // cookie for PKCE
        }
        try{localStorage.setItem(key,value);}catch(e){}
      },
      removeItem:function(key){
        _cookieDel(key);
        try{localStorage.removeItem(key);}catch(e){}
      }
    };
    _sb=window.supabase.createClient(FORJA_SUPABASE_URL,FORJA_SUPABASE_KEY,{
      auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storage:_storage}
    });
    _sb.auth.onAuthStateChange((ev,sess)=>{
      _user=sess?.user??null;_authReady=true;
      _authCbs.forEach(cb=>cb(_user));
      syncDot(_user?'ok':'offline');
    });
    _sb.auth.getSession().then(({data:{session}})=>{
      _user=session?.user??null;_authReady=true;
      _authCbs.forEach(cb=>cb(_user));
      syncDot(_user?'ok':'offline');
    });
    return _sb;
  }catch(e){syncDot('error');return null;}
}

async function ensureAuth(){
  const sb=getSB();if(!sb)return null;
  if(_user)return _user;
  if(!_authReady){
    await new Promise(res=>{
      const t=setTimeout(()=>res(),3000);
      _authCbs.push(u=>{clearTimeout(t);res(u);});
    });
    if(_user)return _user;
  }
  const{data,error}=await sb.auth.signInAnonymously();
  if(!error&&data?.user){_user=data.user;syncDot('ok');return _user;}
  syncDot('error');return null;
}

// Auto-compute weekly muscle volume from logs
function computeWeeklyMuscleVol(logs,routine){
  const today=new Date();
  const dow=today.getDay();const daysToMon=dow===0?6:dow-1;
  const ws=new Date(today);ws.setDate(today.getDate()-daysToMon);ws.setHours(0,0,0,0);
  const weekStr=ws.toISOString().slice(0,10);
  const mv={};
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{
      if(e.d<weekStr)return;
      let nm=id;
      if(routine)routine.forEach(d=>{if(!d)return;(d.ex||[]).forEach(ex=>{if(ex.id===id)nm=ex.e;});});
      const nmLow=nm?.toLowerCase()?.trim();
      const md=EXERCISE_MUSCLE_MAP[nmLow]||EXERCISE_MUSCLE_MAP[ES_TO_META[nmLow]];
      if(!md)return;
      const vol=(+e.w||0)*(+e.r||0);if(vol<=0)return;
      md.p.forEach(m=>{mv[m]=(mv[m]||0)+vol;});
      md.s.forEach(m=>{mv[m]=(mv[m]||0)+vol*0.20;});
    });
  });
  return mv;
}

  async saveSession(dayLabel,exercises,durationSecs){

    // Supabase sync (fire and forget)
    const sb=getSB();const user=typeof ensureAuth==='function'?null:null;
    (async()=>{

      }catch(_){}
    })();
  },
  calcSessionXP(exercises, setsData, EX_META_REF, exMetaKeyFn){
    // exercises: array of {e: name, id}
    // setsData: array of arrays of {kg, rp, done}
    // Returns: {zone: deltaXP}
    const BASE_W={
      'press banca':60,'press inclinado':50,'aperturas':30,'flexión':0,
      'press sobre cabeza':40,'elevación lateral':12,'press arnold':30,
      'peso muerto':100,'sentadilla':80,'sentadilla frontal':70,'hip thrust':80,
      'remo con barra':60,'dominada':0,'jalón al pecho':60,'remo con mancuerna':25,
      'curl bíceps':15,'curl martillo':15,'curl z-bar':20,
      'extensión tríceps':15,'fondos':0,'press francés':20,
      'zancada':40,'step-up':30,'leg press':100,'curl femoral':40,
      'elevación de talones':40,'crunch':0,'plancha':0,'elevación de piernas':0,
      'default':30
    };
    const delta={};
    exercises.forEach((ex,ei)=>{
      const sets=setsData[ei]||[];
      const meta=EX_META_REF[exMetaKeyFn(ex.e)]||{};
      const muscles=[...(meta.p||[]),...(meta.s||[]).map(z=>({z,factor:0.4}))];
      if(!muscles.length)return;
      const nameLow=(ex.e||'').toLowerCase();
      const baseW=BASE_W[nameLow]||BASE_W['default'];
      sets.forEach(s=>{
        if(!s.done)return;
        const kg=parseFloat(s.kg)||0;
        const rp=parseInt(s.rp)||0;
        if(rp<=0)return;
        const wFactor=baseW>0?Math.min(2,Math.max(0.3,kg>0?kg/baseW:0.3)):1.0;
        const rawXP=Math.round(1*rp*wFactor); // 1 set = reps × weight_factor
        muscles.forEach(m=>{
          const zone=typeof m==='string'?m:m.z;
          const mFactor=typeof m==='string'?1.0:(m.factor||1.0);
          if(!zone)return;
          delta[zone]=(delta[zone]||0)+Math.round(rawXP*mFactor);
        });
      });
    });
    return delta;
  },
  // Save daily training load (sets×reps×kg) — used for ACWR calculation
  async saveDailyLoad(loadKg){
    const today=new Date().toISOString().slice(0,10);
    // Update localStorage running total for today
    try{
      const raw=localStorage.getItem('fv8_dl')||'{}';
      const dl=JSON.parse(raw);
      dl[today]=(dl[today]||0)+loadKg;
      localStorage.setItem('fv8_dl',JSON.stringify(dl));
    }catch(_){}
    // Supabase upsert — adds to existing value for today
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return;
    try{
      // Use raw SQL increment via RPC to avoid race conditions
      await sb.from('daily_load').upsert({
        user_id:user.id,load_date:today,load_kg:loadKg
      },{onConflict:'user_id,load_date',ignoreDuplicates:false});
      // Actually increment — upsert replaces, so we need to load first
      const{data}=await sb.from('daily_load').select('load_kg').eq('user_id',user.id).eq('load_date',today).maybeSingle();
      const existing=(data?.load_kg||0);
      await sb.from('daily_load').upsert({user_id:user.id,load_date:today,load_kg:existing+loadKg},{onConflict:'user_id,load_date'});
    }catch(_){}
  },

  // Load last 28 days of daily load for ACWR
  loadACWRLocal(){
    try{
      const raw=localStorage.getItem('fv8_dl');
      return raw?JSON.parse(raw):{};
    }catch(_){return{};}
  },

  async loadACWR(){
    // Try Supabase first, fall back to localStorage
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user) return this.loadACWRLocal();
    try{
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-28);
      const{data}=await sb.from('daily_load')
        .select('load_date,load_kg')
        .eq('user_id',user.id)
        .gte('load_date',cutoff.toISOString().slice(0,10))
        .order('load_date',{ascending:false});
      if(!data||!data.length) return this.loadACWRLocal();
      const result={};
      data.forEach(r=>{result[r.load_date]=parseFloat(r.load_kg)||0;});
      // Merge with localStorage
      const local=this.loadACWRLocal();
      Object.entries(local).forEach(([d,v])=>{if(!result[d])result[d]=v;});
      return result;
    }catch(_){return this.loadACWRLocal();}
  },

  // Save best 1RM per exercise per day for strength curve
  async saveStrengthHistory(exerciseId,exerciseName,estimated1rm,bestKg,bestReps){
    const today=new Date().toISOString().slice(0,10);
    try{
      const raw=localStorage.getItem('fv8_sh')||'{}';
      const sh=JSON.parse(raw);
      if(!sh[exerciseId])sh[exerciseId]=[];
      const existing=sh[exerciseId].find(e=>e.d===today);
      if(existing){
        if(estimated1rm>existing.rm){existing.rm=estimated1rm;existing.kg=bestKg;existing.r=bestReps;existing.n=exerciseName;}
      }else{
        sh[exerciseId]=[{d:today,rm:estimated1rm,kg:bestKg,r:bestReps,n:exerciseName},...sh[exerciseId]].slice(0,90);
      }
      localStorage.setItem('fv8_sh',JSON.stringify(sh));
    }catch(_){}
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return;
    try{
      await sb.from('strength_history').upsert({
        user_id:user.id,exercise_id:exerciseId,exercise_name:exerciseName,
        logged_date:today,estimated_1rm:estimated1rm,best_set_kg:bestKg,best_set_reps:bestReps
      },{onConflict:'user_id,exercise_id,logged_date'});
    }catch(_){}
  },

  loadStrengthLocal(exerciseId){
    try{
      const raw=localStorage.getItem('fv8_sh');
      if(!raw)return[];
      const sh=JSON.parse(raw);
      return(sh[exerciseId]||[]).slice(0,12);
    }catch(_){return[];}
  },

  async loadStrengthHistory(exerciseId){
    const local=this.loadStrengthLocal(exerciseId);
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return local;
    try{
      const{data}=await sb.from('strength_history')
        .select('logged_date,estimated_1rm,best_set_kg,best_set_reps')
        .eq('user_id',user.id).eq('exercise_id',exerciseId)
        .order('logged_date',{ascending:false}).limit(12);
      if(!data||!data.length)return local;
      return data.map(r=>({d:r.logged_date,rm:parseFloat(r.estimated_1rm),kg:parseFloat(r.best_set_kg),r:r.best_set_reps}));
    }catch(_){return local;}
  },
};

function applyGoal(ex,goal){
  let s=ex.s,r=ex.r;
  if(goal==="strength"){s=Math.min(ex.s+1,5);r=ex.rs;}
  else if(goal==="lose"){s=Math.max(ex.s-1,3);r=ex.rc;}
  else if(goal==="recomp"){r=ex.rr;}
  else if(goal==="general"){s=Math.max(ex.s-1,3);r=ex.rg;}
  return{e:ex.e,s,r};
}
function repTarget(rStr){
  if(!rStr) return "8";
  const s=String(rStr);
  if(s.includes("-")){
    const [lo,hi]=s.split("-").map(n=>parseInt(n)||0);
    return String(lo||8);
  }
  if(s.includes("s")||s.includes("m")) return s; // time-based e.g. "30s"
  return s;
}
function repRangeDisplay(rStr){
  if(!rStr) return {target:"8",range:null};
  const s=String(rStr);
  if(s.includes("-")){
    const [lo,hi]=s.split("-").map(n=>parseInt(n)||0);
    return {target:String(lo||8), range:s, lo, hi};
  }
  return {target:s, range:null};
}

function canDo(exName, eq){
  const needed = CELEB_EQ_NEEDS[exName];
  if(needed===undefined) return true;
  if(needed.length===0) return true;
  return needed.every(e=>eq.includes(e));
}

};
function normEq(userEquipment){
  return userEquipment.map(e=>EQ_MAP[e]||e);
}
function adaptExercise(exName, userEquipment){
  const eq = normEq(userEquipment);
  if(canDo(exName, eq)) return exName;
  const subs = CELEB_SUBS[exName]||[];
  for(const sub of subs){
    const subNeeds = CELEB_SUB_EQ[sub]||[];

  }

}

function buildCelebRoutine(celeb, userEquipment, selDays){
  const r = Array(7).fill(null);
  const exercises = CELEB_EXERCISES[celeb.id] || {};
  const splitKeys = Object.keys(exercises);
  if(splitKeys.length === 0) return r;
  selDays.forEach((dayIdx, i)=>{
    const splitName = splitKeys[i % splitKeys.length];
    const raw = exercises[splitName];
    if(raw && !Array.isArray(raw) && raw.circuit){
      const adapted = raw.exercises.map((ex, j)=>({
        e: ex.e, s: 1, r: ex.r,
        id: `c${dayIdx}${j}`, circuit: true
      }));
      r[dayIdx] = {
        l: splitName, ex: adapted,
        circuit: true, rounds: raw.rounds, circuitNote: raw.note
      };
    } else {
      const rawExs = Array.isArray(raw) ? raw : [];
      const adapted = rawExs.map((ex, j)=>({
        e: typeof ex === "string" ? ex : ex.e,
        s: typeof ex === "string" ? 4 : (ex.s||1),
        r: typeof ex === "string" ? "8-12" : ex.r,
        id: `c${dayIdx}${j}`
      }));
      r[dayIdx] = {l: splitName, ex: adapted};
    }
  });
  return r;
}

function canDoAuto(exName, eq){
  const eqMap={"Rack+Barra":"rack","Banco":"bench","Mancuernas":"dumbbells",
    "Dominadas":"pull_up_bar","Paralelas":"dip_bar","Barra Z/EZ":"ez_bar",
    "Leg Ext/Curl":"leg_extension","Polea":"cable_machine","Chaleco":"weight_vest",
    "Kettlebell":"kb","Bandas":"bands"};
  if(!eq||eq.length===0) return exName;
  const eqKeys=eq.map(e=>eqMap[e]||e).filter(Boolean);
  eqKeys.push("bodyweight");
  const needed=EQ_NEEDS_ES[exName];
  if(needed===undefined) return exName; // unknown = assume available
  if(needed.length===0) return exName; // bodyweight
  if(needed.every(n=>eqKeys.includes(n))) return exName; // all needed available
  const sub=SUBS_ES[exName];
  if(sub){
    const subNeeded=EQ_NEEDS_ES[sub];
    if(!subNeeded||subNeeded.length===0||subNeeded.every(n=>eqKeys.includes(n))) return sub;
  }
  return exName; // keep original if no valid sub found
}
function getWeekNum(){
  const d=new Date();
  const jan1=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/864e5+jan1.getDay()+1)/7);
}
function buildRoutine7(splits,selectedDays,goal,eq=[],weekOffset=null){
  const r=Array(7).fill(null);
  const adapted=splits.map(d=>({...d,ex:d.ex.map(e=>{
    const goalApplied=applyGoal(e,goal);
    const exName=canDoAuto(goalApplied.e,eq);
    return {...goalApplied,e:exName};
  })}));
  const wk = weekOffset !== null ? weekOffset : getWeekNum();
  const isWeekB = (wk % 2 === 0);
  const half = Math.floor(adapted.length / 2);
  const hasABVariant = adapted.length >= 4 && half >= selectedDays.length;
  let seq;
  if(adapted.length===2){
    seq=[adapted[0],adapted[1],adapted[0],adapted[1],adapted[0],adapted[1],adapted[0]]
      .slice(0,selectedDays.length);
  } else if(hasABVariant){
    const base=isWeekB?adapted.slice(half):adapted.slice(0,half);
    seq=selectedDays.map((_,i)=>base[i%base.length]);
  } else {
    seq=adapted.slice(0,selectedDays.length);
  }
  selectedDays.forEach((dayIdx,i)=>{
    if(seq[i])r[dayIdx]={...seq[i],ex:seq[i].ex.map((x,j)=>({...x,id:`${dayIdx}${j}`}))};
  });
  return r;
}

function pickExpressCircuit(groupId, targetMins){
  const g=EXPRESS_GROUPS.find(x=>x.id===groupId);
  if(!g) return null;
  const circuit=g.circuits[Math.floor(Math.random()*g.circuits.length)];
  const naturalSecs=circuit.reduce((sum,ex)=>sum+ex.s*(ex.work+ex.rest),0);
  const naturalMins=naturalSecs/60;
  const ratio=targetMins/naturalMins;
  return circuit.map(ex=>({
    ...ex,
    s:Math.max(1,Math.round(ex.s*ratio)),
    id:'exp_'+ex.e.toLowerCase().replace(/\s+/g,'_'),
    isExpress:true,
  }));
}

function computeACWR(loads){
  const today=new Date();
  let acute=0, chronic=0;
  for(let i=0;i<28;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const v=loads[key]||0;
    if(i<7) acute+=v;
    chronic+=v;
  }
  const weeklyAvg=chronic/4; // chronic / 4 weeks = average weekly load
  const daysWithData=Object.keys(loads).filter(k=>{const d=new Date(k);return(new Date()-d)/86400000<=28;}).length;
  const ratio=weeklyAvg>0&&daysWithData>=7?Math.round((acute/weeklyAvg)*100)/100:0;
  return{acute:Math.round(acute),chronic:Math.round(chronic),ratio,loads};
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return r+","+g+","+b;
}

  const[sel,setSel]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const[tourOriginalSel,setTourOriginalSel]=useState(null);
  const[tab,setTab]=useState("train");
  const setTabR=useCallback((t)=>{setTab(t);if(t==="train"){const l=FStore.loadACWRLocal();setAcwr(computeACWR(l));}},[setAcwr]);
  const[done,setDone]=useState({});
  const[logs,setLogs]=useState({});
  const[inWorkout,setInWorkout]=useState(false);
  const[showProModal,setShowProModal]=useState(false); /* isPro=true so never shown */
  const[showExpress,setShowExpress]=useState(false);
  const[expressGroup,setExpressGroup]=useState(null);
  const[expressTime,setExpressTime]=useState(15);
  const[expressDay,setExpressDay]=useState(null);
  const[addEx,setAddEx]=useState(false);
  const[nex,setNex]=useState({e:"",s:3,r:"8-12"});
  const[showSet,setShowSet]=useState(false);
  const[showBotChat,setShowBotChat]=useState(false);
  const[confirmR,setConfirmR]=useState(false);
  const[weekOff,setWeekOff]=useState(0);
  const[tourStep,setTourStep]=useState(null);    // null=ask, 0-N=active, -1=done
  const[muscleXP,setMuscleXP]=useState(()=>{
    const mxp=FStore.loadMuscleXP();
    const today=new Date().toISOString().slice(0,10);
    const lastOpen=localStorage.getItem('fv8_lastOpen')||today;
    const daysSinceOpen=Math.floor((new Date(today)-new Date(lastOpen))/86400000);
    try{localStorage.setItem('fv8_lastOpen',today);}catch(_){}
    if(daysSinceOpen<1) return mxp; // opened today already, skip
    const logs=JSON.parse(localStorage.getItem('fv8l')||'{}');
    const DECAY_GRACE=7;    // days without training before decay starts
    const DECAY_RATE=0.012; // 1.2% per day (gentle but meaningful)
    const MIN_XP=100;       // never drop below 100 XP (level 1 floor)
    let changed=false;
    Object.keys(mxp).forEach(zk=>{
      const zd=mxp[zk];if(!zd||!zd.xp||zd.xp<=MIN_XP) return;
      let lastTrainDate=null;
      Object.entries(logs).forEach(([id,entries])=>{
        (entries||[]).forEach(e=>{
          if(!e.d) return;
          if(!lastTrainDate||e.d>lastTrainDate) lastTrainDate=e.d;
        });
      });
      if(!lastTrainDate) return;
      const daysSinceTrain=Math.floor((new Date(today)-new Date(lastTrainDate))/86400000);
      if(daysSinceTrain<=DECAY_GRACE) return; // still in grace period
      const decayDaysToApply=Math.min(daysSinceOpen, daysSinceTrain-DECAY_GRACE);
      if(decayDaysToApply<1) return;
      const factor=Math.pow(1-DECAY_RATE, decayDaysToApply);
      const newXP=Math.max(MIN_XP, Math.round(zd.xp*factor));
      if(newXP<zd.xp){
        mxp[zk]={...zd,xp:newXP,level:xpToLevel(newXP)};
        changed=true;
      }
    });
    if(changed){
      try{localStorage.setItem('fv8_mxp',JSON.stringify(mxp));}catch(_){}
    }
    return mxp;
  });
  const[acwr,setAcwr]=useState({acute:0,chronic:0,ratio:0,loads:{}});
  const refreshAcwr=useCallback(()=>{const l=FStore.loadACWRLocal();setAcwr(computeACWR(l));},[setAcwr]);
  const[xpLevelUps,setXpLevelUps]=useState([]); // zones that leveled up since last visit
  const[showXPTooltip,setShowXPTooltip]=useState(null); // zone name
  const[xpAnimZone,setXpAnimZone]=useState(null); // zone currently animating level up
  const[scrollVersion,setScrollVersion]=useState(0); // increments after scroll to trigger re-render
  React.useEffect(()=>{
    const startHandler=()=>{if(day&&day.ex&&day.ex.length)setInWorkout(true);};
    window.addEventListener("forja:startWorkout",startHandler);
    const selectDayHandler=(ev)=>{if(ev.detail&&ev.detail.day!==undefined){setSel(ev.detail.day);setTabR("train");setAddEx(false);setInWorkout(false);}};
    window.addEventListener("forja:selectDay",selectDayHandler);
    const toggleHandler=(ev)=>{
      const s=ev.detail&&ev.detail.sel!==undefined?ev.detail.sel:sel;
      const r=routine?routine[s]:null;
      if(!r||!r.ex||!r.ex.length) return;
      const allDone=r.ex.every(function(x){return done[s+"-"+x.id];});
      const nd={...done};
      r.ex.forEach(function(x){
        if(allDone) delete nd[s+"-"+x.id];
        else nd[s+"-"+x.id]=true;
      });
      sd(nd);
    };
    window.addEventListener("forja:toggleDay",toggleHandler);
    return()=>{
      window.removeEventListener("forja:startWorkout",startHandler);
      window.removeEventListener("forja:toggleDay",toggleHandler);
      window.removeEventListener("forja:selectDay",selectDayHandler);
    };

    const handler=()=>setShowProModal&&setShowProModal(true);

        setScrollVersion(v=>v+1);

        const r=el.getBoundingClientRect();
        const target=window.scrollY+r.top+r.height/2-window.innerHeight/2;

        setScrollVersion(v=>v+1);
      }

        const r=el.getBoundingClientRect();

        setScrollVersion(v=>v+1);
      }

    if(tourStep===14||tourStep===15){
      const id=tourStep===14?'fix-my-balance':'prs-section';
      const el=document.querySelector('[data-tour="'+id+'"]');

        const r=el.getBoundingClientRect();
        const target=window.scrollY+r.top+r.height/2-window.innerHeight/2;
        window.scrollTo({top:Math.max(0,Math.round(target)),behavior:'instant'});
        setScrollVersion(v=>v+1);
      }
    }
  },[tourStep]);

      document.body.style.overflow='hidden';

      document.body.style.overflow='';
      document.body.style.touchAction='';

      document.body.style.overflow='';
      document.body.style.touchAction='';

  const saveLog=(id,kg,rp,exName)=>{
    const bwKg=+profile?.weight||75;
    const nameLow=(exName||'').toLowerCase().trim();
    const isBW=BW_EXERCISES.has(nameLow);
    const isTimeEx=NO_TIME_EX.includes(nameLow);
    if(isTimeEx&&!(+kg>0)) return;
    const effKg=(+kg>0)?+kg:(isBW?bwKg:0);

    const nl={...logs};

      const BASE_W_MAP={
        'bench press':60,'dumbbell bench press':50,'incline bench press':55,'incline dumbbell press':45,
        'overhead press':40,'dumbbell shoulder press':30,'seated overhead press':35,'press arnold':25,
        'lateral raise':12,'dumbbell front raise':10,'reverse fly':10,
        'deadlift':100,'romanian deadlift':80,'squat':80,'front squat':70,'goblet squat':40,
        'leg press':100,'hip thrust':80,'bulgarian split squat':40,'dumbbell bulgarian split squat':30,
        'leg curl':40,'leg extension':40,'calf raise':40,
        'barbell row':60,'dumbbell row':25,'cable row':50,'pendlay row':60,
        'lat pulldown':50,'machine pulldown':50,'pull up':0,'chin up':0,
        'dumbbell curl':15,'barbell curl':25,'hammer curl':15,'preacher curl':20,'concentration curl':12,
        'tricep pushdown':20,'overhead tricep extension':20,'skull crusher':25,'dips':0,'close grip bench press':50,
        'plank':0,'crunch':0,'hanging knee raises':0,'mountain climber':0,
        'default':30
      };
      const engKey=ES_TO_META[nameLow]||nameLow;
      const baseW=BASE_W_MAP[engKey]||BASE_W_MAP[nameLow]||BASE_W_MAP['default'];
      const wFactor=baseW>0?Math.min(2.0,Math.max(0.3,effKg>0?effKg/baseW:0.3)):1.0;
      const reps=parseInt(rp)||0;
      const rawXP=Math.max(1,Math.round(reps*wFactor));
      const allMuscles=[...(md.p||[]).map(m=>({m,f:1.0})),...(md.s||[]).map(m=>({m,f:0.4}))];
      setMuscleXP(prev=>{
        const newXP={...prev};
        const levelUps=[];
        allMuscles.forEach(({m,f})=>{
          const zk=FORJA_TO_ZONE[m.toLowerCase()];
          if(!zk)return;
          const zones=[zk];
          if(zk.endsWith('_izq'))zones.push(zk.replace('_izq','_der'));
          if(zk.endsWith('_der'))zones.push(zk.replace('_der','_izq'));
          zones.forEach(z=>{
            if(!newXP[z])newXP[z]={xp:0,level:1};
            const prevLevel=newXP[z].level;
            newXP[z]={...newXP[z],xp:newXP[z].xp+Math.max(1,Math.round(rawXP*f))};
            const newLevel=xpToLevel(newXP[z].xp);
            if(newLevel>prevLevel){
              newXP[z].level=newLevel;
              newXP[z].lastLevelUp=today;
              levelUps.push({zone:z,level:newLevel});
            }
          });
        });
        FStore.saveMuscleXP(newXP);
        if(levelUps.length>0) setXpLevelUps(prev2=>[...prev2,...levelUps]);
        return newXP;
      });
    }
  };
  const exportData=()=>{
    const data={profile,routine,logs,exported:today};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`forja_backup_${today}.json`;
    a.click();
  };
  const addExFn=()=>{if(!nex.e||!day)return;const r=[...routine];r[sel].ex=[...r[sel].ex,{...nex,id:`${sel}${Date.now()}`}];sr(r);setAddEx(false);setNex({e:"",s:3,r:"8-12"});};
  const rmEx=id=>{const r=[...routine];r[sel].ex=r[sel].ex.filter(x=>x.id!==id);sr(r);};
  useEffect(()=>{
    window.dispatchEvent(new CustomEvent("forja:mount"));
  });
  const Inp=({value,onChange,placeholder,type="text",style:s2={}})=>(
    <input type={type} value={value} onChange={onChange} placeholder={placeholder}
      style={{padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.borderL}`,
        background:C.card,color:C.tx,fontSize:14,fontFamily:sans,outline:"none",width:"100%",...s2}}
      onFocus={e=>e.target.style.borderColor=C.tx}
      onBlur={e=>e.target.style.borderColor=C.borderL}/>
  );
  if(inWorkout&&day&&day.ex&&day.ex.length){
    if(expressDay){
      return <ExpressTimer day={expressDay} lang={lang} profile={profile}
        onDone={(zonesWorked)=>{
          if(zonesWorked&&zonesWorked.length){
            const newMxp={...JSON.parse(localStorage.getItem('fv8_mxp')||'{}')};
            zonesWorked.forEach(zk=>{
              if(!newMxp[zk])newMxp[zk]={xp:0,level:1};
              newMxp[zk].lastTrain=new Date().toISOString().slice(0,10);
              newMxp[zk].xp=(newMxp[zk].xp||0)+20;
            });
            try{localStorage.setItem('fv8_mxp',JSON.stringify(newMxp));}catch(_){}
          }
          const today=new Date().toISOString().slice(0,10);
          try{
            const dl=JSON.parse(localStorage.getItem('fv8_dl')||'{}');
            dl[today]=(dl[today]||0)+800;
            localStorage.setItem('fv8_dl',JSON.stringify(dl));
          }catch(_){}
          setInWorkout(false);
          setExpressDay(null);
        }}
        onBack={()=>{setInWorkout(false);setExpressDay(null);}}/>;
    }
    return <WorkoutScreen day={day} sel={sel} done={done} logs={logs}
      onToggle={toggle} onSaveLog={saveLog}
      t={t} lang={lang} profile={profile}
      onBack={()=>{setInWorkout(false);window.__tourBackFromWorkout=null;}}

  if(showProModal){ return(

        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>⚡</div>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:36,letterSpacing:3,color:"#c0a870",lineHeight:1,marginBottom:6}}>FORJA PRO</div>
          <div style={{fontFamily:mono,fontSize:11,color:"rgba(255,255,255,0.45)",letterSpacing:1}}>{lang==="es"||lang==="pt"?"Desbloquea todo el potencial":lang==="fr"?"Débloque tout le potentiel":lang==="it"?"Sblocca tutto il potenziale":lang==="de"?"Volles Potenzial freischalten":"Unlock the full potential"}</div>

          </button>

function VideoThumb({src,size=56}){
  const[thumb,setThumb]=useState(null);
  const[playing,setPlaying]=useState(false);
  const[visible,setVisible]=useState(false);
  const wrapRef=React.useRef(null);
  const vidRef=React.useRef(null);
  useEffect(()=>{
    if(!wrapRef.current) return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setVisible(true);obs.disconnect();}
    },{rootMargin:"80px"});
    obs.observe(wrapRef.current);
    return()=>obs.disconnect();
  },[]);
  useEffect(()=>{
    if(!visible||!src||thumb) return;
    const v=document.createElement("video");
    v.crossOrigin="anonymous";
    v.muted=true;
    v.preload="metadata";
    v.src=src;
    v.currentTime=0.5;
    v.addEventListener("seeked",()=>{
      try{
        const c=document.createElement("canvas");
        c.width=v.videoWidth||160; c.height=v.videoHeight||160;
        c.getContext("2d").drawImage(v,0,0);
        setThumb(c.toDataURL("image/jpeg",0.65));
      }catch(e){}
    },{once:true});
    v.load();
  },[visible,src]);
  return(
    <div ref={wrapRef} style={{width:size,height:size,borderRadius:10,overflow:"hidden",background:"#2c3040",flexShrink:0,position:"relative"}}
      onMouseEnter={()=>{setPlaying(true);vidRef.current?.play();}}
      onMouseLeave={()=>{setPlaying(false);if(vidRef.current){vidRef.current.pause();vidRef.current.currentTime=0;}}}>
      {thumb&&<img src={thumb} style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0,opacity:playing?0:1,transition:"opacity .2s"}}/>}
      {src&&playing&&<video ref={vidRef} src={src} muted loop playsInline preload="none" autoPlay
        style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>}
      {!thumb&&!playing&&<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",opacity:.25,fontSize:18}}>▶</div>}
    </div>
  );
}

function Onboard({lang,setLang,step,setStep,sp,sr}){
  const BN="'Bebas Neue',cursive";
  const MN="'SF Mono','Courier New',monospace";
  const bg="#04080f";
  const W="rgba(240,242,245,0.95)";
  const dim="rgba(240,242,245,0.32)";

  const TOTAL=7;
  const[obStep,setObStep]=useState(0);
  const[ob,setOb]=useState({
    lang:lang||"es",name:"",gender:null,age:25,
    goal:null,level:null,equipment:null,
    daysCount:4,selDays:[1,2,4,6],units:"metric",
  });
  const[nameVal,setNameVal]=useState("");
  const[ageVal,setAgeVal]=useState(25);
  const[weightVal,setWeightVal]=useState(70);
  const[heightVal,setHeightVal]=useState(175);
  const[visible,setVisible]=useState(true);
  const[animDir,setAnimDir]=useState(1);
  const[generating,setGenerating]=useState(false);
  const[genPct,setGenPct]=useState(0);

  const canvasRef=React.useRef(null);
  const animRef=React.useRef(null);
  const mouseRef=React.useRef({x:0,y:0});
  const stepRef=React.useRef(0);
  const transitRef=React.useRef(0);
  const transitDirRef=React.useRef(1);
  const transitFromRef=React.useRef(0);
  const burstParticles=React.useRef([]);
  const burstCanvasRef=React.useRef(null);
  const burstAnimRef=React.useRef(null);
  const activePlanetPos=React.useRef({x:0,y:0});

  const set=(k,v)=>setOb(d=>({...d,[k]:v}));

  const fireBurst=()=>{
    const solarCanvas=canvasRef.current;
    const rect=solarCanvas?solarCanvas.getBoundingClientRect():{top:0,left:0,width:window.innerWidth,height:260};
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    // Partículas tipo energía — pocas, rápidas, muy suaves
    const N=40;
    const newPts=Array.from({length:N},()=>{
      const angle=Math.random()*Math.PI*2;
      const speed=6+Math.random()*20;
      const bright=Math.random();
      return{
        x:cx,y:cy,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        life:1,
        decay:0.018+Math.random()*0.022,
        size:bright>0.8?2.5:bright>0.5?1.5:0.8,
        alpha:0.6+bright*0.4,
        // Solo azul frío — monocromático premium
        hue:210+Math.random()*30,
        sat:70+bright*30,
        light:70+bright*25,
      };
    });
    burstParticles.current=[...burstParticles.current,...newPts];
  };


  const goTo=(n)=>{
    if(n===obStep||n<0||n>=TOTAL) return;
    // Disparar burst fullscreen
    fireBurst();
    transitDirRef.current=n>obStep?1:-1;
    transitFromRef.current=obStep;
    transitRef.current=0;
    setAnimDir(n>obStep?1:-1);
    setVisible(false);
    stepRef.current=n;
    setTimeout(()=>{setObStep(n);setVisible(true);},320);
  };
  const next=()=>goTo(obStep+1);
  const back=()=>goTo(obStep-1);

  // Configuración de planetas
  const PLANETS=React.useMemo(()=>{
    // Cada planeta tiene radio, velocidad de rotación, color y posición en órbita
    return Array.from({length:TOTAL},(_,i)=>{
      const hues=[210,195,225,200,215,205,220]; // azules fríos
      const sizes=[38,44,36,50,40,42,46];
      const speeds=[0.012,0.009,0.015,0.008,0.011,0.013,0.010];
      const nCounts=[280,350,260,420,300,320,370];
      return{
        idx:i,
        r:sizes[i],
        speed:speeds[i],
        nParticles:nCounts[i],
        hue:hues[i],
        orbitR:60+i*18, // radio de la órbita de sus propias partículas
      };
    });
  },[]);

  // Canvas del sistema solar — vuelo hacia adelante en Z
  React.useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const CW=window.innerWidth||375;
    const CH=260;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=CW*dpr; canvas.height=CH*dpr;
    canvas.style.width=CW+"px"; canvas.style.height=CH+"px";
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);
    const cx=CW/2, cy=CH/2;

    // Distribución 3D de planetas en profundidad Z
    // Planeta activo está en Z=0, los demás distribuidos detrás
    const SPREAD=420; // distancia entre planetas en Z
    const phi=Math.PI*(3-Math.sqrt(5));

    // Partículas de cada planeta
    const planetPts=PLANETS.map(pl=>
      Array.from({length:pl.nParticles},(_,i)=>{
        const y=1-2*(i/(pl.nParticles-1));
        const r=Math.sqrt(Math.max(0,1-y*y));
        const theta=phi*i;
        return{ox:Math.cos(theta)*r,oy:y,oz:Math.sin(theta)*r,
          s:0.7+Math.random()*1.6,phase:Math.random()*Math.PI*2};
      })
    );
    const rots=PLANETS.map(()=>({y:Math.random()*Math.PI*2,x:0,vy:0.008,vx:0}));

    // Cámara en Z — anima hacia el planeta activo
    let camZ=0;        // posición actual
    let targetCamZ=0;  // posición objetivo
    let smoothMx=0, smoothMy=0;

    // Estrellas de fondo para dar sensación de vuelo

      x:(Math.random()-0.5)*CW*3,

      // Cámara vuela hacia el planeta activo

      // Fade con color espacio
      ctx.fillStyle="rgba(4,8,15,0.25)";
      ctx.fillRect(0,0,CW,CH);

      // Perspectiva focal
      const FL=320; // focal length

      const project=(x,y,z)=>{
        const relZ=z-camZ;
        if(relZ<=10) return null; // detrás de la cámara
        const scale=FL/relZ;
        return{
          sx:cx+x*scale+smoothMx*30*(1-Math.min(1,relZ/800)),
          sy:cy+y*scale+smoothMy*20*(1-Math.min(1,relZ/800)),
          scale,
          depth:1/relZ,
        };
      };

      // Renderizar estrellas de fondo
      stars.forEach(s=>{
        const relZ=s.z-camZ;
        if(relZ<=20||relZ>SPREAD*TOTAL*1.2) return;
        const scale=FL/relZ;
        const sx=cx+s.x*scale;
        const sy=cy+s.y*scale;
        if(sx<0||sx>CW||sy<0||sy>CH) return;
        const alpha=Math.min(0.7,200/relZ);
        const size=s.s*(FL/relZ)*0.8;
        ctx.beginPath();
        ctx.arc(sx,sy,Math.max(0.2,size),0,Math.PI*2);
        ctx.fillStyle="rgba(180,210,255,"+alpha.toFixed(2)+")";
        ctx.fill();
      });

      // Líneas entre planetas (en perspectiva)
      for(let i=0;i<TOTAL-1;i++){
        const zA=i*SPREAD, zB=(i+1)*SPREAD;
        const pA=project(0,0,zA), pB=project(0,0,zB);
        if(!pA||!pB) continue;
        const isDone=i<stepRef.current;
        ctx.beginPath();
        ctx.moveTo(pA.sx,pA.sy);
        ctx.lineTo(pB.sx,pB.sy);
        ctx.strokeStyle=isDone?"rgba(72,120,255,0.3)":"rgba(255,255,255,0.05)";
        ctx.lineWidth=isDone?1.5:0.5;
        ctx.setLineDash(isDone?[]:[3,8]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Renderizar planetas — del más lejano al más cercano
      const order=[...Array(TOTAL).keys()].sort((a,b)=>{
        return(b*SPREAD-camZ)-(a*SPREAD-camZ);
      });

      order.forEach(idx=>{
        const pl=PLANETS[idx];
        const plZ=idx*SPREAD;
        const proj=project(0,0,plZ);
        if(!proj) return;

        const relZ=plZ-camZ;
        const isActive=idx===stepRef.current;
        const isDone=idx<stepRef.current;

        // Tamaño proyectado
        const R=pl.r*proj.scale*1.8;
        if(R<1||R>CW) return;

        // Alpha por distancia
        const maxDist=SPREAD*2.5;
        const globalAlpha=relZ>maxDist?0:Math.max(0.08,1-relZ/maxDist);

        // Actualizar rotación
        const rot=rots[idx];
        const targetVY=pl.speed+(isActive?smoothMx*0.01:0);
        const targetVX=isActive?smoothMy*0.006:0;
        rot.vy+=(targetVY-rot.vy)*0.04;
        rot.vx+=(targetVX-rot.vx)*0.04;
        rot.y+=rot.vy;
        rot.x+=rot.vx;

        const cY=Math.cos(rot.y),sY=Math.sin(rot.y);
        const cX=Math.cos(rot.x),sX=Math.sin(rot.x);

        // Proyectar partículas del planeta
        const sorted=planetPts[idx].map(p=>{
          const w=Math.sin(t*0.7+p.phase)*0.025;
          let x=p.ox*(1+w),y2=p.oy*(1+w),z=p.oz*(1+w);
          const x2=x*cY+z*sY, z2=-x*sY+z*cY;
          const y3=y2*cX-z2*sX, z3=y2*sX+z2*cX;
          return{
            sx:proj.sx+x2*R,
            sy:proj.sy+y3*R,
            z:z3,s:p.s,
          };
        }).sort((a,b)=>a.z-b.z);

        sorted.forEach(p=>{
          const depth=(p.z+1)/2;
          const alpha=(0.1+depth*0.6)*globalAlpha;
          const size=p.s*(0.3+depth*0.85)*(isActive?1:0.7);
          const r2=Math.floor(30+depth*65);
          const g2=Math.floor(80+depth*95);
          const b2=Math.floor(200+depth*55);
          ctx.beginPath();
          ctx.arc(p.sx,p.sy,Math.max(0.15,size),0,Math.PI*2);
          ctx.fillStyle="rgba("+r2+","+g2+","+b2+","+Math.min(1,alpha).toFixed(2)+")";
          ctx.fill();
        });

        // Guardar posición real del planeta activo
        if(isActive) activePlanetPos.current={x:proj.sx,y:proj.sy};

        // Glow del planeta activo
        if(isActive&&R>8){
          const glow=ctx.createRadialGradient(proj.sx,proj.sy,0,proj.sx,proj.sy,R*1.6);
          glow.addColorStop(0,"rgba(72,120,255,0.08)");
          glow.addColorStop(1,"rgba(72,120,255,0)");
          ctx.beginPath();
          ctx.arc(proj.sx,proj.sy,R*1.6,0,Math.PI*2);
          ctx.fillStyle=glow;
          ctx.fill();
        }

        // Número / check debajo del planeta
        const labelY=proj.sy+R+14;
        if(labelY>0&&labelY<CH&&R>6){
          ctx.fillStyle=isActive?"rgba(130,175,255,0.9)":
            isDone?"rgba(72,120,255,0.5)":"rgba(255,255,255,0.1)";
          ctx.font=(isActive?"bold 9px ":"7px ")+MN;
          ctx.textAlign="center";
          ctx.fillText(isDone?"✓":String(idx+1),proj.sx,labelY);
        }
      });

      // Nombre del usuario sobre el planeta activo
      const activeProj=project(0,0,stepRef.current*SPREAD);
      if(activeProj&&ob.name){
        const R=PLANETS[stepRef.current].r*activeProj.scale*1.8;
        ctx.fillStyle="rgba(255,255,255,0.45)";
        ctx.font="bold 10px "+BN;
        ctx.textAlign="center";
        ctx.fillText(ob.name.toUpperCase(),activeProj.sx,activeProj.sy-R-10);
      }
    };
    draw();

    const onMouse=(e)=>{
      const rect=canvas.getBoundingClientRect();
      mouseRef.current={
        x:(e.clientX-(rect.left+rect.width/2))/(rect.width/2),
        y:(e.clientY-(rect.top+rect.height/2))/(rect.height/2),
      };
    };
    const decay=setInterval(()=>{mouseRef.current.x*=0.92;mouseRef.current.y*=0.92;},50);
    window.addEventListener('mousemove',onMouse,{passive:true});

    };
  },[PLANETS]);

      canvas.height=window.innerHeight*(window.devicePixelRatio||1);
      canvas.style.width=window.innerWidth+"px";
      canvas.style.height=window.innerHeight+"px";
    };
    resize();
    const ctx=canvas.getContext("2d");
    const dpr=window.devicePixelRatio||1;
    const loop=()=>{
      burstAnimRef.current=requestAnimationFrame(loop);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      burstParticles.current=burstParticles.current.filter(p=>{
        p.x+=p.vx; p.y+=p.vy;
        p.vx*=0.93;
        p.vy*=0.93;
        p.life-=p.decay;
        if(p.life<=0) return false;
        const al=p.life*p.life*p.alpha; // ease out suave
        const sz=p.size*p.life*dpr;
        const px=p.x*dpr, py=p.y*dpr;
        // Solo glow suave — sin núcleo duro
        const g=ctx.createRadialGradient(px,py,0,px,py,sz*8);
        g.addColorStop(0,"hsla("+p.hue+","+p.sat+"%,"+p.light+"%,"+al.toFixed(3)+")");
        g.addColorStop(0.3,"hsla("+p.hue+","+p.sat+"%,"+p.light+"%,"+(al*0.4).toFixed(3)+")");
        g.addColorStop(1,"hsla("+p.hue+","+p.sat+"%,"+p.light+"%,0)");
        ctx.beginPath();
        ctx.arc(px,py,sz*8,0,Math.PI*2);
        ctx.fillStyle=g;
        ctx.fill();
        return true;
      });
    };

    loop();
    window.addEventListener("resize",resize);
    return()=>{
      cancelAnimationFrame(burstAnimRef.current);
      window.removeEventListener("resize",resize);
    };
  },[]);

function getZoneState(zk, st) {
  const ts = st[zk]; if(!ts) return "rec";
  const h = (Date.now()-ts)/3600000, rec = ZONE_REC_HOURS[zk]||72;
  if(h < rec*0.33) return "fresh";
  if(h < rec*0.66) return "warm";
  if(h < rec) return "yel";
  return "rec";
}
function getDotColor(zk,st){const s=getZoneState(zk,st);return s==="fresh"?"#e53535":s==="warm"?"#ff7a1a":s==="yel"?"#7ab82a":"#2a2a3a";}
function getPct(zk,st){if(!st[zk])return 100;return Math.min(100,Math.round(((Date.now()-st[zk])/3600000)/(ZONE_REC_HOURS[zk]||72)*100));}
function logsToZoneTimestamps(logs, routine) {
  const zoneTs = {};
  const BILATERAL = [["hombro_izq","hombro_der"],["bicep_izq","bicep_der"],
                     ["tricep_izq","tricep_der"],["antebrazo_izq","antebrazo_der"]];
  Object.entries(logs||{}).forEach(([id,entries])=>{
    if(!entries||!entries.length) return;
    let nm=id;
    if(routine){const rArr=Array.isArray(routine)?routine:Object.values(routine);rArr.forEach(d=>{if(!d)return;(d.ex||[]).forEach(ex=>{if(ex.id===id)nm=ex.e;});});}
    const nmLow=nm?.toLowerCase()?.trim()||"";
    const md=EXERCISE_MUSCLE_MAP[nmLow]||EXERCISE_MUSCLE_MAP[ES_TO_META[nmLow]];
    if(!md) return;
    const muscles=[...(md.p||[]),...(md.s||[])];
    muscles.forEach(m=>{
      const zk=FORJA_TO_ZONE[m.toLowerCase()];
      if(!zk) return;
      entries.forEach(e=>{
        if(!e.d) return;
        const ts=new Date(e.d+"T12:00:00").getTime();
        if(!zoneTs[zk]||ts>zoneTs[zk]) zoneTs[zk]=ts;
      });
      BILATERAL.forEach(([a,b])=>{
        if(zk===a&&(!zoneTs[b]||zoneTs[a]>zoneTs[b])) zoneTs[b]=zoneTs[a];
        if(zk===b&&(!zoneTs[a]||zoneTs[b]>zoneTs[a])) zoneTs[a]=zoneTs[b];
      });
    });
  });
  return zoneTs;
}

function App(){
  const[lang,setLangS]=useState(()=>{
    try{return localStorage.getItem('fv8_lang')||null;}catch{return null;}
  });
  const setLang=useCallback(l=>{
    setLangS(l);
    try{if(l)localStorage.setItem('fv8_lang',l);}catch{}
  },[]);
  const[step,setStep]=useState(0);
  window._fss=setStep;
  const[profile,setProfile]=useState(null);
  const[routine,setRoutine]=useState(null);
  const[ready,setReady]=useState(false);
  const[authChecked,setAuthChecked]=useState(false);
  useEffect(()=>{
    const sb=getSB();
    const loadAndRoute=(skipOnboard=false)=>{
      FStore.loadProfile().then(data=>{
        if(data&&data.profile){
          setProfile(data.profile);
          setLangS(l=>l||data.profile.lang||'es');
          if(data.routine)setRoutine(data.routine);
          setStep(99);
        } else if(skipOnboard){
          setLangS(l=>l||'es');
          setStep(1);
        }
        setReady(true);
        setAuthChecked(true);
       
        window.__forjaOnboardingDone=function(p,r,s){setProfile(p);if(r)setRoutine(r);window._fss(s||99);};
      }).catch(()=>{setReady(true);setAuthChecked(true);});
    };
    const search=window.location.search;
    const hash=window.location.hash;
    const hasOAuthHash=hash.includes('access_token')||
      hash.includes('refresh_token')||
      search.includes('code=');
    if(hasOAuthHash&&sb){
      const{data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
        if(event==='SIGNED_IN'&&session?.user){
          _user=session.user;
          subscription.unsubscribe();
          window.history.replaceState(null,'',window.location.pathname);
          loadAndRoute(true);
        } else if(event==='SIGNED_OUT'){
          subscription.unsubscribe();
          window.history.replaceState(null,'',window.location.pathname);
          setReady(true);
          setAuthChecked(true);
        }
      });
      sb.auth.getSession().then(({data:{session},error})=>{
        if(error) console.error('FORJA: code exchange error:', error.message);
        if(session?.user&&session.user.app_metadata?.provider==='google'){
          _user=session.user;
          subscription.unsubscribe();
          window.history.replaceState(null,'',window.location.pathname);
          loadAndRoute(true);
        }
      }).catch(e=>{
        console.error('FORJA: getSession catch:', e.message);
        window.history.replaceState(null,'',window.location.pathname);
        setReady(true);
        setAuthChecked(true);
      });
      setTimeout(()=>{
        if(!authChecked){
          console.log('FORJA: OAuth timeout, showing login screen');
          window.history.replaceState(null,'',window.location.pathname);
          setReady(true);
          setAuthChecked(true);
        }
      },6000);
    } else {
      if(sb){
        sb.auth.getSession().then(({data:{session}})=>{
          if(session?.user){
            _user=session.user;
            const isGoogle=session.user.email && 
              session.user.app_metadata?.provider==='google';
            if(isGoogle){
              console.log('FORJA: Returning Google user detected:', session.user.email);
            }
          }
          loadAndRoute(false);
        }).catch(()=>loadAndRoute(false));
      } else {
        loadAndRoute(false);
      }
    }
  },[]);
  const sp=useCallback(p=>{setProfile(p);},[]);
  const sr=useCallback(r=>{setRoutine(r);},[]);
  if(!ready)return(
    <div style={{minHeight:"100vh",background:"#07080a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:52,letterSpacing:12,color:"#EEEAE3",opacity:.15}}>FORJA</div>
    </div>
  );
  if(step<99)return <Onboard lang={lang} setLang={setLang} step={step} setStep={setStep} sp={sp} sr={sr}/>;
  return <Main lang={lang} setLang={setLang} profile={profile} routine={routine} sp={sp} sr={sr} setStep={setStep}/>;
}
const _root=ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App/>);
setTimeout(()=>{const r=document.getElementById("root");if(r)r.style.opacity="1";},50);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(function initDumbbell(){
  function tryInit(){
    const canvas = document.getElementById("forja-dumbbell-canvas");
    if(!canvas || !window.THREE) return;
    if(canvas.dataset.forjaInit) return;
    canvas.dataset.forjaInit="1";
    const wrap = canvas.parentElement;
    const W = wrap.offsetWidth||360;
    const H = wrap.offsetHeight||260;

    const renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46,W/H,0.1,100);
    camera.position.set(0,0,14);

    const parts = [
      {xC:0,     r:0.12, th:1.44, type:"cyl"},
      {xC:-0.80, r:0.20, th:0.09, type:"disc"},
      {xC: 0.80, r:0.20, th:0.09, type:"disc"},
      {xC:-0.99, r:1.20, th:0.11, type:"disc"},
      {xC: 0.99, r:1.20, th:0.11, type:"disc"},
      {xC:-1.19, r:0.88, th:0.10, type:"disc"},
      {xC: 1.19, r:0.88, th:0.10, type:"disc"},
      {xC:-1.36, r:0.58, th:0.09, type:"disc"},
      {xC: 1.36, r:0.58, th:0.09, type:"disc"},
      {xC:-1.48, r:0.10, th:0.10, type:"cyl"},
      {xC: 1.48, r:0.10, th:0.10, type:"cyl"},
    ];
    parts.forEach(p=>{ p.area = p.type==="cyl" ? p.th*p.r*2 : p.r*p.r; });
    const totalArea = parts.reduce((s,p)=>s+p.area,0);
    let acc=0;
    parts.forEach(p=>{ p.w=p.area/totalArea; p.cumW=acc+p.w; acc=p.cumW; });

    function samplePart(){
      const rnd=Math.random();
      const p=parts.find(p=>rnd<=p.cumW)||parts[parts.length-1];
      const a=Math.random()*Math.PI*2;
      if(p.type==="cyl") return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*Math.random()*p.r, z:Math.cos(a)*Math.random()*p.r};
      const rad=Math.sqrt(Math.random())*p.r;
      return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*rad, z:Math.cos(a)*rad};
    }

    const CORE=48000, DISP=42000, TOTAL=CORE+DISP;
    const pos=new Float32Array(TOTAL*3), col=new Float32Array(TOTAL*3);

    for(let i=0;i<CORE;i++){
      const s=samplePart();
      const zOff=(Math.random()-0.5)*0.26;
      pos[i*3]=s.x+(Math.random()-0.5)*0.020;
      pos[i*3+1]=s.y+(Math.random()-0.5)*0.020;
      pos[i*3+2]=s.z+zOff;
      const distR=Math.sqrt(s.y*s.y+s.z*s.z);
      const radialT=Math.min(distR/1.20,1.0);
      const depthT=(zOff+0.13)/0.26;
      const t=radialT*0.40+depthT*0.20+Math.random()*0.08;
      const v=0.70+t*0.30;
      // blanco puro en el centro, azulado en bordes
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const idx=CORE+i;
      const s=samplePart();
      const sx=s.x, sy=s.y, sz=s.z;
      const len=Math.sqrt(sy*sy+sz*sz)+0.001;
      const ny=sy/len, nz=sz/len;
      const nx=(Math.abs(sx)>0.8&&Math.abs(sy)<0.15&&Math.abs(sz)<0.15)?Math.sign(sx)*0.3:0;
      const eD=Math.pow(Math.random(),0.35)*7.0;
      const spread=1.4;
      const dx=nx+(Math.random()-0.5)*spread;
      const dy=ny+(Math.random()-0.5)*spread;
      const dz=nz+(Math.random()-0.5)*spread;
      const dlen=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
      pos[idx*3]=sx+(dx/dlen)*eD;
      pos[idx*3+1]=sy+(dy/dlen)*eD;
      pos[idx*3+2]=sz+(dz/dlen)*eD;
      const fadeT=eD/7.0;
      const op=Math.max(0,1.0-fadeT*0.88);
      // fade de blanco (#F0F2F5) hacia bg (#383e4e)
      col[idx*3]=0.94*op+0.22*(1-op);
      col[idx*3+1]=0.96*op+0.243*(1-op);
      col[idx*3+2]=1.0*op+0.306*(1-op);
    }

    const geo=new THREE.BufferGeometry();
    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",   new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:0.014,vertexColors:true,transparent:true,opacity:0.88,sizeAttenuation:true});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);

    let t=0, animId;
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      pts.rotation.y=Math.sin(t*0.45)*0.50;
      pts.rotation.x=Math.sin(t*0.28)*0.05;
      renderer.render(scene,camera);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){ cancelAnimationFrame(animId); } else { animate(); }
    });
  }

  window.addEventListener("forja:mount", tryInit);
  document.addEventListener("DOMContentLoaded", tryInit);
  window.addEventListener("load", tryInit);
  setInterval(tryInit, 200);
})();

function BotChat({profile,routine,done,lang,mono}){
  const[msgs,setMsgs]=React.useState([]);
  const[input,setInput]=React.useState("");
  const[loading,setLoading]=React.useState(false);
  const bottomRef=React.useRef(null);
  const inputRef=React.useRef(null);

  React.useEffect(()=>{
    const now=new Date(),dow=now.getDay(),tdi=dow===0?6:dow-1;
    const todayR=routine?routine[tdi]:null;
    const dd=todayR?todayR.ex.filter(function(x){return done[tdi+"-"+x.id];}).length:0;
    const tot=todayR?todayR.ex.length:0;
    var g="";
    var iso=lang==="es";
    if(dd===tot&&tot>0) g=iso?"Completaste el entreno de hoy. Eso es mentalidad.":"You crushed today workout. Thats the mindset.";
    else if(dd>0){ g=iso?("Llevas "+dd+"/"+tot+". Sigue, no pares ahora."):("You are at "+dd+"/"+tot+". Dont stop now."); }
    else if(todayR){ g=iso?("Hoy toca "+todayR.l+". Arrancamos?"):("Today is "+todayR.l+". Lets go?"); }
    else{ g=iso?"Dia de descanso. El cuerpo tambien crece descansando.":"Rest day. Recovery is where growth happens."; }
    setMsgs([{role:"assistant",content:g}]);
    setTimeout(function(){if(inputRef.current)inputRef.current.focus();},400);
  },[]);

  React.useEffect(function(){
    if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:"smooth"});
  },[msgs,loading]);

  function buildSys(){
    var now=new Date(),dow=now.getDay(),tdi=dow===0?6:dow-1;
    var days=["Lun","Mar","Mie","Jue","Vie","Sab","Dom"];
    var todayR=routine?routine[tdi]:null;
    var week="sin rutina";
    if(routine){
      week=Array(7).fill(0).map(function(_,i){

<script>
(function initBot(){
  const CDN="https://pub-28277a6ce79d49479afd0cb1bba27b44.r2.dev/bot-anims/";
  const FY=-7.8, FOV=35, CZ=14, CAM_Y=-4.4;

  // Una animación por estado — elegida al abrir la app
  const MOOD_ANIMS={
    victory:  [{a:"clapping",    walk:false}, {a:"twerkdance",   walk:false}, {a:"jogging",      walk:true}],
    active:   [{a:"jogging",     walk:true},  {a:"walking_skin", walk:true},  {a:"drunkwalk",    walk:true}],
    idle:     [{a:"fishing",     walk:false}, {a:"cowmilking",   walk:false}, {a:"rifleaiming",  walk:false}, {a:"gunplay", walk:false}],
    low:      [{a:"plank",       walk:false}, {a:"laying",       walk:false}, {a:"situps",       walk:false}],
    dead:     [{a:"laying",      walk:false}, {a:"jumpplank",    walk:false}],
    normal:   [{a:"walking_skin",walk:true},  {a:"jogging",      walk:true},  {a:"drunkwalk",    walk:true}],
  };

  function getMood(){
    try{
      const done=JSON.parse(localStorage.getItem("fv8_done")||"{}");
      const hist=JSON.parse(localStorage.getItem("fv8_hist")||"[]");
      const today=new Date().toISOString().slice(0,10);
      const DAY=86400000, days=new Set();
      Object.keys(done).forEach(k=>{const p=k.split("-");if(p.length>=3)days.add(p.slice(0,3).join("-"));});
      hist.forEach(h=>{if(h.date)days.add(h.date.slice(0,10));});
      const sorted=[...days].sort().reverse();
      if(!sorted.length) return "normal";
      const daysSince=Math.floor((Date.now()-new Date(sorted[0]))/DAY);
      if(sorted[0]===today) return "victory";
      if(daysSince>=3) return "dead";
      if(daysSince>=2) return "low";
      let streak=0,prev=null;
      for(const d of sorted){const dt=new Date(d);if(!prev){streak=1;prev=dt;continue;}if(Math.floor((prev-dt)/DAY)<=1){streak++;prev=dt;}else break;}
      if(streak>=3) return "active";
      return "idle";
    }catch(e){}
    return "normal";
  }

  let ren, scene, cam, clock, aid;
  let model=null, mixer=null;
  let ready=false;
  let cx=-4, canWalk=true, currentAnim='';

  function tryInit(){
    const canvas=document.getElementById("forja-bot-canvas");
    if(!canvas||canvas.dataset.bi) return;
    if(!window.THREE||!window.THREE.GLTFLoader) return;

    const W=canvas.offsetWidth||window.innerWidth||390, H=200;
    canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
    ren=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    ren.setSize(W,H); ren.setPixelRatio(Math.min(devicePixelRatio,2));
    ren.setClearColor(0,0);
    scene=new THREE.Scene();
    cam=new THREE.PerspectiveCamera(FOV,W/H,0.1,200);
    cam.position.set(0,CAM_Y,CZ); cam.lookAt(0,CAM_Y,0);
    scene.add(new THREE.AmbientLight(0xffffff,1.4));
    const dl=new THREE.DirectionalLight(0xfff8f0,2.5); dl.position.set(3,8,5); scene.add(dl);
    const dl2=new THREE.DirectionalLight(0x8090ff,0.6); dl2.position.set(-4,2,3); scene.add(dl2);
    const floorGeo=new THREE.PlaneGeometry(40,40,20,20);
    const floorMat=new THREE.MeshBasicMaterial({color:0x3a4f8a,wireframe:true,transparent:true,opacity:0.28});
    const floorMesh=new THREE.Mesh(floorGeo,floorMat);
    floorMesh.rotation.x=-Math.PI/2;
    floorMesh.position.y=FY+0.05;
    scene.add(floorMesh);
    const glowGeo=new THREE.CircleGeometry(2.5,32);
    const glowMat=new THREE.MeshBasicMaterial({color:0x8878a0,transparent:true,opacity:0.1,side:THREE.DoubleSide});
    const glowDisk=new THREE.Mesh(glowGeo,glowMat);
    glowDisk.rotation.x=-Math.PI/2;
    glowDisk.position.y=FY+0.06;
    scene.add(glowDisk);
    window._botGlow=glowDisk;
    clock=new THREE.Clock();

    // Elegir animación según mood
    const mood=getMood();
    const opts=MOOD_ANIMS[mood]||MOOD_ANIMS.normal;
    const chosen=opts[Math.floor(Math.random()*opts.length)];
    canWalk=chosen.walk;
    currentAnim=chosen.a;
    console.log('BOT mood=',mood,'anim=',chosen.a);

    fetch(CDN+chosen.a+".glb").then(r=>r.arrayBuffer()).then(buf=>{
      new THREE.GLTFLoader().parse(buf, CDN, (gltf)=>{
        model=gltf.scene;
        const rm=[];
        model.traverse(c=>{if(c.name==="Cube"||c.name==="default")rm.push(c);});
        rm.forEach(c=>c.parent&&c.parent.remove(c));
        model.traverse(c=>{
          if(!(c.isMesh||c.isSkinnedMesh)) return;
          const n=c.name||"";
          if(n==="Mascara"||n==="polySurface3"){if(c.material)c.material.skinning=true; return;}
          const col=n==="Cabeza"?0xeae6e0:n==="Cuerpo"||n==="Pierna"||n==="Pierna1"?0x3a3e4a:n==="Brazo"||n==="Brazo1"||n==="Dedos1"||n==="Dedos_Fin"?0xe4e0da:0x888898;
          const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.5,metalness:0.1});
          if(c.isSkinnedMesh) mat.skinning=true;
          c.material=mat;
        });
        model.scale.setScalar(36);
        model.rotation.x=-0.15;
        model.position.set(canWalk?cx:0, FY, 0);
        scene.add(model);
        mixer=new THREE.AnimationMixer(model);
        if(gltf.animations[0]){
          const clip=gltf.animations[0].clone();
          if(canWalk) clip.tracks=clip.tracks.filter(t=>!(t.name.toLowerCase().includes('hip')&&t.name.toLowerCase().includes('position')));
          const a=mixer.clipAction(clip);
          a.setLoop(THREE.LoopRepeat); a.play();
        }
        ready=true;
        animate();
      }, e=>console.error('BOT parse:',e));
    }).catch(e=>console.error('BOT fetch:',e));
  }

  function animate(){
    aid=requestAnimationFrame(animate);
    if(!ready||!model) return;
    const dt=Math.min(clock.getDelta(),0.05);
    mixer&&mixer.update(dt);

    if(canWalk){
      const EDGE=7, SPD=1.8;
      if(!window._botDir){ window._botDir=1; window._botTurn=0; }
      if(window._botTurn>0){
        window._botTurn-=dt;
        const t=1-Math.max(0,window._botTurn)/0.3;
        const fromY=window._botDir>0?-Math.PI/2:Math.PI/2;
        const toY=window._botDir>0?Math.PI/2:-Math.PI/2;
        model.rotation.y=fromY+(toY-fromY)*t;
      } else {
        cx+=window._botDir*SPD*dt;
        model.rotation.y=window._botDir>0?Math.PI/2:-Math.PI/2;
        if(cx>=EDGE){ cx=EDGE; window._botDir=-1; window._botTurn=0.3; }
        else if(cx<=-EDGE){ cx=-EDGE; window._botDir=1; window._botTurn=0.3; }
      }
      model.position.x=cx;
    } else {
      model.position.x=0;
      model.rotation.y=(currentAnim==="laying"||currentAnim==="falling")?0:Math.PI/2;
    }

    cam.lookAt(0,CAM_Y,0);
    ren.render(scene,cam);
  }

  document.addEventListener("visibilitychange",()=>{
    if(document.hidden) cancelAnimationFrame(aid);
    else{ clock=new THREE.Clock(); if(ready) animate(); }
  });
  window.addEventListener("resize",()=>{
    const canvas=document.getElementById("forja-bot-canvas");
    if(!canvas||!ren) return;
    const W2=window.innerWidth||390;
    canvas.width=W2*devicePixelRatio; canvas.height=200*devicePixelRatio;
    ren.setSize(W2,200); cam.aspect=W2/200; cam.updateProjectionMatrix();
  });
  window.FORJA_BOT={ trigger(){} };

  window.addEventListener("load",()=>setTimeout(tryInit,100));
  setInterval(()=>{if(!ready)tryInit();},500);
})();
</script>

    const sphere=new THREE.Mesh(
      new THREE.SphereGeometry(G*0.94,64,64),
      new THREE.MeshBasicMaterial({color:0x08090e,transparent:true,opacity:0})
    );
    sphere.position.y=BH_Y;
    sphere.renderOrder=0;
    scene.add(sphere);

    // -- FIGURA PLATEADA -----------------------------------------------
    let figPts=null,T=0,animId=null;

    function loadImg(url,fb){
      const img=new Image();
      img.crossOrigin="anonymous";
      img.onload=()=>buildFigure(img);
      img.onerror=()=>{
        if(fb){const i2=new Image();i2.crossOrigin="anonymous";i2.onload=()=>buildFigure(i2);i2.onerror=()=>startAnim();i2.src=fb;}
        else startAnim();
      };
      img.src=url;
    }

    function buildFigure(img){
      const OW=320,OH=320;
      const off=document.createElement("canvas");
      off.width=OW;off.height=OH;
      const ctx=off.getContext("2d");
      ctx.drawImage(img,0,0,OW,OH);
      const data=ctx.getImageData(0,0,OW,OH).data;
      const pts2d=[];
      const yStart=Math.floor(OH*0.08),yMax=Math.floor(OH*0.86),yRange=yMax-yStart;
      for(let y=yStart;y<yMax;y++){
        for(let x=0;x<OW;x++){
          const i=(y*OW+x)*4,r=data[i],g=data[i+1],b=data[i+2];
          if(r*0.299+g*0.587+b*0.114>20)
            pts2d.push({nx:((x/OW)*2-1),ny:(1-((y-yStart)/yRange)*2),r:r/255,g:g/255,b:b/255});
        }
      }
      if(!pts2d.length){startAnim();return;}

      // sX se multiplica por aspect para compensar que la cámara
      // es más angosta en X (aspect=0.95) — así el mono no se estira
      const sY=1.38;
      const sX=sY*aspect; // ~1.31 — mantiene proporciones reales
      const FIG_Y=-0.20;

      // SPLIT_NY: puntos por debajo de esta línea van detrás del disco,
      // por encima van delante. ny=0 = centro del cuerpo.
      // Calibrado en prototipo: split en ny=0.00 (50% del cuerpo)
      const SPLIT_NY=0.0;

      const ptBottom=pts2d.filter(p=>p.ny<=SPLIT_NY);
      const ptTop   =pts2d.filter(p=>p.ny> SPLIT_NY);

      function makeLayer(pts,renderOrder){
        if(!pts.length) return null;
        const CORE=Math.min(pts.length*4,50000);
        const pos=new Float32Array(CORE*3),col=new Float32Array(CORE*3);
        for(let i=0;i<CORE;i++){
          const p=pts[Math.floor(Math.random()*pts.length)];
          pos[i*3  ]=p.nx*sX+(Math.random()-0.5)*0.008;
          pos[i*3+1]=p.ny*sY+FIG_Y+(Math.random()-0.5)*0.008;
          pos[i*3+2]=(Math.random()-0.5)*0.06;
          col[i*3]=p.r; col[i*3+1]=p.g; col[i*3+2]=p.b;
        }
        const geo=new THREE.BufferGeometry();
        geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
        geo.setAttribute('color',new THREE.BufferAttribute(col,3));
        const mesh=new THREE.Points(geo,new THREE.PointsMaterial({
          size:0.0095,vertexColors:true,transparent:true,
          opacity:0.98,sizeAttenuation:true,depthWrite:false,depthTest:false
        }));
        mesh.renderOrder=renderOrder;
        scene.add(mesh);
        return mesh;
      }

      // Bottom (piernas/cintura) → renderOrder 0 → detrás del disco (renderOrder 1)
      // Top (torso/cabeza)       → renderOrder 2 → delante del disco
      figPts = makeLayer(ptBottom, 0);
      const figTop = makeLayer(ptTop, 2);
      // Guardar ambos para la animación breathing
      figPts._top = figTop;

      startAnim();
    }

    function startAnim(){
      if(animId) cancelAnimationFrame(animId);
      function animate(){
        animId=requestAnimationFrame(animate);
        T+=0.003;

        // Rotación kepleriana
        const arr=dGeo.attributes.position.array;
        for(let i=0;i<DISC_N;i++){
          dAng[i]+=0.45/Math.pow(dRad[i]/G,1.5)*0.003;
          arr[i*3]=Math.cos(dAng[i])*dRad[i];
          arr[i*3+2]=Math.sin(dAng[i])*dRad[i];
        }
        dGeo.attributes.position.needsUpdate=true;

        // Figura: breathing — animar ambas capas juntas
        if(figPts){
          const by=Math.sin(T*0.45)*0.038;
          const bry=Math.sin(T*0.18)*0.045;
          const brx=Math.sin(T*0.13)*0.010;
          figPts.position.y=by; figPts.rotation.y=bry; figPts.rotation.x=brx;
          if(figPts._top){
            figPts._top.position.y=by;
            figPts._top.rotation.y=bry;
            figPts._top.rotation.x=brx;
          }
        }

        // Cámara: leve órbita
        camera.position.x=Math.sin(T*0.022)*0.4;
        camera.position.y=0.15+Math.sin(T*0.035)*0.10;
        camera.lookAt(0,-0.5,0);

        renderer.render(scene,camera);
      }
      animate();
      document.addEventListener("visibilitychange",()=>{
        if(document.hidden) cancelAnimationFrame(animId); else startAnim();
      });
    }

    loadImg(gender==="female"?FEMALE_URL:MALE_URL,gender==="female"?FEMALE_FB:MALE_FB);
  }

  window.addEventListener("forja:mount",tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit,300);
})();
</script>

<script>
(function initLogoParticles(){
  function tryInit(){
    const canvas=document.getElementById("forja-logo-canvas");
    if(!canvas||!window.THREE) return;
    if(canvas.dataset.linit) return;
    canvas.dataset.linit="1";

    const W=window.innerWidth||canvas.offsetWidth||360;
    const H=window.innerHeight||canvas.offsetHeight||640;

    const OW=800,OH=200; // canvas offscreen para renderizar "FORJA"
    const off=document.createElement("canvas");
    off.width=OW; off.height=OH;
    const ctx=off.getContext("2d");
    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,OW,OH);
    ctx.fillStyle="#000000";
    ctx.font="900 148px Arial Black,Arial,sans-serif";
    ctx.textBaseline="middle";
    ctx.textAlign="center";
    ctx.fillText("FORJA",OW/2,OH/2);

    // Samplear píxeles del texto
    const imgData=ctx.getImageData(0,0,OW,OH);
    const pts2d=[];    // todos los píxeles del texto (para el logo estático)
    const edge2d=[];   // solo bordes (para la explosión)

    for(let y=0;y<OH;y+=2){
      for(let x=0;x<OW;x+=2){
        const i=(y*OW+x)*4;
        const isDark=imgData.data[i]<140;
        if(!isDark) continue;
        pts2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});

        // Borde: al menos un vecino es blanco (fuera de la letra)
        const isEdge=(
          imgData.data[((y-2)*OW+x)*4]>140 ||
          imgData.data[((y+2)*OW+x)*4]>140 ||
          imgData.data[(y*OW+(x-2))*4]>140 ||
          imgData.data[(y*OW+(x+2))*4]>140
        );
        if(isEdge) edge2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});
      }
    }

    const renderer=new THREE.WebGLRenderer({canvas,antialias:false,alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene=new THREE.Scene();
    const aspect=W/H;
    // Canvas es ahora full viewport — frustum cubre todo
    const vRange=1.0;
    const cam=new THREE.OrthographicCamera(-aspect,aspect,vRange,-vRange,0.1,100);
    cam.position.set(0,0,10);

    const TOTAL=pts2d.length;
    const DISP=Math.floor(TOTAL*8);
    const pos=new Float32Array(TOTAL*3);
    const col=new Float32Array(TOTAL*3);
    const posD=new Float32Array(DISP*3);
    const colD=new Float32Array(DISP*3);

    // Texto en el tercio superior — partículas explotan hacia toda la pantalla
    const scaleX=aspect*0.90, scaleY=vRange*0.28;
    const textOffsetY=0.52; // offset hacia arriba
    const edgeSrc=edge2d.length>0?edge2d:pts2d;

    for(let i=0;i<TOTAL;i++){
      const p=pts2d[i];
      pos[i*3  ]=p.x*scaleX+(Math.random()-0.5)*0.012;
      pos[i*3+1]=p.y*scaleY+textOffsetY+(Math.random()-0.5)*0.012;
      pos[i*3+2]=(Math.random()-0.5)*0.03;
      const v=0.80+Math.random()*0.18;
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const src=edgeSrc[Math.floor(Math.random()*edgeSrc.length)];
      const cx=src.x, cy=src.y;
      const len=Math.sqrt(cx*cx+cy*cy)+0.001;
      const baseAngX=cx/len, baseAngY=cy/len;
      const deviation=(Math.random()-0.5)*Math.PI*1.2;
      const cosD=Math.cos(deviation), sinD=Math.sin(deviation);
      const dirX=baseAngX*cosD-baseAngY*sinD;
      const dirY=baseAngX*sinD+baseAngY*cosD;

      const u=Math.random();
      const eD=-Math.log(1-u*0.98)*0.55*aspect;
      const jitterD=(Math.random()-0.5)*0.3*aspect;
      const finalD=Math.max(0.1, eD+jitterD);

      posD[i*3  ]=src.x*scaleX+dirX*finalD;
      posD[i*3+1]=src.y*scaleY+textOffsetY+dirY*finalD; // Y sin compresión — pantalla completa
      posD[i*3+2]=(Math.random()-0.5)*0.6;

      const op=Math.max(0, Math.exp(-finalD/(aspect*0.5))*0.85*(0.5+Math.random()*0.5));
      colD[i*3  ]=0.94*op+0.22*(1-op);
      colD[i*3+1]=0.96*op+0.243*(1-op);
      colD[i*3+2]=1.0*op+0.306*(1-op);
    }

    const geoC=new THREE.BufferGeometry();
    geoC.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geoC.setAttribute("color",new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geoC,new THREE.PointsMaterial({size:0.020,vertexColors:true,transparent:true,opacity:0.95,sizeAttenuation:true})));

    const geoD=new THREE.BufferGeometry();
    geoD.setAttribute("position",new THREE.BufferAttribute(posD,3));
    geoD.setAttribute("color",new THREE.BufferAttribute(colD,3));
    const matD=new THREE.PointsMaterial({size:0.018,vertexColors:true,transparent:true,opacity:0.90,sizeAttenuation:true});
    const ptsD=new THREE.Points(geoD,matD);
    scene.add(ptsD);

    // Per-particle phase + speed para movimiento notorio e independiente
    const phases=Array.from({length:DISP},()=>Math.random()*Math.PI*2);
    const speeds=Array.from({length:DISP},()=>0.6+Math.random()*1.4); // más rápido
    const amps  =Array.from({length:DISP},()=>0.04+Math.random()*0.08); // muy notorio

    let t=0,animId;
    const posD0=new Float32Array(posD);
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      // Texto FORJA: wobble sutil
      scene.children[0].rotation.x=Math.sin(t*0.35)*0.04;
      scene.children[0].rotation.z=Math.sin(t*0.22)*0.012;
      // Partículas dispersas: drift independiente y notorio
      const arr=geoD.attributes.position.array;
      for(let i=0;i<DISP;i++){
        const ph=phases[i], sp=speeds[i], am=amps[i];
        arr[i*3  ]=posD0[i*3  ]+Math.sin(t*sp+ph)*am;
        arr[i*3+1]=posD0[i*3+1]+Math.cos(t*sp*0.7+ph)*am*0.7;
        arr[i*3+2]=posD0[i*3+2];
      }
      geoD.attributes.position.needsUpdate=true;
      renderer.render(scene,cam);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){cancelAnimationFrame(animId);}else{animate();}
    });
  }

  window.addEventListener("forja:mount", tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit, 200);
})();
</script>
