  get:k=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},

const GIF_CACHE={};
async function fetchGif(name){
  const key=name.toLowerCase().trim();
  if(key in GIF_CACHE)return GIF_CACHE[key];
  const url=GIF_STATIC[key];
  if(url) return(GIF_CACHE[key]={gifUrl:url,target:null});
  return(GIF_CACHE[key]=null);
}

// ── WORKOUT SCREEN ──────────────────────────────────────────
function WorkoutScreen({day,sel,done,logs,onToggle,onSaveLog,t,lang,onBack}){
  const exs=day.ex,c=day.c;
  const[idx,setIdx]=useState(0);
  const[kg,setKg]=useState("");
  const[rp,setRp]=useState("");
  const[showHist,setShowHist]=useState(false);
  const[gifData,setGifData]=useState({});
  const[gifLoading,setGifLoading]=useState({});
  const[gifErr,setGifErr]=useState({});
  const[sliding,setSliding]=useState(false);
  const[slideDir,setSlideDir]=useState(0);
  const[dragY,setDragY]=useState(0);
  const startY=useRef(0);
  const isDrag=useRef(false);

  const ex=exs[idx];
  const isDone=ex?!!done[`${sel}-${ex.id}`]:false;
  const hist=ex?(logs[ex.id]||[]):[];
  const last=hist[0];
  const totalDone=exs.filter(x=>done[`${sel}-${x.id}`]).length;

  useEffect(()=>{
    [idx,idx+1].forEach(i=>{
      const e=exs[i];if(!e||e.id in gifData||gifLoading[e.id])return;
      setGifLoading(p=>({...p,[e.id]:true}));
      fetchGif(e.e).then(d=>{setGifData(p=>({...p,[e.id]:d}));setGifLoading(p=>({...p,[e.id]:false}));});
    });
  },[idx]);

  const goTo=ni=>{
    if(ni<0||ni>=exs.length||sliding)return;
    setSlideDir(ni>idx?-1:1);setSliding(true);setKg("");setRp("");setShowHist(false);
    setTimeout(()=>{setIdx(ni);setSlideDir(0);setSliding(false);},260);
  };

  const onTS=e=>{startY.current=e.touches[0].clientY;isDrag.current=true;};
  const onTM=e=>{if(isDrag.current)setDragY(e.touches[0].clientY-startY.current);};
  const onTE=()=>{if(dragY<-55)goTo(idx+1);else if(dragY>55)goTo(idx-1);setDragY(0);isDrag.current=false;};
  const onMD=e=>{startY.current=e.clientY;isDrag.current=true;};
  const onMM=e=>{if(isDrag.current)setDragY(e.clientY-startY.current);};
  const onMU=()=>{if(dragY<-55)goTo(idx+1);else if(dragY>55)goTo(idx-1);setDragY(0);isDrag.current=false;};
  const handleSave=()=>{if(kg||rp){onSaveLog(ex.id,kg,rp);if(!isDone)onToggle(ex.id);}setKg("");setRp("");};

  const gif=ex?gifData[ex.id]:null;
  const loading=ex?!!gifLoading[ex.id]:false;
  const hasGif=gif?.gifUrl&&!gifErr[ex?.id];
  const ty=sliding?slideDir*110:(isDrag.current?Math.min(Math.max(dragY*0.35,-70),70):0);
  const sp=e=>e.stopPropagation();

  const NI=({val,set,label})=>(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
      <div style={{fontSize:9,color:C.tx3,fontFamily:mono,letterSpacing:2}}>{label}</div>
      <input type="number" inputMode="decimal" value={val} onChange={e=>set(e.target.value)} placeholder="—"
        onPointerDown={sp} onMouseDown={sp} onTouchStart={sp}
        style={{width:"100%",padding:"14px 0",background:"transparent",border:"none",
          borderBottom:`1.5px solid ${C.border}`,color:C.tx,fontSize:34,fontWeight:800,
          fontFamily:sans,textAlign:"center",outline:"none",boxSizing:"border-box",caretColor:C.tx}}
        onFocus={e=>e.target.style.borderBottomColor=C.tx}
        onBlur={e=>e.target.style.borderBottomColor=C.border}/>
    </div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:C.bg,display:"flex",flexDirection:"column",overflow:"hidden",fontFamily:sans}}>

      {/* TOP BAR */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
        padding:"16px 20px 12px",borderBottom:`1px solid ${C.borderL}`,flexShrink:0,
        background:C.bg}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C.tx3,
          fontSize:11,fontFamily:mono,letterSpacing:1.5,cursor:"pointer",padding:0}}>
          ← {lang==="es"?"VOLVER":"BACK"}
        </button>
        <div style={{fontSize:10,fontFamily:mono,color:C.tx2,letterSpacing:3,fontWeight:600}}>{day.l}</div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {exs.map((_,i)=>(
            <div key={i} onClick={()=>goTo(i)} style={{
              width:i===idx?20:5,height:5,borderRadius:3,cursor:"pointer",
              background:done[`${sel}-${exs[i].id}`]?C.tx:i===idx?C.tx:C.borderL,
              transition:"all 0.3s"}}/>
          ))}
        </div>
      </div>

      {/* SWIPEABLE BODY */}
      <div onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
        onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
        style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",
          transform:`translateY(${ty}px)`,
          transition:isDrag.current?"none":"transform 0.26s cubic-bezier(.4,0,.2,1)",
          opacity:Math.abs(ty)>30?Math.max(0.4,1-Math.abs(ty)/120):1,
          cursor:isDrag.current?"grabbing":"grab",userSelect:"none",minHeight:0}}>

        {/* EXERCISE HEADER */}
        <div style={{padding:"18px 20px 10px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:2}}>
              {String(idx+1).padStart(2,"0")} / {String(exs.length).padStart(2,"0")}
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              {last&&<div style={{fontSize:10,fontFamily:mono,color:C.tx2,letterSpacing:1}}>{last.w}KG × {last.r}</div>}
              <div onPointerDown={sp} onMouseDown={sp} onTouchStart={sp}
                onClick={e=>{sp(e);onToggle(ex.id);}}
                style={{width:26,height:26,borderRadius:7,cursor:"pointer",
                  background:isDone?C.tx:"transparent",
                  border:`1.5px solid ${isDone?C.tx:C.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s"}}>
                {isDone&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L5 9.5L10 3" stroke={C.white} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
            </div>
          </div>

          {/* BIG NAME */}
          <div style={{fontSize:32,fontWeight:900,color:C.tx,lineHeight:1,
            letterSpacing:-1.5,textTransform:"uppercase",animation:"fu 0.3s ease",
            fontFamily:sans}}>
            {ex.e}
          </div>
          <div style={{display:"flex",gap:10,marginTop:7,alignItems:"center"}}>
            <span style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:1.5}}>{ex.s} × {ex.r}</span>
            {gif?.target&&<span style={{fontSize:10,fontFamily:mono,color:C.tx2,letterSpacing:1}}>// {gif.target.toUpperCase()}</span>}
          </div>
        </div>

        {/* GIF FRAME — fog frame, like IGLOO */}
        <div style={{margin:"0 14px",flex:1,minHeight:0}}>
          <div style={{
            width:"100%",height:"100%",borderRadius:20,overflow:"hidden",
            background:"linear-gradient(145deg, #C8C6C2 0%, #B8B6B2 100%)",
            border:`1px solid ${C.border}`,
            display:"flex",alignItems:"center",justifyContent:"center",
            position:"relative",
            boxShadow:"inset 0 1px 0 rgba(255,255,255,0.6), 0 8px 40px rgba(0,0,0,0.12)"}}>

            {loading&&(
              <div style={{textAlign:"center"}}>
                <div style={{width:24,height:24,border:`2px solid ${C.border}`,borderTopColor:C.tx,
                  borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 8px"}}/>
                <div style={{fontSize:9,color:C.tx3,fontFamily:mono,letterSpacing:2}}>LOADING</div>
              </div>
            )}
            {!loading&&hasGif&&(
              <img src={gif.gifUrl} alt={ex.e}
                onError={()=>setGifErr(p=>({...p,[ex.id]:true}))}
                style={{width:"100%",height:"100%",objectFit:"contain",mixBlendMode:"multiply"}}/>
            )}
            {!loading&&!hasGif&&(
              <div style={{textAlign:"center",opacity:0.3}}>

}

// ── APP ROOT ────────────────────────────────────────────────
function App(){
  const[lang,setLang]=useState(null);
  const[step,setStep]=useState(0);
  const[profile,setProfile]=useState(null);
  const[routine,setRoutine]=useState(null);
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    try{
      const p=store.get("fv8p");
      if(p){const d=JSON.parse(p.value);setProfile(d);setLang(d.lang);
        const r=store.get("fv8r");if(r)setRoutine(JSON.parse(r.value));setStep(99);}
    }catch(_){}
    setReady(true);
  },[]);

  const sp=useCallback(p=>{setProfile(p);store.set("fv8p",JSON.stringify(p));}, []);
  const sr=useCallback(r=>{setRoutine(r);store.set("fv8r",JSON.stringify(r));}, []);

  if(!ready)return <div style={{minHeight:"100vh",background:C.bg}}/>;
  if(step<99)return <Onboard lang={lang} setLang={setLang} step={step} setStep={setStep} sp={sp} sr={sr}/>;
  return <Main lang={lang} setLang={setLang} profile={profile} routine={routine} sp={sp} sr={sr} setStep={setStep}/>;
}

// ── ONBOARD ─────────────────────────────────────────────────

    const tm=TP[split];
    sp({lang,goal,level,days});
    const r=Array(7).fill(null);

// ── MAIN ────────────────────────────────────────────────────
function Main({lang,setLang,profile,routine,sp,sr,setStep}){
  const t=L[lang];
  const[sel,setSel]=useState(()=>{const d=new Date().getDay();return d===0?6:d-1;});
  const[tab,setTab]=useState("train");
  const[done,setDone]=useState({});
  const[logs,setLogs]=useState({});
  const[macros,setMacros]=useState({});
  const[inWorkout,setInWorkout]=useState(false);
  const[addEx,setAddEx]=useState(false);
  const[nex,setNex]=useState({e:"",s:3,r:"8–12"});
  const[addF,setAddF]=useState(false);
  const[fd,setFd]=useState({n:"",cal:"",prot:"",carbs:"",fat:"",m:"mid"});
  const[showSet,setShowSet]=useState(false);
  const[confirmR,setConfirmR]=useState(false);
  const w=wk(),today=tdy();
  const mt={cal:2000,prot:150,carbs:200,fat:60};

  useEffect(()=>{
    try{const r=store.get(`fv8d:${w}`);if(r)setDone(JSON.parse(r.value));}catch(_){}
    try{const r=store.get("fv8l");if(r)setLogs(JSON.parse(r.value));}catch(_){}
    try{const r=store.get(`fv8m:${today}`);if(r)setMacros(JSON.parse(r.value));}catch(_){}
  },[]);

  const sd=useCallback(n=>{setDone(n);store.set(`fv8d:${w}`,JSON.stringify(n));}, [w]);
  const slg=useCallback(n=>{setLogs(n);store.set("fv8l",JSON.stringify(n));}, []);
  const sm=useCallback(n=>{setMacros(n);store.set(`fv8m:${today}`,JSON.stringify(n));}, [today]);

  const day=routine?routine[sel]:null;
  const c=day?day.c:C.tx;
  const exs=day?day.ex:[];
  const dc=exs.filter(x=>done[`${sel}-${x.id}`]).length;
  const pct=exs.length?dc/exs.length:0;
  const entries=macros.entries||[];
  const tot=entries.reduce((a,e)=>({cal:a.cal+(+e.cal||0),prot:a.prot+(+e.prot||0),carbs:a.carbs+(+e.carbs||0),fat:a.fat+(+e.fat||0)}),{cal:0,prot:0,carbs:0,fat:0});

  const toggle=id=>{const k=`${sel}-${id}`;sd({...done,[k]:!done[k]});};
  const saveLog=(id,kg,rp)=>{if(!kg&&!rp)return;const nl={...logs};if(!nl[id])nl[id]=[];nl[id]=[{d:today,w:kg,r:rp},...nl[id]].slice(0,30);slg(nl);};
  const addExFn=()=>{if(!nex.e||!day)return;const r=[...routine];r[sel].ex=[...r[sel].ex,{...nex,id:`${sel}${Date.now()}`}];sr(r);setAddEx(false);setNex({e:"",s:3,r:"8–12"});};
  const rmEx=id=>{const r=[...routine];r[sel].ex=r[sel].ex.filter(x=>x.id!==id);sr(r);};
  const addFood=()=>{if(!fd.n||!fd.cal)return;const m={...macros};if(!m.entries)m.entries=[];m.entries.push({...fd,id:Date.now()});sm(m);setAddF(false);setFd({n:"",cal:"",prot:"",carbs:"",fat:"",m:"mid"});};
  const rmFood=id=>{const m={...macros};m.entries=(m.entries||[]).filter(x=>x.id!==id);sm(m);};

  const Inp=({value,onChange,placeholder,type="text",style:s2={}})=>(

      style={{padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.borderL}`,
        background:C.white,color:C.tx,fontSize:14,fontFamily:sans,
        outline:"none",width:"100%",boxSizing:"border-box",...s2}}
      onFocus={e=>e.target.style.borderColor=C.tx}
      onBlur={e=>e.target.style.borderColor=C.borderL}/>
  );

  const mealC={am:C.yellow,mid:C.tx,snk:C.blue,pm:C.purple};
  const macroC=[C.tx,C.green,C.blue,C.purple];

  if(inWorkout&&day){
    return <WorkoutScreen day={day} sel={sel} done={done} logs={logs}
      onToggle={toggle} onSaveLog={saveLog} t={t} lang={lang} onBack={()=>setInWorkout(false)}/>;
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.tx,fontFamily:sans}}>

      {/* HEADER */}
      <div style={{background:C.bg,borderBottom:`1px solid ${C.borderL}`,
        padding:"14px 18px 10px",position:"sticky",top:0,zIndex:10}}>

          <div>
            {/* FORJA wordmark */}

            </div>

              {DF[lang][sel].toUpperCase()}

            {day&&exs.length>0&&(
              <div style={{textAlign:"right"}}>

            <button onClick={()=>setShowSet(!showSet)}
              style={{width:30,height:30,borderRadius:8,border:`1.5px solid ${C.borderL}`,
                background:C.card,cursor:"pointer",color:C.tx3,fontSize:13,
                display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
          </div>
        </div>

        {showSet&&(
          <div style={{display:"flex",gap:8,marginTop:10,paddingTop:10,borderTop:`1px solid ${C.borderL}`}}>

                <div style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:3,marginBottom:14}}>// REST DAY</div>
                <div style={{fontSize:38,fontWeight:900,letterSpacing:-2,textTransform:"uppercase"}}>{t.rest}</div>
                <div style={{fontSize:13,color:C.tx3,marginTop:10}}>{t.restSub}</div>
              </div>
            ):(
              <>
                <button onClick={()=>setInWorkout(true)} style={{
                  width:"100%",padding:"18px 0",borderRadius:14,
                  border:`1.5px solid ${C.tx}`,
                  cursor:"pointer",background:C.tx,color:C.white,
                  fontSize:12,fontWeight:800,fontFamily:mono,
                  letterSpacing:2.5,marginBottom:18,
                  boxShadow:"0 8px 32px rgba(0,0,0,0.18)",
                  display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span style={{fontSize:14}}>▶</span>{t.startWorkout}
                </button>

                {/* Exercise summary */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0",borderTop:`1px solid ${C.borderL}`,borderBottom:`1px solid ${C.borderL}`}}>
                  <div style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:2}}>{exs.length} {lang==="es"?"EJERCICIOS":"EXERCISES"}</div>
                  <div style={{display:"flex",gap:4}}>
                    {exs.map((_,i)=>{const isDone=done[`${sel}-${exs[i].id}`];return <div key={i} style={{width:6,height:6,borderRadius:2,background:isDone?C.tx:C.borderL,transition:"background 0.2s"}}/>;} )}
                  </div>
                </div>

                {!addEx?(
                  <button onClick={()=>setAddEx(true)} style={{
                    width:"100%",padding:"13px 0",marginTop:12,borderRadius:10,
                    border:`1.5px dashed ${C.border}`,background:"transparent",
                    color:C.tx3,fontSize:10,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                    {t.addEx}
                  </button>
                ):(
                  <div style={{marginTop:12,padding:16,background:C.card,borderRadius:12,border:`1.5px solid ${C.borderL}`}}>
                    <Inp placeholder={t.exName} value={nex.e} onChange={e=>setNex({...nex,e:e.target.value})}/>
                    <div style={{display:"flex",gap:10,marginTop:10}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:4,letterSpacing:2}}>{t.sets}</div>
                        <Inp type="number" value={nex.s} onChange={e=>setNex({...nex,s:+e.target.value})} style={{textAlign:"center"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:4,letterSpacing:2}}>{t.reps}</div>
                        <Inp value={nex.r} onChange={e=>setNex({...nex,r:e.target.value})} style={{textAlign:"center"}}/>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:12}}>
                      <button onClick={()=>setAddEx(false)}
                        style={{flex:1,padding:11,borderRadius:9,border:`1.5px solid ${C.borderL}`,
                          background:"transparent",color:C.tx3,fontSize:12,cursor:"pointer",fontFamily:sans}}>
                        {t.cancel}
                      </button>
                      <button onClick={addExFn}
                        style={{flex:2,padding:11,borderRadius:9,border:"none",
                          background:C.tx,color:C.white,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:sans}}>
                        {lang==="es"?"AGREGAR":"ADD"}
                      </button>
                    </div>
                  </div>
                )}

                <div style={{textAlign:"center",marginTop:22}}>
                  {!confirmR?(
                    <button onClick={()=>setConfirmR(true)}
                      style={{background:"none",border:`1px solid ${C.borderL}`,borderRadius:8,
                        padding:"8px 18px",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                      {t.reset.toUpperCase()}
                    </button>
                  ):(
                    <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                      <button onClick={()=>{sd({});setConfirmR(false);}}
                        style={{padding:"8px 18px",borderRadius:8,border:"none",background:C.tx,
                          color:C.white,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                        {t.yes.toUpperCase()}
                      </button>
                      <button onClick={()=>setConfirmR(false)}
                        style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.borderL}`,
                          background:"transparent",color:C.tx3,fontSize:9,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                        {t.cancel.toUpperCase()}
                      </button>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {/* MACROS TAB */}
        {tab==="macros"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              {[{v:tot.cal,mx:mt.cal,c:C.tx,l:t.cal,u:"kcal"},{v:tot.prot,mx:mt.prot,c:C.green,l:t.prot,u:"g"},{v:tot.carbs,mx:mt.carbs,c:C.blue,l:t.carbs,u:"g"},{v:tot.fat,mx:mt.fat,c:C.purple,l:t.fat,u:"g"}].map((r,i)=>{
                const left=r.mx-r.v,p2=Math.min(r.v/r.mx,1);
                return(
                  <div key={i} style={{padding:"14px",background:C.card,borderRadius:12,border:`1px solid ${C.borderL}`,
                    boxShadow:"inset 0 1px 0 rgba(255,255,255,0.5)"}}>
                    <div style={{fontSize:9,fontFamily:mono,color:r.c,letterSpacing:2,marginBottom:6,fontWeight:600}}>{r.l}</div>
                    <div style={{fontSize:26,fontWeight:800,color:r.v>r.mx?C.red:C.tx}}>{r.v}</div>
                    <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:8}}>{r.u} / {r.mx}</div>
                    <div style={{height:2,background:C.borderL,borderRadius:1,overflow:"hidden"}}>
                      <div style={{height:"100%",background:r.c,width:`${p2*100}%`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:9,fontFamily:mono,color:left>=0?C.tx3:C.red,marginTop:5}}>
                      {left>=0?`${left}${r.u} ${t.left}`:`${Math.abs(left)}${r.u} ${t.over}`}
                    </div>
                  </div>
                );
              })}
            </div>

            {entries.map(f=>(
              <div key={f.id} style={{display:"flex",alignItems:"center",padding:"12px 0",
                borderBottom:`1px solid ${C.borderL}`,gap:12}}>
                <div style={{width:3,height:32,borderRadius:2,background:mealC[f.m]||C.tx3,flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600}}>{f.n}</div>
                  <div style={{display:"flex",gap:8,marginTop:2}}>
                    <span style={{fontSize:10,fontFamily:mono,color:C.tx2}}>{f.cal}kcal</span>
                    <span style={{fontSize:10,fontFamily:mono,color:C.green}}>{f.prot}P</span>
                    <span style={{fontSize:10,fontFamily:mono,color:C.blue}}>{f.carbs}C</span>
                    <span style={{fontSize:10,fontFamily:mono,color:C.purple}}>{f.fat}F</span>
                  </div>
                </div>
                <button onClick={()=>rmFood(f.id)}
                  style={{background:"none",border:"none",color:C.tx3,fontSize:16,cursor:"pointer"}}>×</button>
              </div>
            ))}

            {entries.length===0&&!addF&&(
              <div style={{textAlign:"center",padding:"40px 0",fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:2}}>
                // 0 KCAL LOGGED
              </div>
            )}

            {!addF?(
              <button onClick={()=>setAddF(true)} style={{
                width:"100%",padding:"13px 0",marginTop:10,borderRadius:10,
                border:`1.5px dashed ${C.border}`,background:"transparent",
                color:C.green,fontSize:10,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>
                {t.addFood}
              </button>
            ):(
              <div style={{marginTop:12,padding:16,background:C.card,borderRadius:12,border:`1.5px solid ${C.borderL}`}}>
                <Inp placeholder={t.what} value={fd.n} onChange={e=>setFd({...fd,n:e.target.value})}/>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  {[["am",t.am],["mid",t.mid],["snk",t.snk],["pm",t.pm]].map(([k,lb])=>(
                    <button key={k} onClick={()=>setFd({...fd,m:k})} style={{
                      flex:1,padding:"8px 0",borderRadius:7,
                      border:`1.5px solid ${fd.m===k?C.tx:C.borderL}`,
                      background:fd.m===k?C.tx:"transparent",
                      color:fd.m===k?C.white:C.tx3,
                      fontSize:9,fontFamily:mono,cursor:"pointer",transition:"all 0.15s"}}>
                      {lb.slice(0,3).toUpperCase()}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  {[["cal","KCAL",C.tx],["prot","P",C.green],["carbs","C",C.blue],["fat","F",C.purple]].map(([k,lb,clr])=>(
                    <div key={k} style={{flex:1}}>
                      <div style={{fontSize:9,color:clr,fontFamily:mono,letterSpacing:1,textAlign:"center",marginBottom:3,fontWeight:600}}>{lb}</div>
                      <Inp type="number" value={fd[k]} onChange={e=>setFd({...fd,[k]:e.target.value})}
                        style={{textAlign:"center",fontSize:16,fontWeight:800,padding:9}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>setAddF(false)}
                    style={{flex:1,padding:11,borderRadius:9,border:`1.5px solid ${C.borderL}`,
                      background:"transparent",color:C.tx3,fontSize:10,fontFamily:mono,cursor:"pointer"}}>
                    CANCEL
                  </button>
                  <button onClick={addFood}
                    style={{flex:2,padding:11,borderRadius:9,border:"none",background:C.tx,
                      color:C.white,fontSize:10,fontFamily:mono,fontWeight:700,cursor:"pointer",letterSpacing:1}}>
                    {t.save}
                  </button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
