let _sb = null, _user = null, _authReady = false;
const _authCbs = [];

function syncDot(state){ // 'syncing'|'ok'|'offline'|'error'
  const d=document.getElementById('forja-sync-dot');
  if(!d)return;
  d.className='forja-sync-dot '+(state==='ok'?'':state);
  d.title=state==='ok'?'Synced':state==='syncing'?'Syncing…':state==='error'?'Sync error':'Offline';
}

function getSB(){
  if(_sb)return _sb;
  if(!window.supabase||FORJA_SUPABASE_URL.includes('YOUR_PROJECT')){syncDot('offline');return null;}
  try{
    _sb=window.supabase.createClient(FORJA_SUPABASE_URL,FORJA_SUPABASE_KEY,{
      auth:{persistSession:true,autoRefreshToken:true}
    });
    _sb.auth.onAuthStateChange((ev,sess)=>{
      _user=sess?.user??null;_authReady=true;
      _authCbs.forEach(cb=>cb(_user));
      syncDot(_user?'ok':'offline');
    });
    _sb.auth.getSession().then(({data:{session}})=>{
      _user=session?.user??null;_authReady=true;
      _authCbs.forEach(cb=>cb(_user));
      syncDot(_user?'ok':'offline');
    });
    return _sb;
  }catch(e){syncDot('error');return null;}
}

async function ensureAuth(){
  const sb=getSB();if(!sb)return null;
  if(_user)return _user;
  if(!_authReady){
    await new Promise(res=>{
      const t=setTimeout(()=>res(),3000);
      _authCbs.push(u=>{clearTimeout(t);res(u);});
    });
    if(_user)return _user;
  }
  const{data,error}=await sb.auth.signInAnonymously();
  if(!error&&data?.user){_user=data.user;syncDot('ok');return _user;}
  syncDot('error');return null;
}

    provider:'google',
    options:{redirectTo,scopes:'email profile'}

}

async function signOut(){

  });

}

// Auto-compute weekly muscle volume from logs
function computeWeeklyMuscleVol(logs,routine){
  const today=new Date();
  const dow=today.getDay();const daysToMon=dow===0?6:dow-1;
  const ws=new Date(today);ws.setDate(today.getDate()-daysToMon);ws.setHours(0,0,0,0);
  const weekStr=ws.toISOString().slice(0,10);
  const mv={};
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{
      if(e.d<weekStr)return;
      let nm=id;
      if(routine)routine.forEach(d=>{if(!d)return;(d.ex||[]).forEach(ex=>{if(ex.id===id)nm=ex.e;});});
      const nmLow=nm?.toLowerCase()?.trim();
      const md=EXERCISE_MUSCLE_MAP[nmLow]||EXERCISE_MUSCLE_MAP[ES_TO_META[nmLow]];
      if(!md)return;
      const vol=(+e.w||0)*(+e.r||0);if(vol<=0)return;
      md.p.forEach(m=>{mv[m]=(mv[m]||0)+vol;});
      md.s.forEach(m=>{mv[m]=(mv[m]||0)+vol*0.20;});
    });
  });
  return mv;
}

  calcSessionXP(exercises, setsData, EX_META_REF, exMetaKeyFn){
    // exercises: array of {e: name, id}
    // setsData: array of arrays of {kg, rp, done}
    // Returns: {zone: deltaXP}
    const BASE_W={
      'press banca':60,'press inclinado':50,'aperturas':30,'flexión':0,
      'press sobre cabeza':40,'elevación lateral':12,'press arnold':30,
      'peso muerto':100,'sentadilla':80,'sentadilla frontal':70,'hip thrust':80,
      'remo con barra':60,'dominada':0,'jalón al pecho':60,'remo con mancuerna':25,

      'extensión tríceps':15,'fondos':0,'press francés':20,
      'zancada':40,'step-up':30,'leg press':100,'curl femoral':40,
      'elevación de talones':40,'crunch':0,'plancha':0,'elevación de piernas':0,
      'default':30
    };
    const delta={};
    exercises.forEach((ex,ei)=>{
      const sets=setsData[ei]||[];
      const meta=EX_META_REF[exMetaKeyFn(ex.e)]||{};
      const muscles=[...(meta.p||[]),...(meta.s||[]).map(z=>({z,factor:0.4}))];
      if(!muscles.length)return;
      const nameLow=(ex.e||'').toLowerCase();
      const baseW=BASE_W[nameLow]||BASE_W['default'];
      sets.forEach(s=>{
        if(!s.done)return;
        const kg=parseFloat(s.kg)||0;
        const rp=parseInt(s.rp)||0;
        if(rp<=0)return;
        const wFactor=baseW>0?Math.min(2,Math.max(0.3,kg>0?kg/baseW:0.3)):1.0;
        const rawXP=Math.round(1*rp*wFactor); // 1 set = reps × weight_factor
        muscles.forEach(m=>{
          const zone=typeof m==='string'?m:m.z;
          const mFactor=typeof m==='string'?1.0:(m.factor||1.0);
          if(!zone)return;
          delta[zone]=(delta[zone]||0)+Math.round(rawXP*mFactor);
        });
      });
    });
    return delta;
  },
  // Save daily training load (sets×reps×kg) — used for ACWR calculation
  async saveDailyLoad(loadKg){
    const today=new Date().toISOString().slice(0,10);
    // Update localStorage running total for today
    try{
      const raw=localStorage.getItem('fv8_dl')||'{}';
      const dl=JSON.parse(raw);
      dl[today]=(dl[today]||0)+loadKg;
      localStorage.setItem('fv8_dl',JSON.stringify(dl));
    }catch(_){}
    // Supabase upsert — adds to existing value for today
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return;
    try{
      // Use raw SQL increment via RPC to avoid race conditions
      await sb.from('daily_load').upsert({
        user_id:user.id,load_date:today,load_kg:loadKg
      },{onConflict:'user_id,load_date',ignoreDuplicates:false});
      // Actually increment — upsert replaces, so we need to load first
      const{data}=await sb.from('daily_load').select('load_kg').eq('user_id',user.id).eq('load_date',today).single();
      const existing=(data?.load_kg||0);
      await sb.from('daily_load').upsert({user_id:user.id,load_date:today,load_kg:existing+loadKg},{onConflict:'user_id,load_date'});
    }catch(_){}
  },

  // Load last 28 days of daily load for ACWR
  loadACWRLocal(){
    try{
      const raw=localStorage.getItem('fv8_dl');
      return raw?JSON.parse(raw):{};
    }catch(_){return{};}
  },

  async loadACWR(){
    // Try Supabase first, fall back to localStorage
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user) return this.loadACWRLocal();
    try{
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-28);
      const{data}=await sb.from('daily_load')
        .select('load_date,load_kg')
        .eq('user_id',user.id)
        .gte('load_date',cutoff.toISOString().slice(0,10))
        .order('load_date',{ascending:false});
      if(!data||!data.length) return this.loadACWRLocal();
      const result={};
      data.forEach(r=>{result[r.load_date]=parseFloat(r.load_kg)||0;});
      // Merge with localStorage
      const local=this.loadACWRLocal();
      Object.entries(local).forEach(([d,v])=>{if(!result[d])result[d]=v;});
      return result;
    }catch(_){return this.loadACWRLocal();}
  },

  // Save best 1RM per exercise per day for strength curve
  async saveStrengthHistory(exerciseId,exerciseName,estimated1rm,bestKg,bestReps){
    const today=new Date().toISOString().slice(0,10);
    try{
      const raw=localStorage.getItem('fv8_sh')||'{}';
      const sh=JSON.parse(raw);
      if(!sh[exerciseId])sh[exerciseId]=[];
      const existing=sh[exerciseId].find(e=>e.d===today);
      if(existing){
        if(estimated1rm>existing.rm){existing.rm=estimated1rm;existing.kg=bestKg;existing.r=bestReps;}
      }else{
        sh[exerciseId]=[{d:today,rm:estimated1rm,kg:bestKg,r:bestReps},...sh[exerciseId]].slice(0,90);
      }
      localStorage.setItem('fv8_sh',JSON.stringify(sh));
    }catch(_){}
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return;
    try{
      await sb.from('strength_history').upsert({
        user_id:user.id,exercise_id:exerciseId,exercise_name:exerciseName,
        logged_date:today,estimated_1rm:estimated1rm,best_set_kg:bestKg,best_set_reps:bestReps
      },{onConflict:'user_id,exercise_id,logged_date'});
    }catch(_){}
  },

  loadStrengthLocal(exerciseId){
    try{
      const raw=localStorage.getItem('fv8_sh');
      if(!raw)return[];
      const sh=JSON.parse(raw);
      return(sh[exerciseId]||[]).slice(0,12);
    }catch(_){return[];}
  },

  async loadStrengthHistory(exerciseId){
    const local=this.loadStrengthLocal(exerciseId);
    const sb=getSB();const user=await ensureAuth();
    if(!sb||!user)return local;
    try{
      const{data}=await sb.from('strength_history')
        .select('logged_date,estimated_1rm,best_set_kg,best_set_reps')
        .eq('user_id',user.id).eq('exercise_id',exerciseId)
        .order('logged_date',{ascending:false}).limit(12);
      if(!data||!data.length)return local;
      return data.map(r=>({d:r.logged_date,rm:parseFloat(r.estimated_1rm),kg:parseFloat(r.best_set_kg),r:r.best_set_reps}));
    }catch(_){return local;}
  },
};

// store{} compatibility shim is defined in the Supabase layer above

// Adapta reps/series según objetivo
function applyGoal(ex,goal){
  let s=ex.s,r=ex.r;
  if(goal==="strength"){s=Math.min(ex.s+1,5);r=ex.rs;}
  else if(goal==="lose"){s=Math.max(ex.s-1,3);r=ex.rc;}
  else if(goal==="recomp"){r=ex.rr;}
  else if(goal==="general"){s=Math.max(ex.s-1,3);r=ex.rg;}
  return{e:ex.e,s,r};
}

function canDo(exName, eq){
  const needed = CELEB_EQ_NEEDS[exName];
  if(needed===undefined) return true;
  if(needed.length===0) return true;
  return needed.every(e=>eq.includes(e));
}

// Map UI equipment names → internal keys used by CELEB_EQ_NEEDS
const EQ_MAP={
  "Rack+Barra":"rack","Banco":"bench","Mancuernas":"dumbbells",
  "Dominadas":"pull_up_bar","Paralelas":"dip_bar","Barra Z/EZ":"ez_bar",
  "Leg Ext/Curl":"leg_extension","Polea":"cable_machine",
  "Chaleco":"weight_vest","Kettlebell":"kettlebell","Bandas":"bands",
  // also accept internal keys directly
  "rack":"rack","bench":"bench","dumbbells":"dumbbells","pull_up_bar":"pull_up_bar",
  "dip_bar":"dip_bar","ez_bar":"ez_bar","leg_extension":"leg_extension",
  "cable_machine":"cable_machine","weight_vest":"weight_vest"
};

function normEq(userEquipment){
  return userEquipment.map(e=>EQ_MAP[e]||e);
}

function adaptExercise(exName, userEquipment){
  const eq = normEq(userEquipment);
  if(canDo(exName, eq)) return exName;
  const subs = CELEB_SUBS[exName]||[];
  for(const sub of subs){
    const subNeeds = CELEB_SUB_EQ[sub]||[];
    if(subNeeds.length===0||subNeeds.every(e=>eq.includes(e))) return sub;
  }
  return "Flexiones";
}

function canDoAuto(exName, eq){
  const eqMap={"Rack+Barra":"rack","Banco":"bench","Mancuernas":"dumbbells",
    "Dominadas":"pull_up_bar","Paralelas":"dip_bar","Barra Z/EZ":"ez_bar",
    "Leg Ext/Curl":"leg_extension","Polea":"cable_machine","Chaleco":"weight_vest",
    "Kettlebell":"kb","Bandas":"bands"};
  // If gym completo or no equipment restrictions, everything available
  if(!eq||eq.length===0) return exName;
  const eqKeys=eq.map(e=>eqMap[e]||e).filter(Boolean);
  // Add "always available" items
  eqKeys.push("bodyweight");
  const needed=EQ_NEEDS_ES[exName];
  if(needed===undefined) return exName; // unknown = assume available
  if(needed.length===0) return exName; // bodyweight
  if(needed.every(n=>eqKeys.includes(n))) return exName; // all needed available
  // Try substitution
  const sub=SUBS_ES[exName];
  if(sub){
    const subNeeded=EQ_NEEDS_ES[sub];
    if(!subNeeded||subNeeded.length===0||subNeeded.every(n=>eqKeys.includes(n))) return sub;
  }
  // Last resort: return a bodyweight exercise based on muscle group
  return exName; // keep original if no valid sub found
}

function buildRoutine7(splits,selectedDays,goal,eq=[]){
  const r=Array(7).fill(null);
  const adapted=splits.map(d=>({...d,ex:d.ex.map(e=>{
    const goalApplied=applyGoal(e,goal);
    // Apply equipment substitution
    const exName=canDoAuto(goalApplied.e,eq);
    return {...goalApplied,e:exName};
  })}));
  // Para 5beg: secuencia A B A B A
  const seq=adapted.length===2
    ?[adapted[0],adapted[1],adapted[0],adapted[1],adapted[0]].slice(0,selectedDays.length)
    :adapted.slice(0,selectedDays.length);
  selectedDays.forEach((dayIdx,i)=>{
    if(seq[i])r[dayIdx]={...seq[i],ex:seq[i].ex.map((x,j)=>({...x,id:`${dayIdx}${j}`}))};
  });
  return r;
}

function WorkoutScreen({day,sel,done,logs,onToggle,onSaveLog,t,lang,profile,onBack,tourStep=null,setTourStep=()=>{}}){
  // Sync tourStep from prop — delay 1 frame so exercise cards are in DOM
  const[wsTourStep,setWsTourStep]=React.useState(null);
  const[expandedEx,setExpandedEx]=React.useState(null);
  const[strengthData,setStrengthData]=React.useState({});
  const[wsReady,setWsReady]=React.useState(false);
  const[wsScrollV,setWsScrollV]=React.useState(0);
  // Load strength history when exercise is expanded
  React.useEffect(()=>{
    if(expandedEx===null||!exs[expandedEx])return;
    const ex=exs[expandedEx];
    FStore.loadStrengthHistory(ex.id).then(data=>{
      setStrengthData(prev=>({...prev,[ex.id]:data}));
    });
  },[expandedEx]);

  React.useEffect(()=>{ 
    setWsTourStep(tourStep);
    // Delay so exercise cards are fully rendered and positioned before tour overlay
    const t1=setTimeout(()=>setWsReady(true),250);
    const t2=setTimeout(()=>setWsScrollV(v=>v+1),450); // second pass for accurate bounds
    return()=>{clearTimeout(t1);clearTimeout(t2);};
  },[tourStep]);
  const exs=day.ex;
  const C2={bg:"#0d0f14",bgD:"#080a0e",card:"#131720",border:"#1e2535",borderL:"#19202e",
    tx:"#F0F2F5",tx2:"#b8c2d4",tx3:"#8892a8",
    green:"#3fcf8e",blue:"#4f8ef7",yellow:"#f0b429",red:"#e05555",purple:"#8b6cf7",white:"#FFFFFF"};

  // -- Per-exercise sets state: [{kg,rp,done}] --
  const[sets,setSets]=useState(()=>exs.map(ex=>{
    const h=logs[ex.id];
    const numSets=ex.s||1;
    return Array.from({length:numSets},(_,si)=>{
      const kg=h&&h[si]?String(h[si].w):h&&h[0]?String(h[0].w):"";
      const rp=h&&h[si]?String(h[si].r):h&&h[0]?String(h[0].r):String(ex.r||"8");
      return {kg,rp,done:false};
    });
  }));
  const[notes,setNotes]=useState({});
  const[noteOpen,setNoteOpen]=useState(null); // ei
  const[techOpen,setTechOpen]=useState(null); // ei para panel de técnica
  const[noteText,setNoteText]=useState("");
  const[npOpen,setNpOpen]=useState(null); // {ei,si,field}
  const[npVal,setNpVal]=useState("0");
  const[arcPopOpen,setArcPopOpen]=useState(false);

  // -- Rest timer --
  const[restSecs,setRestSecs]=useState(0);
  const[restDur,setRestDur]=useState(90);
  const[restActive,setRestActive]=useState(false);
  const[restCtx,setRestCtx]=useState(null);
  const restRef=useRef(null);

  // -- Session timer --
  const[sessSecs,setSessSecs]=useState(0);
  const[finalSecs,setFinalSecs]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setSessSecs(s=>s+1),1000);return()=>clearInterval(t);},[]);

  // -- Rest countdown --
  useEffect(()=>{
    if(restActive&&restSecs>0){
      restRef.current=setTimeout(()=>setRestSecs(s=>s-1),1000);
    } else if(restActive&&restSecs===0){
      setRestActive(false);
      // Vibrar al terminar (mobile)
      if(navigator.vibrate) navigator.vibrate([100,50,100]);
      // Beep de audio
      try{
        const ac=new(window.AudioContext||window.webkitAudioContext)();
        [0,0.15,0.30].forEach(t=>{
          const o=ac.createOscillator(),g=ac.createGain();
          o.connect(g);g.connect(ac.destination);
          o.frequency.value=880;g.gain.setValueAtTime(.3,ac.currentTime+t);
          g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+t+.12);
          o.start(ac.currentTime+t);o.stop(ac.currentTime+t+.12);
        });
      }catch(e){}
      try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}
      if(restCtx) highlightNext(restCtx.ei,restCtx.si);
    }
    return()=>clearTimeout(restRef.current);
  },[restActive,restSecs]);

  // -- Adaptive rest --
  function calcRest(ei,si){
    const s=sets[ei][si];
    const ex=exs[ei];
    const h=logs[ex.id];
    const prevKg=h&&h[0]?+h[0].w:0;
    const curKg=+s.kg||0;
    if(curKg>prevKg&&prevKg>0)return{dur:120,msg:lang==="es"?"NUEVO PESO . 2 MIN":"NEW WEIGHT . 2 MIN"};
    if(+s.rp>12)return{dur:60,msg:lang==="es"?"REPS ALTAS . 60S":"HIGH REPS . 60S"};
    if(curKg>0&&curKg<prevKg)return{dur:60,msg:lang==="es"?"MENOS PESO . 60S":"LESS WEIGHT . 60S"};
    return{dur:90,msg:""};
  }

  function startRest(ei,si){
    const{dur}=calcRest(ei,si);
    setRestDur(dur);setRestSecs(dur);setRestActive(true);setRestCtx({ei,si});
  }
  function skipRest(){setRestActive(false);setRestSecs(0);if(restCtx)highlightNext(restCtx.ei,restCtx.si);}

  // -- Highlight next set --
  function highlightNext(ei,si){
    const nextSi=sets[ei].findIndex((s,i)=>i>si&&!s.done);
    let id=null;
    if(nextSi!==-1) id=`setrow-${ei}-${nextSi}`;
    else{
      for(let e2=ei+1;e2<exs.length;e2++){
        const ns=sets[e2].findIndex(s=>!s.done);
        if(ns!==-1){id=`setrow-${e2}-${ns}`;
          const vidEl2=document.getElementById(`vid-${e2}`);
          if(vidEl2) vidEl2.scrollIntoView({behavior:'smooth',block:'start'});
          break;}
      }
    }
    if(id){
      const el=document.getElementById(id);
      if(el){el.classList.add('next-pulse');setTimeout(()=>el.classList.remove('next-pulse'),3600);}
    }
  }

  // -- Toggle set done --
  function toggleDone(ei,si){
    const ns=sets.map((e,i)=>i!==ei?e:e.map((s,j)=>j!==si?s:{...s,done:!s.done}));
    setSets(ns);
    const s=sets[ei][si];
    if(!s.done){
      // Haptic
      try{navigator.vibrate&&navigator.vibrate(40);}catch{}
      // Save log
      onSaveLog(exs[ei].id,ns[ei][si].kg,ns[ei][si].rp||exs[ei].r||'8',exs[ei].e);
      onToggle(exs[ei].id);
      // Rest
      startRest(ei,si);
    }
    // Check all done
    const allDone=ns.every(e=>e.every(s=>s.done));
    if(allDone) setTimeout(()=>{setFinalSecs(sessSecs);setAllDone(true);FStore.saveSession(day&&day.l,exs,sessSecs);},700);
  }

  function addSet(ei){
    const last=sets[ei][sets[ei].length-1];
    setSets(sets.map((e,i)=>i!==ei?e:[...e,{kg:last.kg,rp:last.rp,done:false}]));
  }

  // -- Completion --
  const[allDone,setAllDone]=useState(false);
  const totalSets=sets.reduce((a,e)=>a+e.length,0);
  const doneSets=sets.reduce((a,e)=>a+e.filter(s=>s.done).length,0);

  // -- Numpad --
  function openNp(ei,si,field){
    const v=field==='kg'?sets[ei][si].kg:sets[ei][si].rp;
    setNpVal(v||"0");setNpOpen({ei,si,field});
  }
  function npKey(k){
    setNpVal(v=>{
      if(k==='⌫')return v.slice(0,-1)||'0';
      if(k==='.'&&v.includes('.'))return v;
      if(v==='0'&&k!=='.')return k;
      if(v.length>=6)return v;
      return v+k;
    });
  }
  function npOk(){
    if(npOpen){
      const{ei,si,field}=npOpen;
      setSets(sets.map((e,i)=>i!==ei?e:e.map((s,j)=>j!==si?s:
        field==='kg'?{...s,kg:npVal}:{...s,rp:npVal}
      )));
    }
    setNpOpen(null);
  }
  function npAdj(d){
    const cur=parseFloat(npVal)||0;
    const nv=Math.max(0,cur+d);
    setNpVal(nv%1===0?String(nv):nv.toFixed(1));
  }

  // -- Vol per exercise --
  function calcVol(ei){
    return sets[ei].filter(s=>s.done).reduce((sum,s)=>{
      const kg=typeof s.kg==='string'?parseFloat(s.kg)||0:+s.kg||0;
      const rp=+s.rp||0;
      return sum+kg*rp;
    },0);
  }

  // -- Arc values --
  const arcPct=restActive?(restSecs/restDur):Math.min(sessSecs/3600,1);
  const arcOffset=ARC_C*(1-arcPct);
  const arcColor=restActive?(restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.blue):"rgba(82,90,110,.4)";
  const arcNumStr=restActive?
    (Math.floor(restSecs/60)+':'+(restSecs%60<10?'0':'')+(restSecs%60)):
    ((sessSecs<3600)?((Math.floor(sessSecs/60)<10?'0':'')+Math.floor(sessSecs/60)+':'+(sessSecs%60<10?'0':'')+sessSecs%60):"59:59");
  const arcNumColor=restActive?(restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.tx):C2.tx3;

  const fmtSess=()=>{const s=allDone?finalSecs:sessSecs;const m=Math.floor(s/60),sec=s%60;return(m<10?'0':'')+m+':'+(sec<10?'0':'')+sec;};

  // -- msgs must be outside conditional — React rules of hooks --
  const celebMsgs=lang==="es"?["¡Lo aplastaste hoy!","¡Brutal, crack!","¡Sesión completada!"]:["You crushed it!","Absolutely brutal!","Session complete!"];
  const[celebMsg]=useState(()=>celebMsgs[Math.floor(Math.random()*celebMsgs.length)]);

  // Pre-generate confetti so it's stable
  const[confettiPieces]=useState(()=>{
    const colors=["#3fcf8e","#6a8fc0","#f0b429","#8878c0","#F0F2F5","#e05555","#f0c040","#60d0d9"];
    return Array.from({length:80},(_,i)=>{
      const sz=3+Math.random()*7;
      const isRect=i%3===0;
      return{
        left:Math.random()*100,
        // Start spread across full screen height, animation moves up
        top:10+Math.random()*90,
        w:isRect?sz*1.8:sz, h:sz,
        br:isRect?2:sz/2,
        bg:colors[Math.floor(Math.random()*colors.length)],
        rot:Math.random()*360,
        dur:1.0+Math.random()*1.8,
        delay:Math.random()*2.0,
        op:0.7+Math.random()*0.3,
      };
    });
  });

  // -- Completion screen --
  if(allDone){
    const confettiColors=["#3fcf8e","#6a8fc0","#f0b429","#8878c0","#F0F2F5","#e05555"];
    return(
      <div style={{position:"fixed",inset:0,background:"#080a0e",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"sans-serif",overflow:"hidden"}}>
        {/* Confetti — 80 pieces, full screen */}
        <div style={{position:"absolute",inset:0,pointerEvents:"none",overflow:"hidden"}}>
          {confettiPieces.map((p,i)=>(
            <div key={i} style={{
              position:"absolute",
              left:`${p.left}%`,
              top:`${p.top}%`,
              width:p.w, height:p.h,
              borderRadius:p.br,
              background:p.bg,
              transform:`rotate(${p.rot}deg)`,
              animation:`floatUp ${p.dur}s ease-out ${p.delay}s infinite`,
              opacity:p.op,
            }}/>
          ))}
        </div>
        <div style={{width:88,height:88,borderRadius:"50%",background:C2.green,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 0 48px ${C2.green}55`,marginBottom:22,animation:"celebrate .6s cubic-bezier(.34,1.56,.64,1) both"}}>
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none"><path d="M7 20L16 29L33 11" stroke="#fff" strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <div style={{fontSize:28,fontWeight:900,letterSpacing:-1,color:C2.tx,textAlign:"center",padding:"0 32px",animation:"fu .5s .25s both"}}>{celebMsg}</div>
        <div style={{fontFamily:"'SF Mono','Courier New',monospace",fontSize:9,color:C2.tx3,letterSpacing:2,marginTop:8,animation:"fu .5s .4s both"}}>
          {lang==="es"?"EL TRABAJO DE HOY FORJA EL ATLETA DE MAÑANA":"TODAY'S WORK BUILDS TOMORROW'S ATHLETE"}
        </div>
        <div style={{display:"flex",gap:24,marginTop:28,animation:"fu .5s .55s both"}}>
          {[{v:exs.length,l:lang==="es"?"EJERCICIOS":"EXERCISES",c:C2.tx},
            {v:doneSets,l:lang==="es"?"SERIES":"SETS",c:C2.green},
            {v:fmtSess(),l:lang==="es"?"DURACIÓN":"DURATION",c:C2.blue}
          ].map((stat,i)=>(
            <React.Fragment key={i}>
              {i>0&&<div style={{width:1,background:C2.borderL}}/>}
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:28,fontWeight:900,color:stat.c}}>{stat.v}</div>
                <div style={{fontFamily:"'SF Mono','Courier New',monospace",fontSize:8,color:C2.tx3,letterSpacing:2,marginTop:3}}>{stat.l}</div>
              </div>
            </React.Fragment>
          ))}
        </div>
        <button onClick={onBack} style={{marginTop:36,padding:"14px 42px",background:C2.tx,color:C2.bgD,border:"none",borderRadius:12,fontFamily:"'SF Mono','Courier New',monospace",fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer",animation:"fu .5s .7s both"}}>
          {lang==="es"?"← VOLVER":"← BACK"}
        </button>
      </div>
    );
  }

  const mono="'SF Mono','Fira Code','Courier New',monospace";
  const sans="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif";

  return(
    <div style={{position:"fixed",inset:0,background:C2.bg,display:"flex",flexDirection:"column",fontFamily:sans,overflow:"hidden"}}>

      {/* -- REST OVERLAY -- */}
      {restActive&&(
        <div style={{
          position:"fixed",inset:0,zIndex:200,
          background:"rgba(12,15,24,0.97)",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          animation:"fogIn .2s ease",
        }}>
          {/* Contexto de qué ejercicio/serie */}
          {restCtx&&(
            <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:3,textTransform:"uppercase",marginBottom:20}}>
              {sets[restCtx.ei]&&exs[restCtx.ei]?.e} — {lang==="es"?"SERIE":"SET"} {restCtx.si+1}
            </div>
          )}

          {/* Círculo grande con countdown */}
          <div style={{position:"relative",width:220,height:220,marginBottom:32}}>
            <svg viewBox="0 0 220 220" width="220" height="220" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
              <circle cx="110" cy="110" r="95" fill="none" stroke="rgba(82,90,110,.2)" strokeWidth="6"/>
              <circle cx="110" cy="110" r="95" fill="none"
                stroke={restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.blue}
                strokeWidth="6" strokeLinecap="round"
                strokeDasharray={2*Math.PI*95}
                strokeDashoffset={2*Math.PI*95*(1-restSecs/restDur)}
                style={{transition:"stroke .5s, stroke-dashoffset .9s linear"}}/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
              <div style={{
                fontSize:restSecs>=60?52:64,fontWeight:900,fontFamily:mono,
                color:restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.tx,
                lineHeight:1,letterSpacing:-2,transition:"color .5s",
              }}>
                {Math.floor(restSecs/60)>0?
                  (Math.floor(restSecs/60)+':'+(restSecs%60<10?'0':'')+restSecs%60):
                  restSecs
                }
              </div>
              <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:3}}>
                {lang==="es"?"DESCANSO":"REST"}
              </div>
            </div>
          </div>

          {/* Selector de duración rápida */}
          <div style={{display:"flex",gap:8,marginBottom:32}}>
            {[30,60,90,120,180].map(s=>(
              <button key={s} onClick={()=>{setRestDur(s);setRestSecs(s);}} style={{
                padding:"7px 12px",borderRadius:20,fontFamily:mono,fontSize:10,letterSpacing:1,cursor:"pointer",
                border:`1px solid ${restDur===s?"rgba(106,143,192,.6)":"rgba(82,90,110,.4)"}`,
                background:restDur===s?"rgba(106,143,192,.12)":"transparent",
                color:restDur===s?C2.blue:C2.tx3,transition:"all .15s",
              }}>{s<60?s+"s":s/60+"m"}</button>
            ))}
          </div>

          {/* Botones de acción */}
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>{setRestSecs(r=>Math.min(r+15,restDur));}} style={{
              padding:"12px 20px",borderRadius:12,border:"1px solid rgba(82,90,110,.4)",
              background:"transparent",color:C2.tx3,fontFamily:mono,fontSize:11,letterSpacing:1,cursor:"pointer",
            }}>+15s</button>
            <button onClick={skipRest} style={{
              padding:"12px 28px",borderRadius:12,border:"none",
              background:C2.tx,color:C2.bgD,fontFamily:mono,fontSize:12,letterSpacing:2,
              fontWeight:700,cursor:"pointer",
            }}>{lang==="es"?"SALTAR":"SKIP"}</button>
          </div>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px 12px",flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:C2.tx3,fontFamily:mono,fontSize:11,letterSpacing:1.5,cursor:"pointer",padding:0}}>
          ← {lang==="es"?"VOLVER":"BACK"}
        </button>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
          <div style={{fontFamily:mono,fontSize:10,color:C2.tx2,letterSpacing:3,fontWeight:600}}>{day.l}</div>
          <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:1}}>
            {doneSets}/{totalSets} {lang==="es"?"series":"sets"}
          </div>
        </div>
        {/* Arc clock */}
        <div style={{position:"relative",width:44,height:44,cursor:"pointer",flexShrink:0}} onClick={()=>setArcPopOpen(p=>!p)}>
          <svg viewBox="0 0 44 44" width="44" height="44" style={{position:"absolute",inset:0,transform:"rotate(-90deg)"}}>
            <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(82,90,110,.3)" strokeWidth="2.5"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke={arcColor} strokeWidth="2.5"
              strokeDasharray={ARC_C} strokeDashoffset={arcOffset}
              strokeLinecap="round" style={{transition:"stroke .5s, stroke-dashoffset .9s linear"}}/>
          </svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:0}}>
            <div style={{fontFamily:mono,fontSize:restActive?11:9,fontWeight:700,color:arcNumColor,letterSpacing:-.5,lineHeight:1,transition:"color .5s"}}>{arcNumStr}</div>
            {restActive&&<div style={{fontFamily:mono,fontSize:6,color:C2.tx3,letterSpacing:1}}>REST</div>}
          </div>
        </div>
      </div>

      {/* Arc duration popup */}
      {arcPopOpen&&(
        <div style={{position:"fixed",top:56,right:14,background:C2.bgD,border:`1px solid ${C2.borderL}`,borderRadius:10,padding:8,zIndex:80,animation:"fu .15s ease both"}}>
          <div style={{fontFamily:mono,fontSize:7,color:C2.tx3,letterSpacing:2,padding:"2px 14px 6px",borderBottom:`1px solid rgba(82,90,110,.3)`,marginBottom:4}}>
            {lang==="es"?"DESCANSO":"REST"}
          </div>
          {[[60,lang==="es"?"60s . sprints":"60s . sprints"],[90,lang==="es"?"90s . estándar":"90s . standard"],[120,lang==="es"?"2 min . fuerza":"2 min . strength"],[180,lang==="es"?"3 min . pesado":"3 min . heavy"]].map(([s,label])=>(
            <button key={s} onClick={()=>{setRestDur(s);if(restActive){setRestSecs(s);}setArcPopOpen(false);}}
              style={{display:"block",width:"100%",padding:"6px 14px",borderRadius:7,background:restDur===s?"rgba(106,143,192,.1)":"transparent",
                border:"none",color:restDur===s?C2.blue:C2.tx3,fontFamily:mono,fontSize:10,cursor:"pointer",textAlign:"left",letterSpacing:1}}>
              {label}
            </button>
          ))}
          {restActive&&<button onClick={()=>{skipRest();setArcPopOpen(false);}}
            style={{display:"block",width:"100%",padding:"6px 14px",marginTop:4,borderRadius:7,
              background:"rgba(214,96,96,.1)",border:"none",color:C2.red,fontFamily:mono,fontSize:9,cursor:"pointer",textAlign:"left",letterSpacing:1,borderTop:`1px solid rgba(82,90,110,.3)`}}>
            {lang==="es"?"SALTAR DESCANSO":"SKIP REST"}
          </button>}
        </div>
      )}

      {/* Rest thin bar */}
      <div style={{height:2,background:"transparent",flexShrink:0}}>
        <div style={{height:"100%",width:restActive?(restSecs/restDur*100)+"%" : "0%",
          background:restSecs<=10?C2.red:restSecs<=30?C2.yellow:C2.blue,
          transition:"width 1s linear, background .5s"}}/>
      </div>

      {/* -- SCROLL -- */}
      <div style={{flex:1,overflowY:"auto",overflowX:"hidden",paddingBottom:100}} id="workout-scroll">
        {exs.map((ex,ei)=>{
          const vidUrl=getVid(ex.e);
          const vol=calcVol(ei);
          const exDone=sets[ei].every(s=>s.done);
          const exStarted=sets[ei].some(s=>s.done);
          const h=logs[ex.id];
          const prevKg=h&&h[0]?h[0].w:null;
          const prevRp=h&&h[0]?h[0].r:null;

          return(
            <React.Fragment key={ei}>
              {ei>0&&(
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"20px 20px 0"}}>
                  <div style={{flex:1,height:1,background:"rgba(82,90,110,.3)"}}/>
                  <div style={{fontFamily:mono,fontSize:7,color:"rgba(122,130,148,.4)",letterSpacing:3}}>
                    {lang==="es"?"SIGUIENTE EJERCICIO":"NEXT EXERCISE"}
                  </div>
                  <div style={{flex:1,height:1,background:"rgba(82,90,110,.3)"}}/>
                </div>
              )}

              {/* Strength Curve — expands when tapping exercise name */}
              {expandedEx===ei&&(()=>{
                const hist=(strengthData[ex.id]||[]).slice(0,10).reverse();
                const hasHist=hist.length>0;
                const maxRM=hasHist?Math.max(...hist.map(h=>h.rm)):100;
                const minRM=hasHist?Math.min(...hist.map(h=>h.rm)):0;
                const range=Math.max(maxRM-minRM,10);
                const W=260,H=70,pad=8;
                // % change vs 30 days ago
                const oldest=hist[0];const newest=hist[hist.length-1];
                const pct=oldest&&newest&&oldest.rm>0?Math.round(((newest.rm-oldest.rm)/oldest.rm)*100):null;
                return(
                  <div style={{margin:"8px 0 4px",padding:"14px 16px",background:"rgba(255,255,255,0.03)",borderRadius:12,border:"1px solid rgba(255,255,255,0.07)"}}>
                    {/* Header */}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:hasHist?10:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:2}}>// {lang==="es"?"PROGRESIÓN DE FUERZA":"STRENGTH CURVE"}</span>
                        <button onClick={()=>{const el=document.getElementById("sc-help-"+ex.id);if(el)el.style.display=el.style.display==="none"?"":"none";}} style={{width:16,height:16,borderRadius:"50%",border:"1px solid rgba(255,255,255,.2)",background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.75)",fontSize:9,cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0}}>?</button>
                      </div>
                      {pct!==null&&<span style={{fontFamily:mono,fontSize:11,fontWeight:700,color:pct>=0?"#2da84a":"#e83020",letterSpacing:1}}>
                        {pct>=0?"+":""}{pct}% <span style={{fontSize:9,color:C2.tx3,fontWeight:400}}>{lang==="es"?"(últ.sesiones)":"(recent)"}</span>
                      </span>}
                    </div>
                    {/* Info */}
                    <div id={"sc-help-"+ex.id} style={{display:"none",marginBottom:10,padding:"8px 10px",background:"rgba(255,255,255,0.04)",borderRadius:8,borderLeft:"2px solid #e8a020",fontFamily:mono,fontSize:9,color:C2.tx2,letterSpacing:1,lineHeight:1.7}}>
                      {lang==="es"
                        ?"1RM estimado con la fórmula de Epley basado en tus mejores sets. Muestra tu evolución de fuerza en este ejercicio."
                        :"Estimated 1RM using Epley formula from your best sets. Shows your strength progression for this exercise."}
                    </div>}
                    {hasHist?(
                      <>
                        {/* SVG line chart */}
                        <svg width="100%" viewBox={`0 0 ${W} ${H+pad*2}`} style={{overflow:"visible",marginBottom:4}}>
                          {/* Grid line at max */}
                          <line x1={pad} y1={pad} x2={W-pad} y2={pad} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
                          <line x1={pad} y1={H/2+pad} x2={W-pad} y2={H/2+pad} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
                          {/* Area fill */}
                          {hist.length>1&&(()=>{
                            const pts=hist.map((h,i)=>{
                              const x=pad+(i/(hist.length-1))*(W-pad*2);
                              const y=pad+H-((h.rm-minRM)/range)*H;
                              return`${x},${y}`;
                            });
                            const first=pts[0].split(",");const last=pts[pts.length-1].split(",");
                            return<path d={`M${pts[0]} L${pts.join(" L")} L${last[0]},${H+pad} L${first[0]},${H+pad} Z`}
                              fill="rgba(191,169,138,0.08)" stroke="none"/>;
                          })()}
                          {/* Line */}
                          {hist.length>1&&<polyline
                            points={hist.map((h,i)=>{
                              const x=pad+(i/(hist.length-1))*(W-pad*2);
                              const y=pad+H-((h.rm-minRM)/range)*H;
                              return`${x},${y}`;
                            }).join(" ")}
                            fill="none" stroke="#BFA98A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>}
                          {/* Dots */}
                          {hist.map((h,i)=>{
                            const x=pad+(hist.length>1?(i/(hist.length-1))*(W-pad*2):W/2);
                            const y=pad+H-((h.rm-minRM)/range)*H;
                            return<g key={i}>
                              <circle cx={x} cy={y} r="4" fill="#BFA98A" stroke="#0d0f14" strokeWidth="2"/>
                              {i===hist.length-1&&<text x={x} y={y-8} textAnchor="middle" fill="#BFA98A" fontSize="9" fontFamily="monospace">{Math.round(h.rm)}kg</text>}
                            </g>;
                          })}
                        </svg>
                        {/* Best + current */}
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <div>
                            <div style={{fontFamily:mono,fontSize:8,color:C2.tx3,letterSpacing:1}}>{lang==="es"?"MÁX HISTÓRICO":"ALL-TIME BEST"}</div>
                            <div style={{fontFamily:mono,fontSize:13,fontWeight:700,color:C2.tx}}>{Math.round(maxRM)} kg</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:mono,fontSize:8,color:C2.tx3,letterSpacing:1}}>{lang==="es"?"ÚLTIMA SESIÓN":"LAST SESSION"}</div>
                            <div style={{fontFamily:mono,fontSize:13,fontWeight:700,color:"#BFA98A"}}>{Math.round(newest?.rm||0)} kg</div>
                          </div>
                        </div>
                      </>
                    ):(
                      <div style={{textAlign:"center",padding:"12px 0",fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:1}}>
                        {lang==="es"?"COMPLETA SETS PARA VER TU PROGRESIÓN":"COMPLETE SETS TO SEE PROGRESSION"}
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* Video */}
              <div id={`vid-${ei}`} data-tour={ei===0?"ws-video":undefined} style={{width:"100%",height:220,background:C2.bgD,position:"relative",overflow:"hidden",flexShrink:0}}>
                {vidUrl
                  ?<video autoPlay loop muted playsInline src={vidUrl}
                      style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}
                      onCanPlay={e=>e.target.style.opacity=1}
                      onLoadStart={e=>e.target.style.opacity=0}
                      onError={e=>e.target.style.display='none'}
                    />
                  :<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",opacity:.15}}>
                    <div style={{fontSize:48,color:C2.tx2}}>◎</div>
                  </div>
                }
                {/* Shimmer loading overlay — desaparece cuando el video carga */}
                <div style={{position:"absolute",inset:0,background:`linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%)`,animation:"shimmer 1.5s ease infinite",pointerEvents:"none",opacity:vidUrl?1:0}}/>
                <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 45%,rgba(44,48,64,.85) 100%)",pointerEvents:"none"}}/>
                <div style={{position:"absolute",top:12,left:16,fontFamily:mono,fontSize:9,color:"rgba(255,255,255,.65)",letterSpacing:2}}>FORJA</div>
                <div style={{position:"absolute",top:12,right:12,background:"rgba(0,0,0,.45)",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,.1)",borderRadius:20,padding:"4px 11px",fontFamily:mono,fontSize:8,color:"rgba(255,255,255,.75)",letterSpacing:1.5}}>
                  {ex.e.toUpperCase()}
                </div>
              </div>

              {/* Exercise info */}
              <div style={{padding:"14px 20px 0"}}>
                <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:2,marginBottom:4}}>
                  {String(ei+1).padStart(2,'0')} / {String(exs.length).padStart(2,'0')}
                  {EX_META[exMetaKey(ex.e)]?.mec&&(
                    <span style={{marginLeft:8,color:EX_META[exMetaKey(ex.e)]?.mec==="compound"?C2.blue:C2.purple}}>
                      . {lang==="es"?EX_META[exMetaKey(ex.e)]?.mec==="compound"?"COMPUESTO":"AISLAMIENTO":EX_META[exMetaKey(ex.e)]?.mec?.toUpperCase()}
                    </span>
                  )}
                </div>
                <div data-tour={ei===0?"ws-exercise":undefined} style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                  <div>
                    <div
                      onClick={()=>setExpandedEx(ei===expandedEx?null:ei)}
                      style={{fontSize:24,fontWeight:900,letterSpacing:-1,textTransform:"uppercase",color:C2.tx,lineHeight:1,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
                      {ex.e}
                      <span style={{fontSize:11,color:C2.tx3,fontFamily:mono,opacity:0.5}}>{expandedEx===ei?"▲":"▼"}</span>
                    </div>
                    {/* Músculos debajo del nombre */}
                    {EX_META[exMetaKey(ex.e)]&&(
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:5}}>
                        {EX_META[exMetaKey(ex.e)].p.map(m=>(
                          <span key={m} style={{padding:"2px 7px",borderRadius:8,fontSize:8,fontFamily:mono,background:"rgba(95,170,136,.18)",color:"#5fdc9a",border:"1px solid rgba(95,170,136,.25)"}}>{m}</span>
                        ))}
                        {EX_META[exMetaKey(ex.e)].s.slice(0,2).map(m=>(
                          <span key={m} style={{padding:"2px 7px",borderRadius:8,fontSize:8,fontFamily:mono,background:"rgba(136,120,192,.08)",color:C2.purple,border:"1px solid rgba(136,120,192,.2)"}}>{m}</span>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,marginLeft:8}}>
                    {/* Botón TÉCNICA */}
                    {EX_META[exMetaKey(ex.e)]&&(
                      <button onClick={()=>setTechOpen(techOpen===ei?null:ei)}
                        style={{padding:"4px 8px",borderRadius:7,border:"1px solid rgba(106,143,192,.3)",background:"rgba(106,143,192,.08)",color:C2.blue,fontSize:8,fontFamily:mono,letterSpacing:.5,cursor:"pointer",whiteSpace:"nowrap"}}>
                        TÉCNICA
                      </button>
                    )}
                    {/* Note button */}
                    <button onClick={()=>{setNoteText(notes[ei]||"");setNoteOpen(ei);}}
                      style={{background:"none",border:"none",cursor:"pointer",padding:4,color:notes[ei]?C2.yellow:C2.tx3,opacity:notes[ei]?1:.5,flexShrink:0}}>
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M2 10.5V12h1.5l5.5-5.5-1.5-1.5L2 10.5zM11.7 3.3a1 1 0 000-1.4l-.6-.6a1 1 0 00-1.4 0L8.5 2.5 10 4l1.7-1.7z" fill="currentColor"/>
                      </svg>
                    </button>
                  </div>
                </div>
                {/* Panel de técnica expandible */}
                {techOpen===ei&&EX_META[exMetaKey(ex.e)]&&(
                  <div style={{background:C2.bgD,borderRadius:10,padding:12,marginTop:10,animation:"fu .2s ease"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      {EX_META[exMetaKey(ex.e)].steps.map((s,si)=>(
                        <div key={si} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                          <div style={{width:18,height:18,borderRadius:"50%",background:"#424858",display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:C2.tx3,flexShrink:0,fontFamily:mono}}>{si+1}</div>
                          <div style={{fontSize:11,color:C2.tx2,lineHeight:1.5}}>{s}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{display:"flex",alignItems:"center",gap:12,marginTop:5}}>
                  <span style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:1.5}}>{ex.r}</span>
                  {prevKg&&<span style={{fontFamily:mono,fontSize:9,color:C2.tx3}}>ant: <span style={{color:C2.tx2}}>{prevKg}kg × {prevRp}</span></span>}
                  {exStarted&&<span style={{fontFamily:mono,fontSize:8,color:exDone?C2.green:C2.tx3,background:exDone?"rgba(95,170,136,.12)":"rgba(255,255,255,.05)",border:`1px solid ${exDone?"rgba(95,170,136,.25)":"rgba(82,90,110,.3)"}`,borderRadius:20,padding:"2px 8px",letterSpacing:1}}>
                    {sets[ei].filter(s=>s.done).length}/{sets[ei].length}
                  </span>}
                </div>
                {/* Volume */}
                {vol>0&&(
                  <div style={{fontFamily:mono,fontSize:9,color:C2.tx3,letterSpacing:1.5,marginTop:3}}>
                    VOL <span style={{color:C2.blue,fontWeight:400}}>{vol}kg</span>
                  </div>
                )}
                {/* Note preview */}
                {notes[ei]&&(
                  <div style={{fontFamily:mono,fontSize:9,color:C2.yellow,letterSpacing:.5,marginTop:4,opacity:.7,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    ✏ {notes[ei]}
                  </div>
                )}
              </div>

              {/* Sets table */}
              <div style={{padding:"10px 20px 0"}}>
                {/* Header */}
                <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 44px",padding:"0 0 5px",borderBottom:"1px solid rgba(82,90,110,.4)"}}>
                  {["SET","KG","REPS","✓"].map((h,i)=>(
                    <span key={i} style={{fontFamily:mono,fontSize:7,color:"rgba(255,255,255,.55)",letterSpacing:3,textAlign:i===0?"left":"center",textTransform:"uppercase"}}>{h}</span>
                  ))}
                </div>
                {sets[ei].map((s,si)=>{
                  // Suggestion arrow
                  const curKg=parseFloat(s.kg)||0;
                  const pKg=prevKg?+prevKg:null;
                  const suggest=pKg&&si===0?(curKg>pKg?"↑":curKg===pKg?"=":"↓"):null;
                  const suggestColor=suggest==="↑"?"#3fcf8e":suggest==="↓"?"#f0b429":"rgba(255,255,255,.2)";

                  return(
                    <div key={si} id={`setrow-${ei}-${si}`} data-tour={ei===0&&si===0?"ws-sets":undefined}
                      style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 44px",
                        alignItems:"stretch",minHeight:50,
                        borderBottom:si<sets[ei].length-1?"1px solid rgba(82,90,110,.2)":"none",
                        background:s.done?"rgba(63,207,142,.05)":"transparent",

// ── Muscle XP System ─────────────────────────────────────────────────────
const XP_THRESHOLDS=[0,400,1300,3100,6300,11800,20800,34800,55800,85800]; // index = level-1
const XP_LEVEL_COLORS=[
  '#3a3f4a', // Nv1 gris azulado
  '#2d4a6e', // Nv2 azul oscuro
  '#1a6b8a', // Nv3 azul
  '#1a8a6b', // Nv4 verde azul
  '#2da84a', // Nv5 verde
  '#8ab82d', // Nv6 verde amarillo
  '#e8a020', // Nv7 naranja
  '#e86020', // Nv8 naranja rojo
  '#e83020', // Nv9 rojo
  '#ff1a1a', // Nv10 rojo intenso
];
function xpToLevel(xp){
  for(let i=XP_THRESHOLDS.length-1;i>=0;i--){if(xp>=XP_THRESHOLDS[i])return i+1;}
  return 1;
}
function xpForNextLevel(level){return level>=10?Infinity:XP_THRESHOLDS[level];}
function xpLevelColor(level){return XP_LEVEL_COLORS[Math.min(9,Math.max(0,level-1))];}

// ── ACWR Calculation ─────────────────────────────────────────────────────────
function computeACWR(loads){
  // loads = {date: kg, ...}
  const today=new Date();
  let acute=0, chronic=0;
  // Acute = sum of last 7 days; Chronic = average weekly load over last 28 days
  for(let i=0;i<28;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const v=loads[key]||0;
    if(i<7) acute+=v;
    chronic+=v;
  }
  const weeklyAvg=chronic/4; // chronic / 4 weeks = average weekly load
  // Only show ratio if there are 7+ days of data in the last 28 days
  const daysWithData=Object.keys(loads).filter(k=>{const d=new Date(k);return(new Date()-d)/86400000<=28;}).length;
  const ratio=weeklyAvg>0&&daysWithData>=7?Math.round((acute/weeklyAvg)*100)/100:0;
  return{acute:Math.round(acute),chronic:Math.round(chronic),ratio,loads};
}

                  const zone=!hasRatio?"none":ratio<0.8?"low":ratio<=1.3?"ok":ratio<=1.5?"caution":"danger";

                    caution: lang==="es"?"PRECAUCIÓN":"CAUTION",

            {/* -- VOLUMEN SEMANAL POR MÚSCULO -- */}
                {(()=>{

                    pecho:lang==="es"?"Pecho":"Chest",

                    romboides:lang==="es"?"Espalda":"Back",

                    hombro_izq:lang==="es"?"Hombros":"Shoulders",

                    bicep_izq:lang==="es"?"Bíceps":"Biceps",

                    tricep_izq:lang==="es"?"Tríceps":"Triceps",
                    tricep_der:lang==="es"?"Tríceps":"Triceps",
                    antebrazo_izq:lang==="es"?"Antebrazos":"Forearms",
                    antebrazo_der:lang==="es"?"Antebrazos":"Forearms",
                    quad:lang==="es"?"Cuádriceps":"Quads",
                    isquiotibiales:lang==="es"?"Isquios":"Hamstrings",

                    [lang==="es"?"Tríceps":"Triceps"]:"#c08878",
                    [lang==="es"?"Cuádriceps":"Quads"]:"#78b878",
                    [lang==="es"?"Isquios":"Hamstrings"]:"#a8c060",
                    [lang==="es"?"Glúteos":"Glutes"]:"#d07050",
                    [lang==="es"?"Abdomen":"Core"]:"#a0a0c0",
                    [lang==="es"?"Gemelos":"Calves"]:"#80c0a8",
                  };
                  // Science-based volume landmarks (sets/week)
                  const mev={  // Minimum Effective Volume
                    [lang==="es"?"Pecho":"Chest"]:8,
                    [lang==="es"?"Espalda":"Back"]:8,
                    [lang==="es"?"Hombros":"Shoulders"]:6,
                    [lang==="es"?"Bíceps":"Biceps"]:6,
                    [lang==="es"?"Tríceps":"Triceps"]:6,
                    [lang==="es"?"Cuádriceps":"Quads"]:8,
                    [lang==="es"?"Isquios":"Hamstrings"]:6,
                    [lang==="es"?"Glúteos":"Glutes"]:4,
                    [lang==="es"?"Abdomen":"Core"]:4,
                    [lang==="es"?"Gemelos":"Calves"]:4,
                  };
                  const mrv={  // Maximum Recoverable Volume
                    [lang==="es"?"Pecho":"Chest"]:22,
                    [lang==="es"?"Espalda":"Back"]:25,
                    [lang==="es"?"Hombros":"Shoulders"]:20,
                    [lang==="es"?"Bíceps":"Biceps"]:20,
                    [lang==="es"?"Tríceps":"Triceps"]:18,
                    [lang==="es"?"Cuádriceps":"Quads"]:20,
                    [lang==="es"?"Isquios":"Hamstrings"]:16,
                    [lang==="es"?"Glúteos":"Glutes"]:16,
                    [lang==="es"?"Abdomen":"Core"]:16,
                    [lang==="es"?"Gemelos":"Calves"]:16,
                  };

                  const vol={};
                  if(routine) routine.forEach((day,di)=>{
                    if(!day) return;
                    day.ex.forEach(ex=>{
                      if(!done[`${di}-${ex.id}`]) return;
                      const nameLow = ex.e.toLowerCase().trim();
                      // Resolve to english key via ES_TO_META
                      const engKey = ES_TO_META[nameLow] || nameLow;
                      // Get muscle data
                      const md = EXERCISE_MUSCLE_MAP[engKey] || EXERCISE_MUSCLE_MAP[nameLow];
                      if(!md) return;
                      // Primary muscles get full sets, secondary get 0.5
                      const seen = new Set();
                      (md.p||[]).forEach(muscle=>{
                        const zone = FORJA_TO_ZONE[muscle.toLowerCase()];
                        if(!zone) return;
                        const group = zoneToGroup[zone];
                        if(!group || seen.has(group)) return;
                        seen.add(group);
                        vol[group] = (vol[group]||0) + (ex.s||3);
                      });
                      (md.s||[]).forEach(muscle=>{
                        const zone = FORJA_TO_ZONE[muscle.toLowerCase()];
                        if(!zone) return;
                        const group = zoneToGroup[zone];
                        if(!group || seen.has(group)) return;
                        seen.add(group);
                        vol[group] = (vol[group]||0) + Math.ceil((ex.s||3)*0.5);
                      });
                    });

                          {lang==="es"?"primario · ½ sec":"primary · ½ sec"}

                        </div>

                            {c:"#BFA98A",  t:lang==="es"?"Barra dorada = en rango óptimo":"Gold = in optimal range",

                                <div style={{fontSize:8,color:C.tx3,lineHeight:1.5,marginTop:1}}>{row.s}</div>

                            <span style={{color:"rgba(255,255,255,.65)"}}>MEV</span>
                            {lang==="es"?" = mínimo para crecer  ":" = minimum to grow  "}
                            <span style={{color:"rgba(255,255,255,.65)"}}>MRV</span>
                            {lang==="es"?" = máximo recuperable":" = maximum recoverable"}
                          </div>
                        </div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {entries.length===0?(
                          <div style={{padding:"24px 16px",textAlign:"center"}}>
                            <div style={{fontSize:28,marginBottom:8,opacity:0.3}}>📊</div>
                            <div style={{color:"rgba(255,255,255,0.4)",fontFamily:"'SF Mono','Fira Code',monospace",
                              fontSize:9,letterSpacing:2,lineHeight:1.8}}>

                              <div style={{opacity:0.6}}>{lang==="es"?"PARA VER TU VOLUMEN":"TO SEE YOUR VOLUME"}</div>
                            </div>
                          </div>

                          const color = groupColor[m] || C.tx3;
                          const target = mev[m] || 8;
                          const max = mrv[m] || 20;
                          const pct = Math.min(100, (s/max)*100);
                          const atMev = s >= target;
                          const atMrv = s >= max;
                          return(
                          <div key={m}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                              <div style={{fontSize:10,fontFamily:mono,color,width:76,flexShrink:0,letterSpacing:.3,fontWeight:600}}>{m}</div>

                              </div>
                            </div>
                            <div style={{display:"flex",justifyContent:"space-between",paddingLeft:84}}>
                              <div style={{fontSize:8,fontFamily:mono,color:"#9aa3b8",letterSpacing:.5}}>
                                MEV {target}{cap[0]} · MRV {max}{cap[0]}
                              </div>
                              <div style={{fontSize:7,fontFamily:mono,letterSpacing:.5,
                                color:atMrv?"#e05555":atMev?"#BFA98A":"rgba(255,255,255,.4)"}}>
                                {atMrv?(lang==="es"?"⚠ máx":"⚠ max"):atMev?"✓":(lang==="es"?"↑ acumular":"↑ add more")}
                              </div>
                            </div>
                          </div>
                        );})
                      }
                      </div>
                    </div>
                  );
                })()}
