                          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"center"}}>
                            <div onClick={(e)=>{e.stopPropagation();setDrawerEx(isDrawerOpen?null:ex);}} style={{
                              padding:"3px 7px",borderRadius:6,fontSize:8,fontFamily:mono,letterSpacing:.5,
                              background:"rgba(106,143,192,.12)",border:"1px solid rgba(106,143,192,.25)",
                              color:C.blue,cursor:"pointer",whiteSpace:"nowrap",
                            }}>INFO</div>
                            <div onClick={()=>{
                              const r=[...manualRoutine];const cur=r[catalogDay]||[];
                              r[catalogDay]=added?cur.filter(x=>x!==ex):[...cur,ex];setManualRoutine(r);
                            }} style={{
                              width:22,height:22,borderRadius:"50%",flexShrink:0,
                              border:`1.5px solid ${added?C.green:C.borderL}`,
                              background:added?C.green:"transparent",
                              display:"flex",alignItems:"center",justifyContent:"center",
                              fontSize:12,color:added?C.white:"transparent",transition:"all .15s",cursor:"pointer",
                            }}>{added?"✓":""}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </React.Fragment>
                );
              })}
            </div>

            <div style={{display:"flex",gap:10}}>
              <div style={{flex:1}}><Btn ghost onClick={()=>setStep(22)}>{t.back}</Btn></div>
              <div style={{flex:2}}><Btn onClick={finishManual} disabled={manualSelDays.some((_,i)=>(manualRoutine[i]||[]).length===0)}>{t.go}</Btn></div>
            </div>
          </>)}
        </div>
      )}
    </div>
  );
}


function MuscleHeatmap({muscleVol,lang}){
  const cRef=React.useRef(null);
  const renRef=React.useRef(null);
  const mdlRef=React.useRef(null);
  const frameRef=React.useRef(null);
  const[status,setStatus]=React.useState("CARGANDO...");
  const mono="'SF Mono','Courier New',monospace";
  const es=lang==="es";

  // Smooth gaussian heatmap using world-space normalized coordinates
  function applyHeatmap(obj, muscleVol){
    const totalVol=Object.values(muscleVol||{}).reduce((a,b)=>a+b,0);
    if(!muscleVol||totalVol===0){
      obj.traverse(function(c){
        if(c.isMesh) c.material=new THREE.MeshBasicMaterial({color:0xb0b4c0,vertexColors:false});
      });
      return;
    }
    const maxV=Math.max(...Object.values(muscleVol),1);
    const mv={};
    Object.keys(muscleVol).forEach(k=>{ mv[k]=Math.min(1,(muscleVol[k]||0)/maxV); });
    const THR=0.25;
    const vt=k=>(mv[k]||0)>=THR?mv[k]:0;
    const wb=new THREE.Box3().setFromObject(obj);
    const yMin=wb.min.y, yH=(wb.max.y-wb.min.y)||1;
    const xMaxAbs=Math.max(Math.abs(wb.min.x),Math.abs(wb.max.x))||1;
    const zMaxAbs=Math.max(Math.abs(wb.min.z),Math.abs(wb.max.z),0.01);
    function G(x,c,s){ return Math.exp(-Math.pow(x-c,2)/(2*s*s)); }

    // MUSCLE POSITIONS — derived from pixel measurements on REAL MODEL renders
    // yToYn formula: yn = 1-(py-28)/387 where py=pixel y on 260x420 render
    // pecho cy=118→yn=0.767 | delt cy=98→yn=0.819 | biceps cy=140→yn=0.711
    // abs cy=172→yn=0.628  | dorsal cy=178→yn=0.612 | trap cy=100→yn=0.814
    // ANATOMICAL MUSCLE DEFINITIONS — strict front/back, 2D-verified positions
    const _AX=0.50,_AY=-0.16,_AL2=0.2756;
    function armT(xn,yn){return((xn-0.45)*_AX+(yn-0.73)*_AY)/_AL2;}
    function G(x,c,s){return Math.exp(-Math.pow(x-c,2)/(2*s*s));}
    const DEFS={
      "pectoral mayor":{
        zone:function(yn,xn,zn,a,l,t){return t&&zn>0.10&&yn>0.76&&yn<0.87&&xn<0.32;},
        pk:[[0.807,0.110,0.025,0.058,1.0],[0.805,0.192,0.025,0.052,0.9],[0.800,0.258,0.022,0.040,0.7],[0.810,0.058,0.020,0.038,0.8]],
        front:true,useT:false
      },
      "core (transverso abdominal)":{
        zone:function(yn,xn,zn,a,l,t){return t&&zn>0.10&&yn>0.58&&yn<0.72&&xn<0.10;},
        pk:[[0.700,0.050,0.020,0.035,0.9],[0.678,0.055,0.018,0.033,0.9],[0.655,0.050,0.018,0.031,0.8]],
        front:true,useT:false
      },
      "trapecio superior":{
        zone:function(yn,xn,zn,a,l,t){return t&&zn<-0.10&&yn>0.78&&yn<0.89&&xn<0.22;},
        pk:[[0.842,0.075,0.020,0.052,1.0],[0.840,0.148,0.020,0.045,0.8],[0.844,0.035,0.016,0.035,0.9]],
        front:false,useT:false
      },
      "dorsal ancho":{
        zone:function(yn,xn,zn,a,l,t){return t&&zn<-0.10&&yn>0.54&&yn<0.76&&xn<0.32;},
        pk:[[0.690,0.085,0.048,0.055,1.0],[0.675,0.178,0.043,0.062,0.9],[0.662,0.252,0.036,0.048,0.8],[0.702,0.110,0.036,0.058,0.9]],
        front:false,useT:false
      },
      "glúteo mayor":{
        zone:function(yn,xn,zn,a,l,t){
          if(t&&zn<-0.10&&yn>0.44&&yn<0.58&&xn<0.24) return true;
          if(!a&&!t&&yn>=0.35&&yn<0.44&&zn<-0.05) return true;
          return false;
        },
        pk:[[0.510,0.110,0.036,0.060,1.0],[0.498,0.188,0.032,0.052,0.9],[0.398,0.130,0.028,0.055,0.9],[0.385,0.200,0.026,0.048,0.8]],
        front:false,useT:false
      },
      "deltoides anterior":{
        zone:function(yn,xn,zn,a,l,t){if(!a)return false;var at=armT(xn,yn);return at>=-0.05&&at<0.20;},
        front:true,useT:true,tPk:[[0.10,0.050,1.0]]
      },
      "deltoides posterior":{
        zone:function(yn,xn,zn,a,l,t){if(!a)return false;var at=armT(xn,yn);return at>=-0.05&&at<0.20;},
        front:false,useT:true,tPk:[[0.10,0.050,1.0]]
      },
      "bíceps braquial":{
        zone:function(yn,xn,zn,a,l,t){if(!a)return false;var at=armT(xn,yn);return at>=0.18&&at<0.42;},
        front:true,useT:true,tPk:[[0.28,0.050,1.0]]
      },
      "tríceps braquial":{
        zone:function(yn,xn,zn,a,l,t){if(!a)return false;var at=armT(xn,yn);return at>=0.18&&at<0.42;},
        front:false,useT:true,tPk:[[0.28,0.050,1.0]]
      },
      "braquiorradial":{
        zone:function(yn,xn,zn,a,l,t){if(!a)return false;var at=armT(xn,yn);return at>=0.42&&at<0.80;},
        front:null,useT:true,tPk:[[0.58,0.080,1.0]]
      },
      "braquial":{
        zone:function(yn,xn,zn,a,l,t){if(!a)return false;var at=armT(xn,yn);return at>=0.42&&at<0.80;},
        front:null,useT:true,tPk:[[0.58,0.080,1.0]]
      },
      "cuádriceps":{
        zone:function(yn,xn,zn,a,l,t){return !a&&yn>=0.33&&yn<0.44;},
        pk:[[0.409,0.170,0.030,0.055,1.0],[0.398,0.222,0.028,0.045,0.9],[0.398,0.115,0.028,0.040,0.9],[0.380,0.165,0.028,0.052,0.8]],
        front:true,useT:false
      },
      "isquiotibiales":{
        zone:function(yn,xn,zn,a,l,t){return !a&&yn>=0.33&&yn<0.44;},
        pk:[[0.398,0.170,0.028,0.055,1.0],[0.375,0.175,0.026,0.052,0.9],[0.350,0.170,0.024,0.048,0.8]],
        front:false,useT:false
      },
      "gastrocnemio":{
        zone:function(yn,xn,zn,a,l,t){return !a&&yn>=0.08&&yn<0.22;},
        pk:[[0.152,0.225,0.028,0.048,1.0],[0.155,0.282,0.026,0.042,0.9],[0.140,0.252,0.030,0.050,0.8]],
        front:false,useT:false
      },
    };

    obj.traverse(function(c){
      if(!c.isMesh) return;
      const geo=c.geometry, pos=geo.attributes.position;
      if(!pos) return;
      const col=new Float32Array(pos.count*3);
      for(let i=0;i<pos.count;i++){
        const wy=pos.getY(i)*obj.scale.y+obj.position.y;
        const wx=pos.getX(i)*obj.scale.x;
        const wz=pos.getZ(i)*obj.scale.z;
        const yn=(wy-yMin)/yH, xn=Math.abs(wx)/xMaxAbs, zn=wz/zMaxAbs;
        const isArm=xn>=0.45&&yn>=0.50&&yn<=0.82;
        const isLeg=yn<0.44&&!isArm;
        const isTorso=!isArm&&!isLeg&&yn>=0.44;
        const fB=1/(1+Math.exp(-zn*8)), bB=1-fB;
        let h=0;
        for(var mName in DEFS){
          var vol=vt(mName);if(vol<=0)continue;
          var D=DEFS[mName];
          if(!D.zone(yn,xn,zn,isArm,isLeg,isTorso))continue;
          var pH=0;
          if(D.useT&&D.tPk){
            var at2=armT(xn,yn);
            for(var ti=0;ti<D.tPk.length;ti++)pH=Math.max(pH,D.tPk[ti][2]*G(at2,D.tPk[ti][0],D.tPk[ti][1]));
          } else if(D.pk){
            for(var pi=0;pi<D.pk.length;pi++)pH=Math.max(pH,D.pk[pi][4]*G(yn,D.pk[pi][0],D.pk[pi][2])*G(xn,D.pk[pi][1],D.pk[pi][3]));
          }
          var side=1;
          if(D.front===true)  side=fB>0.50?fB:0;
          if(D.front===false) side=bB>0.50?bB:0;
          h=Math.max(h,vol*pH*side);
        }
                h=Math.min(1,h);
        let r,g,b;
        if(h<0.03){ r=0.68;g=0.70;b=0.74; }
        else{
          const t=Math.min(1,Math.pow(h,0.50));
          if(t<0.4){const s=t/0.4;r=0.95;g=0.75-s*0.40;b=0.15-s*0.10;}
          else if(t<0.7){const s=(t-0.4)/0.3;r=0.95;g=0.35-s*0.20;b=0.05;}
          else{const s=(t-0.7)/0.3;r=0.95-s*0.10;g=0.15-s*0.12;b=0.02;}
        }
        col[i*3]=r; col[i*3+1]=g; col[i*3+2]=b;
      }
      geo.setAttribute('color',new THREE.BufferAttribute(col,3));
      c.material=new THREE.MeshBasicMaterial({vertexColors:true});
    });
  }

  React.useEffect(()=>{
    const cv=cRef.current;
    if(!cv) return;

    const ren=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:false});
    ren.setSize(240,380,false);
    ren.setPixelRatio(Math.min(devicePixelRatio,2));
    ren.setClearColor(0x383e4e,1);
    ren.toneMapping=THREE.ACESFilmicToneMapping;
    ren.toneMappingExposure=1.2;
    ren.outputEncoding=THREE.sRGBEncoding;
    ren.physicallyCorrectLights=true;
    renRef.current=ren;

    const sc=new THREE.Scene();
    // FOV 32 + camera pulled back → full body fits with no cropping
    const cam=new THREE.PerspectiveCamera(32,240/380,0.1,200);
    cam.position.set(0,-0.1,7.8);
    cam.lookAt(0,-0.1,0);

    const pmrem=new THREE.PMREMGenerator(ren);
    pmrem.compileEquirectangularShader();
    sc.add(new THREE.AmbientLight(0xffffff,0.4));
    const kl=new THREE.DirectionalLight(0xffffff,1.5);kl.position.set(3,5,4);sc.add(kl);
    const fl=new THREE.DirectionalLight(0x8899ff,0.5);fl.position.set(-4,1,-3);sc.add(fl);

    setStatus(es?"CARGANDO ENTORNO...":"LOADING ENV...");

    function loadModel(envReady){
      setStatus(es?"CARGANDO MODELO...":"LOADING MODEL...");
      new THREE.OBJLoader().load(
        'https://forjavideos.b-cdn.net/cuerpo.obj',
        function(obj){
          const box=new THREE.Box3().setFromObject(obj);
          const sz=box.getSize(new THREE.Vector3());
          const ct=box.getCenter(new THREE.Vector3());
          const s=3.6/Math.max(sz.x,sz.y,sz.z);
          obj.scale.setScalar(s);
          obj.position.sub(ct.multiplyScalar(s));
          // No Y offset — perfectly centered

          // Apply chrome material first
          obj.traverse(function(c){
            if(c.isMesh) c.material=new THREE.MeshStandardMaterial({
              color:0xffffff,metalness:1.0,roughness:0.03,envMapIntensity:2.5
            });
          });
          sc.add(obj);
          mdlRef.current=obj;
          if(muscleVol&&Object.keys(muscleVol).length>0) applyHeatmap(obj,muscleVol);
          setStatus("");
        },
        function(x){setStatus("OBJ "+(x.loaded/1048576).toFixed(1)+"MB / 25MB");},
        function(e){setStatus("ERROR: "+e);}
      );
    }

    new THREE.RGBELoader().load(
      'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_08_1k.hdr',
      function(hdr){
        sc.environment=pmrem.fromEquirectangular(hdr).texture;
        hdr.dispose();pmrem.dispose();
        loadModel(true);
      },
      undefined,
      function(){
        [[0xffffff,8,4,6,5],[0xaaddff,4,-5,3,-3],[0xffffff,5,0,-5,-4],[0xffffff,3,0,8,0]].forEach(function(p){
          const l=new THREE.PointLight(p[0],p[1],35);l.position.set(p[2],p[3],p[4]);sc.add(l);
        });
        loadModel(false);
      }
    );

    let drg=false,px=0,ry=0,vl=0; // ry=0: espalda visible por defecto // ry=0: back of model faces camera (espalda visible by default)
    const onD=function(e){drg=true;px=e.clientX;cv.style.cursor='grabbing';};
    const onU=function(){drg=false;cv.style.cursor='grab';};
    const onM=function(e){if(!drg||!mdlRef.current)return;const dx=e.clientX-px;ry+=dx*0.012;vl=dx*0.012;px=e.clientX;};
    const onTD=function(e){drg=true;px=e.touches[0].clientX;};
    const onTU=function(){drg=false;};
    const onTM=function(e){if(!drg||!mdlRef.current)return;const dx=e.touches[0].clientX-px;ry+=dx*0.012;vl=dx*0.012;px=e.touches[0].clientX;};
    cv.addEventListener('mousedown',onD);
    window.addEventListener('mouseup',onU);
    window.addEventListener('mousemove',onM);
    cv.addEventListener('touchstart',onTD,{passive:true});
    window.addEventListener('touchend',onTU);
    window.addEventListener('touchmove',onTM,{passive:true});
    cv.style.cursor='grab';

    function loop(){
      frameRef.current=requestAnimationFrame(loop);
      if(mdlRef.current){if(!drg){vl*=0.93;ry+=vl+0.004;}mdlRef.current.rotation.y=ry;}
      ren.render(sc,cam);
    }
    loop();

    return function(){
      cancelAnimationFrame(frameRef.current);
      cv.removeEventListener('mousedown',onD);
      window.removeEventListener('mouseup',onU);
      window.removeEventListener('mousemove',onM);
      cv.removeEventListener('touchstart',onTD);
      window.removeEventListener('touchend',onTU);
      window.removeEventListener('touchmove',onTM);
      ren.dispose();
    };
  },[]);

  React.useEffect(()=>{
    if(mdlRef.current&&muscleVol) applyHeatmap(mdlRef.current,muscleVol);
  },[JSON.stringify(muscleVol)]);

  const mv=muscleVol||{};
  const maxV=Math.max(...Object.values(mv),1);
  const activeMuscles=Object.entries(mv).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);

  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <div style={{position:"relative",width:240}}>
        <canvas ref={cRef} style={{width:240,height:380,borderRadius:12,display:"block"}}/>
        {status&&(
          <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",
            background:"rgba(44,48,64,.88)",borderRadius:8,padding:"4px 10px",
            fontSize:9,fontFamily:mono,color:"#6a8fc0",letterSpacing:1.5,whiteSpace:"nowrap"
          }}>{status}</div>
        )}
        <div style={{position:"absolute",top:8,right:8,
          background:"rgba(44,48,64,.7)",borderRadius:6,padding:"3px 7px",
          fontSize:8,fontFamily:mono,color:"#7a8294",letterSpacing:1
        }}>↔ {es?"GIRA":"DRAG"}</div>
      </div>

      {activeMuscles.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",maxWidth:260}}>
          {activeMuscles.map(function([k,v]){
            const p=v/maxV;
            const col=p<0.30?"#ff8c3c":p<0.65?"#ff3c3c":"#ff1010";
            return(
              <div key={k} style={{display:"flex",alignItems:"center",gap:4,
                padding:"3px 8px",borderRadius:10,
                background:"rgba(255,60,60,.08)",border:"1px solid rgba(255,60,60,.2)"
              }}>
                <div style={{width:5,height:5,borderRadius:"50%",background:col,flexShrink:0}}/>
                <span style={{fontSize:9,fontFamily:mono,color:col,letterSpacing:.5,textTransform:"capitalize"}}>{k}</span>
                <span style={{fontSize:8,fontFamily:mono,color:"#7a8294"}}>{Math.round(v/1000*10)/10}t</span>
              </div>
            );
          })}
        </div>
      )}
      {activeMuscles.length===0&&(
        <div style={{fontSize:10,fontFamily:mono,color:"#525a6e",letterSpacing:1}}>
          {es?"entrena para ver el mapa activo":"train to activate the map"}
        </div>
      )}
    </div>
  );
}

function StatsScreen({logs,routine,lang,profile}){
  const C={bg:"#383e4e",bgDeep:"#2c3040",card:"#424858",border:"#525a6e",borderL:"#4a5264",
    tx:"#F0F2F5",tx2:"#C8CDD8",tx3:"#7a8294",
    green:"#5faa88",blue:"#6a8fc0",yellow:"#c0a870",red:"#d96060",purple:"#8878c0"};
  const mono="'SF Mono','Courier New',monospace";
  const sans="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif";
  const es=lang==="es";
  const[selPR,setSelPR]=useState(null);

  // ── Datos ────────────────────────────────────────────────────────────
  // PRs
  const prs=Object.entries(logs).map(([id,entries])=>{
    if(!entries||!entries.length) return null;
    const best=entries.reduce((b,e)=>((e.rm||0)>(b.rm||0)?e:b),entries[0]);
    let name=id;
    if(routine) routine.forEach(d=>{if(!d)return;d.ex&&d.ex.forEach(e=>{if(e.id===id)name=e.e;})});
    // Historial de 1RM ordenado por fecha
    const hist=[...entries].sort((a,b)=>a.d.localeCompare(b.d)).map(e=>({d:e.d,rm:e.rm||0,w:e.w,r:e.r}));
    return {id,name,best1rm:best.rm||0,bestW:best.w,bestR:best.r,date:best.d,entries,hist};
  }).filter(Boolean).filter(p=>p.best1rm>0).sort((a,b)=>b.best1rm-a.best1rm);

  // Semana actual
  const today=new Date();
  const weekStart=new Date(today);
  // Semana empieza el lunes (getDay: 0=dom,1=lun,...6=sab)
  const dow=today.getDay();
  const daysToMon=dow===0?6:dow-1; // días desde el lunes anterior
  weekStart.setDate(today.getDate()-daysToMon);
  weekStart.setHours(0,0,0,0);
  const weekStr=weekStart.toISOString().slice(0,10);
  let weekVol=0,weekSets=0;
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{if(e.d>=weekStr){weekVol+=((+e.w||0)*(+e.r||0));weekSets++;}});
  });

  // Días entrenados últimas 12 semanas (grilla tipo GitHub)
  const WEEKS=12;
  const grid=Array.from({length:WEEKS},(_,wi)=>{
    return Array.from({length:7},(_,di)=>{
      const d=new Date(today);
      // di=0=lun, di=6=dom (consistente con lunes como inicio de semana)
      d.setDate(today.getDate()-daysToMon-((WEEKS-1-wi)*7)+di);
      d.setHours(0,0,0,0);
      const ds=d.toISOString().slice(0,10);
      let vol=0;
      Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d===ds)vol+=(+e.w||0)*(+e.r||0);}));
      return {ds,vol};
    });
  });

  // Volumen por músculo esta semana
  const muscleVol={};
  Object.entries(logs).forEach(([id,entries])=>{
    entries.forEach(e=>{
      if(e.d>=weekStr){
        let exName=id;
        if(routine) routine.forEach(d=>{if(!d)return;d.ex&&d.ex.forEach(ex=>{if(ex.id===id)exName=ex.e;})});
        const meta=EX_META[exName?.toLowerCase()];
        if(meta){
          const vol=(+e.w||0)*(+e.r||0);
          // Normalizar nombre del músculo primario
          const normalizeMuscle=(m)=>{
            if(!m) return m;
            if(m.includes('pectoral mayor')) return 'pectoral mayor';
            if(m.includes('bíceps braquial')||m==='bíceps') return 'bíceps braquial';
            if(m.includes('tríceps braquial')||m==='tríceps') return 'tríceps braquial';
            if(m.includes('deltoides anterior')||m==='deltoides') return 'deltoides anterior';
            if(m.includes('deltoides posterior')) return 'deltoides posterior';
            if(m.includes('trapecio')) return 'trapecio superior';
            if(m.includes('core')||m.includes('recto abdominal')||m.includes('oblicuos')) return 'core (transverso abdominal)';
            if(m.includes('glúteo')) return 'glúteo mayor';
            if(m.includes('gastrocnemio')||m==='gemelos') return 'gastrocnemio';
            if(m.includes('cuádriceps')||m==='recto femoral') return 'cuádriceps';
            if(m.includes('isquiotibiales')) return 'isquiotibiales';
            if(m.includes('dorsal')) return 'dorsal ancho';
            return m;
          };
          const primary=normalizeMuscle(meta.p[0]);
          muscleVol[primary]=(muscleVol[primary]||0)+vol;
          // Solo acumular secundarios directamente relevantes al heatmap (no anconeo, romboides, etc.)
          const HEATMAP_KEYS=new Set(['bíceps braquial','tríceps braquial','deltoides anterior',
            'deltoides posterior','trapecio superior','core (transverso abdominal)',
            'dorsal ancho','glúteo mayor','cuádriceps','isquiotibiales','gastrocnemio',
            'braquial','braquiorradial']);
          meta.s.forEach(sec=>{
            const ns=normalizeMuscle(sec);
            if(ns && HEATMAP_KEYS.has(ns) && ns!==primary)
              muscleVol[ns]=(muscleVol[ns]||0)+vol*0.20; // 20% para secundarios, no 40%
          });
        }
      }
    });
  });
  const mvArr=Object.entries(muscleVol).sort((a,b)=>b[1]-a[1]);
  const totalMV=mvArr.reduce((s,[,v])=>s+v,0)||1;

  // Mes actual
  const monthStr=today.toISOString().slice(0,7);
  const trainedDays=new Set();
  Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d&&e.d.startsWith(monthStr))trainedDays.add(e.d);}));

  // ── STREAK — días consecutivos entrenados ────────────────────────
  // Collect ALL trained days across all time
  const allTrainedDays=new Set();
  Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d)allTrainedDays.add(e.d);}));

  // Current streak: count back from today (or yesterday if today not trained)
  const todayStr=today.toISOString().slice(0,10);
  let streakCurrent=0;
  let streakCheck=new Date(today);
  // If today not trained yet, start counting from yesterday
  if(!allTrainedDays.has(todayStr)) streakCheck.setDate(streakCheck.getDate()-1);
  while(true){
    const ds=streakCheck.toISOString().slice(0,10);
    if(!allTrainedDays.has(ds)) break;
    streakCurrent++;
    streakCheck.setDate(streakCheck.getDate()-1);
    if(streakCurrent>365) break; // safety
  }

  // Best streak ever
  const sortedDays=[...allTrainedDays].sort();
  let streakBest=0,streakTemp=0;
  for(let i=0;i<sortedDays.length;i++){
    if(i===0){streakTemp=1;}
    else{
      const prev=new Date(sortedDays[i-1]);
      const curr=new Date(sortedDays[i]);
      const diff=(curr-prev)/(1000*60*60*24);
      if(diff===1){streakTemp++;}
      else{streakTemp=1;}
    }
    if(streakTemp>streakBest) streakBest=streakTemp;
  }
  if(streakCurrent>streakBest) streakBest=streakCurrent;

  // This week's training days (Mon–Sun)
  const weekDaysTrained=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);
    const ds=d.toISOString().slice(0,10);
    return{ds,trained:allTrainedDays.has(ds),isToday:ds===todayStr,isFuture:ds>todayStr};
  });

  // PR seleccionado para el sparkline
  const prView=selPR!==null?prs[selPR]:prs[0];

  // Colores por músculo
  const muscleColor={"pectoral mayor":C.blue,"dorsal ancho":C.green,"cuádriceps":C.red,
    "isquiotibiales":C.yellow,"glúteo mayor":C.purple,"deltoides anterior":C.blue,
    "bíceps braquial":C.green,"tríceps braquial":C.yellow};

  if(prs.length===0&&weekVol===0) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,gap:12}}>
      <div style={{fontSize:32,opacity:.3}}>📊</div>
      <div style={{fontFamily:mono,fontSize:10,color:C.tx3,letterSpacing:2,textAlign:"center"}}>
        {es?"COMPLETA TU PRIMER ENTRENO":"COMPLETE YOUR FIRST WORKOUT"}<br/>
        <span style={{fontSize:9,opacity:.6}}>{es?"tus stats aparecerán aquí":"your stats will appear here"}</span>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:24}}>

      {/* ── HERO: PR principal ───────────────────────────────────────── */}
      {prView&&(
        <div style={{
          background:`linear-gradient(135deg, #2c3040 0%, #383e4e 100%)`,
          borderRadius:20,padding:"20px 18px 18px",marginBottom:12,
          border:`1px solid ${C.borderL}`,position:"relative",overflow:"hidden",
        }}>
          {/* Background glow */}
          <div style={{position:"absolute",top:-40,right:-40,width:140,height:140,borderRadius:"50%",
            background:"rgba(106,143,192,.12)",filter:"blur(30px)",pointerEvents:"none"}}/>

          <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:3,marginBottom:16}}>
            🏆 {es?"MEJOR PR ACTIVO":"TOP PR"}
          </div>

          {/* Nombre del ejercicio */}
          <div style={{fontSize:11,fontFamily:mono,color:C.tx3,letterSpacing:1,marginBottom:4,textTransform:"uppercase"}}>{prView.name}</div>

          {/* 1RM grande */}
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:14}}>
            <div style={{fontSize:52,fontWeight:900,letterSpacing:-3,color:C.tx,lineHeight:1,fontFamily:sans}}>{prView.best1rm}</div>
            <div style={{fontSize:14,fontFamily:mono,color:C.tx3,fontWeight:400}}>kg<br/><span style={{fontSize:9}}>1RM est.</span></div>
          </div>

          {/* Detalle del set */}
          <div style={{display:"flex",gap:16,marginBottom:18}}>
            <div>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:2}}>{es?"PESO":"WEIGHT"}</div>
              <div style={{fontSize:18,fontWeight:700,color:C.tx}}>{prView.bestW}<span style={{fontSize:10,color:C.tx3,fontWeight:400}}>kg</span></div>
            </div>
            <div style={{width:1,background:C.borderL}}/>
            <div>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:2}}>REPS</div>
              <div style={{fontSize:18,fontWeight:700,color:C.tx}}>{prView.bestR}</div>
            </div>
            <div style={{width:1,background:C.borderL}}/>
            <div>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:2}}>{es?"FECHA":"DATE"}</div>
              <div style={{fontSize:13,fontWeight:600,color:C.tx2}}>{prView.date}</div>
            </div>
          </div>

          {/* Sparkline de progresión */}
          {prView.hist&&prView.hist.length>1&&(()=>{
            const vals=prView.hist.map(h=>h.rm).filter(v=>v>0);
            if(vals.length<2) return null;
            const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
            const W=280,H=40;
            const pts=vals.map((v,i)=>`${(i/(vals.length-1))*W},${H-((v-mn)/rng)*H}`).join(" ");
            const last=vals[vals.length-1],prev=vals[vals.length-2];
            const up=last>=prev;
            return(
              <div>
                <svg width="100%" viewBox={`0 0 ${W} ${H+8}`} style={{overflow:"visible"}}>
                  <polyline points={pts} fill="none" stroke={up?C.green:C.red} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" opacity=".9"/>
                  {vals.map((v,i)=>{
                    const cx=(i/(vals.length-1))*W,cy=H-((v-mn)/rng)*H;
                    return <circle key={i} cx={cx} cy={cy} r={i===vals.length-1?3.5:2} fill={i===vals.length-1?(up?C.green:C.red):C.borderL}/>;
                  })}
                </svg>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                  <div style={{fontSize:8,fontFamily:mono,color:C.tx3}}>{prView.hist[0]?.d}</div>
                  <div style={{fontSize:9,fontFamily:mono,color:up?C.green:C.red}}>
                    {up?"↑":"↓"} {Math.abs(last-prev)}kg {es?"vs anterior":"vs prev"}
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ── SELECTOR DE PRs ─────────────────────────────────────────── */}
      {prs.length>1&&(
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
          {prs.slice(0,8).map((pr,i)=>(
            <button key={pr.id} onClick={()=>setSelPR(i)} style={{
              flexShrink:0,padding:"7px 12px",borderRadius:20,
              border:`1px solid ${(selPR===i||(selPR===null&&i===0))?C.blue:C.borderL}`,
              background:(selPR===i||(selPR===null&&i===0))?"rgba(106,143,192,.12)":"transparent",
              color:(selPR===i||(selPR===null&&i===0))?C.blue:C.tx3,
              fontSize:10,fontFamily:mono,letterSpacing:.5,cursor:"pointer",
              whiteSpace:"nowrap",transition:"all .15s",
            }}>
              {pr.name} <span style={{opacity:.6}}>{pr.best1rm}kg</span>
            </button>
          ))}
        </div>
      )}

      {/* ── MUSCLE HEATMAP ──────────────────────────────────────────── */}
      <div style={{background:C.card,borderRadius:16,padding:"16px",marginBottom:12,border:`1px solid ${C.borderL}`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:12,textTransform:"uppercase",alignSelf:"flex-start"}}>
          💪 {es?"MÚSCULOS ESTA SEMANA":"MUSCLES THIS WEEK"}
        </div>
        <MuscleHeatmap muscleVol={muscleVol} totalVol={totalMV} lang={lang}/>
        {totalMV===0&&(
          <div style={{fontSize:10,fontFamily:mono,color:C.tx3,marginTop:8,letterSpacing:1}}>
            {es?"entrena para ver el mapa activo":"train to see the active map"}
          </div>
        )}
      </div>

      {/* ── STREAK ──────────────────────────────────────────────────── */}
      <div style={{
        background:streakCurrent>=3
          ?`linear-gradient(135deg,rgba(192,112,40,.18) 0%,rgba(217,96,60,.08) 100%)`
          :C.card,
        borderRadius:16,padding:"16px 18px",marginBottom:12,
        border:`1px solid ${streakCurrent>=3?"rgba(217,140,60,.35)":C.borderL}`,
        position:"relative",overflow:"hidden",
      }}>
        {/* Glow fondo si racha activa */}
        {streakCurrent>=3&&<div style={{position:"absolute",top:-30,right:-20,width:120,height:120,
          borderRadius:"50%",background:"rgba(217,120,40,.15)",filter:"blur(30px)",pointerEvents:"none"}}/>}

        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
          <div>
            <div style={{fontSize:8,fontFamily:mono,color:streakCurrent>=3?C.yellow:C.tx3,
              letterSpacing:2,marginBottom:4,textTransform:"uppercase"}}>
              {es?"RACHA ACTUAL":"CURRENT STREAK"}
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <div style={{fontSize:48,fontWeight:900,letterSpacing:-2,
                color:streakCurrent>=7?C.yellow:streakCurrent>=3?"#ff8c3c":C.tx,
                lineHeight:1,fontFamily:sans,
              }}>{streakCurrent}</div>
              <div style={{fontSize:13,fontFamily:mono,color:C.tx3,fontWeight:400}}>
                {es?"días":"days"}
              </div>
              {streakCurrent>=3&&<div style={{fontSize:24}}>{streakCurrent>=7?"🔥":"⚡"}</div>}
            </div>
            {streakCurrent===0&&(
              <div style={{fontSize:10,fontFamily:mono,color:C.tx3,marginTop:4}}>
                {es?"entrena hoy para empezar":"train today to start"}
              </div>
            )}
          </div>
          {streakBest>0&&(
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:3,textTransform:"uppercase"}}>
                {es?"mejor racha":"best streak"}
              </div>
              <div style={{fontSize:22,fontWeight:900,color:C.tx3,letterSpacing:-1,fontFamily:sans}}>
                {streakBest}
                <span style={{fontSize:10,fontWeight:400,color:C.tx3,marginLeft:3}}>{es?"días":"d"}</span>
              </div>
              {streakCurrent===streakBest&&streakBest>1&&(
                <div style={{fontSize:8,fontFamily:mono,color:C.yellow,letterSpacing:1}}>RÉCORD 🏆</div>
              )}
            </div>
          )}
        </div>

        {/* Dots de la semana — L M X J V S D */}
        <div>
          <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:8,textTransform:"uppercase"}}>
            {es?"esta semana":"this week"}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {weekDaysTrained.map(({ds,trained,isToday,isFuture},i)=>{
              const labels=es?["L","M","X","J","V","S","D"]:["M","T","W","T","F","S","S"];
              const col=trained?C.green:isToday?"rgba(95,170,136,.3)":C.border;
              const borderCol=isToday?C.green:trained?C.green:C.borderL;
              return(
                <div key={ds} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{
                    width:"100%",aspectRatio:"1",borderRadius:"50%",
                    background:isFuture?"transparent":col,
                    border:`1.5px solid ${isFuture?C.borderL+"44":borderCol}`,
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:8,color:trained?C.white:isToday?C.green:C.tx3,
                    fontFamily:mono,fontWeight:trained?700:400,
                    boxShadow:trained?`0 0 8px rgba(95,170,136,.4)`:"none",
                    transition:"all .2s",
                  }}>
                    {trained?"✓":isToday?"·":""}
                  </div>
                  <div style={{fontSize:8,fontFamily:mono,
                    color:isToday?C.green:trained?C.tx2:C.tx3,
                    fontWeight:isToday?700:400,
                  }}>{labels[i]}</div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Mensaje motivacional según racha */}
        {streakCurrent>0&&(
          <div style={{marginTop:12,padding:"8px 12px",borderRadius:10,
            background:"rgba(255,255,255,.04)",border:`1px solid ${C.borderL}33`,
          }}>
            <div style={{fontSize:10,fontFamily:mono,color:C.tx3,letterSpacing:.5}}>
              {streakCurrent>=14?es?"🔥 Imparable. Sigue así.":"🔥 Unstoppable. Keep going."
              :streakCurrent>=7 ?es?"⚡ Una semana seguida. Eres consistente.":"⚡ A full week. You're consistent."
              :streakCurrent>=3 ?es?"💪 Buen ritmo. No pares ahora.":"💪 Good rhythm. Don't stop now."
              :                   es?"✓ Empezando la racha. Mañana es clave.":"✓ Streak started. Tomorrow is key."}
            </div>
          </div>
        )}
      </div>

      {/* ── STATS RÁPIDAS ───────────────────────────────────────────── */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
        {[
          {l:es?"VOL SEMANA":"WEEK VOL",v:weekVol>999?(weekVol/1000).toFixed(1)+"t":weekVol+"kg",s:`${weekSets} sets`,c:C.blue},
          {l:es?"DÍAS/MES":"DAYS/MO",v:String(trainedDays.size),s:es?"este mes":"this month",c:C.green},
          {l:"PRs",v:String(prs.length),s:es?"ejercicios":"exercises",c:C.yellow},
        ].map(({l,v,s,c})=>(
          <div key={l} style={{background:C.card,borderRadius:14,padding:"12px 10px",textAlign:"center",border:`1px solid ${C.borderL}`}}>
            <div style={{fontSize:7,fontFamily:mono,color:C.tx3,letterSpacing:1.5,marginBottom:6,textTransform:"uppercase"}}>{l}</div>
            <div style={{fontSize:24,fontWeight:900,letterSpacing:-1,color:c,lineHeight:1,fontFamily:sans}}>{v}</div>
            <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginTop:4}}>{s}</div>
          </div>
        ))}
      </div>

      {/* ── GRILLA DE ACTIVIDAD ─────────────────────────────────────── */}
      <div style={{background:C.card,borderRadius:16,padding:"14px 16px",marginBottom:12,border:`1px solid ${C.borderL}`}}>
        <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:12,textTransform:"uppercase"}}>
          {es?"ACTIVIDAD — ÚLTIMAS 12 SEMANAS":"ACTIVITY — LAST 12 WEEKS"}
        </div>
        {/* Días de la semana labels */}
        <div style={{display:"flex",gap:3,marginBottom:4}}>
          {(es?["","L","","X","","V",""]:["","M","","W","","F",""]).map((d,i)=>(
            <div key={i} style={{width:14,fontSize:7,fontFamily:mono,color:C.tx3,textAlign:"center"}}>{d}</div>
          ))}
        </div>
        {/* Grilla */}
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {/* Transponer: mostrar por semanas horizontales */}
          {Array.from({length:7},(_,di)=>(
            <div key={di} style={{display:"flex",gap:3}}>
              {grid.map((week,wi)=>{
                const cell=week[di];
                if(!cell) return <div key={wi} style={{width:14,height:14}}/>;
                const lvl=cell.vol===0?0:cell.vol<5000?1:cell.vol<15000?2:3;
                const bg=lvl===0?C.border:lvl===1?"rgba(106,143,192,.35)":lvl===2?"rgba(106,143,192,.65)":C.blue;
                const isFuture=cell.ds>today.toISOString().slice(0,10);
                return(
                  <div key={wi} title={`${cell.ds}${cell.vol>0?" · "+Math.round(cell.vol/1000)+"t":""}`}
                    style={{width:14,height:14,borderRadius:3,
                      background:isFuture?"transparent":bg,
                      border:isFuture?`1px solid ${C.borderL}33`:"none",
                      transition:"background .2s",cursor:cell.vol>0?"pointer":"default",
                    }}/>
                );
              })}
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,alignItems:"center"}}>
          <div style={{fontSize:8,fontFamily:mono,color:C.tx3}}>12 {es?"semanas":"weeks"}</div>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{fontSize:7,fontFamily:mono,color:C.tx3}}>{es?"menos":"less"}</div>
            {[C.border,"rgba(106,143,192,.35)","rgba(106,143,192,.65)",C.blue].map((c,i)=>(
              <div key={i} style={{width:10,height:10,borderRadius:2,background:c}}/>
            ))}
            <div style={{fontSize:7,fontFamily:mono,color:C.tx3}}>{es?"más":"more"}</div>
          </div>
        </div>
      </div>

      {/* ── VOLUMEN POR MÚSCULO ─────────────────────────────────────── */}
      {mvArr.length>0&&(
        <div style={{background:C.card,borderRadius:16,padding:"14px 16px",marginBottom:12,border:`1px solid ${C.borderL}`}}>
          <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:16,textTransform:"uppercase"}}>
            💪 {es?"DISTRIBUCIÓN MUSCULAR — ESTA SEMANA":"MUSCLE SPLIT — THIS WEEK"}
          </div>
          <div style={{display:"flex",gap:16,alignItems:"center"}}>
            {/* Donut chart SVG */}
            {(()=>{
              const R=42,r=26,cx=52,cy=52;
              let angle=-Math.PI/2;
              const colors=[C.blue,C.green,C.red,C.yellow,C.purple,"#5faaaa","#aa8878"];
              const slices=mvArr.map(([m,v],i)=>{
                const pct=v/totalMV;
                const a1=angle,a2=angle+pct*Math.PI*2;
                angle=a2;
                const x1=cx+R*Math.cos(a1),y1=cy+R*Math.sin(a1);
                const x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
                const ix1=cx+r*Math.cos(a1),iy1=cy+r*Math.sin(a1);
                const ix2=cx+r*Math.cos(a2),iy2=cy+r*Math.sin(a2);
                const large=pct>.5?1:0;
                const path=`M ${ix1} ${iy1} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${r} ${r} 0 ${large} 0 ${ix1} ${iy1} Z`;
                return {path,color:colors[i%colors.length],muscle:m,pct,vol:v};
              });
              return(
                <svg width="104" height="104" style={{flexShrink:0}}>
                  {slices.map((s,i)=>(
                    <path key={i} d={s.path} fill={s.color} opacity=".85" stroke={C.card} strokeWidth="1.5"/>
                  ))}
                  <circle cx={cx} cy={cy} r={r-1} fill={C.bgDeep}/>
                  <text x={cx} y={cy-4} textAnchor="middle" fill={C.tx} fontSize="11" fontWeight="900" fontFamily={sans}>{Math.round(totalMV/1000*10)/10}</text>
                  <text x={cx} y={cy+9} textAnchor="middle" fill={C.tx3} fontSize="8" fontFamily={mono}>ton</text>
                </svg>
              );
            })()}
            {/* Leyenda */}
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
              {mvArr.slice(0,5).map(([m,v],i)=>{
                const colors=[C.blue,C.green,C.red,C.yellow,C.purple];
                const pct=Math.round(v/totalMV*100);
                return(
                  <div key={m}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:colors[i%colors.length],flexShrink:0}}/>
                        <div style={{fontSize:10,color:C.tx2,textTransform:"capitalize"}}>{m}</div>
                      </div>
                      <div style={{fontSize:9,fontFamily:mono,color:C.tx3}}>{pct}%</div>
                    </div>
                    <div style={{height:3,background:C.border,borderRadius:2}}>
                      <div style={{height:"100%",width:`${pct}%`,background:colors[i%colors.length],borderRadius:2,transition:"width .5s",opacity:.8}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── TOP PRs LIST ─────────────────────────────────────────────── */}
      {prs.length>0&&(
        <div style={{background:C.card,borderRadius:16,padding:"14px 16px",border:`1px solid ${C.borderL}`}}>
          <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:14,textTransform:"uppercase"}}>
            {es?"TODOS LOS PRs":"ALL PRs"} <span style={{opacity:.5}}>({prs.length})</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:0}}>
            {prs.map((pr,i)=>{
              const prev=pr.hist&&pr.hist.length>1?pr.hist[pr.hist.length-2]?.rm:null;
              const delta=prev?pr.best1rm-prev:null;
              return(
                <div key={pr.id} onClick={()=>setSelPR(i)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",
                    borderBottom:i<prs.length-1?`1px solid ${C.borderL}33`:"none",
                    cursor:"pointer",transition:"opacity .15s",
                    opacity:(selPR===i||(selPR===null&&i===0))?1:.75,
                  }}>
                  {/* Rank */}
                  <div style={{
                    width:20,height:20,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:8,fontFamily:mono,color:i<3?["#c0a870","#9aa0b0","#c07060"][i]:C.tx3,
                    fontWeight:700,
                  }}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                  {/* Nombre */}
                  <div style={{flex:1,fontSize:12,color:C.tx,textTransform:"capitalize",fontWeight:500,
                    whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{pr.name}</div>
                  {/* Delta */}
                  {delta!==null&&delta!==0&&(
                    <div style={{fontSize:9,fontFamily:mono,color:delta>0?C.green:C.red,flexShrink:0}}>
                      {delta>0?"+":""}{delta}
                    </div>
                  )}
                  {/* 1RM */}
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:15,fontWeight:900,color:C.tx,letterSpacing:-.5,fontFamily:sans}}>{pr.best1rm}<span style={{fontSize:8,fontWeight:400,color:C.tx3}}>kg</span></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


function App(){
  const[lang,setLang]=useState(null);
  const[step,setStep]=useState(0);
  const[profile,setProfile]=useState(null);
  const[routine,setRoutine]=useState(null);
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    try{const p=store.get("fv8p");if(p){const d=JSON.parse(p.value);setProfile(d);setLang(d.lang);const r=store.get("fv8r");if(r)setRoutine(JSON.parse(r.value));setStep(99);}}catch(_){}
    setReady(true);
  },[]);

  const sp=useCallback(p=>{setProfile(p);store.set("fv8p",JSON.stringify(p));},[]);
  const sr=useCallback(r=>{setRoutine(r);store.set("fv8r",JSON.stringify(r));},[]);

  if(!ready)return <div style={{minHeight:"100vh",background:"#383e4e"}}/>;
  if(step<99)return <Onboard lang={lang} setLang={setLang} step={step} setStep={setStep} sp={sp} sr={sr}/>;
  return <Main lang={lang} setLang={setLang} profile={profile} routine={routine} sp={sp} sr={sr} setStep={setStep}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
(function initDumbbell(){
  function tryInit(){
    const canvas = document.getElementById("forja-dumbbell-canvas");
    if(!canvas || !window.THREE) return;
    if(canvas.dataset.forjaInit) return;
    canvas.dataset.forjaInit="1";
    const wrap = canvas.parentElement;
    const W = wrap.offsetWidth||360;
    const H = wrap.offsetHeight||260;

    const renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46,W/H,0.1,100);
    camera.position.set(0,0,9.5);

    const parts = [
      {xC:0,     r:0.12, th:1.44, type:"cyl"},
      {xC:-0.80, r:0.20, th:0.09, type:"disc"},
      {xC: 0.80, r:0.20, th:0.09, type:"disc"},
      {xC:-0.99, r:1.20, th:0.11, type:"disc"},
      {xC: 0.99, r:1.20, th:0.11, type:"disc"},
      {xC:-1.19, r:0.88, th:0.10, type:"disc"},
      {xC: 1.19, r:0.88, th:0.10, type:"disc"},
      {xC:-1.36, r:0.58, th:0.09, type:"disc"},
      {xC: 1.36, r:0.58, th:0.09, type:"disc"},
      {xC:-1.48, r:0.10, th:0.10, type:"cyl"},
      {xC: 1.48, r:0.10, th:0.10, type:"cyl"},
    ];
    parts.forEach(p=>{ p.area = p.type==="cyl" ? p.th*p.r*2 : p.r*p.r; });
    const totalArea = parts.reduce((s,p)=>s+p.area,0);
    let acc=0;
    parts.forEach(p=>{ p.w=p.area/totalArea; p.cumW=acc+p.w; acc=p.cumW; });

    function samplePart(){
      const rnd=Math.random();
      const p=parts.find(p=>rnd<=p.cumW)||parts[parts.length-1];
      const a=Math.random()*Math.PI*2;
      if(p.type==="cyl") return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*Math.random()*p.r, z:Math.cos(a)*Math.random()*p.r};
      const rad=Math.sqrt(Math.random())*p.r;
      return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*rad, z:Math.cos(a)*rad};
    }

    const CORE=48000, DISP=42000, TOTAL=CORE+DISP;
    const pos=new Float32Array(TOTAL*3), col=new Float32Array(TOTAL*3);

    for(let i=0;i<CORE;i++){
      const s=samplePart();
      const zOff=(Math.random()-0.5)*0.26;
      pos[i*3]=s.x+(Math.random()-0.5)*0.020;
      pos[i*3+1]=s.y+(Math.random()-0.5)*0.020;
      pos[i*3+2]=s.z+zOff;
      const distR=Math.sqrt(s.y*s.y+s.z*s.z);
      const radialT=Math.min(distR/1.20,1.0);
      const depthT=(zOff+0.13)/0.26;
      const t=radialT*0.40+depthT*0.20+Math.random()*0.08;
      const v=0.70+t*0.30;
      // blanco puro en el centro, azulado en bordes
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const idx=CORE+i;
      const s=samplePart();
      const sx=s.x, sy=s.y, sz=s.z;
      const len=Math.sqrt(sy*sy+sz*sz)+0.001;
      const ny=sy/len, nz=sz/len;
      const nx=(Math.abs(sx)>0.8&&Math.abs(sy)<0.15&&Math.abs(sz)<0.15)?Math.sign(sx)*0.3:0;
      const eD=Math.pow(Math.random(),0.35)*7.0;
      const spread=1.4;
      const dx=nx+(Math.random()-0.5)*spread;
      const dy=ny+(Math.random()-0.5)*spread;
      const dz=nz+(Math.random()-0.5)*spread;
      const dlen=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
      pos[idx*3]=sx+(dx/dlen)*eD;
      pos[idx*3+1]=sy+(dy/dlen)*eD;
      pos[idx*3+2]=sz+(dz/dlen)*eD;
      const fadeT=eD/7.0;
      const op=Math.max(0,1.0-fadeT*0.88);
      // fade de blanco (#F0F2F5) hacia bg (#383e4e)
      col[idx*3]=0.94*op+0.22*(1-op);
      col[idx*3+1]=0.96*op+0.243*(1-op);
      col[idx*3+2]=1.0*op+0.306*(1-op);
    }

    const geo=new THREE.BufferGeometry();
    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",   new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:0.014,vertexColors:true,transparent:true,opacity:0.88,sizeAttenuation:true});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);

    let t=0, animId;
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      pts.rotation.y=Math.sin(t*0.45)*0.50;
      pts.rotation.x=Math.sin(t*0.28)*0.05;
      renderer.render(scene,camera);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){ cancelAnimationFrame(animId); } else { animate(); }
    });
  }

  window.addEventListener("forja:mount", tryInit);
  document.addEventListener("DOMContentLoaded", tryInit);
  window.addEventListener("load", tryInit);
  setInterval(tryInit, 200);
})();
</script>

(function initMeditation(){

    function diskColor(norm,doppler){
      let r,g,b;
      if(norm<0.05){r=1.00;g=0.97;b=0.90;}
      else if(norm<0.18){r=1.00;g=0.95;b=0.80;}

      else{r=0.52;g=0.25;b=0.08;}
      const bs=Math.max(0,doppler),ds=Math.max(0,-doppler);
      const boost=1+bs*1.8,dim=1-ds*0.72,blue=bs*0.10;
      return[Math.min(1,r*boost*dim),Math.min(1,(g+blue*0.04)*boost*dim),Math.min(1,(b+blue)*boost*dim)];

      dAng[i]=ang; dRad[i]=r;
      const norm=Math.min((r/G-1.08)/4.0,1);
      const doppler=Math.sin(ang-Math.PI*0.55);
      const[cr,cg,cb]=diskColor(norm,doppler);
      const br=(0.28+Math.random()*0.58)*(1-norm*0.65);
      dCol[i*3]=cr*br; dCol[i*3+1]=cg*br; dCol[i*3+2]=cb*br;
    }
    const dGeo=new THREE.BufferGeometry();
    dGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
    dGeo.setAttribute('color',new THREE.BufferAttribute(dCol,3));
    {const pts=new THREE.Points(dGeo,new THREE.PointsMaterial({
      size:0.018,vertexColors:true,transparent:true,
      opacity:0.92,sizeAttenuation:true,depthWrite:false
    }));pts.renderOrder=1;scene.add(pts);}

    // ── PHOTON RING ───────────────────────────────────────────────────
    {
      const N=6000,p=new Float32Array(N*3),c=new Float32Array(N*3);
      for(let i=0;i<N;i++){
        const ang=Math.random()*Math.PI*2,r=(1.01+Math.random()*0.07)*G;
        p[i*3]=Math.cos(ang)*r; p[i*3+1]=(Math.random()-0.5)*0.014+BH_Y; p[i*3+2]=Math.sin(ang)*r;
        const doppler=Math.sin(ang-Math.PI*0.55);
        const boost=1+Math.max(0,doppler)*2.0,blue=Math.max(0,doppler)*0.15;
        const br=Math.min(1,(0.60+Math.random()*0.40)*boost);
        c[i*3]=br; c[i*3+1]=br*(0.93+blue*0.04); c[i*3+2]=br*(0.78+blue);
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('color',new THREE.BufferAttribute(c,3));
      {const pts=new THREE.Points(g,new THREE.PointsMaterial({
        size:0.040,vertexColors:true,transparent:true,
        opacity:0.96,sizeAttenuation:true,depthWrite:false
      }));pts.renderOrder=1;scene.add(pts);}
    }

    // ── ARCO SUPERIOR (lente gravitacional) ───────────────────────────
    {
      const N=30000,p=new Float32Array(N*3),c=new Float32Array(N*3);
      for(let i=0;i<N;i++){
        const r=(1.10+Math.pow(Math.random(),0.44)*3.2)*G;
        const ang=Math.random()*Math.PI*2;
        const norm=Math.min((r/G-1.10)/3.2,1);
        // Limitar altura máxima — arco no sube más allá de BH_Y+0.55
        // para no tapar al mono que está en Y positivo
        const hRaw=(0.35+Math.exp(-(r/G-1.10)*0.85)*0.90+(Math.random()-0.5)*0.03)*G;
        const hClamped=Math.min(hRaw, 1.20); // arco rodea al mono
        p[i*3  ]=Math.cos(ang)*r*0.97;
        p[i*3+1]=hClamped+BH_Y;
        p[i*3+2]=Math.sin(ang)*r*0.15;
        const doppler=Math.sin(ang-Math.PI*0.55);
        const[cr,cg,cb]=diskColor(norm*1.1,doppler*0.8);
        const br=(0.16+Math.random()*0.32)*(1-norm*0.82);
        c[i*3]=Math.min(1,cr*br); c[i*3+1]=Math.min(1,cg*br); c[i*3+2]=Math.min(1,cb*br);
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('color',new THREE.BufferAttribute(c,3));
      {const pts=new THREE.Points(g,new THREE.PointsMaterial({
        size:0.018,vertexColors:true,transparent:true,
        opacity:0.82,sizeAttenuation:true,depthWrite:false
      }));pts.renderOrder=1;scene.add(pts);}
    }

    {

        const[cr,cg,cb]=diskColor(norm*1.2,doppler*0.6);

        c[i*3]=Math.min(1,cr*br); c[i*3+1]=Math.min(1,cg*br); c[i*3+2]=Math.min(1,cb*br);
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('color',new THREE.BufferAttribute(c,3));
      {const pts=new THREE.Points(g,new THREE.PointsMaterial({
        size:0.016,vertexColors:true,transparent:true,
        opacity:0.62,sizeAttenuation:true,depthWrite:false
      }));pts.renderOrder=1;scene.add(pts);}
    }

    // ── ESFERA NEGRA — tapa el disco pero el mono se agrega después ───
    // renderOrder negativo para que se dibuje antes que las partículas
    const sphere=new THREE.Mesh(
      new THREE.SphereGeometry(G*0.94,64,64),
      new THREE.MeshBasicMaterial({color:0x383e4e})
    );
    sphere.position.y=BH_Y;
    sphere.renderOrder=0;
    scene.add(sphere);

    // ── FIGURA PLATEADA ───────────────────────────────────────────────
    let figPts=null,T=0,animId=null;

    function loadImg(url,fb){
      const img=new Image();
      img.crossOrigin="anonymous";
      img.onload=()=>buildFigure(img);
      img.onerror=()=>{
        if(fb){const i2=new Image();i2.crossOrigin="anonymous";i2.onload=()=>buildFigure(i2);i2.onerror=()=>startAnim();i2.src=fb;}
        else startAnim();
      };
      img.src=url;
    }

    function buildFigure(img){
      const OW=320,OH=320;
      const off=document.createElement("canvas");
      off.width=OW;off.height=OH;
      const ctx=off.getContext("2d");
      ctx.drawImage(img,0,0,OW,OH);
      const data=ctx.getImageData(0,0,OW,OH).data;
      const pts2d=[];
      const yStart=Math.floor(OH*0.08),yMax=Math.floor(OH*0.86),yRange=yMax-yStart;
      for(let y=yStart;y<yMax;y++){
        for(let x=0;x<OW;x++){
          const i=(y*OW+x)*4,r=data[i],g=data[i+1],b=data[i+2];
          if(r*0.299+g*0.587+b*0.114>20)
            pts2d.push({nx:((x/OW)*2-1),ny:(1-((y-yStart)/yRange)*2),r:r/255,g:g/255,b:b/255});

      const sY=1.38;

      const FIG_Y=-0.20;

      // SPLIT_NY: puntos por debajo de esta línea van detrás del disco,
      // por encima van delante. ny=0 = centro del cuerpo.
      // Calibrado en prototipo: split en ny=0.00 (50% del cuerpo)
      const SPLIT_NY=0.0;

      const ptBottom=pts2d.filter(p=>p.ny<=SPLIT_NY);
      const ptTop   =pts2d.filter(p=>p.ny> SPLIT_NY);

      function makeLayer(pts,renderOrder){
        if(!pts.length) return null;
        const CORE=Math.min(pts.length*4,50000);
        const pos=new Float32Array(CORE*3),col=new Float32Array(CORE*3);
        for(let i=0;i<CORE;i++){
          const p=pts[Math.floor(Math.random()*pts.length)];
          pos[i*3  ]=p.nx*sX+(Math.random()-0.5)*0.008;
          pos[i*3+1]=p.ny*sY+FIG_Y+(Math.random()-0.5)*0.008;
          pos[i*3+2]=(Math.random()-0.5)*0.06;
          col[i*3]=p.r; col[i*3+1]=p.g; col[i*3+2]=p.b;
        }
        const geo=new THREE.BufferGeometry();
        geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
        geo.setAttribute('color',new THREE.BufferAttribute(col,3));
        const mesh=new THREE.Points(geo,new THREE.PointsMaterial({
          size:0.0095,vertexColors:true,transparent:true,
          opacity:0.98,sizeAttenuation:true,depthWrite:false,depthTest:false
        }));
        mesh.renderOrder=renderOrder;
        scene.add(mesh);
        return mesh;
      }

      // Bottom (piernas/cintura) → renderOrder 0 → detrás del disco (renderOrder 1)
      // Top (torso/cabeza)       → renderOrder 2 → delante del disco
      figPts = makeLayer(ptBottom, 0);
      const figTop = makeLayer(ptTop, 2);
      // Guardar ambos para la animación breathing
      figPts._top = figTop;

      startAnim();
    }

    function startAnim(){
      if(animId) cancelAnimationFrame(animId);
      function animate(){
        animId=requestAnimationFrame(animate);
        T+=0.003;

        // Rotación kepleriana
        const arr=dGeo.attributes.position.array;
        for(let i=0;i<DISC_N;i++){
          dAng[i]+=0.45/Math.pow(dRad[i]/G,1.5)*0.003;
          arr[i*3]=Math.cos(dAng[i])*dRad[i];
          arr[i*3+2]=Math.sin(dAng[i])*dRad[i];
        }
        dGeo.attributes.position.needsUpdate=true;

        // Figura: breathing — animar ambas capas juntas
        if(figPts){
          const by=Math.sin(T*0.45)*0.038;
          const bry=Math.sin(T*0.18)*0.045;
          const brx=Math.sin(T*0.13)*0.010;
          figPts.position.y=by; figPts.rotation.y=bry; figPts.rotation.x=brx;
          if(figPts._top){
            figPts._top.position.y=by;
            figPts._top.rotation.y=bry;
            figPts._top.rotation.x=brx;
          }
        }

        // Cámara: leve órbita
        camera.position.x=Math.sin(T*0.022)*0.4;
        camera.position.y=0.15+Math.sin(T*0.035)*0.10;
        camera.lookAt(0,-0.5,0);

        renderer.render(scene,camera);
      }
      animate();
      document.addEventListener("visibilitychange",()=>{
        if(document.hidden) cancelAnimationFrame(animId); else startAnim();
      });
    }

    loadImg(gender==="female"?FEMALE_URL:MALE_URL,gender==="female"?FEMALE_FB:MALE_FB);
  }

  window.addEventListener("forja:mount",tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit,300);
})();
</script>

<script>
(function initLogoParticles(){
  function tryInit(){
    const canvas=document.getElementById("forja-logo-canvas");
    if(!canvas||!window.THREE) return;
    if(canvas.dataset.linit) return;
    canvas.dataset.linit="1";

    const W=window.innerWidth||canvas.offsetWidth||360;
    const H=window.innerHeight||canvas.offsetHeight||640;

    const OW=800,OH=200; // canvas offscreen para renderizar "FORJA"
    const off=document.createElement("canvas");
    off.width=OW; off.height=OH;
    const ctx=off.getContext("2d");
    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,OW,OH);
    ctx.fillStyle="#000000";
    ctx.font="900 148px Arial Black,Arial,sans-serif";
    ctx.textBaseline="middle";
    ctx.textAlign="center";
    ctx.fillText("FORJA",OW/2,OH/2);

    // Samplear píxeles del texto
    const imgData=ctx.getImageData(0,0,OW,OH);
    const pts2d=[];    // todos los píxeles del texto (para el logo estático)
    const edge2d=[];   // solo bordes (para la explosión)

    for(let y=0;y<OH;y+=2){
      for(let x=0;x<OW;x+=2){
        const i=(y*OW+x)*4;
        const isDark=imgData.data[i]<140;
        if(!isDark) continue;
        pts2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});

        // Borde: al menos un vecino es blanco (fuera de la letra)
        const isEdge=(
          imgData.data[((y-2)*OW+x)*4]>140 ||
          imgData.data[((y+2)*OW+x)*4]>140 ||
          imgData.data[(y*OW+(x-2))*4]>140 ||
          imgData.data[(y*OW+(x+2))*4]>140
        );
        if(isEdge) edge2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});
      }
    }

    const renderer=new THREE.WebGLRenderer({canvas,antialias:false,alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene=new THREE.Scene();
    const aspect=W/H;
    // Canvas es ahora full viewport — frustum cubre todo
    const vRange=1.0;
    const cam=new THREE.OrthographicCamera(-aspect,aspect,vRange,-vRange,0.1,100);
    cam.position.set(0,0,10);

    const TOTAL=pts2d.length;
    const DISP=Math.floor(TOTAL*8);
    const pos=new Float32Array(TOTAL*3);
    const col=new Float32Array(TOTAL*3);
    const posD=new Float32Array(DISP*3);
    const colD=new Float32Array(DISP*3);

    // Texto en el tercio superior — partículas explotan hacia toda la pantalla
    const scaleX=aspect*0.90, scaleY=vRange*0.28;
    const textOffsetY=0.52; // offset hacia arriba
    const edgeSrc=edge2d.length>0?edge2d:pts2d;

    for(let i=0;i<TOTAL;i++){
      const p=pts2d[i];
      pos[i*3  ]=p.x*scaleX+(Math.random()-0.5)*0.012;
      pos[i*3+1]=p.y*scaleY+textOffsetY+(Math.random()-0.5)*0.012;
      pos[i*3+2]=(Math.random()-0.5)*0.03;
      const v=0.80+Math.random()*0.18;
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const src=edgeSrc[Math.floor(Math.random()*edgeSrc.length)];
      const cx=src.x, cy=src.y;
      const len=Math.sqrt(cx*cx+cy*cy)+0.001;
      const baseAngX=cx/len, baseAngY=cy/len;
      const deviation=(Math.random()-0.5)*Math.PI*1.2;
      const cosD=Math.cos(deviation), sinD=Math.sin(deviation);
      const dirX=baseAngX*cosD-baseAngY*sinD;
      const dirY=baseAngX*sinD+baseAngY*cosD;

      const u=Math.random();
      const eD=-Math.log(1-u*0.98)*0.55*aspect;
      const jitterD=(Math.random()-0.5)*0.3*aspect;
      const finalD=Math.max(0.1, eD+jitterD);

      posD[i*3  ]=src.x*scaleX+dirX*finalD;
      posD[i*3+1]=src.y*scaleY+textOffsetY+dirY*finalD; // Y sin compresión — pantalla completa
      posD[i*3+2]=(Math.random()-0.5)*0.6;

      const op=Math.max(0, Math.exp(-finalD/(aspect*0.5))*0.85*(0.5+Math.random()*0.5));
      colD[i*3  ]=0.94*op+0.22*(1-op);
      colD[i*3+1]=0.96*op+0.243*(1-op);
      colD[i*3+2]=1.0*op+0.306*(1-op);
    }

    const geoC=new THREE.BufferGeometry();
    geoC.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geoC.setAttribute("color",new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geoC,new THREE.PointsMaterial({size:0.020,vertexColors:true,transparent:true,opacity:0.95,sizeAttenuation:true})));

    const geoD=new THREE.BufferGeometry();
    geoD.setAttribute("position",new THREE.BufferAttribute(posD,3));
    geoD.setAttribute("color",new THREE.BufferAttribute(colD,3));
    const matD=new THREE.PointsMaterial({size:0.018,vertexColors:true,transparent:true,opacity:0.90,sizeAttenuation:true});
    const ptsD=new THREE.Points(geoD,matD);
    scene.add(ptsD);

    // Per-particle phase + speed para movimiento notorio e independiente
    const phases=Array.from({length:DISP},()=>Math.random()*Math.PI*2);
    const speeds=Array.from({length:DISP},()=>0.6+Math.random()*1.4); // más rápido
    const amps  =Array.from({length:DISP},()=>0.04+Math.random()*0.08); // muy notorio

    let t=0,animId;
    const posD0=new Float32Array(posD);
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      // Texto FORJA: wobble sutil
      scene.children[0].rotation.x=Math.sin(t*0.35)*0.04;
      scene.children[0].rotation.z=Math.sin(t*0.22)*0.012;
      // Partículas dispersas: drift independiente y notorio
      const arr=geoD.attributes.position.array;
      for(let i=0;i<DISP;i++){
        const ph=phases[i], sp=speeds[i], am=amps[i];
        arr[i*3  ]=posD0[i*3  ]+Math.sin(t*sp+ph)*am;
        arr[i*3+1]=posD0[i*3+1]+Math.cos(t*sp*0.7+ph)*am*0.7;
        arr[i*3+2]=posD0[i*3+2];
      }
      geoD.attributes.position.needsUpdate=true;
      renderer.render(scene,cam);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){cancelAnimationFrame(animId);}else{animate();}
    });
  }

  window.addEventListener("forja:mount", tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit, 200);
})();
</script>
