<script>
// ══ FORJA ONBOARDING ENGINE ══════════════════════════════════════════════════
// Check if already onboarded
function _foIsOnboarded() {
  try { return localStorage.getItem('forja_onboarded') === '1'; } catch(e) { return false; }
}
function _foMarkOnboarded() {
  try { localStorage.setItem('forja_onboarded', '1'); } catch(e) {}
}

function showForjaOnboarding() {
  localStorage.removeItem('forja_onboarded');
  state = { name:'', goal:null, days:null, mode:null, selectedDays:[] };
  currentScreen = 0;
  var ov = document.getElementById('forja-onboarding');
  if (!ov) return;
  ov.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active','exit'); });
  var s0 = document.getElementById('screen-0');
  if (s0) s0.classList.add('active');
  ['.opt.selected','.wday.selected','.day-pill.selected'].forEach(function(sel){document.querySelectorAll(sel).forEach(function(el){el.classList.remove('selected');});});
  var wn = document.getElementById('wday-note'); if(wn) wn.style.opacity='0';
  var bn = document.getElementById('btn-goal'); if(bn) bn.disabled=true;
  var bm = document.getElementById('btn-mode'); if(bm) bm.disabled=true;
  var bd = document.getElementById('btn-days'); if(bd) bd.disabled=true;
  var bna = document.getElementById('btn-name'); if(bna) bna.disabled=true;
  var ni = document.getElementById('name-input'); if(ni) ni.value='';
  var pw = document.getElementById('progress-wrap');
  if (pw) pw.style.opacity = '0';
  ov.classList.remove('hidden');
  ov.style.display = 'flex';
  ov.style.opacity = '1';
  if (typeof applyLang === 'function') applyLang();
}


// ── Init: show or hide onboarding on page load ──────────────────────────────
window.addEventListener('load', function() {
  var overlay = document.getElementById('forja-onboarding');
  if (!overlay) return;
  if (_foIsOnboarded()) {
    overlay.classList.add('hidden');
  } else {
    overlay.style.display = 'flex';
    applyLang(); // Apply default language
  }
});


// ── State ──────────────────────────────────────────────────────────────────
var state = { name:'', goal:null, days:null, mode:null };
var currentScreen = 0;
var TOTAL_STEPS = 4;

var DAY_NOTES = {
  '3': 'Perfecto para empezar. Lunes, miércoles y viernes.',
  '4': 'El balance ideal entre descanso y progreso.',
  '5': 'Alta frecuencia. Resultados más rápidos.',
  '6': 'Modo bestia. Asegúrate de descansar bien.',
};

// ── Navigation ─────────────────────────────────────────────────────────────
function goNext() {
  if (currentScreen === 0) {
    showProgressBar();
  }
  if (currentScreen < 5) {
    transitionTo(currentScreen + 1);
  }
}

function goBack() {
  if (currentScreen > 1) {
    transitionBack(currentScreen - 1);
  }
}

function transitionTo(n) {
  var old = document.getElementById('screen-' + currentScreen);
  var next = document.getElementById('screen-' + n);

  old.classList.remove('active');
  old.classList.add('exit');
  setTimeout(function() { old.classList.remove('exit'); }, 420);

  next.style.transform = 'translateX(48px)';
  next.style.opacity = '0';
  // Force reflow so CSS animations retrigger
  void next.offsetWidth;
  requestAnimationFrame(function() {
    next.style.transform = '';
    next.style.opacity = '';
    next.classList.add('active');
  });

  currentScreen = n;
  updateProgress();
  updateBackBtn();
}

function transitionBack(n) {
  var old = document.getElementById('screen-' + currentScreen);
  var prev = document.getElementById('screen-' + n);

  old.style.transition = 'opacity 0.35s, transform 0.35s';
  old.style.opacity = '0';
  old.style.transform = 'translateX(48px)';
  old.classList.remove('active');
  setTimeout(function() {
    old.style.transform = '';
    old.style.opacity = '';
    old.style.transition = '';
  }, 360);

  prev.style.transition = 'none';
  prev.style.transform = 'translateX(-48px)';
  prev.style.opacity = '0';
  prev.classList.add('active');
  requestAnimationFrame(function() {
    prev.style.transition = '';
    prev.style.transform = '';
    prev.style.opacity = '';
  });

  currentScreen = n;
  updateProgress();
  updateBackBtn();
}

function showProgressBar() {
  var el = document.getElementById('progress-wrap');
  el.style.transition = 'opacity 0.4s';
  el.style.opacity = '1';
}

function updateProgress() {
  if (currentScreen === 0 || currentScreen === 5) {
    document.getElementById('progress-wrap').style.opacity = '0';
    return;
  }
  document.getElementById('progress-wrap').style.opacity = '1';
  for (var i = 1; i <= TOTAL_STEPS; i++) {
    var fill = document.getElementById('p' + i);
    fill.style.width = (i < currentScreen) ? '100%' : (i === currentScreen ? '50%' : '0%');
  }
}

function updateBackBtn() {
  var btn = document.getElementById('back-btn');
  btn.classList.toggle('visible', currentScreen > 1 && currentScreen < 5);
}

// ── Option selection ───────────────────────────────────────────────────────
function selectOpt(el, group) {
  var siblings = el.parentElement.querySelectorAll('.opt');
  siblings.forEach(function(s) { s.classList.remove('selected'); });
  el.classList.add('selected');
  state[group] = el.dataset.val;

  var btnMap = { goal: 'btn-goal', mode: 'btn-mode' };
  var btn = document.getElementById(btnMap[group]);
  if (btn) btn.disabled = false;
}

function toggleWeekDay(el) {
  var day = parseInt(el.dataset.day);
  var sel = state.selectedDays || [];
  var idx = sel.indexOf(day);
  if (idx > -1) {
    sel.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    sel.push(day);
    el.classList.add('selected');
  }
  state.selectedDays = sel;
  state.days = String(sel.length);
  updateWdayNote();
  // Enable button only if at least 2 days selected (min meaningful routine)
  var btn = document.getElementById('btn-days');
  if (btn) btn.disabled = sel.length < 2;
}


function updateWdayNote() {
  var sel = state.selectedDays || [];
  var note = document.getElementById('wday-note');
  if (!note) return;
  var dayNames = {0:'Dom',1:'Lun',2:'Mar',3:'Mié',4:'Jue',5:'Vie',6:'Sáb'};
  if (sel.length === 0) {
    note.style.opacity = '0';
    return;
  }
  var sorted = sel.slice().sort(function(a,b){return a-b;});
  var names = sorted.map(function(d){return dayNames[d];}).join(' · ');
  note.textContent = sel.length + ' días — ' + names;
  note.style.opacity = '1';
  note.style.transition = 'opacity 0.3s';
}


function onNameChange() {
  var val = document.getElementById('name-input').value.trim();
  state.name = val;
  document.getElementById('btn-name').disabled = val.length < 2;
}

// ── Generating animation ───────────────────────────────────────────────────
function startGenerating() {
  var gen = document.getElementById('screen-generating');
  gen.classList.add('active');

  var fill = document.getElementById('gen-fill');
  var pct = 0;
  var step = 0;

  var interval = setInterval(function() {
    pct += 2;
    fill.style.width = Math.min(pct, 100) + '%';

    if (pct === 20 && step === 0) { showGenItem(0); step++; }
    if (pct === 45 && step === 1) { showGenItem(1); step++; }
    if (pct === 70 && step === 2) { showGenItem(2); step++; }
    if (pct === 90 && step === 3) { showGenItem(3); step++; }

    if (pct >= 100) {
      clearInterval(interval);
      setTimeout(function() {
        gen.classList.remove('active');
        // Celebrity mode: skip done screen, go directly to celebrity picker
        if (state.mode === 'celebrity') {
          finish();
        } else {
          showDoneScreen();
        }
      }, 600);
    }
  }, 30);
}

function showGenItem(idx) {
  var ids = ['gi1','gi2','gi3','gi4'];
  // Mark previous as done
  if (idx > 0) {
    var prev = document.getElementById(ids[idx-1]);
    prev.classList.add('done');
  }
  var el = document.getElementById(ids[idx]);
  el.classList.add('show');
}

// ── Done screen ────────────────────────────────────────────────────────────
var GOAL_LABELS = { muscle:'Ganar músculo', fat:'Quemar grasa', performance:'Rendimiento', active:'Mantenerse activo' };
var MODE_LABELS = { auto:'FORJA te genera la rutina ⚡', celebrity:'Modo Celebridad 🏆', builder:'Modo Constructor ⚒️', challenge:'Modo Reto 🤝' };

function showDoneScreen() {
  // Update name
  var n = state.name || '';
  var _dn = document.getElementById('done-name');
  if(_dn) _dn.textContent = n ? n + '.' : '';

  // Build chips
  var chips = document.getElementById('done-chips');
  chips.innerHTML = '';
  var info = [
    { text: state.days + ' días/semana', green: true },
    { text: GOAL_LABELS[state.goal] || '' },
    { text: MODE_LABELS[state.mode] || '' },
  ];
  info.forEach(function(c) {
    if (!c.text) return;
    var el = document.createElement('div');
    el.className = 'chip' + (c.green ? ' green' : '');
    el.textContent = c.text;
    chips.appendChild(el);
  });

  transitionTo(5);
}

  window._forjaOnboardingState = {};

function finish() {
  _foMarkOnboarded();
  // Map onboarding goal → FORJA goal
  var goalMap = { muscle:'muscle', fat:'general', performance:'general', active:'general' };
  var days = state.selectedDays ? state.selectedDays.length : parseInt(state.days || 3);
  var selDays = state.selectedDays || [1,3,5];
  var lang = (typeof LANG !== 'undefined' ? LANG : null) || 'es';
  // Build profile object matching FORJA's schema
  var profile = {
    lang: lang,
    goal: goalMap[state.goal] || 'general',
    level: 'int',
    days: days,
    selDays: selDays,
    mode: state.mode || 'auto',
    name: state.name || '',
    age: 25, weight: 75, height: 175, units: 'metric', gender: 'male'
  };
  // Pick default routine from RAW
  var routineKey = days + 'int';
  var routine = (typeof RAW !== 'undefined' && RAW[routineKey]) ? RAW[routineKey] : null;
  // Save to FStore (localStorage + Supabase)
  try {
    if (typeof FStore !== 'undefined') {
      FStore.saveProfile(profile, routine || []);
    } else {
      localStorage.setItem('fv8p', JSON.stringify(profile));
      if (routine) localStorage.setItem('fv8r', JSON.stringify(routine));
    }
  } catch(e) {}
  var targetStep = (state.mode === 'celebrity') ? 25 : 99;
  if (typeof window.__forjaOnboardingDone === 'function') {
    window.__forjaOnboardingDone(profile, routine, targetStep);
  }
  // Hide overlay — instant for celebrity (to show celeb picker immediately)
  var ov = document.getElementById('forja-onboarding');
  if (ov) {
    if (state.mode === 'celebrity') {
      ov.classList.add('hidden');
    } else {

// ── Victory stickman (canvas) ──────────────────────────────────────────────

function stickLoop() {
  if (currentScreen !== 5) return;
  sT += 1/60;
  requestAnimationFrame(stickLoop);

  sCtx.clearRect(0, 0, 120, 120);

  var jh = Math.max(0, Math.sin(sT * 1.5)) * 14;
  var w  = Math.sin(sT * 1.5) * 0.15;
  var CX = 60, GY = 95, SC = 1.0;
  var col = '#3fcf8e';
  var WC  = 'rgba(255,255,255,0.88)';
  var LW  = 4.5 * SC;
  var HR  = 8   * SC;

  // Joints
  var OX = CX, OY = GY;
function sk(x,y){ return {x: OX+x, y: OY-y}; }

  var joints = {
    hd:  sk(0,   64 + jh),
    nk:  sk(0,   50 + jh),
    hp:  sk(0,   28 + jh),
    ls:  sk(-11, 46 + jh),
    rs:  sk(11,  46 + jh),
    le:  sk(-20 + w*60, 58 + jh + w*40),
    re:  sk( 20 - w*60, 58 + jh - w*40),
    lh:  sk(-28 + w*80, 70 + jh + w*60),
    rh:  sk( 28 - w*80, 70 + jh - w*60),
    lhp: sk(-5,  28 + jh),
    rhp: sk( 5,  28 + jh),
    lk:  sk(-8,  14 + jh * 0.3),
    rk:  sk( 8,  14 + jh * 0.3),
    lf:  sk(-10, -2 + jh * 0.15),
    rf:  sk( 10, -2 + jh * 0.15),
  };

  sCtx.lineCap = 'round'; sCtx.lineJoin = 'round';
function bone(a, b, w2) {
    var bw = w2 || LW;
    sCtx.strokeStyle = WC;    sCtx.lineWidth = bw + 3.5;
    sCtx.beginPath(); sCtx.moveTo(a.x,a.y); sCtx.lineTo(b.x,b.y); sCtx.stroke();
    sCtx.strokeStyle = col;   sCtx.lineWidth = bw;
    sCtx.beginPath(); sCtx.moveTo(a.x,a.y); sCtx.lineTo(b.x,b.y); sCtx.stroke();
  }

  bone(joints.lhp, joints.lk); bone(joints.lk, joints.lf);
  bone(joints.rhp, joints.rk); bone(joints.rk, joints.rf);
  bone(joints.nk,  joints.hp, LW*1.35);
  bone(joints.ls,  joints.le); bone(joints.le, joints.lh);
  bone(joints.rs,  joints.re); bone(joints.re, joints.rh);

  sCtx.beginPath(); sCtx.arc(joints.hd.x, joints.hd.y, HR+2.5, 0, Math.PI*2);
  sCtx.fillStyle = WC; sCtx.fill();
  sCtx.beginPath(); sCtx.arc(joints.hd.x, joints.hd.y, HR, 0, Math.PI*2);
  sCtx.fillStyle = col; sCtx.fill();
}
