                    <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:2,transition:"width .6s"}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── MUSCLE HEATMAP ──────────────────────────────────────────── */}
      <div style={{background:C.card,borderRadius:16,padding:"16px",marginBottom:12,border:`1px solid ${C.borderL}`,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{fontSize:8,fontFamily:mono,color:C.tx3,letterSpacing:2,marginBottom:12,textTransform:"uppercase",alignSelf:"flex-start"}}>
          {recoveryArr.length>0?(es?"FATIGA MUSCULAR":"MUSCLE FATIGUE"):(es?"MÚSCULOS ESTA SEMANA":"MUSCLES THIS WEEK")}
        </div>

function App(){
  const[lang,setLang]=useState(null);
  const[step,setStep]=useState(0);
  const[profile,setProfile]=useState(null);
  const[routine,setRoutine]=useState(null);
  const[ready,setReady]=useState(false);

  useEffect(()=>{
    FStore.loadProfile().then(data=>{
      if(data&&data.profile){
        setProfile(data.profile);
        setLang(data.profile.lang||null);
        if(data.routine)setRoutine(data.routine);
        setStep(99);
      }
      setReady(true);
    }).catch(()=>setReady(true));
  },[]);

  const sp=useCallback(p=>{setProfile(p);},[]);
  const sr=useCallback(r=>{setRoutine(r);},[]);

  if(!ready)return <div style={{minHeight:"100vh",background:"#383e4e"}}/>;
  if(step<99)return <Onboard lang={lang} setLang={setLang} step={step} setStep={setStep} sp={sp} sr={sr}/>;
  return <Main lang={lang} setLang={setLang} profile={profile} routine={routine} sp={sp} sr={sr} setStep={setStep}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
(function initDumbbell(){
  function tryInit(){
    const canvas = document.getElementById("forja-dumbbell-canvas");
    if(!canvas || !window.THREE) return;
    if(canvas.dataset.forjaInit) return;
    canvas.dataset.forjaInit="1";
    const wrap = canvas.parentElement;
    const W = wrap.offsetWidth||360;
    const H = wrap.offsetHeight||260;

    const renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46,W/H,0.1,100);
    camera.position.set(0,0,9.5);

    const parts = [
      {xC:0,     r:0.12, th:1.44, type:"cyl"},
      {xC:-0.80, r:0.20, th:0.09, type:"disc"},
      {xC: 0.80, r:0.20, th:0.09, type:"disc"},
      {xC:-0.99, r:1.20, th:0.11, type:"disc"},
      {xC: 0.99, r:1.20, th:0.11, type:"disc"},
      {xC:-1.19, r:0.88, th:0.10, type:"disc"},
      {xC: 1.19, r:0.88, th:0.10, type:"disc"},
      {xC:-1.36, r:0.58, th:0.09, type:"disc"},
      {xC: 1.36, r:0.58, th:0.09, type:"disc"},
      {xC:-1.48, r:0.10, th:0.10, type:"cyl"},
      {xC: 1.48, r:0.10, th:0.10, type:"cyl"},
    ];
    parts.forEach(p=>{ p.area = p.type==="cyl" ? p.th*p.r*2 : p.r*p.r; });
    const totalArea = parts.reduce((s,p)=>s+p.area,0);
    let acc=0;
    parts.forEach(p=>{ p.w=p.area/totalArea; p.cumW=acc+p.w; acc=p.cumW; });

    function samplePart(){
      const rnd=Math.random();
      const p=parts.find(p=>rnd<=p.cumW)||parts[parts.length-1];
      const a=Math.random()*Math.PI*2;
      if(p.type==="cyl") return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*Math.random()*p.r, z:Math.cos(a)*Math.random()*p.r};
      const rad=Math.sqrt(Math.random())*p.r;
      return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*rad, z:Math.cos(a)*rad};
    }

    const CORE=48000, DISP=42000, TOTAL=CORE+DISP;
    const pos=new Float32Array(TOTAL*3), col=new Float32Array(TOTAL*3);

    for(let i=0;i<CORE;i++){
      const s=samplePart();
      const zOff=(Math.random()-0.5)*0.26;
      pos[i*3]=s.x+(Math.random()-0.5)*0.020;
      pos[i*3+1]=s.y+(Math.random()-0.5)*0.020;
      pos[i*3+2]=s.z+zOff;
      const distR=Math.sqrt(s.y*s.y+s.z*s.z);
      const radialT=Math.min(distR/1.20,1.0);
      const depthT=(zOff+0.13)/0.26;
      const t=radialT*0.40+depthT*0.20+Math.random()*0.08;
      const v=0.70+t*0.30;
      // blanco puro en el centro, azulado en bordes
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const idx=CORE+i;
      const s=samplePart();
      const sx=s.x, sy=s.y, sz=s.z;
      const len=Math.sqrt(sy*sy+sz*sz)+0.001;
      const ny=sy/len, nz=sz/len;
      const nx=(Math.abs(sx)>0.8&&Math.abs(sy)<0.15&&Math.abs(sz)<0.15)?Math.sign(sx)*0.3:0;
      const eD=Math.pow(Math.random(),0.35)*7.0;
      const spread=1.4;
      const dx=nx+(Math.random()-0.5)*spread;
      const dy=ny+(Math.random()-0.5)*spread;
      const dz=nz+(Math.random()-0.5)*spread;
      const dlen=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
      pos[idx*3]=sx+(dx/dlen)*eD;
      pos[idx*3+1]=sy+(dy/dlen)*eD;
      pos[idx*3+2]=sz+(dz/dlen)*eD;
      const fadeT=eD/7.0;
      const op=Math.max(0,1.0-fadeT*0.88);
      // fade de blanco (#F0F2F5) hacia bg (#383e4e)
      col[idx*3]=0.94*op+0.22*(1-op);
      col[idx*3+1]=0.96*op+0.243*(1-op);
      col[idx*3+2]=1.0*op+0.306*(1-op);
    }

    const geo=new THREE.BufferGeometry();
    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",   new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:0.014,vertexColors:true,transparent:true,opacity:0.88,sizeAttenuation:true});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);

    let t=0, animId;
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      pts.rotation.y=Math.sin(t*0.45)*0.50;
      pts.rotation.x=Math.sin(t*0.28)*0.05;
      renderer.render(scene,camera);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){ cancelAnimationFrame(animId); } else { animate(); }
    });
  }

  window.addEventListener("forja:mount", tryInit);
  document.addEventListener("DOMContentLoaded", tryInit);
  window.addEventListener("load", tryInit);
  setInterval(tryInit, 200);
})();
</script>

      {const pts=new THREE.Points(g,new THREE.PointsMaterial({

      }));pts.renderOrder=1;scene.add(pts);}

      const OW=320,OH=320;
      const off=document.createElement("canvas");
      off.width=OW;off.height=OH;
      const ctx=off.getContext("2d");
      ctx.drawImage(img,0,0,OW,OH);
      const data=ctx.getImageData(0,0,OW,OH).data;
      const pts2d=[];
      const yStart=Math.floor(OH*0.08),yMax=Math.floor(OH*0.86),yRange=yMax-yStart;
      for(let y=yStart;y<yMax;y++){
        for(let x=0;x<OW;x++){
          const i=(y*OW+x)*4,r=data[i],g=data[i+1],b=data[i+2];
          if(r*0.299+g*0.587+b*0.114>20)
            pts2d.push({nx:((x/OW)*2-1),ny:(1-((y-yStart)/yRange)*2),r:r/255,g:g/255,b:b/255});
        }
      }
      if(!pts2d.length){startAnim();return;}

      // sX se multiplica por aspect para compensar que la cámara
      // es más angosta en X (aspect=0.95) — así el mono no se estira
      const sY=1.38;
      const sX=sY*aspect; // ~1.31 — mantiene proporciones reales
      const FIG_Y=-0.20;

      // SPLIT_NY: puntos por debajo de esta línea van detrás del disco,
      // por encima van delante. ny=0 = centro del cuerpo.
      // Calibrado en prototipo: split en ny=0.00 (50% del cuerpo)
      const SPLIT_NY=0.0;

      const ptBottom=pts2d.filter(p=>p.ny<=SPLIT_NY);
      const ptTop   =pts2d.filter(p=>p.ny> SPLIT_NY);

      function makeLayer(pts,renderOrder){
        if(!pts.length) return null;
        const CORE=Math.min(pts.length*4,50000);
        const pos=new Float32Array(CORE*3),col=new Float32Array(CORE*3);
        for(let i=0;i<CORE;i++){
          const p=pts[Math.floor(Math.random()*pts.length)];
          pos[i*3  ]=p.nx*sX+(Math.random()-0.5)*0.008;
          pos[i*3+1]=p.ny*sY+FIG_Y+(Math.random()-0.5)*0.008;
          pos[i*3+2]=(Math.random()-0.5)*0.06;
          col[i*3]=p.r; col[i*3+1]=p.g; col[i*3+2]=p.b;
        }
        const geo=new THREE.BufferGeometry();
        geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
        geo.setAttribute('color',new THREE.BufferAttribute(col,3));
        const mesh=new THREE.Points(geo,new THREE.PointsMaterial({
          size:0.0095,vertexColors:true,transparent:true,
          opacity:0.98,sizeAttenuation:true,depthWrite:false,depthTest:false
        }));
        mesh.renderOrder=renderOrder;
        scene.add(mesh);
        return mesh;
      }

      // Bottom (piernas/cintura) → renderOrder 0 → detrás del disco (renderOrder 1)
      // Top (torso/cabeza)       → renderOrder 2 → delante del disco
      figPts = makeLayer(ptBottom, 0);
      const figTop = makeLayer(ptTop, 2);
      // Guardar ambos para la animación breathing
      figPts._top = figTop;

      startAnim();
    }

    function startAnim(){
      if(animId) cancelAnimationFrame(animId);
      function animate(){
        animId=requestAnimationFrame(animate);
        T+=0.003;

        // Rotación kepleriana
        const arr=dGeo.attributes.position.array;
        for(let i=0;i<DISC_N;i++){
          dAng[i]+=0.45/Math.pow(dRad[i]/G,1.5)*0.003;
          arr[i*3]=Math.cos(dAng[i])*dRad[i];
          arr[i*3+2]=Math.sin(dAng[i])*dRad[i];
        }
        dGeo.attributes.position.needsUpdate=true;

        // Figura: breathing — animar ambas capas juntas
        if(figPts){
          const by=Math.sin(T*0.45)*0.038;
          const bry=Math.sin(T*0.18)*0.045;
          const brx=Math.sin(T*0.13)*0.010;
          figPts.position.y=by; figPts.rotation.y=bry; figPts.rotation.x=brx;
          if(figPts._top){
            figPts._top.position.y=by;
            figPts._top.rotation.y=bry;
            figPts._top.rotation.x=brx;
          }
        }

        // Cámara: leve órbita
        camera.position.x=Math.sin(T*0.022)*0.4;
        camera.position.y=0.15+Math.sin(T*0.035)*0.10;
        camera.lookAt(0,-0.5,0);

        renderer.render(scene,camera);
      }
      animate();
      document.addEventListener("visibilitychange",()=>{
        if(document.hidden) cancelAnimationFrame(animId); else startAnim();
      });
    }

    loadImg(gender==="female"?FEMALE_URL:MALE_URL,gender==="female"?FEMALE_FB:MALE_FB);
  }

  window.addEventListener("forja:mount",tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit,300);
})();
</script>

<script>
(function initLogoParticles(){
  function tryInit(){
    const canvas=document.getElementById("forja-logo-canvas");
    if(!canvas||!window.THREE) return;
    if(canvas.dataset.linit) return;
    canvas.dataset.linit="1";

    const W=window.innerWidth||canvas.offsetWidth||360;
    const H=window.innerHeight||canvas.offsetHeight||640;

    const OW=800,OH=200; // canvas offscreen para renderizar "FORJA"
    const off=document.createElement("canvas");
    off.width=OW; off.height=OH;
    const ctx=off.getContext("2d");
    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,OW,OH);
    ctx.fillStyle="#000000";
    ctx.font="900 148px Arial Black,Arial,sans-serif";
    ctx.textBaseline="middle";
    ctx.textAlign="center";
    ctx.fillText("FORJA",OW/2,OH/2);

    // Samplear píxeles del texto
    const imgData=ctx.getImageData(0,0,OW,OH);
    const pts2d=[];    // todos los píxeles del texto (para el logo estático)
    const edge2d=[];   // solo bordes (para la explosión)

    for(let y=0;y<OH;y+=2){
      for(let x=0;x<OW;x+=2){
        const i=(y*OW+x)*4;
        const isDark=imgData.data[i]<140;
        if(!isDark) continue;
        pts2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});

        // Borde: al menos un vecino es blanco (fuera de la letra)
        const isEdge=(
          imgData.data[((y-2)*OW+x)*4]>140 ||
          imgData.data[((y+2)*OW+x)*4]>140 ||
          imgData.data[(y*OW+(x-2))*4]>140 ||
          imgData.data[(y*OW+(x+2))*4]>140
        );
        if(isEdge) edge2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});
      }
    }

    const renderer=new THREE.WebGLRenderer({canvas,antialias:false,alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene=new THREE.Scene();
    const aspect=W/H;
    // Canvas es ahora full viewport — frustum cubre todo
    const vRange=1.0;
    const cam=new THREE.OrthographicCamera(-aspect,aspect,vRange,-vRange,0.1,100);
    cam.position.set(0,0,10);

    const TOTAL=pts2d.length;
    const DISP=Math.floor(TOTAL*8);
    const pos=new Float32Array(TOTAL*3);
    const col=new Float32Array(TOTAL*3);
    const posD=new Float32Array(DISP*3);
    const colD=new Float32Array(DISP*3);

    // Texto en el tercio superior — partículas explotan hacia toda la pantalla
    const scaleX=aspect*0.90, scaleY=vRange*0.28;
    const textOffsetY=0.52; // offset hacia arriba
    const edgeSrc=edge2d.length>0?edge2d:pts2d;

    for(let i=0;i<TOTAL;i++){
      const p=pts2d[i];
      pos[i*3  ]=p.x*scaleX+(Math.random()-0.5)*0.012;
      pos[i*3+1]=p.y*scaleY+textOffsetY+(Math.random()-0.5)*0.012;
      pos[i*3+2]=(Math.random()-0.5)*0.03;
      const v=0.80+Math.random()*0.18;
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const src=edgeSrc[Math.floor(Math.random()*edgeSrc.length)];
      const cx=src.x, cy=src.y;
      const len=Math.sqrt(cx*cx+cy*cy)+0.001;
      const baseAngX=cx/len, baseAngY=cy/len;
      const deviation=(Math.random()-0.5)*Math.PI*1.2;
      const cosD=Math.cos(deviation), sinD=Math.sin(deviation);
      const dirX=baseAngX*cosD-baseAngY*sinD;
      const dirY=baseAngX*sinD+baseAngY*cosD;

      const u=Math.random();
      const eD=-Math.log(1-u*0.98)*0.55*aspect;
      const jitterD=(Math.random()-0.5)*0.3*aspect;
      const finalD=Math.max(0.1, eD+jitterD);

      posD[i*3  ]=src.x*scaleX+dirX*finalD;
      posD[i*3+1]=src.y*scaleY+textOffsetY+dirY*finalD; // Y sin compresión — pantalla completa
      posD[i*3+2]=(Math.random()-0.5)*0.6;

      const op=Math.max(0, Math.exp(-finalD/(aspect*0.5))*0.85*(0.5+Math.random()*0.5));
      colD[i*3  ]=0.94*op+0.22*(1-op);
      colD[i*3+1]=0.96*op+0.243*(1-op);
      colD[i*3+2]=1.0*op+0.306*(1-op);
    }

    const geoC=new THREE.BufferGeometry();
    geoC.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geoC.setAttribute("color",new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geoC,new THREE.PointsMaterial({size:0.020,vertexColors:true,transparent:true,opacity:0.95,sizeAttenuation:true})));

    const geoD=new THREE.BufferGeometry();
    geoD.setAttribute("position",new THREE.BufferAttribute(posD,3));
    geoD.setAttribute("color",new THREE.BufferAttribute(colD,3));
    const matD=new THREE.PointsMaterial({size:0.018,vertexColors:true,transparent:true,opacity:0.90,sizeAttenuation:true});
    const ptsD=new THREE.Points(geoD,matD);
    scene.add(ptsD);

    // Per-particle phase + speed para movimiento notorio e independiente
    const phases=Array.from({length:DISP},()=>Math.random()*Math.PI*2);
    const speeds=Array.from({length:DISP},()=>0.6+Math.random()*1.4); // más rápido
    const amps  =Array.from({length:DISP},()=>0.04+Math.random()*0.08); // muy notorio

    let t=0,animId;
    const posD0=new Float32Array(posD);
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      // Texto FORJA: wobble sutil
      scene.children[0].rotation.x=Math.sin(t*0.35)*0.04;
      scene.children[0].rotation.z=Math.sin(t*0.22)*0.012;
      // Partículas dispersas: drift independiente y notorio
      const arr=geoD.attributes.position.array;
      for(let i=0;i<DISP;i++){
        const ph=phases[i], sp=speeds[i], am=amps[i];
        arr[i*3  ]=posD0[i*3  ]+Math.sin(t*sp+ph)*am;
        arr[i*3+1]=posD0[i*3+1]+Math.cos(t*sp*0.7+ph)*am*0.7;
        arr[i*3+2]=posD0[i*3+2];
      }
      geoD.attributes.position.needsUpdate=true;
      renderer.render(scene,cam);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){cancelAnimationFrame(animId);}else{animate();}
    });
  }

  window.addEventListener("forja:mount", tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit, 200);
})();
</script>
