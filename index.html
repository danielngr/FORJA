<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>FORJA — Workout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#383e4e;--bgD:#2c3040;--card:#424858;
  --border:#525a6e;--borderL:#4a5264;
  --tx:#F0F2F5;--tx2:#C8CDD8;--tx3:#7a8294;
  --green:#5faa88;--blue:#6a8fc0;--yellow:#c0a870;--red:#d96060;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
  --sans:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
}
html,body{height:100%;background:var(--bgD);color:var(--tx);font-family:var(--sans);}
body{overscroll-behavior:none;}

#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg);overflow:hidden;}

/* ── HEADER ── */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px 12px;
  flex-shrink:0;
}
.hdr-back{background:none;border:none;color:var(--tx3);font-family:var(--mono);font-size:11px;letter-spacing:1.5px;cursor:pointer;padding:0;}
.hdr-center{display:flex;flex-direction:column;align-items:center;gap:1px;}
.hdr-name{font-family:var(--mono);font-size:10px;color:var(--tx2);letter-spacing:3px;font-weight:600;}
.hdr-sess{font-family:var(--mono);font-size:11px;color:var(--tx3);letter-spacing:1px;}
.hdr-dots{display:flex;gap:5px;align-items:center;}
.dot{height:5px;border-radius:3px;background:var(--borderL);transition:all .3s;width:5px;}
.dot.done{background:var(--green);}
.dot.cur{background:var(--tx);width:16px;}

/* ── HEADER ARC CLOCK ── */
.hdr-arc{position:relative;width:44px;height:44px;flex-shrink:0;cursor:pointer;}
.hdr-arc svg{position:absolute;inset:0;transform:rotate(-90deg);}
.arc-bg{stroke:rgba(82,90,110,.35);stroke-width:2.5;fill:none;}
.arc-fg{stroke:var(--blue);stroke-width:2.5;fill:none;
  stroke-dasharray:113;stroke-dashoffset:113;
  stroke-linecap:round;transition:stroke .5s,stroke-dashoffset .9s linear;}
.arc-fg.yellow{stroke:var(--yellow);}
.arc-fg.red{stroke:var(--red);}
.arc-inner{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
}
.arc-num{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--tx);letter-spacing:-.5px;line-height:1;}
.arc-lbl{font-family:var(--mono);font-size:6px;color:var(--tx3);letter-spacing:1px;}
/* idle state: session time small */
.arc-inner.idle .arc-num{font-size:9px;color:var(--tx3);}
.arc-inner.idle .arc-lbl{display:none;}

/* ── dots replace with ex-counter ── */
.hdr-excount{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:1px;text-align:center;}
.hdr-excount b{color:var(--tx);font-weight:700;}

/* ── NEXT SET PULSE (highlight when rest ends) ── */
.set-row.next-pulse{animation:nextPulse 1.2s ease 3;}
@keyframes nextPulse{0%,100%{background:transparent;}50%{background:rgba(106,143,192,.18);}}

/* ── REST BAR ── */
#rest-bar{height:2px;background:transparent;flex-shrink:0;}
#rest-fill{height:100%;width:0%;transition:width 1s linear;background:var(--blue);border-radius:1px;}

/* ── SCROLL ── */
#scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:100px;}
#scroll::-webkit-scrollbar{display:none;}

/* ── VIDEO (full width, rounded, no border) ── */
.vid-wrap{
  width:100%;height:240px;
  background:#e8e4dd;
  position:relative;overflow:hidden;
  border-radius:0;          /* flush top */
  flex-shrink:0;
}
.vid-wrap video{width:100%;height:100%;object-fit:cover;display:block;}
/* Gradient overlay at bottom so title reads on video */
.vid-wrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom, transparent 50%, rgba(44,48,64,.85) 100%);
  pointer-events:none;
}
.vid-forja{position:absolute;top:12px;left:16px;z-index:2;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;font-weight:600;}
.vid-muscle{position:absolute;top:12px;right:12px;z-index:2;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:4px 11px;font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.7);letter-spacing:1.5px;}

/* ── EXERCISE INFO (directly below video, no card) ── */
.ex-info{padding:14px 20px 0;}
.ex-num{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:2px;margin-bottom:4px;}
.ex-name{font-size:26px;font-weight:900;letter-spacing:-1px;text-transform:uppercase;line-height:1;color:var(--tx);}
.ex-meta{display:flex;align-items:center;gap:12px;margin-top:6px;}
.ex-spec{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:1.5px;}
.ex-prev{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:.5px;}
.ex-prev b{color:var(--tx2);font-weight:400;}
.ex-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(95,170,136,.12);border:1px solid rgba(95,170,136,.2);border-radius:20px;padding:2px 8px;font-family:var(--mono);font-size:8px;color:var(--green);letter-spacing:1px;margin-left:auto;}

/* ── SETS (minimal, no hard borders) ── */
.sets-wrap{padding:12px 20px 0;}
.sets-hdr{
  display:grid;grid-template-columns:28px 1fr 1fr 44px;
  padding:0 0 6px;
  border-bottom:1px solid rgba(82,90,110,.4);
}
.sets-hdr span{font-family:var(--mono);font-size:8px;color:var(--tx3);letter-spacing:2px;text-align:center;}
.sets-hdr span:first-child{text-align:left;}

.set-row{
  display:grid;grid-template-columns:28px 1fr 1fr 44px;
  align-items:stretch;min-height:50px;
  border-bottom:1px solid rgba(82,90,110,.25);
  transition:background .15s;
  border-radius:0;
}
.set-row:last-child{border-bottom:none;}
.set-row.done{background:rgba(95,170,136,.05);}

.set-n{display:flex;align-items:center;font-family:var(--mono);font-size:10px;color:var(--tx3);letter-spacing:1px;}
.set-row.done .set-n{color:var(--green);}

.set-kg,.set-rp{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;padding:4px 0;
  transition:opacity .1s;
  border-left:1px solid rgba(82,90,110,.25);
}
.set-kg:active,.set-rp:active{opacity:.7;}
.sv{font-size:18px;font-weight:900;color:var(--tx);letter-spacing:-.5px;line-height:1;}
.sl{font-family:var(--mono);font-size:7px;color:var(--tx3);letter-spacing:1.5px;}
.set-row.done .sv{color:var(--green);}

.set-chk{
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-left:1px solid rgba(82,90,110,.25);
  transition:opacity .1s;
}
.set-chk:active{opacity:.7;}
.chk-ring{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--borderL);
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.set-row.done .chk-ring{background:var(--green);border-color:var(--green);}
.chk-ring svg{opacity:0;transition:opacity .18s;}
.set-row.done .chk-ring svg{opacity:1;}

.add-set-btn{
  display:flex;align-items:center;justify-content:center;
  width:100%;padding:12px 0;border:none;
  background:transparent;cursor:pointer;
  font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:2px;
  transition:opacity .1s;
}
.add-set-btn:active{opacity:.6;}

/* ── DIVIDER between exercises ── */
.divider{
  display:flex;align-items:center;gap:12px;
  padding:20px 20px 0;
  margin-bottom:0;
}
.div-line{flex:1;height:1px;background:rgba(82,90,110,.3);}
.div-txt{font-family:var(--mono);font-size:7px;color:rgba(122,130,148,.5);letter-spacing:3px;}

/* ── PROGRESS BAR ── */
#prog{height:2px;background:rgba(0,0,0,.2);flex-shrink:0;}
#prog-fill{height:100%;width:0%;background:var(--tx);transition:width .5s ease;}

/* ── REST TOAST (minimal, bottom) ── */
#rest-toast{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px 20px;
  background:linear-gradient(to top, var(--bgD) 70%, transparent);
  z-index:50;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-width:430px;margin:0 auto;
}
#rest-toast.show{transform:translateY(0);}
.rest-left{display:flex;align-items:center;gap:12px;}
.rest-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:blink 1s ease-in-out infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.rest-lbl{font-family:var(--mono);font-size:8px;color:var(--tx3);letter-spacing:2px;}
.rest-num{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--tx);letter-spacing:-1px;line-height:1;}
.rest-durs{display:flex;gap:4px;}
.rest-d{padding:4px 8px;border-radius:6px;background:transparent;border:1px solid rgba(82,90,110,.5);color:var(--tx3);font-family:var(--mono);font-size:8px;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.rest-d.on{border-color:var(--blue);color:var(--blue);background:rgba(106,143,192,.1);}
.rest-skip{background:rgba(255,255,255,.06);border:1px solid rgba(82,90,110,.5);border-radius:8px;padding:6px 14px;font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:1px;cursor:pointer;}

/* ── NUMPAD ── */
#np-wrap{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;max-width:430px;margin:0 auto;}
#np-wrap.open{opacity:1;pointer-events:all;}
#np-sheet{background:var(--bgD);border-top:1px solid var(--borderL);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);}
#np-wrap.open #np-sheet{transform:translateY(0);}
.np-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid rgba(82,90,110,.35);}
.np-title{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:2px;}
.np-val{font-size:34px;font-weight:900;color:var(--tx);letter-spacing:-2px;}
.np-ok{background:var(--tx);color:var(--bgD);border:none;border-radius:10px;padding:8px 20px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;}
.np-quick{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid rgba(82,90,110,.25);}
.np-q{flex:1;padding:8px 0;background:rgba(255,255,255,.04);border:1px solid rgba(82,90,110,.4);border-radius:8px;color:var(--tx2);font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;transition:background .1s;}
.np-q:active{background:rgba(255,255,255,.08);}
.np-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(82,90,110,.3);}
.np-key{padding:17px 0;background:var(--bgD);border:none;cursor:pointer;font-size:20px;font-weight:600;color:var(--tx);font-family:var(--sans);transition:background .1s;text-align:center;}
.np-key:active{background:var(--card);}
.np-key.dim{color:var(--tx3);font-size:14px;}

/* ── FINISH ── */
#finish{position:fixed;inset:0;background:var(--bgD);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;max-width:430px;margin:0 auto;overflow:hidden;}
#finish.on{opacity:1;pointer-events:all;}
.fin-p-area{position:absolute;inset:0;pointer-events:none;}
.fin-p{position:absolute;border-radius:50%;animation:floatUp 2s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-100px);}}
.fin-ring{width:88px;height:88px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;box-shadow:0 0 50px rgba(95,170,136,.35);margin-bottom:24px;animation:pop .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{0%{transform:scale(.2);opacity:0;}100%{transform:scale(1);opacity:1;}}
.fin-msg{font-size:28px;font-weight:900;letter-spacing:-1px;text-align:center;padding:0 32px;animation:fu .5s .25s both;}
.fin-sub{font-family:var(--mono);font-size:9px;color:var(--tx3);letter-spacing:2px;margin-top:8px;text-align:center;padding:0 32px;line-height:1.6;animation:fu .5s .4s both;}
.fin-stats{display:flex;gap:24px;margin-top:28px;animation:fu .5s .55s both;}
.fin-stat{text-align:center;}
.fin-v{font-size:30px;font-weight:900;}
.fin-l{font-family:var(--mono);font-size:8px;color:var(--tx3);letter-spacing:2px;margin-top:3px;}
.fin-sep{width:1px;background:var(--borderL);}
.fin-btn{margin-top:36px;padding:14px 42px;background:var(--tx);color:var(--bgD);border:none;border-radius:12px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;animation:fu .5s .7s both;}
@keyframes fu{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <button class="hdr-back" onclick="location.reload()">← VOLVER</button>
    <div class="hdr-center">
      <div class="hdr-name">PULL B</div>
      <div class="hdr-excount" id="excount"><b>0</b> / 3 ej</div>
    </div>
    <!-- Arc clock — shows session time idle, countdown during rest -->
    <div class="hdr-arc" id="hdr-arc" onclick="skipRest()">
      <svg viewBox="0 0 44 44" width="44" height="44">
        <circle class="arc-bg" cx="22" cy="22" r="18"/>
        <circle class="arc-fg" id="arc-fg" cx="22" cy="22" r="18"/>
      </svg>
      <div class="arc-inner idle" id="arc-inner">
        <div class="arc-num" id="arc-num">00:00</div>
        <div class="arc-lbl" id="arc-lbl">REST</div>
      </div>
    </div>
  </div>
  <div id="rest-bar"><div id="rest-fill"></div></div>
  <div id="scroll"></div>
  <div id="prog"><div id="prog-fill"></div></div>
</div>

<!-- REST TOAST — minimal, shows adaptive suggestion -->
<div id="rest-toast">
  <div class="rest-left">
    <div class="rest-dot" id="rest-dot"></div>
    <div>
      <div class="rest-lbl" id="rest-lbl-txt">DESCANSO</div>
      <div class="rest-num" id="rest-num">1:30</div>
    </div>
    <div class="rest-durs" id="rest-durs"></div>
  </div>
  <button class="rest-skip" onclick="skipRest()">SALTAR ›</button>
</div>

<!-- NUMPAD -->
<div id="np-wrap" onclick="npBg(event)">
  <div id="np-sheet">
    <div class="np-hdr">
      <div class="np-title" id="np-title">KG</div>
      <div class="np-val" id="np-val">0</div>
      <button class="np-ok" onclick="npOk()">OK</button>
    </div>
    <div class="np-quick" id="np-quick"></div>
    <div class="np-grid" id="np-grid"></div>
  </div>
</div>

<!-- FINISH -->
<div id="finish">
  <div class="fin-p-area" id="fin-p"></div>
  <div class="fin-ring">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <path d="M7 20L16 29L33 11" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="fin-msg" id="fin-msg">¡Lo aplastaste hoy!</div>
  <div class="fin-sub">EL TRABAJO DE HOY FORJA EL ATLETA DE MAÑANA</div>
  <div class="fin-stats">
    <div class="fin-stat"><div class="fin-v" id="fin-exs">3</div><div class="fin-l">EJERCICIOS</div></div>
    <div class="fin-sep"></div>
    <div class="fin-stat"><div class="fin-v" style="color:var(--green)" id="fin-sets">0</div><div class="fin-l">SERIES</div></div>
    <div class="fin-sep"></div>
    <div class="fin-stat"><div class="fin-v" style="color:var(--blue)" id="fin-time">00:00</div><div class="fin-l">DURACIÓN</div></div>
  </div>
  <button class="fin-btn" onclick="location.reload()">← VOLVER</button>
</div>

<script>
const EXS=[
  {name:"Pendlay Row",   muscle:"ESPALDA · CORE",   vid:"https://forjavideos.b-cdn.net/barbell-bent-over-row.mp4",  reps:"6-8",   prevKg:70,  prevRp:8},
  {name:"Chin Up",       muscle:"ESPALDA · BÍCEPS",  vid:"https://forjavideos.b-cdn.net/chin-ups.mp4",               reps:"8-12",  prevKg:"BW",prevRp:10},
  {name:"Dumbbell Curl", muscle:"BÍCEPS",            vid:"https://forjavideos.b-cdn.net/dumbbell-bicep-curl.mp4",    reps:"10-12", prevKg:16,  prevRp:12},
];
const S=EXS.map(ex=>[{kg:ex.prevKg,rp:ex.prevRp,done:false}]);

// ── ARC CLOCK ──
// R=18, circumference = 2π×18 ≈ 113
const ARC_C = 2*Math.PI*18; // 113.1
const arcFg = document.getElementById('arc-fg');
const arcNum = document.getElementById('arc-num');
const arcLbl = document.getElementById('arc-lbl');
const arcInner = document.getElementById('arc-inner');

function setArc(pct, color){
  // pct 0=empty, 1=full
  const offset = ARC_C * (1 - pct);
  arcFg.style.strokeDashoffset = offset;
  arcFg.className = 'arc-fg' + (color==='yellow'?' yellow':color==='red'?' red':'');
}

function setArcIdle(){
  arcInner.className='arc-inner idle';
  arcLbl.style.display='none';
  setArc(0,'');
}

function setArcRest(secs, dur){
  arcInner.className='arc-inner';
  arcLbl.style.display='';
  const pct=dur>0?secs/dur:0;
  const color=secs<=10?'red':secs<=30?'yellow':'';
  setArc(pct,color);
  const m=Math.floor(secs/60),s=secs%60;
  arcNum.textContent=m+':'+(s<10?'0':'')+s;
  arcNum.style.color=secs<=10?'var(--red)':secs<=30?'var(--yellow)':'var(--tx)';
}

// ── ADAPTIVE REST ──
// Logic: compare new set vs previous set to decide rest duration
function calcAdaptiveRest(ei, si){
  const cur = S[ei][si];
  const prev = S[ei][si-1]; // previous set of same exercise
  const hist = EXS[ei]; // previous session data

  const curKg = typeof cur.kg==='number' ? cur.kg : 0;
  const prevKg = typeof hist.prevKg==='number' ? hist.prevKg : 0;

  // New PR weight → long rest (2min)
  if(curKg > prevKg && prevKg > 0) return {dur:120, reason:"NUEVO PESO → 2 MIN"};
  // Same weight, same reps → standard (90s)
  if(curKg === prevKg && cur.rp >= hist.prevRp) return {dur:90, reason:"MISMO NIVEL · 1:30"};
  // Less than previous → fatiga, short rest ok (60s)
  if(curKg > 0 && curKg < prevKg) return {dur:60, reason:"MENOS PESO · 60S"};
  // High reps (>12) → less rest needed
  if(cur.rp > 12) return {dur:60, reason:"REPS ALTAS · 60S"};
  // Default
  return {dur:90, reason:""};
}

// ── REST TIMER ──
let restDur=90, restSecs=0, restTick=null;
let lastRestCtx=null; // {ei, si} to know which set to highlight

function buildRestDurs(){
  const w=document.getElementById('rest-durs');
  [60,90,120,180].forEach(s=>{
    const b=document.createElement('button');
    b.className='rest-d'+(s===90?' on':'');
    b.textContent=s<120?s+'s':(s/60)+'m';
    b.onclick=()=>{
      restDur=s;
      w.querySelectorAll('.rest-d').forEach((x,i)=>x.classList.toggle('on',[60,90,120,180][i]===s));
      if(restTick){restSecs=s;updRest();}
    };
    w.appendChild(b);
  });
}

function startRest(ei, si){
  lastRestCtx={ei,si};
  // Adaptive calculation
  const adapt=calcAdaptiveRest(ei,si);
  restDur=adapt.dur;
  restSecs=restDur;

  // Sync duration buttons UI
  document.querySelectorAll('.rest-d').forEach((x,i)=>{
    x.classList.toggle('on',[60,90,120,180][i]===restDur);
  });

  // Show adaptive reason if any
  if(adapt.reason){
    document.getElementById('rest-lbl-txt').textContent=adapt.reason;
    setTimeout(()=>{if(restTick)document.getElementById('rest-lbl-txt').textContent='DESCANSO';},2000);
  }

  clearInterval(restTick);
  updRest();
  document.getElementById('rest-toast').classList.add('show');
  document.getElementById('rest-fill').style.width='100%';

  restTick=setInterval(()=>{
    restSecs=Math.max(0,restSecs-1);
    updRest();
    if(!restSecs){
      clearInterval(restTick);restTick=null;
      document.getElementById('rest-toast').classList.remove('show');
      setArcIdle();
      // Update arc back to session
      updSessionArc();
      // ── Highlight next set ──
      highlightNextSet(ei,si);
      try{navigator.vibrate&&navigator.vibrate([200,100,200]);}catch{}
    }
  },1000);
}

function skipRest(){
  if(!restTick) return;
  clearInterval(restTick);restTick=null;
  document.getElementById('rest-toast').classList.remove('show');
  setArcIdle();
  updSessionArc();
  if(lastRestCtx) highlightNextSet(lastRestCtx.ei, lastRestCtx.si);
}

function updRest(){
  const m=Math.floor(restSecs/60),s=restSecs%60;
  document.getElementById('rest-num').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('rest-fill').style.width=(restDur?restSecs/restDur*100:0)+'%';
  const c=restSecs<=10?'var(--red)':restSecs<=30?'var(--yellow)':'var(--blue)';
  document.getElementById('rest-fill').style.background=c;
  document.getElementById('rest-num').style.color=restSecs<=10?'var(--red)':restSecs<=30?'var(--yellow)':'var(--tx)';
  document.getElementById('rest-dot').style.background=c;
  // Update arc
  setArcRest(restSecs, restDur);
}

// ── HIGHLIGHT NEXT SET ──
function highlightNextSet(ei, si){
  // Find next undone set — same exercise first, then next exercise
  let targetEl=null;
  const nextSi=S[ei].findIndex((s,i)=>i>si&&!s.done);
  if(nextSi!==-1){
    const rows=document.querySelectorAll(`#sets-${ei} .set-row`);
    targetEl=rows[nextSi+1]; // +1 for header row
  } else {
    for(let ei2=ei+1;ei2<EXS.length;ei2++){
      const nextUndoneSi=S[ei2].findIndex(s=>!s.done);
      if(nextUndoneSi!==-1){
        const rows=document.querySelectorAll(`#sets-${ei2} .set-row`);
        targetEl=rows[nextUndoneSi+1];
        // Scroll to it
        const vidEl=document.getElementById('vid-'+ei2);
        if(vidEl) vidEl.scrollIntoView({behavior:'smooth',block:'start'});
        break;
      }
    }
  }
  if(targetEl){
    targetEl.classList.add('next-pulse');
    targetEl.addEventListener('animationend',()=>targetEl.classList.remove('next-pulse'),{once:true});
  }
}

// ── SESSION ARC (idle state shows session progress as thin ring) ──
let sessSecs=0;
function updSessionArc(){
  if(restTick) return; // rest is active, arc shows rest
  const m=Math.floor(sessSecs/60),s=sessSecs%60;
  arcNum.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  arcNum.style.color='';
  // Fill arc proportional to session — 60min = full circle
  const pct=Math.min(sessSecs/3600,1);
  setArc(pct,'');
  arcInner.className='arc-inner idle';
  arcLbl.style.display='none';
}

setInterval(()=>{
  sessSecs++;
  updSessionArc();
  // Update ex count
  const dn=S.filter(ex=>ex.every(s=>s.done)).length;
  document.getElementById('excount').innerHTML=`<b>${dn}</b> / ${EXS.length} ej`;
},1000);

// ── NUMPAD ──
let npCtx=null;
function openNp(ei,si,f){
  npCtx={ei,si,f};
  const v=f==='kg'?S[ei][si].kg:S[ei][si].rp;
  document.getElementById('np-title').textContent=f==='kg'?'KG':'REPS';
  document.getElementById('np-val').textContent=String(v);
  const q=document.getElementById('np-quick');q.innerHTML='';
  (f==='kg'?['-5','-2.5','+2.5','+5']:['-2','-1','+1','+2']).forEach(d=>{
    const b=document.createElement('button');b.className='np-q';b.textContent=d;
    b.onclick=()=>{
      const cur=parseFloat(document.getElementById('np-val').textContent)||0;
      const nv=Math.max(0,cur+(+d));
      document.getElementById('np-val').textContent=nv%1===0?String(nv):nv.toFixed(1);
    };q.appendChild(b);
  });
  const g=document.getElementById('np-grid');g.innerHTML='';
  ['1','2','3','4','5','6','7','8','9',f==='kg'?'.':'','0','⌫'].forEach(k=>{
    const b=document.createElement('button');
    b.className='np-key'+((!k||k==='⌫')?' dim':'');b.textContent=k||'';
    if(k)b.onclick=()=>{
      const el=document.getElementById('np-val');
      if(k==='⌫'){el.textContent=el.textContent.slice(0,-1)||'0';return;}
      if(k==='.'&&el.textContent.includes('.'))return;
      if(el.textContent==='0'&&k!=='.')el.textContent=k;
      else if(el.textContent.length<6)el.textContent+=k;
    };
    g.appendChild(b);
  });
  document.getElementById('np-wrap').classList.add('open');
}
function npOk(){
  if(npCtx){
    const{ei,si,f}=npCtx;const raw=document.getElementById('np-val').textContent;
    if(f==='kg')S[ei][si].kg=parseFloat(raw)||0;else S[ei][si].rp=parseInt(raw)||1;
    renderSets(ei);
  }
  document.getElementById('np-wrap').classList.remove('open');npCtx=null;
}
function npBg(e){if(e.target===document.getElementById('np-wrap'))npOk();}

// ── TOGGLE ──
function toggleSet(ei,si){
  S[ei][si].done=!S[ei][si].done;
  renderSets(ei);updProg();
  if(S[ei][si].done){
    startRest(ei,si);
  }
  const tot=S.reduce((a,e)=>a+e.length,0),dn=S.reduce((a,e)=>a+e.filter(s=>s.done).length,0);
  if(dn===tot)setTimeout(showFinish,700);
}
function addSet(ei){const l=S[ei][S[ei].length-1];S[ei].push({kg:l.kg,rp:l.rp,done:false});renderSets(ei);updProg();}

// ── RENDER SETS ──
function renderSets(ei){
  const wrap=document.getElementById('sets-'+ei);
  const badge=document.getElementById('badge-'+ei);
  const dn=S[ei].filter(s=>s.done).length;
  if(badge){badge.style.display=dn>0?'inline-flex':'none';badge.textContent=dn+'/'+S[ei].length;}
  wrap.innerHTML='<div class="sets-hdr"><span>SET</span><span>KG</span><span>REPS</span><span>✓</span></div>';
  S[ei].forEach((s,si)=>{
    const row=document.createElement('div');
    row.className='set-row'+(s.done?' done':'');
    row.innerHTML=`
      <div class="set-n">${String(si+1).padStart(2,'0')}</div>
      <div class="set-kg" onclick="openNp(${ei},${si},'kg')"><div class="sv">${s.kg}</div><div class="sl">KG</div></div>
      <div class="set-rp" onclick="openNp(${ei},${si},'rp')"><div class="sv">${s.rp}</div><div class="sl">REPS</div></div>
      <div class="set-chk" onclick="toggleSet(${ei},${si})">
        <div class="chk-ring"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.5L5 9.5L10 3" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      </div>`;
    wrap.appendChild(row);
  });
}

// ── PROGRESS ──
function updProg(){
  const tot=S.reduce((a,e)=>a+e.length,0),dn=S.reduce((a,e)=>a+e.filter(s=>s.done).length,0);
  document.getElementById('prog-fill').style.width=(dn/tot*100)+'%';
}

// ── BUILD ──
function build(){
  const sc=document.getElementById('scroll');sc.innerHTML='';
  EXS.forEach((ex,i)=>{
    if(i>0){
      const div=document.createElement('div');div.className='divider';
      div.innerHTML='<div class="div-line"></div><div class="div-txt">SIGUIENTE EJERCICIO</div><div class="div-line"></div>';
      sc.appendChild(div);
    }
    const vw=document.createElement('div');vw.className='vid-wrap';vw.id='vid-'+i;
    vw.innerHTML=`<video autoplay loop muted playsinline src="${ex.vid}" onerror="this.style.display='none'"></video><div class="vid-forja">FORJA</div><div class="vid-muscle">${ex.muscle}</div>`;
    sc.appendChild(vw);
    const info=document.createElement('div');info.className='ex-info';
    info.innerHTML=`
      <div class="ex-num">${String(i+1).padStart(2,'0')} / ${String(EXS.length).padStart(2,'0')}</div>
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta">
        <span class="ex-spec">${ex.reps} REPS</span>
        <span class="ex-prev">ant: <b>${ex.prevKg}${typeof ex.prevKg==='number'?'kg':''} × ${ex.prevRp}</b></span>
        <span class="ex-badge" id="badge-${i}" style="display:none"></span>
      </div>`;
    sc.appendChild(info);
    const sw=document.createElement('div');sw.className='sets-wrap';
    sw.innerHTML=`<div id="sets-${i}"></div><button class="add-set-btn" onclick="addSet(${i})">+ AGREGAR SERIE</button>`;
    sc.appendChild(sw);
    renderSets(i);
  });
}

// ── FINISH ──
function showFinish(){
  const tot=S.reduce((a,e)=>a+e.length,0);
  const msgs=["¡Lo aplastaste hoy!","¡Brutal, crack!","¡Sesión completada!"];
  document.getElementById('fin-msg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('fin-exs').textContent=EXS.length;
  document.getElementById('fin-sets').textContent=tot;
  const m=Math.floor(sessSecs/60),s=sessSecs%60;
  document.getElementById('fin-time').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  const colors=['#5faa88','#6a8fc0','#c0a870','#8878c0'];
  const area=document.getElementById('fin-p');
  for(let i=0;i<28;i++){
    const p=document.createElement('div');const sz=3+Math.random()*5;
    p.className='fin-p';p.style.cssText=`left:${Math.random()*100}%;top:${30+Math.random()*60}%;width:${sz}px;height:${sz}px;background:${colors[i%4]};animation-delay:${Math.random()*1.5}s;animation-duration:${1.5+Math.random()*1.2}s;`;
    area.appendChild(p);
  }
  document.getElementById('finish').classList.add('on');
}

// init
document.getElementById('arc-fg').style.strokeDasharray=ARC_C;
build();updProg();buildRestDurs();setArcIdle();
</script>
</body>
</html>
