                    <div style={{fontSize:9,fontFamily:mono,color:r.c,letterSpacing:2,marginBottom:6,fontWeight:600}}>{r.l}</div>
                    <div style={{fontSize:26,fontWeight:800,color:r.v>r.mx?C.red:C.tx}}>{r.v}</div>
                    <div style={{fontSize:9,fontFamily:mono,color:C.tx3,marginBottom:8}}>{r.u} / {r.mx}</div>
                    <div style={{height:2,background:C.borderL,borderRadius:1,overflow:"hidden"}}>
                      <div style={{height:"100%",background:r.c,width:`${p2*100}%`,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:9,fontFamily:mono,color:left>=0?C.tx3:C.red,marginTop:5}}>
                      {left>=0?`${left}${r.u} ${t.left}`:`${Math.abs(left)}${r.u} ${t.over}`}
                    </div>
                  </div>
                );
              })}
            </div>

            {entries.map(f=>{
              const mc={am:C.yellow,mid:C.tx,snk:C.blue,pm:C.purple};
              return(
                <div key={f.id} style={{display:"flex",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${C.borderL}`,gap:12}}>
                  <div style={{width:3,height:32,borderRadius:2,background:mc[f.m]||C.tx3,flexShrink:0}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600}}>{f.n}</div>
                    <div style={{display:"flex",gap:8,marginTop:2}}>
                      <span style={{fontSize:10,fontFamily:mono,color:C.tx2}}>{f.cal}kcal</span>
                      <span style={{fontSize:10,fontFamily:mono,color:C.green}}>{f.prot}P</span>
                      <span style={{fontSize:10,fontFamily:mono,color:C.blue}}>{f.carbs}C</span>
                      <span style={{fontSize:10,fontFamily:mono,color:C.purple}}>{f.fat}F</span>
                    </div>
                  </div>
                  <button onClick={()=>rmFood(f.id)} style={{background:"none",border:"none",color:C.tx3,fontSize:16,cursor:"pointer"}}>×</button>
                </div>
              );
            })}

            {entries.length===0&&!addF&&(
              <div style={{textAlign:"center",padding:"40px 0",fontSize:9,fontFamily:mono,color:C.tx3,letterSpacing:2}}>// 0 KCAL LOGGED</div>
            )}

            {!addF?(
              <button onClick={()=>setAddF(true)} style={{width:"100%",padding:"13px 0",marginTop:10,borderRadius:10,border:`1.5px dashed ${C.border}`,background:"transparent",color:C.green,fontSize:10,fontFamily:mono,letterSpacing:2,cursor:"pointer"}}>{t.addFood}</button>
            ):(
              <div style={{marginTop:12,padding:16,background:C.card,borderRadius:12,border:`1.5px solid ${C.borderL}`}}>
                <Inp placeholder={t.what} value={fd.n} onChange={e=>setFd({...fd,n:e.target.value})}/>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  {[["am",t.am],["mid",t.mid],["snk",t.snk],["pm",t.pm]].map(([k,lb])=>(
                    <button key={k} onClick={()=>setFd({...fd,m:k})} style={{flex:1,padding:"8px 0",borderRadius:7,border:`1.5px solid ${fd.m===k?C.tx:C.borderL}`,background:fd.m===k?C.tx:"transparent",color:fd.m===k?C.white:C.tx3,fontSize:9,fontFamily:mono,cursor:"pointer",transition:"all 0.15s"}}>
                      {lb.slice(0,3).toUpperCase()}
                    </button>
                  ))}
                </div>
                <div style={{display:"flex",gap:5,marginTop:8}}>
                  {[["cal","KCAL",C.tx],["prot","P",C.green],["carbs","C",C.blue],["fat","F",C.purple]].map(([k,lb,clr])=>(
                    <div key={k} style={{flex:1}}>
                      <div style={{fontSize:9,color:clr,fontFamily:mono,letterSpacing:1,textAlign:"center",marginBottom:3,fontWeight:600}}>{lb}</div>
                      <Inp type="number" value={fd[k]} onChange={e=>setFd({...fd,[k]:e.target.value})} style={{textAlign:"center",fontSize:16,fontWeight:800,padding:9}}/>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={()=>setAddF(false)} style={{flex:1,padding:11,borderRadius:9,border:`1.5px solid ${C.borderL}`,background:"transparent",color:C.tx3,fontSize:10,fontFamily:mono,cursor:"pointer"}}>CANCEL</button>
                  <button onClick={addFood} style={{flex:2,padding:11,borderRadius:9,border:"none",background:C.tx,color:C.white,fontSize:10,fontFamily:mono,fontWeight:700,cursor:"pointer",letterSpacing:1}}>{t.save}</button>
                </div>
              </div>
            )}
          </div>
        )}

        {tab==="body"&&(
          <BodyHeatmapTab logs={logs} routine={routine} lang={lang} muscleXP={muscleXP} xpLevelUps={xpLevelUps} setXpLevelUps={setXpLevelUps} showXPTooltip={showXPTooltip} setShowXPTooltip={setShowXPTooltip} xpAnimZone={xpAnimZone} setXpAnimZone={setXpAnimZone}/>
        )}

        {/* ── XP TOOLTIP (JSX overlay, shown when tapping a muscle zone) ── */}
        {tab==="body"&&showXPTooltip&&(()=>{
          const zk=showXPTooltip;
          const zd=muscleXP[zk]||muscleXP[zk.replace('_izq','_der')]||{xp:0};
          const lvl=xpToLevel(zd.xp||0);
          const xpCur=zd.xp||0;
          const xpNext=xpForNextLevel(lvl);
          const xpPrev=XP_THRESHOLDS[Math.max(0,lvl-2)]||0;
          const pct=lvl>=10?100:Math.round(((xpCur-xpPrev)/Math.max(1,xpNext-xpPrev))*100);
          const lvlC=xpLevelColor(lvl);
          const ZLBL={pecho:'PECHO',dorsal:'DORSAL',hombro_izq:'HOMBROS',hombro_der:'HOMBROS',
            bicep_izq:'BÍCEPS',bicep_der:'BÍCEPS',tricep_izq:'TRÍCEPS',tricep_der:'TRÍCEPS',
            quad:'CUÁDRICEPS',quad_der:'CUÁDRICEPS',gluteos:'GLÚTEOS',gluteos_der:'GLÚTEOS',
            isquiotibiales:'ISQUIO',isquiotibiales_der:'ISQUIO',
            abdomen:'ABDOMEN',gemelos:'GEMELOS',gemelos_der:'GEMELOS',
            trapecio:'TRAPECIO',espalda_baja:'LUMBAR',
            antebrazo_izq:'ANTEBRAZO',antebrazo_der:'ANTEBRAZO'};
          const label=ZLBL[zk]||zk.toUpperCase().replace(/_IZQ|_DER/,'');
          const sideLabel=zk.endsWith('_izq')?(lang==='es'?' · IZQ':' · LEFT'):zk.endsWith('_der')?(lang==='es'?' · DER':' · RIGHT'):'';
          return(
            <div onClick={()=>setShowXPTooltip(null)} style={{
              position:'fixed',bottom:90,left:16,right:16,zIndex:500,
              borderRadius:16,overflow:'hidden',cursor:'pointer',
              background:'linear-gradient(135deg,rgba(13,15,20,0.98) 0%,rgba(18,22,30,0.98) 100%)',
              border:`1px solid ${lvlC}44`,
              boxShadow:`0 0 0 1px ${lvlC}22,0 12px 40px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.05)`,
              padding:'16px 18px 14px',
            }}>
              {/* Glow orb */}
              <div style={{position:'absolute',top:-40,right:-40,width:120,height:120,borderRadius:'50%',
                background:`radial-gradient(circle,${lvlC}28 0%,transparent 70%)`,pointerEvents:'none'}}/>
              {/* Header */}
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:lvlC,boxShadow:`0 0 8px ${lvlC}`}}/>
                  <span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:11,fontWeight:700,letterSpacing:2,color:'rgba(255,255,255,0.9)'}}>{label}{sideLabel}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6,background:`${lvlC}18`,borderRadius:20,padding:'3px 10px 3px 8px',border:`1px solid ${lvlC}44`}}>
                  <span style={{fontSize:9,color:lvlC,fontFamily:"'SF Mono','Fira Code',monospace",fontWeight:700}}>⬡</span>
                  <span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:12,fontWeight:700,color:lvlC,letterSpacing:1}}>NV.{lvl}</span>
                  {lvl<10&&<span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:8,color:'rgba(255,255,255,0.3)',letterSpacing:1}}> / 10</span>}
                </div>
              </div>
              {/* XP bar */}
              <div style={{height:6,borderRadius:3,background:'rgba(255,255,255,0.06)',overflow:'hidden',boxShadow:'inset 0 1px 3px rgba(0,0,0,0.4)',marginBottom:8}}>
                <div style={{height:'100%',width:`${pct}%`,borderRadius:3,
                  background:`linear-gradient(90deg,${lvlC}aa,${lvlC})`,
                  boxShadow:`0 0 8px ${lvlC}66`,transition:'width 0.6s cubic-bezier(0.34,1.56,0.64,1)'}}/>
              </div>
              {/* XP numbers */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:10,color:'rgba(255,255,255,0.5)',letterSpacing:1}}>{xpCur.toLocaleString()} XP</span>
                {lvl<10
                  ?<span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:9,color:'rgba(255,255,255,0.3)',letterSpacing:1}}>{(xpNext-xpCur).toLocaleString()} para NV.{lvl+1}</span>
                  :<span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:9,color:lvlC,letterSpacing:1,fontWeight:700}}>✦ NIVEL MÁXIMO</span>
                }
              </div>
              <div style={{marginTop:8,textAlign:'center',fontFamily:"'SF Mono','Fira Code',monospace",fontSize:8,color:'rgba(255,255,255,0.15)',letterSpacing:1}}>TAP PARA CERRAR</div>
            </div>
          );
        })()}

        {/* ── LEVEL-UP BANNER ── */}
        {tab==="body"&&xpLevelUps&&xpLevelUps.length>0&&(()=>{
          const latest=xpLevelUps[xpLevelUps.length-1];
          const lvlC=xpLevelColor(latest.level);
          const ZLBL={pecho:'PECHO',dorsal:'DORSAL',hombro_izq:'HOMBROS',bicep_izq:'BÍCEPS',
            tricep_izq:'TRÍCEPS',quad:'CUÁDRICEPS',gluteos:'GLÚTEOS',isquiotibiales:'ISQUIO',
            abdomen:'ABDOMEN',gemelos:'GEMELOS',trapecio:'TRAPECIO',espalda_baja:'LUMBAR'};
          const label=ZLBL[latest.zone]||latest.zone.toUpperCase().replace(/_IZQ|_DER/,'');
          return(
            <div onClick={()=>setXpLevelUps([])} style={{
              position:'fixed',top:60,left:16,right:16,zIndex:600,cursor:'pointer',
              borderRadius:14,overflow:'hidden',
              background:`linear-gradient(135deg,${lvlC}18,${lvlC}08)`,
              border:`1px solid ${lvlC}66`,padding:'14px 16px',
              animation:'levelUpPulse 2s ease-in-out',
            }}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:36,height:36,borderRadius:10,flexShrink:0,
                  background:`${lvlC}22`,border:`1.5px solid ${lvlC}88`,
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>⬆</div>
                <div>
                  <div style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:9,color:'rgba(255,255,255,0.4)',letterSpacing:2,marginBottom:3}}>LEVEL UP</div>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:2,color:lvlC,lineHeight:1}}>{label} → NV.{latest.level}</div>
                </div>
                {xpLevelUps.length>1&&<div style={{marginLeft:'auto',background:`${lvlC}22`,borderRadius:8,padding:'2px 8px',fontFamily:"'SF Mono','Fira Code',monospace",fontSize:9,color:lvlC}}>+{xpLevelUps.length}</div>}
              </div>
            </div>
          );
        })()}

      </div>
      {/* ── TOUR OVERLAY ─────────────────────────────────────── */}
      {/* ── MAIN TOUR ─────────────────────────────── */}
      {(tourAskVisible||(tourStep!==null&&tourStep!==-1&&(tourStep<4||tourStep>7)))&&(()=>{
        const M_="'SF Mono','Fira Code',monospace";
        const S_="'DM Sans',sans-serif";
        const es=lang==="es";
        const TOTAL=12;

        const STEPS=[
          // 0
          {id:"cal-day",    pad:8,
           tES:"Tu día de entrenamiento",     tEN:"Your training day",
           xES:"El día marcado es hoy. Tu rutina vive aquí — toca cualquier día para verla.",
           xEN:"The highlighted day is today. Your routine lives here — tap any day to see it."},
          // 1
          {id:"cal-nav",    pad:8,
           tES:"Historial semanal",           tEN:"Weekly history",
           xES:"Navega semanas anteriores con estas flechas para revisar qué entrenaste.",
           xEN:"Use these arrows to browse past weeks and review what you trained."},
          // 2
          {id:"day-progress", pad:10,
           tES:"Tu progreso de hoy",          tEN:"Today's progress",
           xES:"Este contador muestra cuántos ejercicios completaste hoy.",
           xEN:"This counter shows how many exercises you've completed today."},
          // 3 — start-workout: user clicks CONTINUAR → step 4 triggers setInWorkout
          {id:"start-workout", pad:8,
           tES:"Inicia tu entreno",           tEN:"Start your workout",
           xES:"Toca CONTINUAR y te mostraremos cómo registrar tu entreno paso a paso.",
           xEN:"Tap CONTINUE and we'll show you how to log your workout step by step."},
          // 4-7 handled by WorkoutScreen tour
          // 8
          {id:"vol-weekly",  pad:10, tabNeeded:"train",
           tES:"Volumen semanal",             tEN:"Weekly volume",
           xES:"Las barras muestran cuánto has trabajado cada músculo vs. lo recomendado.",
           xEN:"Bars show how much you've worked each muscle vs. science recommendations."},
          // 8b: CARGA SEMANAL
          {id:"carga-semanal", pad:10, tabNeeded:"train",
           tES:"Carga semanal (ACWR)",        tEN:"Weekly load (ACWR)",
           xES:"Mide si estás entrenando más de lo habitual. Rango óptimo: 0.8–1.3. Se registra automáticamente al guardar sets.",
           xEN:"Measures if you're training more than usual. Optimal: 0.8–1.3. Recorded automatically when you log sets."},
          // 9
          {id:"tab-body",    pad:8,  tabNeeded:"train",
           tES:"Pestaña Cuerpo",              tEN:"Body tab",
           xES:"Aquí vive tu maniquí 3D. Toca CONTINUAR para ir ahí.",
           xEN:"Your 3D mannequin lives here. Tap CONTINUE to go there.",
           onEnter:()=>{setTabR("body");}},
          // 10
          {id:"mannequin",   pad:4,  tabNeeded:"body",
           tES:"Tu maniquí 3D",               tEN:"Your 3D mannequin",
           xES:"Los músculos se colorean por estado: rojo=activo, naranja=recuperando, verde=listo. Gíralo.",
           xEN:"Muscles colored by state: red=active, orange=recovering, green=ready. Drag to rotate."},
          // 11
          {id:"balance-score", pad:10, tabNeeded:"body",
           tES:"Balance Score",               tEN:"Balance Score",
           xES:"Sube entrenando todos los grupos. Úsalo para no olvidar ninguna zona.",
           xEN:"Raise it by training all muscle groups. Use it so you never skip a zone."},
        ];

        // Map tourStep → STEPS index (steps 4-7 are WS, so Main uses 0-3 and 8-11→mapped to 4-7)
        const STEP_MAP={0:0,1:1,2:2,3:3,8:4,9:5,10:6,11:7,12:8};
        const si=STEP_MAP[tourStep];

        // ── ASK MODAL ─────────────────────────────────────────
        if(tourAskVisible&&tourReady&&tourStep===null) return(
          <div style={{position:"fixed",inset:0,zIndex:9000,
            background:"rgba(0,0,0,0.75)",backdropFilter:"blur(4px)",
            display:"flex",alignItems:"flex-end",justifyContent:"center",padding:"0 0 40px"}}>
            <div style={{width:"calc(100% - 40px)",maxWidth:420,background:"#141418",
              borderRadius:20,border:"1px solid rgba(255,255,255,0.1)",
              padding:"28px 24px 24px",boxShadow:"0 32px 64px rgba(0,0,0,0.6)"}}>
              <div style={{fontSize:22,marginBottom:6}}>👋</div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:28,letterSpacing:2,
                color:"#EEEAE3",marginBottom:8}}>
                {es?"Descubre cómo funciona FORJA":"Discover how FORJA works"}
              </div>
              <div style={{fontSize:13,color:"rgba(238,234,227,0.65)",lineHeight:1.6,
                marginBottom:24,fontFamily:S_}}>
                {es?"Un tour rápido de 12 pasos te muestra todo."
                   :"A quick 12-step tour shows you everything."}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <button onClick={()=>{setTourAskVisible(false);
                  // If today is a rest day, switch to first workout day for the tour
                  if(routine){
                    const curDay=routine[sel];
                    if(!curDay||!curDay.ex||!curDay.ex.length){
                      const firstWorkoutDay=routine.findIndex(d=>d&&d.ex&&d.ex.length>0);
                      if(firstWorkoutDay>=0){
                        setTourOriginalSel(sel);
                        setSel(firstWorkoutDay);
                      }
                    }
                  }
                  setTourStep(0);}} style={{
                  padding:"14px",borderRadius:12,border:"none",background:"#EEEAE3",color:"#07080a",
                  fontFamily:M_,fontSize:11,fontWeight:700,letterSpacing:2,cursor:"pointer"}}>
                  {es?"EMPEZAR TOUR →":"START TOUR →"}
                </button>
                <button onClick={()=>{
                  try{localStorage.setItem('fv8_toured','1');}catch{}
                  setTourAskVisible(false);setTourStep(-1);
                  if(tourOriginalSel!==null){setSel(tourOriginalSel);setTourOriginalSel(null);}
                }} style={{padding:"12px",borderRadius:12,
                  border:"1px solid rgba(255,255,255,0.1)",background:"transparent",
                  color:"rgba(238,234,227,0.4)",fontFamily:M_,fontSize:10,letterSpacing:1,cursor:"pointer"}}>
                  {es?"Saltar":"Skip"}
                </button>
              </div>
            </div>
          </div>
        );

        // Not in a valid main step
        if(si===undefined||si===null) return null;

        const step=STEPS[si];
        if(!step) return null;

        const el=document.querySelector(`[data-tour="${step.id}"]`);
        const bounds=el?el.getBoundingClientRect():null;
        const pad=step.pad||8;
        const vh=window.innerHeight;
        const tooltipBelow=bounds&&(bounds.bottom+pad+180)<vh;

        const endTour=()=>{
          try{localStorage.setItem('fv8_toured','1');}catch{}
          setTourAskVisible(false);setTourStep(-1);
          // Restore original day if we switched for the tour
          if(tourOriginalSel!==null){setSel(tourOriginalSel);setTourOriginalSel(null);}
        };

        const nextStep=()=>{
          const ns=tourStep+1;
          if(ns>=TOTAL){endTour();return;}
          // Enter workout
          if(ns===4){ if(day&&day.ex&&day.ex.length){ setInWorkout(true); setTourStep(ns); } else { setTabR('train'); setTourStep(8); } return; }
          // Exit workout → train tab → scroll to vol-weekly → then show step
          if(ns===8){ setInWorkout(false); setTabR("train"); }
          if(ns===10){setTabR('body');}
          // Just advance
          setTourStep(ns);
        };

        return(
          <div style={{position:"fixed",inset:0,zIndex:9000,pointerEvents:"none"}}>
            {/* 4-rect cutout */}
            {bounds?<>
              <div style={{position:"fixed",top:0,left:0,right:0,
                height:Math.max(0,bounds.top-pad),
                background:"rgba(0,0,0,0.88)",pointerEvents:"all"}}/>
              <div style={{position:"fixed",left:0,right:0,
                top:bounds.bottom+pad,bottom:0,
                background:"rgba(0,0,0,0.88)",pointerEvents:"all"}}/>
              <div style={{position:"fixed",
                top:bounds.top-pad,height:bounds.height+pad*2,
                left:0,width:Math.max(0,bounds.left-pad),
                background:"rgba(0,0,0,0.88)",pointerEvents:"all"}}/>
              <div style={{position:"fixed",
                top:bounds.top-pad,height:bounds.height+pad*2,
                left:bounds.right+pad,right:0,
                background:"rgba(0,0,0,0.88)",pointerEvents:"all"}}/>
              <div style={{position:"fixed",
                top:bounds.top-pad,left:bounds.left-pad,
                width:bounds.width+pad*2,height:bounds.height+pad*2,
                borderRadius:14,pointerEvents:"none",
                border:"2.5px solid rgba(191,169,138,1)",
                boxShadow:"0 0 0 1px rgba(191,169,138,0.2),0 0 24px rgba(191,169,138,0.45)"}}/>
              {/* Block clicks on focused element — except mannequin canvas */}
              {step.id!=="mannequin"&&<div style={{position:"fixed",
                top:bounds.top-pad,left:bounds.left-pad,
                width:bounds.width+pad*2,height:bounds.height+pad*2,
                borderRadius:14,pointerEvents:"all",
                background:"transparent",cursor:"default"}}
                onClick={e=>e.stopPropagation()}/>}
            </>:<div style={{position:"absolute",inset:0,
              background:"rgba(0,0,0,0.88)",pointerEvents:"all"}}/>}

            {/* Tooltip */}
            <div style={{
              position:"fixed",left:16,right:16,
              // Tooltip: below if space, above if not, never overlapping element
              ...(()=>{
                if(!bounds) return {bottom:20};
                const spaceBelow = vh - bounds.bottom - pad;
                const spaceAbove = bounds.top - pad;
                if(spaceBelow >= 170) return {top: Math.round(bounds.bottom+pad+8)};
                if(spaceAbove >= 170) return {bottom: Math.round(vh - bounds.top + pad + 8)};
                return {bottom: 20};
              })(),
              background:"#141418",borderRadius:16,
              border:"1px solid rgba(255,255,255,0.1)",
              padding:"18px 18px 14px",
              boxShadow:"0 20px 48px rgba(0,0,0,0.75)",
              pointerEvents:"all",zIndex:2,
              maxHeight:"50vh",overflow:"hidden"}}>
              {/* Progress */}
              <div style={{fontFamily:M_,fontSize:8,color:"rgba(255,255,255,0.3)",
                letterSpacing:2,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                {tourStep+1} / {TOTAL}
                <div style={{flex:1,height:2,background:"rgba(255,255,255,0.08)",
                  borderRadius:1,overflow:"hidden"}}>
                  <div style={{height:"100%",
                    width:`${((tourStep+1)/TOTAL)*100}%`,
                    background:"#BFA98A",borderRadius:1,transition:"width 0.3s ease"}}/>
                </div>
              </div>
              {/* Title */}
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,letterSpacing:1.5,
                color:"#EEEAE3",marginBottom:8,lineHeight:1}}>
                {es?step.tES:step.tEN}
              </div>
              {/* Body */}
              <div style={{fontSize:13,color:"rgba(238,234,227,0.85)",lineHeight:1.65,
                marginBottom:16,fontFamily:S_}}>
                {es?step.xES:step.xEN}
              </div>
              {/* Buttons */}
              <div style={{display:"flex",alignItems:"center",
                justifyContent:"space-between",gap:12}}>
                <button onClick={endTour} style={{background:"none",border:"none",
                  padding:"6px 0",fontFamily:M_,fontSize:9,letterSpacing:1,
                  color:"rgba(255,255,255,0.25)",cursor:"pointer"}}>
                  {es?"Saltar tour":"Skip tour"}
                </button>
                <button onClick={nextStep} style={{padding:"11px 22px",borderRadius:10,
                  border:"none",background:"#EEEAE3",color:"#07080a",

// Thumbnail lazy — solo carga cuando entra al viewport
function VideoThumb({src,size=56}){
  const[thumb,setThumb]=useState(null);
  const[playing,setPlaying]=useState(false);
  const[visible,setVisible]=useState(false);
  const wrapRef=React.useRef(null);
  const vidRef=React.useRef(null);

  // IntersectionObserver — dispara carga solo cuando el elemento es visible
  useEffect(()=>{
    if(!wrapRef.current) return;
    const obs=new IntersectionObserver(([e])=>{
      if(e.isIntersecting){setVisible(true);obs.disconnect();}
    },{rootMargin:"80px"});
    obs.observe(wrapRef.current);
    return()=>obs.disconnect();
  },[]);

  // Capturar primer frame solo cuando visible y aún no hay thumb
  useEffect(()=>{
    if(!visible||!src||thumb) return;
    const v=document.createElement("video");
    v.crossOrigin="anonymous";
    v.muted=true;
    v.preload="metadata";
    v.src=src;
    v.currentTime=0.5;
    v.addEventListener("seeked",()=>{
      try{
        const c=document.createElement("canvas");
        c.width=v.videoWidth||160; c.height=v.videoHeight||160;
        c.getContext("2d").drawImage(v,0,0);
        setThumb(c.toDataURL("image/jpeg",0.65));
      }catch(e){}
    },{once:true});
    v.load();
  },[visible,src]);

  return(
    <div ref={wrapRef} style={{width:size,height:size,borderRadius:10,overflow:"hidden",background:"#2c3040",flexShrink:0,position:"relative"}}
      onMouseEnter={()=>{setPlaying(true);vidRef.current?.play();}}
      onMouseLeave={()=>{setPlaying(false);if(vidRef.current){vidRef.current.pause();vidRef.current.currentTime=0;}}}>
      {thumb&&<img src={thumb} style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0,opacity:playing?0:1,transition:"opacity .2s"}}/>}
      {src&&playing&&<video ref={vidRef} src={src} muted loop playsInline preload="none" autoPlay
        style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>}
      {!thumb&&!playing&&<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",opacity:.25,fontSize:18}}>▶</div>}


    </div>
  );
}

function getZoneState(zk, st) {
  const ts = st[zk]; if(!ts) return "rec";
  const h = (Date.now()-ts)/3600000, rec = ZONE_REC_HOURS[zk]||72;
  if(h < rec*0.33) return "fresh";
  if(h < rec*0.66) return "warm";
  if(h < rec) return "yel";
  return "rec";
}
function getDotColor(zk,st){const s=getZoneState(zk,st);return s==="fresh"?"#e53535":s==="warm"?"#ff7a1a":s==="yel"?"#7ab82a":"#2a2a3a";}
function getPct(zk,st){if(!st[zk])return 100;return Math.min(100,Math.round(((Date.now()-st[zk])/3600000)/(ZONE_REC_HOURS[zk]||72)*100));}

function logsToZoneTimestamps(logs, routine) {
  const zoneTs = {};
  const BILATERAL = [["hombro_izq","hombro_der"],["bicep_izq","bicep_der"],
                     ["tricep_izq","tricep_der"],["antebrazo_izq","antebrazo_der"]];
  Object.entries(logs||{}).forEach(([id,entries])=>{
    if(!entries||!entries.length) return;
    // Resolve exercise name from routine (same pattern as computeWeeklyMuscleVol)
    let nm=id;
    if(routine){const rArr=Array.isArray(routine)?routine:Object.values(routine);rArr.forEach(d=>{if(!d)return;(d.ex||[]).forEach(ex=>{if(ex.id===id)nm=ex.e;});});}
    const nmLow=nm?.toLowerCase()?.trim()||"";
    // Use same fallback chain as computeWeeklyMuscleVol
    const md=EXERCISE_MUSCLE_MAP[nmLow]||EXERCISE_MUSCLE_MAP[ES_TO_META[nmLow]];
    if(!md) return;
    const muscles=[...(md.p||[]),...(md.s||[])];
    muscles.forEach(m=>{
      const zk=FORJA_TO_ZONE[m.toLowerCase()];
      if(!zk) return;
      entries.forEach(e=>{
        if(!e.d) return;
        const ts=new Date(e.d+"T12:00:00").getTime();
        if(!zoneTs[zk]||ts>zoneTs[zk]) zoneTs[zk]=ts;
      });
      BILATERAL.forEach(([a,b])=>{
        if(zk===a&&(!zoneTs[b]||zoneTs[a]>zoneTs[b])) zoneTs[b]=zoneTs[a];
        if(zk===b&&(!zoneTs[a]||zoneTs[b]>zoneTs[a])) zoneTs[a]=zoneTs[b];
      });
    });
  });
  return zoneTs;
}

}

function BodyHeatmapTab({logs, routine, lang, profile, muscleXP={}, xpLevelUps=[], setXpLevelUps=()=>{}, showXPTooltip, setShowXPTooltip=()=>{}, xpAnimZone, setXpAnimZone=()=>{}}){
  const cvsRef  = React.useRef(null);
  const wrapRef = React.useRef(null);
  const mxpRef  = React.useRef(muscleXP);
  const matMapRef  = React.useRef({});
  const meshMapRef = React.useRef({});
  const modelRef   = React.useRef(null);
  const rendRef    = React.useRef(null);
  const camRef     = React.useRef(null);
  const stRef      = React.useRef({});
  const rafRef     = React.useRef(null);

  const [loaded,     setLoaded]     = React.useState(false);
  const [progress,   setProgress]   = React.useState(0);
  const [pTxt,       setPTxt]       = React.useState("iniciando...");
  const [activeZone, setActiveZone] = React.useState(null);
  const [zoneState,  setZoneState]  = React.useState({});
  const [selPR,      setSelPR]      = React.useState(null);

  const es   = lang==="es";
  const mono = "'SF Mono','Courier New',monospace";
  const sans = "-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif";
  const C = {
    bg:"#0a0a0d",bg2:"#111116",bg3:"#18181e",card:"#141418",
    bd:"rgba(255,255,255,0.06)",bd2:"rgba(255,255,255,0.12)",
    tx:"#eeeef2",tx2:"#88889a",tx3:"#44445a",acc:"#e8e0d0",
    green:"#5faa88",blue:"#6a8fc0",yellow:"#c0a870",red:"#d96060",purple:"#8878c0",
    borderL:"rgba(255,255,255,0.08)",
  };

  // Sync logs → zone timestamps
  React.useEffect(()=>{
    const ts=logsToZoneTimestamps(logs,routine);
    setZoneState(ts); stRef.current=ts;
  },[logs,routine]);

  function refreshMats(st){
    if(typeof THREE==="undefined") return;
    const XP_RGB=[
      [0.23,0.25,0.29],[0.18,0.29,0.43],[0.10,0.42,0.54],[0.10,0.54,0.42],
      [0.18,0.66,0.29],[0.54,0.72,0.18],[0.91,0.63,0.13],[0.91,0.38,0.13],
      [0.91,0.19,0.13],[1.00,0.10,0.10]
    ];
    const mxp=mxpRef.current||{};
    Object.entries(matMapRef.current).forEach(([name,mat])=>{
      const zk=MESH_ZONE_3D[name]||"base";
      const s=getZoneState(zk,st);
      let [r,g,b]=ZONE_COLOR_VALS[s]||ZONE_COLOR_VALS.base;
      // Blend XP level color into rec/base states (not active training states)
      if(s==="rec"||s==="base"){
        const zd=mxp[zk]||mxp[zk.replace('_izq','_der')]||mxp[zk.replace('_der','_izq')];
        const lvl=zd?xpToLevel(zd.xp):1;
        if(lvl>1){
          const [xr,xg,xb]=XP_RGB[Math.min(9,lvl-1)];
          const blend=(lvl-1)/9*0.55; // max 55% blend at level 10
          r=r*(1-blend)+xr*blend;
          g=g*(1-blend)+xg*blend;
          b=b*(1-blend)+xb*blend;
        }
      }
      mat.color.setRGB(r,g,b);
    });
  }
  React.useEffect(()=>{ stRef.current=zoneState; mxpRef.current=muscleXP; refreshMats(zoneState); },[zoneState,muscleXP]);

  // Init Three.js
  React.useEffect(()=>{
    if(!cvsRef.current||!wrapRef.current||typeof THREE==="undefined") return;

    // Check WebGL support first (mobile may lack it)
    const testCanvas=document.createElement('canvas');
    const gl=testCanvas.getContext('webgl2')||testCanvas.getContext('webgl')||testCanvas.getContext('experimental-webgl');
    if(!gl){ setPTxt("WebGL no disponible"); setProgress(0); return; }

    let ren;
    try{
      ren=new THREE.WebGLRenderer({canvas:cvsRef.current,antialias:true,powerPreference:'low-power'});
    }catch(e){
      console.error('WebGL init failed:',e);
      setPTxt("Error 3D"); setProgress(0); return;
    }
    ren.setPixelRatio(Math.min(devicePixelRatio,1.5)); // lower on mobile
    ren.outputEncoding=THREE.sRGBEncoding;
    ren.toneMapping=THREE.ACESFilmicToneMapping;
    ren.toneMappingExposure=1.3;
    ren.setClearColor(0x0a0a0d,1);
    rendRef.current=ren;

    const scene=new THREE.Scene();
    scene.fog=new THREE.FogExp2(0x0a0a0d,0.018);
    const cam=new THREE.PerspectiveCamera(55,1,0.01,1000);
    cam.position.set(0,0,20);
    camRef.current=cam;

    scene.add(new THREE.AmbientLight(0x223344,0.5));
    const kl=new THREE.DirectionalLight(0xfff4e0,2.2); kl.position.set(4,6,8); scene.add(kl);
    const fl=new THREE.DirectionalLight(0x8ab4e8,0.6); fl.position.set(-8,2,4); scene.add(fl);
    const rl=new THREE.DirectionalLight(0xffffff,0.9); rl.position.set(0,4,-12); scene.add(rl);

    function resize(){
      if(!wrapRef.current) return;
      const w=wrapRef.current.clientWidth,h=wrapRef.current.clientHeight;
      ren.setSize(w,h,false); cam.aspect=w/h; cam.updateProjectionMatrix();
    }
    resize();
    const ro=new ResizeObserver(resize); ro.observe(wrapRef.current);

    // -- Horizontal-only orbit ----------------------------------------
    let drag=false,lx=0,rotY=0,rotOffset=0,auto=true,mom=0,ldx=0;
    function applyRot(){ if(modelRef.current) modelRef.current.rotation.y=rotY; }
    const el=cvsRef.current;
    const onDown=e=>{ drag=true; lx=e.clientX; auto=false; ldx=0; };
    const onMove=e=>{ if(!drag) return; const dx=e.clientX-lx; rotY+=dx*0.009; ldx=dx; lx=e.clientX; applyRot(); };
    let autoTimer=null;
    const onUp  =()=>{
      if(drag) mom=ldx*0.008;
      drag=false;
      clearTimeout(autoTimer);
      autoTimer=setTimeout(()=>{
        // Sync rotOffset so auto-rotate continues from current angle
        rotOffset=rotY-(performance.now()-t0)*0.00022;
        auto=true;
      },2000);
    };
    el.addEventListener("pointerdown",onDown);
    window.addEventListener("pointermove",onMove);
    window.addEventListener("pointerup",onUp);

    const t0=performance.now();
    function animate(t){
      rafRef.current=requestAnimationFrame(animate);
      if(auto&&modelRef.current){ rotY=(t-t0)*0.00022+(typeof rotOffset!=='undefined'?rotOffset:0); applyRot(); }
      if(!drag&&!auto&&Math.abs(mom)>0.0002){ rotY+=mom; applyRot(); mom*=0.92; }
      ren.render(scene,cam);
    }
    rafRef.current=requestAnimationFrame(animate);

    // Load GLB
    setProgress(10); setPTxt(es?"cargando...":"loading...");
    fetch("https://danielngr.github.io/FORJA/forja_body.glb")
      .then(r=>{ if(!r.ok) throw new Error("GLB 404"); setProgress(35); return r.arrayBuffer(); })
      .then(buf=>{
        setProgress(60); setPTxt(es?"parseando...":"parsing...");
        const u8=new Uint8Array(buf), dv=new DataView(buf);
        if(dv.getUint32(0,true)!==0x46546C67) throw new Error("Invalid GLB");
        const jLen=dv.getUint32(12,true);
        const gltf=JSON.parse(new TextDecoder().decode(u8.slice(20,20+jLen)));
        const bin=u8.slice(20+jLen+8);
        setProgress(80);
        const group=new THREE.Group();
        gltf.nodes.forEach(node=>{
          if(node.mesh===undefined) return;
          gltf.meshes[node.mesh].primitives.forEach(prim=>{
            const geo=new THREE.BufferGeometry();
            const getArr=(ai,T,n)=>{const a=gltf.accessors[ai],bv=gltf.bufferViews[a.bufferView],off=(bv.byteOffset||0)+(a.byteOffset||0);return new T(bin.buffer,bin.byteOffset+off,a.count*n);};
            if(prim.attributes.POSITION!==undefined) geo.setAttribute("position",new THREE.BufferAttribute(getArr(prim.attributes.POSITION,Float32Array,3).slice(),3));
            if(prim.attributes.NORMAL!==undefined)   geo.setAttribute("normal",new THREE.BufferAttribute(getArr(prim.attributes.NORMAL,Float32Array,3).slice(),3));
            if(prim.indices!==undefined){const a=gltf.accessors[prim.indices];geo.setIndex(new THREE.BufferAttribute(getArr(prim.indices,a.componentType===5123?Uint16Array:Uint32Array,1).slice(),1));}
            if(!geo.attributes.normal) geo.computeVertexNormals();
            const zk=MESH_ZONE_3D[node.name]||"base";
            const s=getZoneState(zk,stRef.current);
            const [r,g,b]=ZONE_COLOR_VALS[s]||ZONE_COLOR_VALS.base;
            const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(r,g,b),roughness:zk==="base"?0.88:0.72,metalness:0.05});
            matMapRef.current[node.name]=mat;
            const mesh=new THREE.Mesh(geo,mat); mesh.name=node.name;
            if(node.translation) mesh.position.set(...node.translation);
            if(node.rotation)    mesh.quaternion.set(...node.rotation);
            if(node.scale)       mesh.scale.set(...node.scale);
            meshMapRef.current[node.name]=mesh; group.add(mesh);
          });
        });
        const box=new THREE.Box3().setFromObject(group);
        const center=box.getCenter(new THREE.Vector3()), size=box.getSize(new THREE.Vector3());
        group.position.sub(center);
        group.position.y -= 5.2;
        group.scale.setScalar(17/Math.max(size.x,size.y,size.z));
        scene.add(group); modelRef.current=group;
        refreshMats(stRef.current);
        setProgress(100); setPTxt(es?"listo":"ready");
        setTimeout(()=>setLoaded(true),300);
      })
      .catch(err=>{ console.error(err); setPTxt("error"); });

    return ()=>{
      cancelAnimationFrame(rafRef.current); ro.disconnect();
      el.removeEventListener("pointerdown",onDown);
      window.removeEventListener("pointermove",onMove);
      window.removeEventListener("pointerup",onUp);
      ren.dispose();
    };
  },[]);

  // Raycast click → show zone info only
  function handleClick(e){
    if(!modelRef.current||typeof THREE==="undefined") return;
    const rect=cvsRef.current.getBoundingClientRect();
    const mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
    const ray=new THREE.Raycaster(); ray.setFromCamera(mouse,camRef.current);
    const hits=ray.intersectObjects(Object.values(meshMapRef.current));
    if(!hits.length){setShowXPTooltip(null);return;}
    const zk2=MESH_ZONE_3D[hits[0].object.name];
    if(zk2&&zk2!=="base"){setActiveZone(zk2);setShowXPTooltip(zk2);}
    if(!hits.length) return;
    const zk=MESH_ZONE_3D[hits[0].object.name];
    if(zk&&zk!=="base") setActiveZone(zk);
  }

  function getStatusText(zk){
    const ts=zoneState[zk];
    if(!ts) return es?"descansado — listo ✓":"rested — ready ✓";
    const h=(Date.now()-ts)/3600000,rec=ZONE_REC_HOURS[zk]||72,left=Math.max(0,rec-h);
    if(h<1) return `${es?"activo":"active"} — ${Math.round(h*60)}m`;
    if(h<rec) return `${es?"recuperando":"recovering"} — ${Math.round(left)}h ${es?"restantes":"left"}`;
    return es?"descansado — listo ✓":"rested — ready ✓";
  }

  // -- Stats data (moved from StatsScreen) -----------------------------
  const prs=Object.entries(logs).map(([id,entries])=>{
    if(!entries||!entries.length) return null;
    const best=entries.reduce((b,e)=>((e.rm||0)>(b.rm||0)?e:b),entries[0]);
    let name=id;
    if(routine) routine.forEach(d=>{if(!d)return;d.ex&&d.ex.forEach(e=>{if(e.id===id)name=e.e;});});
    const hist=[...entries].sort((a,b)=>a.d.localeCompare(b.d)).map(e=>({d:e.d,rm:e.rm||0,w:e.w,r:e.r}));
    return {id,name,best1rm:best.rm||0,bestW:best.w,bestR:best.r,date:best.d,hist};
  }).filter(Boolean).filter(p=>p.best1rm>0).sort((a,b)=>b.best1rm-a.best1rm);

  const today=new Date(), todayStr=today.toISOString().slice(0,10);
  const dow=today.getDay(), daysToMon=dow===0?6:dow-1;
  const weekStart=new Date(today); weekStart.setDate(today.getDate()-daysToMon); weekStart.setHours(0,0,0,0);
  const weekStr=weekStart.toISOString().slice(0,10);
  let weekVol=0,weekSets=0;
  Object.entries(logs).forEach(([id,entries])=>entries.forEach(e=>{if(e.d>=weekStr){if(+e.w>0)weekVol+=((+e.w||0)*(+e.r||1));weekSets++;}}));

  const allDays=new Set();
  Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d)allDays.add(e.d);}));
  let streak=0,sc=new Date(today);
  if(!allDays.has(todayStr)) sc.setDate(sc.getDate()-1);
  while(true){const ds=sc.toISOString().slice(0,10);if(!allDays.has(ds))break;streak++;sc.setDate(sc.getDate()-1);if(streak>365)break;}

  const prView=selPR!==null?prs[selPR]:prs[0];
  const ALL_ZONES=["pecho","dorsal","trapecio","romboides","espalda_baja","abdomen","oblicuos","hombro_izq","hombro_der","bicep_izq","bicep_der","tricep_izq","tricep_der","antebrazo_izq","antebrazo_der","quad","gluteos","isquiotibiales","gemelos","tibia"];

  // Activity grid last 10 weeks
  const WEEKS=10;
  const grid=Array.from({length:WEEKS},(_,wi)=>Array.from({length:7},(_,di)=>{
    const d=new Date(today); d.setDate(today.getDate()-daysToMon-((WEEKS-1-wi)*7)+di); d.setHours(0,0,0,0);
    const ds=d.toISOString().slice(0,10);
    let vol=0; Object.values(logs).forEach(entries=>entries.forEach(e=>{if(e.d===ds)vol+=(+e.w||0)*(+e.r||0);}));

function App(){
  // Idioma persiste en localStorage independiente del perfil
  const[lang,setLangS]=useState(()=>{
    try{return localStorage.getItem('fv8_lang')||null;}catch{return null;}
  });
  const setLang=useCallback(l=>{
    setLangS(l);
    try{if(l)localStorage.setItem('fv8_lang',l);}catch{}
  },[]);

  const[step,setStep]=useState(0);
  const[profile,setProfile]=useState(null);
  const[routine,setRoutine]=useState(null);
  const[ready,setReady]=useState(false);
  const[authChecked,setAuthChecked]=useState(false);

  useEffect(()=>{
    const sb=getSB();

    // Helper: load profile and go to app or onboarding
    const loadAndRoute=(skipOnboard=false)=>{
      FStore.loadProfile().then(data=>{
        if(data&&data.profile){
          setProfile(data.profile);
          // Preserve lang from localStorage, fallback to profile lang
          setLangS(l=>l||data.profile.lang||'es');
          if(data.routine)setRoutine(data.routine);
          setStep(99);
        } else if(skipOnboard){
          // Google user logged in but no profile yet → go to onboarding
          // Keep lang from localStorage or default
          setLangS(l=>l||'es');
          setStep(0);
        }
        setReady(true);
        setAuthChecked(true);
      }).catch(()=>{setReady(true);setAuthChecked(true);});
    };

    // Check for OAuth hash in URL (returning from Google)
    const hasOAuthHash=window.location.hash.includes('access_token')||
      window.location.hash.includes('refresh_token')||
      window.location.search.includes('code=');

    if(hasOAuthHash&&sb){
      // Clean URL immediately so refreshing doesn't re-trigger
      window.history.replaceState(null,'',window.location.pathname);
      // Wait for Supabase to process the hash and fire SIGNED_IN
      const{data:{subscription}}=sb.auth.onAuthStateChange((event,session)=>{
        if(event==='SIGNED_IN'&&session?.user){
          _user=session.user;
          subscription.unsubscribe();
          loadAndRoute(true);
        }
      });
      // Fallback: if no SIGNED_IN fires in 4s, show app anyway
      setTimeout(()=>{if(!authChecked)loadAndRoute(true);},4000);
    } else {
      // Normal startup — check existing session first, then localStorage
      if(sb){
        sb.auth.getSession().then(({data:{session}})=>{
          if(session?.user) _user=session.user;
          loadAndRoute(false);
        }).catch(()=>loadAndRoute(false));
      } else {
        loadAndRoute(false);
      }
    }
  },[]);

  const sp=useCallback(p=>{setProfile(p);},[]);
  const sr=useCallback(r=>{setRoutine(r);},[]);

  if(!ready)return(
    <div style={{minHeight:"100vh",background:"#07080a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:52,letterSpacing:12,color:"#EEEAE3",opacity:.15}}>FORJA</div>
    </div>
  );
  if(step<99)return <Onboard lang={lang} setLang={setLang} step={step} setStep={setStep} sp={sp} sr={sr}/>;
  return <Main lang={lang} setLang={setLang} profile={profile} routine={routine} sp={sp} sr={sr} setStep={setStep}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
(function initDumbbell(){
  function tryInit(){
    const canvas = document.getElementById("forja-dumbbell-canvas");
    if(!canvas || !window.THREE) return;
    if(canvas.dataset.forjaInit) return;
    canvas.dataset.forjaInit="1";
    const wrap = canvas.parentElement;
    const W = wrap.offsetWidth||360;
    const H = wrap.offsetHeight||260;

    const renderer = new THREE.WebGLRenderer({canvas, antialias:false, alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46,W/H,0.1,100);
    camera.position.set(0,0,9.5);

    const parts = [
      {xC:0,     r:0.12, th:1.44, type:"cyl"},
      {xC:-0.80, r:0.20, th:0.09, type:"disc"},
      {xC: 0.80, r:0.20, th:0.09, type:"disc"},
      {xC:-0.99, r:1.20, th:0.11, type:"disc"},
      {xC: 0.99, r:1.20, th:0.11, type:"disc"},
      {xC:-1.19, r:0.88, th:0.10, type:"disc"},
      {xC: 1.19, r:0.88, th:0.10, type:"disc"},
      {xC:-1.36, r:0.58, th:0.09, type:"disc"},
      {xC: 1.36, r:0.58, th:0.09, type:"disc"},
      {xC:-1.48, r:0.10, th:0.10, type:"cyl"},
      {xC: 1.48, r:0.10, th:0.10, type:"cyl"},
    ];
    parts.forEach(p=>{ p.area = p.type==="cyl" ? p.th*p.r*2 : p.r*p.r; });
    const totalArea = parts.reduce((s,p)=>s+p.area,0);
    let acc=0;
    parts.forEach(p=>{ p.w=p.area/totalArea; p.cumW=acc+p.w; acc=p.cumW; });

    function samplePart(){
      const rnd=Math.random();
      const p=parts.find(p=>rnd<=p.cumW)||parts[parts.length-1];
      const a=Math.random()*Math.PI*2;
      if(p.type==="cyl") return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*Math.random()*p.r, z:Math.cos(a)*Math.random()*p.r};
      const rad=Math.sqrt(Math.random())*p.r;
      return {x:p.xC+(Math.random()-0.5)*p.th, y:Math.sin(a)*rad, z:Math.cos(a)*rad};
    }

    const CORE=48000, DISP=42000, TOTAL=CORE+DISP;
    const pos=new Float32Array(TOTAL*3), col=new Float32Array(TOTAL*3);

    for(let i=0;i<CORE;i++){
      const s=samplePart();
      const zOff=(Math.random()-0.5)*0.26;
      pos[i*3]=s.x+(Math.random()-0.5)*0.020;
      pos[i*3+1]=s.y+(Math.random()-0.5)*0.020;
      pos[i*3+2]=s.z+zOff;
      const distR=Math.sqrt(s.y*s.y+s.z*s.z);
      const radialT=Math.min(distR/1.20,1.0);
      const depthT=(zOff+0.13)/0.26;
      const t=radialT*0.40+depthT*0.20+Math.random()*0.08;
      const v=0.70+t*0.30;
      // blanco puro en el centro, azulado en bordes
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const idx=CORE+i;
      const s=samplePart();
      const sx=s.x, sy=s.y, sz=s.z;
      const len=Math.sqrt(sy*sy+sz*sz)+0.001;
      const ny=sy/len, nz=sz/len;
      const nx=(Math.abs(sx)>0.8&&Math.abs(sy)<0.15&&Math.abs(sz)<0.15)?Math.sign(sx)*0.3:0;
      const eD=Math.pow(Math.random(),0.35)*7.0;
      const spread=1.4;
      const dx=nx+(Math.random()-0.5)*spread;
      const dy=ny+(Math.random()-0.5)*spread;
      const dz=nz+(Math.random()-0.5)*spread;
      const dlen=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
      pos[idx*3]=sx+(dx/dlen)*eD;
      pos[idx*3+1]=sy+(dy/dlen)*eD;
      pos[idx*3+2]=sz+(dz/dlen)*eD;
      const fadeT=eD/7.0;
      const op=Math.max(0,1.0-fadeT*0.88);
      // fade de blanco (#F0F2F5) hacia bg (#383e4e)
      col[idx*3]=0.94*op+0.22*(1-op);
      col[idx*3+1]=0.96*op+0.243*(1-op);
      col[idx*3+2]=1.0*op+0.306*(1-op);
    }

    const geo=new THREE.BufferGeometry();
    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",   new THREE.BufferAttribute(col,3));
    const mat=new THREE.PointsMaterial({size:0.014,vertexColors:true,transparent:true,opacity:0.88,sizeAttenuation:true});
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);

    let t=0, animId;
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      pts.rotation.y=Math.sin(t*0.45)*0.50;
      pts.rotation.x=Math.sin(t*0.28)*0.05;
      renderer.render(scene,camera);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){ cancelAnimationFrame(animId); } else { animate(); }
    });
  }

  window.addEventListener("forja:mount", tryInit);
  document.addEventListener("DOMContentLoaded", tryInit);
  window.addEventListener("load", tryInit);
  setInterval(tryInit, 200);
})();
</script>

    {

        const br=Math.min(1,(0.60+Math.random()*0.40)*boost);

      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('color',new THREE.BufferAttribute(c,3));
      {const pts=new THREE.Points(g,new THREE.PointsMaterial({
        size:0.040,vertexColors:true,transparent:true,
        opacity:0.96,sizeAttenuation:true,depthWrite:false
      }));pts.renderOrder=1;scene.add(pts);}
    }

    // -- ARCO SUPERIOR (lente gravitacional) ---------------------------
    {
      const N=30000,p=new Float32Array(N*3),c=new Float32Array(N*3);
      for(let i=0;i<N;i++){
        const r=(1.10+Math.pow(Math.random(),0.44)*3.2)*G;
        const ang=Math.random()*Math.PI*2;
        const norm=Math.min((r/G-1.10)/3.2,1);
        // Limitar altura máxima — arco no sube más allá de BH_Y+0.55
        // para no tapar al mono que está en Y positivo
        const hRaw=(0.35+Math.exp(-(r/G-1.10)*0.85)*0.90+(Math.random()-0.5)*0.03)*G;
        const hClamped=Math.min(hRaw, 1.20); // arco rodea al mono
        p[i*3  ]=Math.cos(ang)*r*0.97;
        p[i*3+1]=hClamped+BH_Y;
        p[i*3+2]=Math.sin(ang)*r*0.15;
        const doppler=Math.sin(ang-Math.PI*0.55);
        const[cr,cg,cb]=diskColor(norm*1.1,doppler*0.8);
        const br=(0.16+Math.random()*0.32)*(1-norm*0.82);
        c[i*3]=Math.min(1,cr*br); c[i*3+1]=Math.min(1,cg*br); c[i*3+2]=Math.min(1,cb*br);
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.BufferAttribute(p,3));
      g.setAttribute('color',new THREE.BufferAttribute(c,3));
      {const pts=new THREE.Points(g,new THREE.PointsMaterial({
        size:0.018,vertexColors:true,transparent:true,
        opacity:0.82,sizeAttenuation:true,depthWrite:false

        p[i*3]=Math.cos(ang)*r*0.95; p[i*3+1]=h+BH_Y; p[i*3+2]=Math.sin(ang)*r*0.12;

    // -- ESFERA NEGRA — tapa el disco pero el mono se agrega después ---

    const sphere=new THREE.Mesh(

    );
    sphere.position.y=BH_Y;
    sphere.renderOrder=0;
    scene.add(sphere);

    // -- FIGURA PLATEADA -----------------------------------------------
    let figPts=null,T=0,animId=null;

    function loadImg(url,fb){
      const img=new Image();
      img.crossOrigin="anonymous";

      img.onerror=()=>{
        if(fb){const i2=new Image();i2.crossOrigin="anonymous";i2.onload=()=>buildFigure(i2);i2.onerror=()=>startAnim();i2.src=fb;}
        else startAnim();
      };
      img.src=url;
    }

    function buildFigure(img){
      const OW=320,OH=320;
      const off=document.createElement("canvas");
      off.width=OW;off.height=OH;
      const ctx=off.getContext("2d");
      ctx.drawImage(img,0,0,OW,OH);

      const pts2d=[];
      const yStart=Math.floor(OH*0.08),yMax=Math.floor(OH*0.86),yRange=yMax-yStart;
      for(let y=yStart;y<yMax;y++){
        for(let x=0;x<OW;x++){
          const i=(y*OW+x)*4,r=data[i],g=data[i+1],b=data[i+2];

      const SPLIT_NY=0.0;

      const ptBottom=pts2d.filter(p=>p.ny<=SPLIT_NY);

      function makeLayer(pts,renderOrder){
        if(!pts.length) return null;

          pos[i*3+2]=(Math.random()-0.5)*0.06;
          col[i*3]=p.r; col[i*3+1]=p.g; col[i*3+2]=p.b;

      figPts = makeLayer(ptBottom, 0);
      const figTop = makeLayer(ptTop, 2);

      figPts._top = figTop;

    }

    function startAnim(){
      if(animId) cancelAnimationFrame(animId);

          dAng[i]+=0.45/Math.pow(dRad[i]/G,1.5)*0.003;
          arr[i*3]=Math.cos(dAng[i])*dRad[i];
          arr[i*3+2]=Math.sin(dAng[i])*dRad[i];

        // Figura: breathing — animar ambas capas juntas
        if(figPts){
          const by=Math.sin(T*0.45)*0.038;
          const bry=Math.sin(T*0.18)*0.045;
          const brx=Math.sin(T*0.13)*0.010;
          figPts.position.y=by; figPts.rotation.y=bry; figPts.rotation.x=brx;
          if(figPts._top){
            figPts._top.position.y=by;
            figPts._top.rotation.y=bry;
            figPts._top.rotation.x=brx;
          }
        }

        // Cámara: leve órbita
        camera.position.x=Math.sin(T*0.022)*0.4;
        camera.position.y=0.15+Math.sin(T*0.035)*0.10;
        camera.lookAt(0,-0.5,0);

        renderer.render(scene,camera);
      }
      animate();
      document.addEventListener("visibilitychange",()=>{
        if(document.hidden) cancelAnimationFrame(animId); else startAnim();
      });
    }

    loadImg(gender==="female"?FEMALE_URL:MALE_URL,gender==="female"?FEMALE_FB:MALE_FB);
  }

  window.addEventListener("forja:mount",tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit,300);
})();
</script>

<script>
(function initLogoParticles(){
  function tryInit(){
    const canvas=document.getElementById("forja-logo-canvas");
    if(!canvas||!window.THREE) return;
    if(canvas.dataset.linit) return;
    canvas.dataset.linit="1";

    const W=window.innerWidth||canvas.offsetWidth||360;
    const H=window.innerHeight||canvas.offsetHeight||640;

    const OW=800,OH=200; // canvas offscreen para renderizar "FORJA"
    const off=document.createElement("canvas");
    off.width=OW; off.height=OH;
    const ctx=off.getContext("2d");
    ctx.fillStyle="#ffffff";
    ctx.fillRect(0,0,OW,OH);
    ctx.fillStyle="#000000";
    ctx.font="900 148px Arial Black,Arial,sans-serif";
    ctx.textBaseline="middle";
    ctx.textAlign="center";
    ctx.fillText("FORJA",OW/2,OH/2);

    // Samplear píxeles del texto
    const imgData=ctx.getImageData(0,0,OW,OH);
    const pts2d=[];    // todos los píxeles del texto (para el logo estático)
    const edge2d=[];   // solo bordes (para la explosión)

    for(let y=0;y<OH;y+=2){
      for(let x=0;x<OW;x+=2){
        const i=(y*OW+x)*4;
        const isDark=imgData.data[i]<140;
        if(!isDark) continue;
        pts2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});

        // Borde: al menos un vecino es blanco (fuera de la letra)
        const isEdge=(
          imgData.data[((y-2)*OW+x)*4]>140 ||
          imgData.data[((y+2)*OW+x)*4]>140 ||
          imgData.data[(y*OW+(x-2))*4]>140 ||
          imgData.data[(y*OW+(x+2))*4]>140
        );
        if(isEdge) edge2d.push({x:((x/OW)*2-1), y:(1-(y/OH)*2)});
      }
    }

    const renderer=new THREE.WebGLRenderer({canvas,antialias:false,alpha:true});
    renderer.setSize(W,H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x000000,0);

    const scene=new THREE.Scene();
    const aspect=W/H;
    // Canvas es ahora full viewport — frustum cubre todo
    const vRange=1.0;
    const cam=new THREE.OrthographicCamera(-aspect,aspect,vRange,-vRange,0.1,100);
    cam.position.set(0,0,10);

    const TOTAL=pts2d.length;
    const DISP=Math.floor(TOTAL*8);
    const pos=new Float32Array(TOTAL*3);
    const col=new Float32Array(TOTAL*3);
    const posD=new Float32Array(DISP*3);
    const colD=new Float32Array(DISP*3);

    // Texto en el tercio superior — partículas explotan hacia toda la pantalla
    const scaleX=aspect*0.90, scaleY=vRange*0.28;
    const textOffsetY=0.52; // offset hacia arriba
    const edgeSrc=edge2d.length>0?edge2d:pts2d;

    for(let i=0;i<TOTAL;i++){
      const p=pts2d[i];
      pos[i*3  ]=p.x*scaleX+(Math.random()-0.5)*0.012;
      pos[i*3+1]=p.y*scaleY+textOffsetY+(Math.random()-0.5)*0.012;
      pos[i*3+2]=(Math.random()-0.5)*0.03;
      const v=0.80+Math.random()*0.18;
      col[i*3]=v*0.94; col[i*3+1]=v*0.96; col[i*3+2]=v;
    }

    for(let i=0;i<DISP;i++){
      const src=edgeSrc[Math.floor(Math.random()*edgeSrc.length)];
      const cx=src.x, cy=src.y;
      const len=Math.sqrt(cx*cx+cy*cy)+0.001;
      const baseAngX=cx/len, baseAngY=cy/len;
      const deviation=(Math.random()-0.5)*Math.PI*1.2;
      const cosD=Math.cos(deviation), sinD=Math.sin(deviation);
      const dirX=baseAngX*cosD-baseAngY*sinD;
      const dirY=baseAngX*sinD+baseAngY*cosD;

      const u=Math.random();
      const eD=-Math.log(1-u*0.98)*0.55*aspect;
      const jitterD=(Math.random()-0.5)*0.3*aspect;
      const finalD=Math.max(0.1, eD+jitterD);

      posD[i*3  ]=src.x*scaleX+dirX*finalD;
      posD[i*3+1]=src.y*scaleY+textOffsetY+dirY*finalD; // Y sin compresión — pantalla completa
      posD[i*3+2]=(Math.random()-0.5)*0.6;

      const op=Math.max(0, Math.exp(-finalD/(aspect*0.5))*0.85*(0.5+Math.random()*0.5));
      colD[i*3  ]=0.94*op+0.22*(1-op);
      colD[i*3+1]=0.96*op+0.243*(1-op);
      colD[i*3+2]=1.0*op+0.306*(1-op);
    }

    const geoC=new THREE.BufferGeometry();
    geoC.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geoC.setAttribute("color",new THREE.BufferAttribute(col,3));
    scene.add(new THREE.Points(geoC,new THREE.PointsMaterial({size:0.020,vertexColors:true,transparent:true,opacity:0.95,sizeAttenuation:true})));

    const geoD=new THREE.BufferGeometry();
    geoD.setAttribute("position",new THREE.BufferAttribute(posD,3));
    geoD.setAttribute("color",new THREE.BufferAttribute(colD,3));
    const matD=new THREE.PointsMaterial({size:0.018,vertexColors:true,transparent:true,opacity:0.90,sizeAttenuation:true});
    const ptsD=new THREE.Points(geoD,matD);
    scene.add(ptsD);

    // Per-particle phase + speed para movimiento notorio e independiente
    const phases=Array.from({length:DISP},()=>Math.random()*Math.PI*2);
    const speeds=Array.from({length:DISP},()=>0.6+Math.random()*1.4); // más rápido
    const amps  =Array.from({length:DISP},()=>0.04+Math.random()*0.08); // muy notorio

    let t=0,animId;
    const posD0=new Float32Array(posD);
    function animate(){
      animId=requestAnimationFrame(animate);
      t+=0.006;
      // Texto FORJA: wobble sutil
      scene.children[0].rotation.x=Math.sin(t*0.35)*0.04;
      scene.children[0].rotation.z=Math.sin(t*0.22)*0.012;
      // Partículas dispersas: drift independiente y notorio
      const arr=geoD.attributes.position.array;
      for(let i=0;i<DISP;i++){
        const ph=phases[i], sp=speeds[i], am=amps[i];
        arr[i*3  ]=posD0[i*3  ]+Math.sin(t*sp+ph)*am;
        arr[i*3+1]=posD0[i*3+1]+Math.cos(t*sp*0.7+ph)*am*0.7;
        arr[i*3+2]=posD0[i*3+2];
      }
      geoD.attributes.position.needsUpdate=true;
      renderer.render(scene,cam);
    }
    animate();

    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){cancelAnimationFrame(animId);}else{animate();}
    });
  }

  window.addEventListener("forja:mount", tryInit);
  window.addEventListener("load",tryInit);
  setInterval(tryInit, 200);
})();
</script>
